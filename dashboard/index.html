        const SettingsScreen = ({ seller, onSellerUpdate }) => {
            const supabase = window.supabaseClient;
            const hashPin = window.hashPin;

            const [flash, setFlash] = useState({ show: false, message: '', type: 'success' });
            const showFlash = (message, type = 'success') => {
                setFlash({ show: true, message, type });
                setTimeout(() => setFlash({ show: false, message: '', type: 'success' }), 3000);
            };

            // ---- Profile & Store ----
            const [profile, setProfile] = useState({
                full_name: seller.full_name || '',
                business_name: seller.business_name || '',
                business_description: seller.business_description || '',
                seller_phone: seller.seller_phone || seller.phone || '',
                location: seller.location || '',
                address: seller.address || '',
                logo_url: seller.logo_url || '',
                banner_url: seller.banner_url || '',
                preferred_language: seller.preferred_language || 'en',
            });
            const [savingProfile, setSavingProfile] = useState(false);

            const saveProfile = async () => {
                setSavingProfile(true);
                try {
                    const { error } = await supabase.from('sellers').update(profile).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, ...profile };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Profile updated successfully!');
                } catch (err) { showFlash('Failed to update profile: ' + err.message, 'error'); }
                setSavingProfile(false);
            };

            // ---- Change PIN ----
            const [pinData, setPinData] = useState({ current: '', newPin: '', confirm: '' });
            const [savingPin, setSavingPin] = useState(false);

            const changePin = async () => {
                if (!pinData.current || !pinData.newPin || !pinData.confirm) {
                    showFlash('Please fill in all PIN fields', 'error'); return;
                }
                if (pinData.newPin.length < 4) {
                    showFlash('New PIN must be at least 4 digits', 'error'); return;
                }
                if (pinData.newPin !== pinData.confirm) {
                    showFlash('New PIN and confirmation do not match', 'error'); return;
                }
                setSavingPin(true);
                try {
                    const { data: res, error } = await supabase.rpc('seller_change_pin', {
                        p_seller_id: seller.id, p_current_pin: pinData.current, p_new_pin: pinData.newPin
                    });
                    if (error) throw new Error('Could not change PIN. Please try again.');
                    if (!res || res.error) { showFlash((res && res.message) || 'Current PIN is incorrect', 'error'); setSavingPin(false); return; }
                    setPinData({ current: '', newPin: '', confirm: '' });
                    showFlash('PIN changed successfully!');
                } catch (err) { showFlash('Failed to change PIN: ' + err.message, 'error'); }
                setSavingPin(false);
            };

            // ---- Business Hours ----
            const defaultHours = { mon: '', tue: '', wed: '', thu: '', fri: '', sat: '', sun: '' };
            const [hours, setHours] = useState({ ...defaultHours, ...(seller.business_hours || {}) });
            const [savingHours, setSavingHours] = useState(false);
            const dayLabels = { mon: 'Monday', tue: 'Tuesday', wed: 'Wednesday', thu: 'Thursday', fri: 'Friday', sat: 'Saturday', sun: 'Sunday' };

            const saveHours = async () => {
                setSavingHours(true);
                try {
                    const { error } = await supabase.from('sellers').update({ business_hours: hours }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, business_hours: hours };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Business hours saved!');
                } catch (err) { showFlash('Failed to save hours: ' + err.message, 'error'); }
                setSavingHours(false);
            };

            // ---- Delivery & Shipping ----
            const allDeliveryMethods = [
                { id: 'pickup', label: 'Customer Pickup', desc: 'Customer collects from your location' },
                { id: 'self_delivery', label: 'Seller Delivery', desc: 'You deliver to customer address' },
                { id: 'courier', label: 'Third-Party Courier', desc: 'Via Pargo, Aramex, local courier, etc.' }
            ];
            const [deliveryMethods, setDeliveryMethods] = useState(seller.delivery_methods || ['pickup']);
            const [deliveryFee, setDeliveryFee] = useState((seller.delivery_fee || 0).toString());
            const [deliveryFeeType, setDeliveryFeeType] = useState(seller.delivery_fee_type || 'flat');
            const [pickupAddress, setPickupAddress] = useState(seller.pickup_address || seller.address || '');
            const [deliveryNotes, setDeliveryNotes] = useState(seller.delivery_notes || '');
            const [areasText, setAreasText] = useState((seller.delivery_areas || []).join(', '));
            const [savingDelivery, setSavingDelivery] = useState(false);

            const toggleMethod = (id) => {
                setDeliveryMethods(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
            };

            const saveDelivery = async () => {
                if (deliveryMethods.length === 0) { showFlash('Enable at least one delivery method', 'error'); return; }
                setSavingDelivery(true);
                const areasArray = areasText.split(',').map(a => a.trim()).filter(Boolean);
                const updates = {
                    delivery_methods: deliveryMethods,
                    delivery_fee: parseFloat(deliveryFee) || 0,
                    delivery_fee_type: deliveryFeeType,
                    pickup_address: pickupAddress,
                    delivery_notes: deliveryNotes,
                    delivery_areas: areasArray
                };
                try {
                    const { error } = await supabase.from('sellers').update(updates).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, ...updates };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Delivery settings saved!');
                } catch (err) { showFlash('Failed to save delivery settings: ' + err.message, 'error'); }
                setSavingDelivery(false);
            };

            // ---- Bank / Payment Details ----
            const [bankDetails, setBankDetails] = useState({
                bank_name: '', account_holder: '', account_number: '', branch_code: '', reference: '',
                ...(seller.bank_details || {})
            });
            const [savingBank, setSavingBank] = useState(false);

            const saveBank = async () => {
                setSavingBank(true);
                try {
                    const { error } = await supabase.from('sellers').update({ bank_details: bankDetails }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, bank_details: bankDetails };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Bank details saved!');
                } catch (err) { showFlash('Failed to save bank details: ' + err.message, 'error'); }
                setSavingBank(false);
            };

            // ---- Social Links ----
            const [social, setSocial] = useState({
                facebook: '', instagram: '', tiktok: '', website: '',
                ...(seller.social_links || {})
            });
            const [savingSocial, setSavingSocial] = useState(false);

            const saveSocial = async () => {
                setSavingSocial(true);
                try {
                    const { error } = await supabase.from('sellers').update({ social_links: social }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, social_links: social };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Social links saved!');
                } catch (err) { showFlash('Failed to save social links: ' + err.message, 'error'); }
                setSavingSocial(false);
            };

            // Helpers — defined outside render to prevent re-creation

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-gray-900">Settings</h2>

                    {/* Flash message */}
                    {flash.show && (
                        <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-lg text-sm font-semibold animate-pulse ${
                            flash.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
                        }`}>
                            {flash.message}
                        </div>
                    )}

                    {/* 1. Profile & Store */}
                    <SettingsSectionCard icon={<Icons.store />} title="Profile & Store">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Full Name" value={profile.full_name} onChange={v => setProfile({...profile, full_name: v})} placeholder="Your name" />
                            <SettingsInputField label="Business Name" value={profile.business_name} onChange={v => setProfile({...profile, business_name: v})} placeholder="Store name" />
                        </div>
                        <SettingsInputField label="Business Description" value={profile.business_description} onChange={v => setProfile({...profile, business_description: v})} placeholder="What do you sell?" textarea />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Phone (WhatsApp)" value={profile.seller_phone} onChange={v => setProfile({...profile, seller_phone: v})} placeholder="+27..." type="tel" />
                            <SettingsInputField label="Location" value={profile.location} onChange={v => setProfile({...profile, location: v})} placeholder="City, Province" />
                        </div>
                        <SettingsInputField label="Address" value={profile.address} onChange={v => setProfile({...profile, address: v})} placeholder="Full street address" />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Logo URL" value={profile.logo_url} onChange={v => setProfile({...profile, logo_url: v})} placeholder="https://..." />
                            <SettingsInputField label="Banner URL" value={profile.banner_url} onChange={v => setProfile({...profile, banner_url: v})} placeholder="https://..." />
                        </div>
                        {(profile.logo_url || profile.banner_url) && (
                            <div className="flex gap-4">
                                {profile.logo_url && (
                                    <div>
                                        <p className="text-xs text-gray-400 mb-1">Logo Preview</p>
                                        <img src={profile.logo_url} alt="Logo" className="w-16 h-16 rounded-xl object-cover border border-gray-200" onError={e => e.target.style.display='none'} />
                                    </div>
                                )}
                                {profile.banner_url && (
                                    <div className="flex-1">
                                        <p className="text-xs text-gray-400 mb-1">Banner Preview</p>
                                        <img src={profile.banner_url} alt="Banner" className="w-full h-16 rounded-xl object-cover border border-gray-200" onError={e => e.target.style.display='none'} />
                                    </div>
                                )}
                            </div>
                        )}
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Preferred Language</label>
                            <select value={profile.preferred_language} onChange={e => setProfile({...profile, preferred_language: e.target.value})}
                                className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50">
                                <option value="en">English</option>
                                <option value="st">Sesotho</option>
                            </select>
                        </div>
                        <SettingsSaveButton onClick={saveProfile} saving={savingProfile} />
                    </SettingsSectionCard>

                    {/* 2. Change PIN */}
                    <SettingsSectionCard icon={<Icons.lock />} title="Change PIN">
                        <SettingsInputField label="Current PIN" value={pinData.current} onChange={v => setPinData({...pinData, current: v})} type="password" placeholder="Enter current PIN" />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="New PIN" value={pinData.newPin} onChange={v => setPinData({...pinData, newPin: v})} type="password" placeholder="At least 4 digits" />
                            <SettingsInputField label="Confirm New PIN" value={pinData.confirm} onChange={v => setPinData({...pinData, confirm: v})} type="password" placeholder="Re-enter new PIN" />
                        </div>
                        <SettingsSaveButton onClick={changePin} saving={savingPin} label="Change PIN" />
                    </SettingsSectionCard>

                    {/* 3. Business Hours */}
                    <SettingsSectionCard icon={<Icons.clock />} title="Business Hours">
                        <p className="text-xs text-gray-400">Enter hours like "08:00 - 17:00" or "Closed"</p>
                        <div className="space-y-2">
                            {Object.keys(dayLabels).map(d => (
                                <div key={d} className="flex items-center gap-3">
                                    <span className="text-sm font-medium text-gray-600 w-24">{dayLabels[d]}</span>
                                    <input type="text" value={hours[d] || ''} onChange={e => setHours({...hours, [d]: e.target.value})}
                                        placeholder="e.g. 08:00 - 17:00"
                                        className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                </div>
                            ))}
                        </div>
                        <SettingsSaveButton onClick={saveHours} saving={savingHours} />
                    </SettingsSectionCard>

                    {/* 4. Delivery & Shipping */}
                    <SettingsSectionCard icon={<Icons.mapPin />} title="Delivery & Shipping">
                        <p className="text-xs text-gray-400 -mt-1">Choose how customers can receive their orders.</p>

                        {/* Delivery Methods */}
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Delivery Methods</label>
                            <div className="space-y-2">
                                {allDeliveryMethods.map(m => (
                                    <label key={m.id} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition ${
                                        deliveryMethods.includes(m.id) ? 'border-brand-500 bg-brand-50' : 'border-gray-200 bg-gray-50 hover:border-gray-300'
                                    }`}>
                                        <input type="checkbox" checked={deliveryMethods.includes(m.id)} onChange={() => toggleMethod(m.id)}
                                            className="w-4 h-4 rounded text-brand-500 focus:ring-brand-500" />
                                        <div>
                                            <span className="text-sm font-semibold text-gray-900">{m.label}</span>
                                            <span className="text-xs text-gray-500 ml-2">{m.desc}</span>
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </div>

                        {/* Delivery Fee (only if delivery/courier enabled) */}
                        {(deliveryMethods.includes('self_delivery') || deliveryMethods.includes('courier')) && (
                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 space-y-3">
                                <p className="text-xs font-semibold text-amber-800">Delivery Fee — charged when customer selects delivery (pickup is always free)</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Fee Type</label>
                                        <select value={deliveryFeeType} onChange={e => setDeliveryFeeType(e.target.value)}
                                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                                            <option value="flat">Flat fee (R)</option>
                                            <option value="free_above">Free above threshold (R)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">
                                            {deliveryFeeType === 'flat' ? 'Delivery Fee (R)' : 'Fee (R) — free above this order total'}
                                        </label>
                                        <input type="number" value={deliveryFee} onChange={e => setDeliveryFee(e.target.value)} min="0" step="5"
                                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Pickup Address */}
                        {deliveryMethods.includes('pickup') && (
                            <SettingsInputField label="Pickup Address / Instructions" value={pickupAddress} onChange={setPickupAddress}
                                placeholder="e.g. 123 Main St, Maseru — ring bell at gate" textarea />
                        )}

                        {/* Delivery Areas */}
                        <SettingsInputField label="Delivery Areas (comma separated)" value={areasText} onChange={setAreasText}
                            placeholder="Maseru, Ladybrand, Bloemfontein" textarea />
                        {areasText && (
                            <div className="flex flex-wrap gap-2">
                                {areasText.split(',').map(a => a.trim()).filter(Boolean).map((a, i) => (
                                    <span key={i} className="bg-brand-50 text-brand-700 text-xs font-medium px-3 py-1 rounded-full">{a}</span>
                                ))}
                            </div>
                        )}

                        {/* Delivery Notes */}
                        <SettingsInputField label="Delivery Notes (shown to buyer)" value={deliveryNotes} onChange={setDeliveryNotes}
                            placeholder="e.g. Delivery within 24hrs of order confirmation. Courier orders may take 2-3 days." textarea />

                        <SettingsSaveButton onClick={saveDelivery} saving={savingDelivery} />
                    </SettingsSectionCard>

                    {/* 5. Bank / Payment Details */}
                    <SettingsSectionCard icon={<Icons.bank />} title="Bank / Payment Details">
                        <p className="text-xs text-gray-400">These details are shown to buyers when they select EFT payment.</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Bank Name" value={bankDetails.bank_name} onChange={v => setBankDetails({...bankDetails, bank_name: v})} placeholder="e.g. FNB, Capitec" />
                            <SettingsInputField label="Account Holder" value={bankDetails.account_holder} onChange={v => setBankDetails({...bankDetails, account_holder: v})} placeholder="Name on account" />
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Account Number" value={bankDetails.account_number} onChange={v => setBankDetails({...bankDetails, account_number: v})} placeholder="Account number" />
                            <SettingsInputField label="Branch Code" value={bankDetails.branch_code} onChange={v => setBankDetails({...bankDetails, branch_code: v})} placeholder="Branch code" />
                        </div>
                        <SettingsInputField label="Payment Reference" value={bankDetails.reference} onChange={v => setBankDetails({...bankDetails, reference: v})} placeholder="e.g. Order number" />
                        <SettingsSaveButton onClick={saveBank} saving={savingBank} />
                    </SettingsSectionCard>

                    {/* 6. Social Links */}
                    <SettingsSectionCard icon={<Icons.externalLink />} title="Social Links">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Facebook" value={social.facebook} onChange={v => setSocial({...social, facebook: v})} placeholder="https://facebook.com/..." />
                            <SettingsInputField label="Instagram" value={social.instagram} onChange={v => setSocial({...social, instagram: v})} placeholder="https://instagram.com/..." />
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="TikTok" value={social.tiktok} onChange={v => setSocial({...social, tiktok: v})} placeholder="https://tiktok.com/@..." />
                            <SettingsInputField label="Website" value={social.website} onChange={v => setSocial({...social, website: v})} placeholder="https://..." />
                        </div>
                        <SettingsSaveButton onClick={saveSocial} saving={savingSocial} />
                    </SettingsSectionCard>
                </div>
            );
        };

        // ============================================================================
        // DISCOUNTS SCREEN
        // ============================================================================

        const DiscountsScreen = ({ seller }) => {
            const [codes, setCodes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingCode, setEditingCode] = useState(null);
            const [saving, setSaving] = useState(false);
            const [form, setForm] = useState({
                code: '', type: 'percentage', value: '', min_order: '',
                max_uses: '', expires_at: '', is_active: true
            });

            const supabase = window.supabaseClient;

            useEffect(() => { loadCodes(); }, [seller.id]);

            const loadCodes = async () => {
                setLoading(true);
                const { data } = await supabase
                    .from('discount_codes')
                    .select('*')
                    .eq('seller_id', seller.id)
                    .order('created_at', { ascending: false });
                setCodes(data || []);
                setLoading(false);
            };

            const resetForm = () => {
                setForm({ code: '', type: 'percentage', value: '', min_order: '', max_uses: '', expires_at: '', is_active: true });
                setEditingCode(null);
                setShowForm(false);
            };

            const openEdit = (dc) => {
                setForm({
                    code: dc.code,
                    type: dc.type,
                    value: dc.value.toString(),
                    min_order: dc.min_order ? dc.min_order.toString() : '',
                    max_uses: dc.max_uses ? dc.max_uses.toString() : '',
                    expires_at: dc.expires_at ? dc.expires_at.slice(0, 16) : '',
                    is_active: dc.is_active
                });
                setEditingCode(dc);
                setShowForm(true);
            };

            const handleSave = async () => {
                if (!form.code.trim() || !form.value) return;
                setSaving(true);
                const payload = {
                    seller_id: seller.id,
                    code: form.code.trim().toUpperCase(),
                    type: form.type,
                    value: parseFloat(form.value),
                    min_order: form.min_order ? parseFloat(form.min_order) : 0,
                    max_uses: form.max_uses ? parseInt(form.max_uses) : null,
                    expires_at: form.expires_at ? new Date(form.expires_at).toISOString() : null,
                    is_active: form.is_active
                };

                if (editingCode) {
                    await supabase.from('discount_codes').update(payload).eq('id', editingCode.id);
                } else {
                    await supabase.from('discount_codes').insert(payload);
                }

                setSaving(false);
                resetForm();
                loadCodes();
            };

            const toggleActive = async (dc) => {
                await supabase.from('discount_codes').update({ is_active: !dc.is_active }).eq('id', dc.id);
                loadCodes();
            };

            const deleteCode = async (dc) => {
                if (!confirm(`Delete discount code "${dc.code}"?`)) return;
                await supabase.from('discount_codes').delete().eq('id', dc.id);
                loadCodes();
            };

            const isExpired = (dc) => dc.expires_at && new Date(dc.expires_at) < new Date();
            const isMaxedOut = (dc) => dc.max_uses && dc.used_count >= dc.max_uses;

            if (loading) return (
                <div className="flex items-center justify-center py-20">
                    <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-500"></div>
                </div>
            );

            return (
                <div>
                    {/* Header */}
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h2 className="text-xl font-bold text-gray-900">Discount Codes</h2>
                            <p className="text-sm text-gray-500 mt-0.5">Create codes your buyers can apply at checkout</p>
                        </div>
                        <button
                            onClick={() => { resetForm(); setShowForm(true); }}
                            className="flex items-center gap-2 px-4 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-semibold hover:bg-brand-600 transition-colors"
                        >
                            <Icons.plus style={{ width: 16, height: 16 }} /> New Code
                        </button>
                    </div>

                    {/* Create / Edit Form */}
                    {showForm && (
                        <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-6 shadow-sm">
                            <h3 className="font-semibold text-gray-900 mb-4">
                                {editingCode ? 'Edit Discount Code' : 'Create Discount Code'}
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {/* Code */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">Code</label>
                                    <input
                                        type="text"
                                        value={form.code}
                                        onChange={e => setForm({ ...form, code: e.target.value.toUpperCase() })}
                                        placeholder="e.g. SAVE10"
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none font-mono tracking-wider"
                                    />
                                </div>
                                {/* Type */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">Discount Type</label>
                                    <select
                                        value={form.type}
                                        onChange={e => setForm({ ...form, type: e.target.value })}
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none bg-white"
                                    >
                                        <option value="percentage">Percentage (%)</option>
                                        <option value="fixed">Fixed Amount (R)</option>
                                    </select>
                                </div>
                                {/* Value */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">
                                        {form.type === 'percentage' ? 'Percentage Off' : 'Amount Off (R)'}
                                    </label>
                                    <input
                                        type="number"
                                        value={form.value}
                                        onChange={e => setForm({ ...form, value: e.target.value })}
                                        placeholder={form.type === 'percentage' ? 'e.g. 10' : 'e.g. 25.00'}
                                        min="0"
                                        step={form.type === 'percentage' ? '1' : '0.01'}
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none"
                                    />
                                </div>
                                {/* Min Order */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">Minimum Order (R)</label>
                                    <input
                                        type="number"
                                        value={form.min_order}
                                        onChange={e => setForm({ ...form, min_order: e.target.value })}
                                        placeholder="0 = no minimum"
                                        min="0"
                                        step="0.01"
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none"
                                    />
                                </div>
                                {/* Max Uses */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">Max Uses</label>
                                    <input
                                        type="number"
                                        value={form.max_uses}
                                        onChange={e => setForm({ ...form, max_uses: e.target.value })}
                                        placeholder="Empty = unlimited"
                                        min="1"
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none"
                                    />
                                </div>
                                {/* Expires At */}
                                <div>
                                    <label className="block text-xs font-medium text-gray-600 mb-1">Expires At</label>
                                    <input
                                        type="datetime-local"
                                        value={form.expires_at}
                                        onChange={e => setForm({ ...form, expires_at: e.target.value })}
                                        className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:border-brand-400 focus:ring-1 focus:ring-brand-400 outline-none"
                                    />
                                </div>
                            </div>
                            {/* Active Toggle */}
                            <div className="flex items-center gap-2 mt-4">
                                <input
                                    type="checkbox"
                                    checked={form.is_active}
                                    onChange={e => setForm({ ...form, is_active: e.target.checked })}
                                    className="rounded border-gray-300"
                                    id="dc-active"
                                />
                                <label htmlFor="dc-active" className="text-sm text-gray-700">Active</label>
                            </div>
                            {/* Actions */}
                            <div className="flex gap-3 mt-5">
                                <button
                                    onClick={handleSave}
                                    disabled={saving || !form.code.trim() || !form.value}
                                    className="px-5 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-semibold hover:bg-brand-600 transition-colors disabled:opacity-50"
                                >
                                    {saving ? 'Saving...' : editingCode ? 'Update Code' : 'Create Code'}
                                </button>
                                <button
                                    onClick={resetForm}
                                    className="px-5 py-2.5 border border-gray-200 text-gray-700 rounded-xl text-sm font-semibold hover:bg-gray-50 transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Codes List */}
                    {codes.length === 0 ? (
                        <div className="bg-white rounded-2xl border border-gray-200 p-10 text-center">
                            <Icons.discount style={{ width: 40, height: 40, margin: '0 auto 12px', color: '#9ca3af' }} />
                            <p className="text-gray-500 text-sm">No discount codes yet. Create one to share with your buyers!</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {codes.map(dc => {
                                const expired = isExpired(dc);
                                const maxedOut = isMaxedOut(dc);
                                const inactive = !dc.is_active || expired || maxedOut;

                                return (
                                    <div key={dc.id} className={`bg-white rounded-2xl border ${inactive ? 'border-gray-200 opacity-70' : 'border-gray-200'} p-4 shadow-sm`}>
                                        <div className="flex items-start justify-between gap-3">
                                            {/* Left: Code info */}
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <span className="font-mono font-bold text-base tracking-wider text-gray-900">{dc.code}</span>
                                                    {dc.is_active && !expired && !maxedOut && (
                                                        <span className="px-2 py-0.5 bg-green-100 text-green-700 text-xs font-semibold rounded-full">Active</span>
                                                    )}
                                                    {!dc.is_active && (
                                                        <span className="px-2 py-0.5 bg-gray-100 text-gray-500 text-xs font-semibold rounded-full">Disabled</span>
                                                    )}
                                                    {expired && (
                                                        <span className="px-2 py-0.5 bg-red-100 text-red-600 text-xs font-semibold rounded-full">Expired</span>
                                                    )}
                                                    {maxedOut && (
                                                        <span className="px-2 py-0.5 bg-orange-100 text-orange-600 text-xs font-semibold rounded-full">Limit Reached</span>
                                                    )}
                                                </div>
                                                <div className="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm text-gray-600">
                                                    <span className="font-semibold text-brand-600">
                                                        {dc.type === 'percentage' ? `${dc.value}% off` : `R${parseFloat(dc.value).toFixed(2)} off`}
                                                    </span>
                                                    {dc.min_order > 0 && <span>Min order: R{parseFloat(dc.min_order).toFixed(2)}</span>}
                                                    {dc.max_uses && <span>Uses: {dc.used_count}/{dc.max_uses}</span>}
                                                    {!dc.max_uses && <span>Uses: {dc.used_count} (unlimited)</span>}
                                                    {dc.expires_at && (
                                                        <span>Expires: {new Date(dc.expires_at).toLocaleDateString()}</span>
                                                    )}
                                                </div>
                                            </div>
                                            {/* Right: Actions */}
                                            <div className="flex items-center gap-1.5 flex-shrink-0">
                                                <button
                                                    onClick={() => toggleActive(dc)}
                                                    className={`p-2 rounded-lg text-xs font-medium transition-colors ${dc.is_active ? 'bg-gray-100 text-gray-600 hover:bg-gray-200' : 'bg-green-50 text-green-600 hover:bg-green-100'}`}
                                                    title={dc.is_active ? 'Disable' : 'Enable'}
                                                >
                                                    {dc.is_active ? 'Disable' : 'Enable'}
                                                </button>
                                                <button
                                                    onClick={() => openEdit(dc)}
                                                    className="p-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors"
                                                    title="Edit"
                                                >
                                                    <Icons.edit />
                                                </button>
                                                <button
                                                    onClick={() => deleteCode(dc)}
                                                    className="p-2 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 transition-colors"
                                                    title="Delete"
                                                >
                                                    <Icons.trash />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // MAIN APP COMPONENT — RESPONSIVE SIDEBAR + BOTTOM NAV
        // ============================================================================

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('current_seller');
                if (stored) {
                    try {
                        setCurrentUser(JSON.parse(stored));
                    } catch (e) {
                        console.error('Parse error:', e);
                    }
                }
            }, []);

            const logout = () => {
                if (window.confirm('Sign out?')) {
                    localStorage.removeItem('current_seller');
                    setCurrentUser(null);
                }
            };

            if (!currentUser) {
                return <LoginScreen onLoginSuccess={setCurrentUser} />;
            }

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', Icon: Icons.dashboard },
                { id: 'products', label: 'Products', Icon: Icons.products },
                { id: 'orders', label: 'Orders', Icon: Icons.orders },
                { id: 'payments', label: 'Payments', Icon: Icons.payments },
                { id: 'discounts', label: 'Discounts', Icon: Icons.discount },
                { id: 'templates', label: 'Templates', Icon: Icons.templates },
                { id: 'settings', label: 'Settings', Icon: Icons.settings },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* ======= DESKTOP SIDEBAR (hidden on mobile) ======= */}
                    <aside className="hidden lg:flex lg:flex-col lg:fixed lg:inset-y-0 lg:left-0 lg:w-64 bg-white border-r border-gray-200 z-50">
                        {/* Sidebar Header */}
                        <div className="px-5 py-5 border-b border-gray-100">
                            <div className="flex items-center gap-3 mb-1">
                                <Logo size={40} />
                                <div className="min-w-0">
                                    <h1 className="font-bold text-base text-gray-900 leading-tight tracking-tight"><span className="kc-green">Yebo</span><span className="kc-gold">Sell</span></h1>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.business_name}</p>
                                </div>
                            </div>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 px-3 py-4 space-y-1 sidebar-scroll overflow-y-auto">
                            {navItems.map(({ id, label, Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setCurrentTab(id)}
                                    className={`sidebar-link w-full ${currentTab === id ? 'active' : ''}`}
                                >
                                    <Icon />
                                    <span>{label}</span>
                                </button>
                            ))}
                        </nav>

                        {/* User info + Sign Out */}
                        <div className="px-4 py-3 border-t border-gray-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-sm">
                                    {currentUser.full_name?.charAt(0)?.toUpperCase() || 'S'}
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="text-sm font-semibold text-gray-900 truncate">{currentUser.full_name}</p>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.phone}</p>
                                </div>
                            </div>
                            <button
                                onClick={logout}
                                className="flex items-center gap-2 w-full text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors font-medium"
                            >
                                <Icons.logout /> Sign Out
                            </button>
                        </div>

                        {/* Footer branding */}
                        <div className="px-4 py-3 border-t border-gray-100 bg-gray-50/50 text-center">
                            <p className="text-[10px] text-gray-400 leading-tight">Developed by</p>
                            <a href="https://4dcs.co.za" target="_blank" rel="noopener noreferrer" className="text-[11px] font-semibold text-gray-500 hover:text-green-600 transition-colors leading-tight">4D <span className="italic">Climate Solutions</span></a>
                            <p className="text-[10px] text-gray-300 text-center mt-1.5">&copy; 2026 YeboSell · InnovaEarth × 4D</p>
                        </div>
                    </aside>

                    {/* ======= MOBILE TOP HEADER (hidden on desktop) ======= */}
                    <div className="lg:hidden bg-white border-b border-gray-200 sticky top-0 z-40">
                        <div className="px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2.5">
                                <Logo size={36} />
                                <div>
                                    <h1 className="font-bold text-sm text-gray-900 leading-none tracking-tight"><span className="kc-green">Yebo</span><span className="kc-gold">Sell</span></h1>
                                    <p className="text-xs text-gray-500">{currentUser.business_name}</p>
                                </div>
                            </div>
                            <button
                                onClick={logout}
                                className="text-xs font-semibold text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors"
                            >
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* ======= MAIN CONTENT AREA ======= */}
                    <main className="lg:ml-64 min-h-screen pb-20 lg:pb-0">
                        <div className="max-w-6xl mx-auto px-4 lg:px-8 py-5 lg:py-8">
                            <div className="tab-content">
                                {currentTab === 'dashboard' && <DashboardScreen seller={currentUser} />}
                                {currentTab === 'products' && <ProductsScreen seller={currentUser} />}
                                {currentTab === 'orders' && <OrdersScreen seller={currentUser} />}
                                {currentTab === 'payments' && <PaymentsScreen seller={currentUser} />}
                                {currentTab === 'discounts' && <DiscountsScreen seller={currentUser} />}
                                {currentTab === 'templates' && <TemplatesScreen seller={currentUser} />}
                                {currentTab === 'settings' && <SettingsScreen seller={currentUser} onSellerUpdate={setCurrentUser} />}
                            </div>
                        </div>
                    </main>

                    {/* ======= MOBILE BOTTOM NAVIGATION (hidden on desktop) ======= */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40" style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}>
                        <div className="flex overflow-x-auto" style={{ scrollbarWidth: 'none', WebkitOverflowScrolling: 'touch', msOverflowStyle: 'none' }}>
                            <style>{`.mobile-bottom-nav::-webkit-scrollbar { display: none; }`}</style>
                            <div className="flex mobile-bottom-nav" style={{ minWidth: '100%', overflowX: 'auto', scrollbarWidth: 'none' }}>
                                {navItems.map(({ id, label, Icon }) => (
                                    <button
                                        key={id}
                                        onClick={() => setCurrentTab(id)}
                                        className={`flex flex-col items-center gap-0.5 py-2.5 px-4 text-xs font-medium transition-colors whitespace-nowrap flex-shrink-0 ${
                                            currentTab === id
                                                ? 'text-brand-500'
                                                : 'text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <Icon style={{ width: 20, height: 20 }} />
                                        <span>{label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // RENDER APP
        // ============================================================================

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
