            const [showFeeModal, setShowFeeModal] = useState(false);
            const [stats, setStats] = useState({
                todayOrders: 0, todayRevenue: 0,
                monthOrders: 0, monthRevenue: 0,
                allTimeOrders: 0, allTimeRevenue: 0,
                pendingPayments: 0, pendingPaymentsAmount: 0,
                toDeliver: 0,
                avgOrderValue: 0,
                totalProducts: 0,
                statusBreakdown: {},
                dailyRevenue: [],
                collectionRate: 0,
            });

            useEffect(() => { loadDashboardData(); }, [seller.id]);
            const lastRefresh = useLiveRefresh(() => loadDashboardData(), { realtime: { table: 'orders', filter: 'seller_id=eq.' + seller.id } });

            const loadDashboardData = async () => {
                try {
                    const now = new Date();
                    const today = now.toISOString().split('T')[0];
                    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];

                    // Fetch all orders, payments, products, order_items in parallel
                    const [ordersRes, paymentsRes, productsRes, itemsRes] = await Promise.all([
                        supabase.from('orders')
                            .select('id, seller_id, order_number, total, status, payment_status, delivery_status, created_at, customer_phone, customer_name')
                            .eq('seller_id', seller.id)
                            .order('created_at', { ascending: false }),
                        supabase.from('payments')
                            .select('id, amount, status, created_at')
                            .eq('seller_id', seller.id)
                            .eq('status', 'confirmed'),
                        supabase.from('products')
                            .select('id, name, is_active, stock, variants')
                            .eq('seller_id', seller.id),
                        supabase.from('order_items')
                            .select('order_id, product_name, quantity, unit_price')
                            .in('order_id', (await supabase.from('orders').select('id').eq('seller_id', seller.id)).data?.map(o => o.id) || []),
                    ]);

                    const allOrders = ordersRes.data || [];
                    const confirmedPayments = paymentsRes.data || [];
                    const products = productsRes.data || [];
                    const allItems = itemsRes.data || [];

                    // Today's stats
                    const todaysOrders = allOrders.filter(o => o.created_at >= today);
                    const todayRevenue = todaysOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);

                    // This month
                    const monthOrders = allOrders.filter(o => o.created_at >= monthStart);
                    const monthRevenue = monthOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);

                    // All time
                    const allTimeRevenue = allOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
                    const avgOrderValue = allOrders.length > 0 ? allTimeRevenue / allOrders.length : 0;

                    // Pending payments — count orders where payment_status != 'paid'
                    const unpaidOrders = allOrders.filter(o => o.payment_status !== 'paid');
                    const pendingPaymentsAmount = unpaidOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);

                    // To deliver
                    const toDeliver = allOrders.filter(o => ['confirmed', 'preparing', 'ready_for_pickup', 'out_for_delivery'].includes(o.status)).length;

                    // Collection rate
                    const totalConfirmedPayments = confirmedPayments.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
                    const collectionRate = allTimeRevenue > 0 ? Math.min(100, (totalConfirmedPayments / allTimeRevenue) * 100) : 0;

                    // Status breakdown
                    const statusBreakdown = {};
                    allOrders.forEach(o => { statusBreakdown[o.status] = (statusBreakdown[o.status] || 0) + 1; });

                    // Daily revenue for last 7 days
                    const dailyRevenue = [];
                    for (let i = 6; i >= 0; i--) {
                        const d = new Date(now);
                        d.setDate(d.getDate() - i);
                        const dateStr = d.toISOString().split('T')[0];
                        const dayLabel = d.toLocaleDateString('en', { weekday: 'short' });
                        const dayRevenue = allOrders
                            .filter(o => o.created_at.startsWith(dateStr))
                            .reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
                        dailyRevenue.push({ day: dayLabel, date: dateStr, revenue: dayRevenue });
                    }

                    // Top products (from order_items table)
                    const productSales = {};
                    allItems.forEach(item => {
                        const name = item.product_name || 'Unknown';
                        if (!productSales[name]) productSales[name] = { name, qty: 0, revenue: 0 };
                        productSales[name].qty += (item.quantity || 1);
                        productSales[name].revenue += (item.quantity || 1) * (parseFloat(item.unit_price) || 0);
                    });
                    const topProds = Object.values(productSales).sort((a, b) => b.revenue - a.revenue).slice(0, 5);

                    setStats({
                        todayOrders: todaysOrders.length, todayRevenue,
                        monthOrders: monthOrders.length, monthRevenue,
                        allTimeOrders: allOrders.length, allTimeRevenue,
                        pendingPayments: unpaidOrders.length, pendingPaymentsAmount,
                        toDeliver, avgOrderValue,
                        totalProducts: products.length,
                        statusBreakdown, dailyRevenue, collectionRate,
                    });
                    setRecentOrders(allOrders.slice(0, 8));
                    setTopProducts(topProds);
                    setAllOrdersData(allOrders);

                    // Low stock detection (threshold: 5 units)
                    const LOW_STOCK_THRESHOLD = 5;
                    const lowStock = products.filter(p => {
                        if (!p.is_active) return false;
                        const vars = Array.isArray(p.variants) ? p.variants : [];
                        if (vars.length > 0) {
                            return vars.some(v => typeof v.stock === 'number' && v.stock <= LOW_STOCK_THRESHOLD);
                        }
                        return typeof p.stock === 'number' && p.stock <= LOW_STOCK_THRESHOLD;
                    }).map(p => {
                        const vars = Array.isArray(p.variants) ? p.variants : [];
                        let lowestStock = p.stock;
                        let lowVariants = [];
                        if (vars.length > 0) {
                            lowVariants = vars.filter(v => typeof v.stock === 'number' && v.stock <= LOW_STOCK_THRESHOLD);
                            lowestStock = Math.min(...vars.map(v => typeof v.stock === 'number' ? v.stock : 999));
                        }
                        return { ...p, lowestStock, lowVariants };
                    }).sort((a, b) => a.lowestStock - b.lowestStock);
                    setLowStockProducts(lowStock);
                    if (onLowStockUpdate) onLowStockUpdate(lowStock.length);

                    // Platform fee summary (SECURITY DEFINER RPC — reads platform_config internally)
                    const { data: feeRes } = await supabase.rpc('get_seller_fee_summary', { p_seller_id: seller.id });
                    if (feeRes) setFeeData(feeRes);
                } catch (err) {
                    console.error('Dashboard data load error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const storefrontUrl = `${SITE_URL}/shop/?s=${seller.slug}`;
            const copyStorefrontUrl = () => {
                navigator.clipboard.writeText(storefrontUrl);
                window.toast('Storefront link copied!', 'success');
            };

            // Mini bar chart component
            const MiniBarChart = ({ data }) => {
                const maxVal = Math.max(...data.map(d => d.revenue), 1);
                return (
                    <div className="flex items-end gap-1.5 h-28">
                        {data.map((d, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center gap-1">
                                <div className="w-full rounded-t-md bg-brand-500 transition-all duration-500"
                                    style={{ height: `${Math.max(4, (d.revenue / maxVal) * 100)}%`, opacity: d.revenue > 0 ? 1 : 0.15 }}
                                    title={`${d.day}: ${formatCurrency(d.revenue)}`}
                                />
                                <span className="text-xs text-gray-400 font-medium">{d.day}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            // Donut-like progress ring
            const ProgressRing = ({ percent, size = 64, strokeWidth = 6, color = '#25D366' }) => {
                const r = (size - strokeWidth) / 2;
                const circ = 2 * Math.PI * r;
                const offset = circ - (percent / 100) * circ;
                return (
                    <svg width={size} height={size} className="transform -rotate-90">
                        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={strokeWidth}/>
                        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth}
                            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
                            style={{ transition: 'stroke-dashoffset 0.8s ease' }}/>
                    </svg>
                );
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader title={isNewSeller ? `Welcome to YeboSell, ${seller.full_name}!` : `Welcome back, ${seller.full_name}`} subtitle={seller.business_name} actions={<FreshnessBadge lastRef={lastRefresh} />} />

                    {needsPickupAddress && (
                        <div className="mb-6 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 flex items-start gap-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b45309" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <div className="flex-1">
                                <p className="text-sm font-semibold text-amber-900">Finish setting up your storefront</p>
                                <p className="text-xs text-amber-700 mt-0.5">Add your pickup address so buyers know where to collect their orders.</p>
                            </div>
                            <button onClick={() => onNavigate && onNavigate('settings')} className="text-xs font-semibold text-amber-800 underline whitespace-nowrap mt-0.5">Add address</button>
                        </div>
                    )}

                    {/* Account suspended — fees at limit */}
                    {feeData && feeData.suspended && (
                        <div className="mb-6 rounded-xl border-2 border-red-400 bg-red-50 px-4 py-3 flex items-start gap-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b91c1c" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                            <div className="flex-1">
                                <p className="text-sm font-semibold text-red-900">Account suspended — fees overdue</p>
                                <p className="text-xs text-red-700 mt-0.5">Outstanding fees ({formatCurrency(feeData.pending_fees)}) have exceeded the limit. New orders are paused until fees are settled.</p>
                            </div>
                            <button onClick={() => setShowFeeModal(true)} className="text-xs font-semibold text-red-800 underline whitespace-nowrap mt-0.5">Settle now</button>
                        </div>
                    )}

                    {/* Near-suspension warning (fees >= 80% of threshold) */}
                    {feeData && feeData.near_suspension && !feeData.suspended && (
                        <div className="mb-6 rounded-xl border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b45309" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            <div className="flex-1">
                                <p className="text-sm font-semibold text-amber-900">Outstanding fees approaching limit</p>
                                <p className="text-xs text-amber-700 mt-0.5">{formatCurrency(feeData.pending_fees)} in platform fees pending. Settle before reaching {formatCurrency(feeData.suspension_threshold)} to keep your store active.</p>
                            </div>
                            <button onClick={() => setShowFeeModal(true)} className="text-xs font-semibold text-amber-800 underline whitespace-nowrap mt-0.5">Pay now</button>
                        </div>
                    )}

                    {/* ===== TOP KPI CARDS ===== */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div className="card card-shadow stat-card stat-green p-5 cursor-pointer hover:shadow-lg transition-shadow" onClick={() => setDashPopup('revenue_today')}>
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Today's Revenue</p>
                                <span className="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#25D366" strokeWidth="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                </span>
                            </div>
                            <p className="text-2xl lg:text-3xl font-bold text-gray-900">{formatCurrency(stats.todayRevenue)}</p>
                            <p className="text-xs text-gray-400 mt-1">{stats.todayOrders} order{stats.todayOrders !== 1 ? 's' : ''} today</p>
                        </div>
                        <div className="card card-shadow stat-card stat-blue p-5 cursor-pointer hover:shadow-lg transition-shadow" onClick={() => setDashPopup('revenue_month')}>
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">This Month</p>
                                <span className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                                </span>
                            </div>
                            <p className="text-2xl lg:text-3xl font-bold text-gray-900">{formatCurrency(stats.monthRevenue)}</p>
                            <p className="text-xs text-gray-400 mt-1">{stats.monthOrders} order{stats.monthOrders !== 1 ? 's' : ''} this month</p>
                        </div>
                        <div className="card card-shadow stat-card stat-orange p-5 cursor-pointer hover:shadow-lg transition-shadow" onClick={() => setDashPopup('pending_payments')}>
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Pending Payments</p>
                                <span className="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                                </span>
                            </div>
                            <p className="text-2xl lg:text-3xl font-bold text-amber-600">{stats.pendingPayments}</p>
                            <p className="text-xs text-gray-400 mt-1">{formatCurrency(stats.pendingPaymentsAmount)} awaiting</p>
                        </div>
                        <div className="card card-shadow stat-card stat-purple p-5 cursor-pointer hover:shadow-lg transition-shadow" onClick={() => setDashPopup('to_deliver')}>
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">To Deliver</p>
                                <span className="w-8 h-8 rounded-lg bg-purple-50 flex items-center justify-center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" strokeWidth="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                                </span>
                            </div>
                            <p className="text-2xl lg:text-3xl font-bold text-purple-600">{stats.toDeliver}</p>
                            <p className="text-xs text-gray-400 mt-1">orders need shipping</p>
                        </div>
                    </div>

                    {/* ===== SECOND ROW: Revenue Chart + Collection + Quick Stats ===== */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
                        {/* Revenue Trend */}
                        <div className="lg:col-span-2 card card-shadow p-5">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h3 className="font-semibold text-gray-900 text-sm">Revenue — Last 7 Days</h3>
                                    <p className="text-xs text-gray-400">Daily sales performance</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-lg font-bold text-gray-900">{formatCurrency(stats.dailyRevenue.reduce((s, d) => s + d.revenue, 0))}</p>
                                    <p className="text-xs text-gray-400">7-day total</p>
                                </div>
                            </div>
                            <MiniBarChart data={stats.dailyRevenue} />
                        </div>

                        {/* Collection Rate + All-time */}
                        <div className="card card-shadow p-5 flex flex-col items-center justify-center">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Payment Collection</p>
                            <div className="relative mb-3">
                                <ProgressRing percent={stats.collectionRate} size={80} strokeWidth={7}
                                    color={stats.collectionRate >= 80 ? '#25D366' : stats.collectionRate >= 50 ? '#F59E0B' : '#EF4444'} />
                                <span className="absolute inset-0 flex items-center justify-center text-lg font-bold text-gray-900">
                                    {Math.round(stats.collectionRate)}%
                                </span>
                            </div>
                            <p className="text-xs text-gray-400 mb-4">of total revenue collected</p>
                            <div className="w-full pt-3 border-t border-gray-100 grid grid-cols-2 gap-3 text-center">
                                <div>
                                    <p className="text-lg font-bold text-gray-900">{stats.allTimeOrders}</p>
                                    <p className="text-xs text-gray-400">All-time orders</p>
                                </div>
                                <div>
                                    <p className="text-lg font-bold text-gray-900">{formatCurrency(stats.avgOrderValue)}</p>
                                    <p className="text-xs text-gray-400">Avg order value</p>
                                </div>

        // ============================================================================
        // PRODUCTS SCREEN
        // ============================================================================

        const ProductsScreen = ({ seller, onLowStockUpdate }) => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [sortBy, setSortBy] = useState('newest');
            const [viewMode, setViewMode] = useState('grid');
            const [formData, setFormData] = useState({
                name: '',
                description: '',
                price: '',
                category: 'other',
                option_label: '',
                option2_label: '',
                unit: '',
                condition: '',
                photos: [],
                active: true,
                variants: [],
                stock: ''
            });
            const [uploading, setUploading] = useState(false);
            const fileInputRef = useRef(null);
            const [lightboxImg, setLightboxImg] = useState(null);

            useEffect(() => {
                loadProducts();
            }, [seller.id]);

            useLiveRefresh(() => loadProducts());

            const loadProducts = async () => {
                try {
                    const { data, error } = await supabase
                        .from('products')
                        .select('*')
                        .eq('seller_id', seller.id)
                        .order('sort_order', { ascending: true });

                    if (error) throw error;
                    const mapped = (data || []).map(p => ({
                        ...p,
                        active: p.is_active,
                        photos: Array.isArray(p.photos) ? p.photos : (p.photo_url ? [p.photo_url] : []),
                        variants: Array.isArray(p.variants) ? p.variants : []
                    }));
                    setProducts(mapped);
                    if (onLowStockUpdate) {
                        const LOW = 5;
                        const cnt = mapped.filter(p => {
                            if (p.variants && p.variants.length > 0) return p.variants.some(v => typeof v.stock === 'number' && v.stock <= LOW);
                            return typeof p.stock === 'number' && p.stock <= LOW;
                        }).length;
                        onLowStockUpdate(cnt);
                    }
                } catch (err) {
                    console.error('Load products error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const MAX_PHOTOS = 5;
            const [dragOver, setDragOver] = useState(false);
            const cameraInputRef = useRef(null);

            const uploadFile = async (file) => {
                if (!file) return;
                if (formData.photos.length >= MAX_PHOTOS) { window.toast(`Maximum ${MAX_PHOTOS} photos per product`); return; }
                if (file.size > 5 * 1024 * 1024) { window.toast('Photo must be smaller than 5MB'); return; }
                if (!file.type.startsWith('image/')) { window.toast('Please select an image file'); return; }

                setUploading(true);
                try {
                    const timestamp = Date.now();
                    const path = `${seller.id}/${timestamp}-${file.name}`;
                    const { error: uploadErr } = await supabase.storage.from('product-photos').upload(path, file);
                    if (uploadErr) throw uploadErr;
                    const { data } = supabase.storage.from('product-photos').getPublicUrl(path);
                    setFormData(prev => ({ ...prev, photos: [...prev.photos, data.publicUrl] }));
                } catch (err) {
                    window.toast('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const handlePhotoUpload = (e) => { Array.from(e.target.files || []).forEach(f => uploadFile(f)); e.target.value = ''; };
            const handleCameraCapture = (e) => { uploadFile(e.target.files?.[0]); e.target.value = ''; };
            const removePhoto = (index) => setFormData(prev => ({ ...prev, photos: prev.photos.filter((_, i) => i !== index) }));
            const setCoverPhoto = (index) => {
                setFormData(prev => {
                    const photos = [...prev.photos];
                    const [moved] = photos.splice(index, 1);
                    photos.unshift(moved);
                    return { ...prev, photos };
                });
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                Array.from(e.dataTransfer.files || []).forEach(f => uploadFile(f));
            };

            const handlePasteUrl = () => {
                const url = prompt('Paste image URL:');
                if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                    if (formData.photos.length >= MAX_PHOTOS) { window.toast(`Maximum ${MAX_PHOTOS} photos`); return; }
                    setFormData(prev => ({ ...prev, photos: [...prev.photos, url] }));
                } else if (url) {
                    window.toast('Please enter a valid URL starting with http:// or https://');
                }
            };

            // Variants: up to 2 named option dimensions (e.g. Size + Colour).
            // Stored as {size: dim1value, color: dim2value, price, stock} —
            // the checkout RPC already matches color+size, so no schema change needed.
            const OPT_LABEL_LIST = ['Size', 'Colour', 'Color', 'Flavour', 'Material', 'Length', 'Weight', 'Style', 'Pack'];

            const loadOptionsFromVariants = (variants, lbl1, lbl2) => {
                if (!variants || variants.length === 0) return { groups: [], matrix: [] };
                const d1s = [...new Set(variants.map(v => v.size).filter(Boolean))];
                const d2s = [...new Set(variants.map(v => v.color).filter(Boolean))];
                const groups = [];
                if (d1s.length > 0) groups.push({ label: lbl1 || 'Size', values: d1s });
                if (d2s.length > 0) groups.push({ label: lbl2 || 'Colour', values: d2s });
                const matrix = variants.filter(v => v.size || v.color).map(v => ({
                    d1: v.size || '', d2: v.color || '',
                    price: (v.price !== undefined && v.price !== null) ? String(v.price) : '',
                    stock: v.stock !== undefined ? String(v.stock) : ''
                }));
                return { groups, matrix };
            };

            const regenMatrix = (groups, oldMatrix) => {
                const g1 = (groups[0] && groups[0].values.filter(v => v.trim())) || [];
                const g2 = (groups[1] && groups[1].values.filter(v => v.trim())) || [];
                if (g1.length === 0) return [];
                const combos = g2.length > 0
                    ? g1.flatMap(v1 => g2.map(v2 => ({ d1: v1, d2: v2 })))
                    : g1.map(v1 => ({ d1: v1, d2: '' }));
                return combos.map(({ d1, d2 }) => {
                    const ex = oldMatrix.find(m => m.d1 === d1 && m.d2 === d2);
                    return ex || { d1, d2, price: '', stock: '' };
                });
            };

            const matrixToVariants = (matrix, basePrice) => matrix
                .filter(m => m.d1)
                .map(m => ({
                    size: m.d1, color: m.d2 || '',
                    price: m.price !== '' ? parseFloat(m.price) : (basePrice !== '' ? parseFloat(basePrice) : null),
                    stock: parseInt(m.stock) || 0
                }));

            const [optGroups, setOptGroups] = useState([]); // [{label, values: string[]}]
            const [varMatrix, setVarMatrix] = useState([]); // [{d1, d2, price, stock}]

            useEffect(() => {
                const { groups, matrix } = loadOptionsFromVariants(formData.variants, formData.option_label, formData.option2_label);
                setOptGroups(groups);
                setVarMatrix(matrix);
            }, [showForm]);

            const addOptGroup = () => {
                if (optGroups.length >= 2) return;
                const defaultLabel = optGroups.length === 0 ? 'Size' : 'Colour';
                const newGroups = [...optGroups, { label: defaultLabel, values: [''] }];
                setOptGroups(newGroups);
                setVarMatrix(prev => regenMatrix(newGroups, prev));
            };
            const removeOptGroup = (gi) => {
                const newGroups = optGroups.filter((_, i) => i !== gi);
                setOptGroups(newGroups);
                setVarMatrix(prev => regenMatrix(newGroups, prev));
            };
            const updateGroupLabel = (gi, label) => setOptGroups(prev => prev.map((g, i) => i === gi ? { ...g, label } : g));
            const addGroupValue = (gi) => {
                const newGroups = optGroups.map((g, i) => i === gi ? { ...g, values: [...g.values, ''] } : g);
                setOptGroups(newGroups);
                setVarMatrix(prev => regenMatrix(newGroups, prev));
            };
            const updateGroupValue = (gi, vi, val) => {
                const newGroups = optGroups.map((g, i) => i === gi ? { ...g, values: g.values.map((v, j) => j === vi ? val : v) } : g);
                setOptGroups(newGroups);
                setVarMatrix(prev => regenMatrix(newGroups, prev));
            };
            const removeGroupValue = (gi, vi) => {
                const newGroups = optGroups.map((g, i) => i === gi ? { ...g, values: g.values.filter((_, j) => j !== vi) } : g);
                setOptGroups(newGroups);
                setVarMatrix(prev => regenMatrix(newGroups, prev));
            };
            const updateMatrix = (mi, field, val) => setVarMatrix(prev => prev.map((m, i) => i === mi ? { ...m, [field]: val } : m));

            // Rename a value in-place preserving price/stock in the matrix (avoids regenMatrix key loss on each keystroke)
            const renameGroupValue = (gi, vi, newName) => {
                const oldName = optGroups[gi] ? optGroups[gi].values[vi] : '';
                setOptGroups(prev => prev.map((g, i) => i === gi ? { ...g, values: g.values.map((v, j) => j === vi ? newName : v) } : g));
                setVarMatrix(prev => {
                    const key = gi === 0 ? 'd1' : 'd2';
                    const idx = prev.findIndex(m => m[key] === oldName);
                    if (idx >= 0) return prev.map((m, i) => i === idx ? { ...m, [key]: newName } : m);
                    if (newName.trim() && optGroups.length === 1) return [...prev, { d1: newName, d2: '', price: '', stock: '' }];
                    return prev;
                });
            };

            const saveProduct = async () => {
                if (!formData.name || !formData.price) {
                    window.toast('Please fill in name and price');
                    return;
                }

                try {
                    const { active, photos, variants: _v, stock: stockStr, option_label: _ol, option2_label: _ol2, ...rest } = formData;
                    const computedVariants = matrixToVariants(varMatrix, formData.price);
                    const hasVars = computedVariants.length > 0;
                    const dbData = {
                        ...rest,
                        option_label: optGroups[0] ? optGroups[0].label : '',
                        option2_label: optGroups[1] ? optGroups[1].label : '',
                        is_active: active,
                        photos: photos,
                        photo_url: photos.length > 0 ? photos[0] : '',
                        variants: computedVariants,
                        stock: hasVars ? null : (stockStr !== '' ? parseInt(stockStr) : null),
                    };

                    if (editingId) {
                        const { error } = await supabase
                            .from('products')
                            .update(dbData)
                            .eq('id', editingId);
                        if (error) throw error;
                    } else {
                        const { error } = await supabase
                            .from('products')
                            .insert({
                                ...dbData,
                                seller_id: seller.id,
                                price: parseFloat(formData.price),
                                sort_order: products.length
                            });
                        if (error) throw error;
                    }

                    resetForm();
                    loadProducts();
                } catch (err) {
                    const denied = /row-level security|policy/i.test(err.message || '') || err.code === '42501';
                    window.toast(denied
                        ? 'Your store is suspended — you can’t change products until it’s reactivated.'
                        : 'Save failed: ' + err.message, 'error');
                }
            };

            const deleteProduct = async (id) => {
                if (!(await window.confirmDialog({ title: 'Delete this product?', message: 'This can’t be undone. It will be removed from your storefront.', confirmLabel: 'Delete', danger: true }))) return;
                try {
                    const { error } = await supabase
                        .from('products')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    loadProducts();
                } catch (err) {
                    window.toast('Delete failed: ' + err.message);
                }
            };

            const toggleActive = async (id, currentActive) => {
                try {
                    const { error } = await supabase
                        .from('products')
                        .update({ is_active: !currentActive })
                        .eq('id', id);
                    if (error) throw error;
                    loadProducts();
                } catch (err) {
                    window.toast('Update failed: ' + err.message);
                }
            };

            const postCatalogToWhatsApp = () => {
                const activeProducts = products.filter(p => p.active);
                if (activeProducts.length === 0) {
                    window.toast('No active products to share');
                    return;
                }

                const lines = [
                    `\u{1F6CD}\uFE0F *${seller.business_name}* \u2014 New items available!\n`,
                    ...activeProducts.map((p, i) => {
                        const desc = p.description ? `\n     ${p.description}` : '';
                        return `${i + 1}. *${p.name}* \u2014 ${formatCurrency(p.price)}${desc}`;
                    }),
                    `\n\u{1F449} Order here: ${SITE_URL}/shop/?s=${seller.slug}`

                const message = lines.join('\n');
                window.open(whatsappShareLink(message), '_blank');
            };

            const resetForm = () => {
                setShowForm(false);
                setEditingId(null);
                setFormData({
                    name: '',
                    description: '',
                    price: '',
                    category: 'other',
                    option_label: '',
                    option2_label: '',
                    unit: '',
                    condition: '',
                    photos: [],
                    active: true,
                    variants: [],
                    stock: ''

                setOptGroups([]);
                setVarMatrix([]);

            const startEdit = (product) => {
                setEditingId(product.id);
                setFormData({
                    name: product.name,
                    description: product.description || '',
                    price: product.price.toString(),
                    category: product.category || 'other',
                    option_label: product.option_label || '',
                    option2_label: product.option2_label || '',
                    unit: product.unit || '',
                    condition: product.condition || '',

                    active: product.active !== undefined ? product.active : product.is_active,
                    variants: Array.isArray(product.variants) ? product.variants : [],
                    stock: product.stock !== undefined && product.stock !== null ? product.stock.toString() : ''

                setShowForm(true);

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            // Filter and sort products
            const filteredProducts = products
                .filter(p => {
                    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                    if (filterCategory !== 'all' && p.category !== filterCategory) return false;
                    if (filterStatus === 'active' && !p.is_active) return false;
                    if (filterStatus === 'hidden' && p.is_active) return false;
                    return true;
                })
                .sort((a, b) => {
                    if (sortBy === 'newest') return new Date(b.created_at) - new Date(a.created_at);
                    if (sortBy === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
                    if (sortBy === 'price_low') return (a.price || 0) - (b.price || 0);
                    if (sortBy === 'price_high') return (b.price || 0) - (a.price || 0);
                    if (sortBy === 'name_az') return a.name.localeCompare(b.name);
                    if (sortBy === 'name_za') return b.name.localeCompare(a.name);
                    if (sortBy === 'stock_low') {
                        const stockA = a.variants?.length > 0 ? a.variants.reduce((s, v) => s + (v.stock || 0), 0) : (a.stock ?? 999);
                        const stockB = b.variants?.length > 0 ? b.variants.reduce((s, v) => s + (v.stock || 0), 0) : (b.stock ?? 999);
                        return stockA - stockB;
                    }
                    return 0;
                });

                                        <input

                                    <div>

                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Category</label>
                                        <select

                                            <option value="clothing">Clothing</option>
                                            <option value="accessories">Accessories</option>
                                            <option value="food">Food</option>

                                            <div className="flex flex-wrap gap-1 mb-3">
