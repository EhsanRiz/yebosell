        // ============================================================================
        // ORDERS SCREEN
        // ============================================================================

        // Small badges that surface the BUYER's own assertions (two-sided state)
        // so the seller sees them at a glance in the order list. Dispute is loudest.
        const BuyerSignals = ({ order }) => {
            const items = [];
            if (order.buyer_dispute_at)
                items.push(['⚠ Buyer reported a problem', '#b91c1c', '#fef2f2', '#fecaca']);
            if (order.buyer_paid_confirmed_at)
                items.push(['✓ Buyer confirmed payment', '#15803d', '#f0fdf4', '#bbf7d0']);
            if (order.buyer_received_confirmed_at)
                items.push(['✓ Buyer confirmed receipt', '#15803d', '#f0fdf4', '#bbf7d0']);
            if (!items.length) return null;
            return (
                <div className="flex flex-wrap gap-1 mt-1">
                    {items.map(([label, color, bg, border], i) => (
                        <span key={i} className="inline-flex items-center text-[10px] font-bold px-1.5 py-0.5 rounded"
                            style={{ color, background: bg, border: '1px solid ' + border }}>{label}</span>
                    ))}
                </div>
            );
        };

        // Stock-alert semantics shared by the Inventory tab and the bell. A variant
        // counts as "out of stock" ONLY if it was actually stocked at some point
        // (initial = remaining + sold > 0). A variant that was zero from the start
        // (never stocked, never sold) is "not stocked" — not an out-of-stock alert.
        const STOCK_LOW = 5;
        const isVarOut = (v) => v.remaining <= 0 && v.initial > 0;
        const isVarLow = (v) => v.remaining > 0 && v.remaining <= STOCK_LOW;
        const isVarNeverStocked = (v) => v.remaining <= 0 && v.initial <= 0;

        // ===== INVENTORY: per-variant stock / sold / remaining tracker =====
        // Stock is decremented at checkout (create_storefront_order RPC) and not
        // restored on cancel, so: remaining = current DB stock, sold = units in
        // non-cancelled orders, initial = remaining + sold. Per-variant sold is
        // matched by the order_items.product_name the shop writes:
        //   "<name> (<colour> / <size>)"  (blank dims dropped).
        const InventoryScreen = ({ seller, onLowStockUpdate }) => {
            const LOW = 5;
            const [rows, setRows] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [lowOnly, setLowOnly] = useState(false);

            useEffect(() => { load(); }, [seller.id]);
            useLiveRefresh(() => load(), { realtime: { table: 'orders', filter: 'seller_id=eq.' + seller.id } });

            const load = async () => {
                try {
                    const { data: prods, error } = await supabase
                        .from('products')
                        .select('id, name, photo_url, photos, stock, variants, is_active')
                        .eq('seller_id', seller.id)
                        .order('name', { ascending: true });
                    if (error) throw error;

                    // Orders (id + status) then their items — count units that left inventory.
                    const { data: ords } = await supabase.from('orders').select('id, status').eq('seller_id', seller.id);
                    const liveOrderIds = (ords || []).filter(o => o.status !== 'cancelled').map(o => o.id);
                    let items = [];
                    if (liveOrderIds.length > 0) {
                        const { data: it } = await supabase
                            .from('order_items')
                            .select('product_id, product_name, quantity')
                            .in('order_id', liveOrderIds);
                        items = it || [];
                    }

                    // sold lookup keyed by product_id -> { byName, total }
                    const soldByPid = {};
                    items.forEach(it => {
                        const pid = it.product_id || '__none';
                        if (!soldByPid[pid]) soldByPid[pid] = { byName: {}, total: 0 };
                        const q = parseInt(it.quantity) || 0;
                        soldByPid[pid].byName[it.product_name] = (soldByPid[pid].byName[it.product_name] || 0) + q;
                        soldByPid[pid].total += q;
                    });

                    const out = (prods || []).map(p => {
                        const photo = (Array.isArray(p.photos) && p.photos[0]) || p.photo_url || '';
                        const sold = soldByPid[p.id] || { byName: {}, total: 0 };
                        const vars = Array.isArray(p.variants) ? p.variants.filter(v => v.size || v.color) : [];
                        let variants = [];
                        let matchedSold = 0;
                        if (vars.length > 0) {
                            variants = vars.map(v => {
                                const lbl = [v.color, v.size].filter(Boolean).join(' / ');
                                const s = sold.byName[`${p.name} (${lbl})`] || 0;
                                matchedSold += s;
                                const remaining = parseInt(v.stock) || 0;
                                return { label: lbl, sold: s, remaining, initial: remaining + s };
                            });
                        }
                        const otherSold = Math.max(0, sold.total - matchedSold);
                        const unlimited = vars.length === 0 && (p.stock === null || p.stock === undefined);
                        const baseRemaining = vars.length === 0 ? (unlimited ? null : (parseInt(p.stock) || 0)) : null;
                        const totalRemaining = vars.length > 0
                            ? variants.reduce((s, v) => s + v.remaining, 0)
                            : baseRemaining;
                        const totalSold = sold.total;
                        const totalInitial = totalRemaining === null ? null : totalRemaining + totalSold;
                        return {
                            id: p.id, name: p.name, photo, active: p.is_active,
                            hasVariants: vars.length > 0, variants, otherSold,
                            baseRemaining, unlimited, totalRemaining, totalSold, totalInitial
                        };
                    });
                    setRows(out);

                    if (onLowStockUpdate) {
                        const cnt = out.filter(isLowRow).length;
                        onLowStockUpdate(cnt);
                    }
                } catch (e) {
                    console.error('Inventory load error:', e);
                } finally {
                    setLoading(false);
                }
            };

            // A non-variant product's out/low using its own initial (remaining+sold).
            const baseOut = (r) => !r.hasVariants && r.baseRemaining !== null && r.baseRemaining <= 0 && (r.totalInitial || 0) > 0;
            const baseLow = (r) => !r.hasVariants && r.baseRemaining !== null && r.baseRemaining > 0 && r.baseRemaining <= LOW;
            const isLowRow = (r) => r.hasVariants
                ? r.variants.some(v => isVarOut(v) || isVarLow(v))
                : (baseOut(r) || baseLow(r));

            const summary = rows.reduce((a, r) => {
                a.skus += r.hasVariants ? r.variants.length : 1;
                a.units += (r.totalRemaining || 0);
                a.sold += r.totalSold;
                if (r.hasVariants) r.variants.forEach(v => { if (isVarOut(v)) a.out++; else if (isVarLow(v)) a.low++; });
                else if (baseOut(r)) a.out++;
                else if (baseLow(r)) a.low++;
                return a;
            }, { skus: 0, units: 0, sold: 0, low: 0, out: 0 });

            const filtered = rows.filter(r => {
                if (search && !r.name.toLowerCase().includes(search.toLowerCase())) return false;
                if (lowOnly && !isLowRow(r)) return false;
                return true;
            });

            const cellCls = (n) => n === null ? 'text-gray-400'
                : n <= 0 ? 'text-red-600 font-bold'
                : n <= LOW ? 'text-amber-700 font-bold'
                : 'text-gray-900 font-semibold';

            const StockBadge = ({ n }) => {
                if (n === null) return <span className="text-xs text-gray-400">∞</span>;
                const cls = n <= 0 ? 'bg-red-50 text-red-600' : n <= LOW ? 'bg-amber-50 text-amber-700' : 'bg-green-50 text-green-700';
                return <span className={`inline-block text-xs font-bold px-2 py-0.5 rounded ${cls}`}>{n <= 0 ? 'Out' : n}</span>;
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <div className="flex items-center justify-between mb-1">
                        <h2 className="text-xl lg:text-2xl font-bold text-gray-900">Inventory</h2>
                    </div>
                    <p className="text-sm text-gray-500 mb-5">Stock, sold and remaining for every product and variant.</p>

                    {/* Summary cards */}
                    <div className="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-5">
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">SKUs</p>
                            <p className="text-2xl font-bold text-gray-900 mt-1">{summary.skus}</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Units in stock</p>
                            <p className="text-2xl font-bold text-gray-900 mt-1">{summary.units}</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Units sold</p>
                            <p className="text-2xl font-bold text-brand-600 mt-1">{summary.sold}</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Low stock</p>
                            <p className="text-2xl font-bold text-amber-600 mt-1">{summary.low}</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Out of stock</p>
                            <p className="text-2xl font-bold text-red-600 mt-1">{summary.out}</p>
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="flex flex-col sm:flex-row gap-2 mb-4">
                        <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                            placeholder="Search products…"
                            className="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white" />
                        <button onClick={() => setLowOnly(v => !v)} type="button"
                            className={`px-4 py-2.5 rounded-lg text-sm font-semibold border transition-colors flex items-center gap-2 justify-center ${lowOnly ? 'bg-amber-500 border-amber-500 text-white' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                            <Icons.alertTriangle style={{ width: 15, height: 15 }} />
                            Low stock only
                        </button>
                    </div>

                    {loading ? (
                        <div className="flex justify-center py-16"><Spinner size="lg" /></div>
                    ) : filtered.length === 0 ? (
                        <div className="card card-shadow p-10 text-center text-gray-400 text-sm">
                            {rows.length === 0 ? 'No products yet — add products to track inventory.' : 'No products match your filters.'}
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {filtered.map(r => (
                                <div key={r.id} className="card card-shadow overflow-hidden">
                                    <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-100 bg-gray-50/50">
                                        {r.photo
                                            ? <img src={r.photo} alt="" className="w-10 h-10 rounded-lg object-cover flex-shrink-0" />
                                            : <div className="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0"><Icons.products style={{ width: 18, height: 18, color: '#9ca3af' }} /></div>}
                                        <div className="min-w-0 flex-1">
                                            <p className="font-semibold text-gray-900 text-sm truncate">{r.name}</p>
                                            <p className="text-xs text-gray-400">
                                                {r.hasVariants ? `${r.variants.length} variants` : 'No variants'}
                                                {!r.active && <span className="ml-2 text-gray-400">· Hidden</span>}
                                            </p>
                                        </div>
                                        <div className="text-right flex-shrink-0">
                                            <p className="text-[10px] text-gray-400 uppercase tracking-wide">Sold / In stock</p>
                                            <p className="text-sm font-bold text-gray-900">
                                                <span className="text-brand-600">{r.totalSold}</span>
                                                <span className="text-gray-300 mx-1">/</span>
                                                <span className={r.totalRemaining !== null && r.totalRemaining <= 0 ? 'text-red-600' : r.totalRemaining !== null && r.totalRemaining <= LOW ? 'text-amber-700' : 'text-gray-900'}>
                                                    {r.totalRemaining === null ? '∞' : r.totalRemaining}
                                                </span>
                                            </p>
                                        </div>
                                    </div>

                                    {r.hasVariants ? (
                                        <div>
                                            <div className="grid px-4 py-1.5 text-[10px] font-semibold text-gray-400 uppercase tracking-wide gap-2" style={{ gridTemplateColumns: '1fr 70px 70px 80px' }}>
                                                <span>Variant</span>
                                                <span className="text-center">Initial</span>
                                                <span className="text-center">Sold</span>
                                                <span className="text-center">Remaining</span>
                                            </div>
                                            {r.variants.map((v, i) => (
                                                <div key={i} className="grid items-center px-4 py-2 border-t border-gray-50 gap-2" style={{ gridTemplateColumns: '1fr 70px 70px 80px' }}>
                                                    <span className={`text-sm truncate ${isVarNeverStocked(v) ? 'text-gray-400' : 'text-gray-700'}`}>{v.label}</span>
                                                    <span className="text-center text-sm text-gray-500">{v.initial}</span>
                                                    <span className="text-center text-sm text-brand-600 font-medium">{v.sold}</span>
                                                    <span className="text-center">{isVarNeverStocked(v) ? <span className="text-[11px] text-gray-400">Not stocked</span> : <StockBadge n={v.remaining} />}</span>
                                                </div>
                                            ))}
                                            {r.otherSold > 0 && (
                                                <div className="grid items-center px-4 py-2 border-t border-gray-50 gap-2" style={{ gridTemplateColumns: '1fr 70px 70px 80px' }}>
                                                    <span className="text-sm text-gray-400 italic truncate">Other / manual orders</span>
                                                    <span className="text-center text-sm text-gray-300">—</span>
                                                    <span className="text-center text-sm text-gray-500 font-medium">{r.otherSold}</span>
                                                    <span className="text-center text-sm text-gray-300">—</span>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="grid px-4 py-2.5 gap-2 items-center" style={{ gridTemplateColumns: '1fr 70px 70px 80px' }}>
                                            <span className="text-sm text-gray-500">Single item</span>
                                            <span className={`text-center text-sm ${r.totalInitial === null ? 'text-gray-300' : 'text-gray-500'}`}>{r.totalInitial === null ? '—' : r.totalInitial}</span>
                                            <span className="text-center text-sm text-brand-600 font-medium">{r.totalSold}</span>
                                            <span className="text-center"><StockBadge n={r.baseRemaining} /></span>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const OrdersScreen = ({ seller, focusOrderId, onFocusConsumed }) => {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [unreadByOrder, setUnreadByOrder] = useState({});
            const [showForm, setShowForm] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [detailOrder, setDetailOrder] = useState(null);
            const blankItem = () => ({ product_id: null, custom: false, variantIdx: '', product_name: '', quantity: 1, price: '' });
            const [formData, setFormData] = useState({
                customer_name: '',
                customer_phone: '',
                items: [blankItem()],
                total: ''
            });
            const [products, setProducts] = useState([]);

            useEffect(() => {
                loadOrders();
                supabase.from('products').select('id, name, price, variants').eq('seller_id', seller.id).eq('is_active', true).order('name', { ascending: true })
                    .then(({ data }) => setProducts(data || []));
            }, [seller.id]);

            const productVariants = (p) => (p && Array.isArray(p.variants)) ? p.variants.filter(v => v.size || v.color) : [];
            const variantLabel = (v) => [v.color, v.size].filter(Boolean).join(' / ');

            // Group digits as "XXXX XXXX" (Lesotho local = 8 digits) as the seller types.
            const formatPhoneInput = (v) => {
                const d = (v || '').replace(/\D/g, '').slice(0, 8);
                return d.length <= 4 ? d : d.slice(0, 4) + ' ' + d.slice(4);
            };
            const recomputeTotal = (items) => {
                const sum = items.reduce((s, it) => s + (parseFloat(it.price) || 0) * (parseInt(it.quantity) || 0), 0);
                return sum > 0 ? sum.toFixed(2) : '';
            };
            const updateItem = (idx, patch) => setFormData(prev => {
                const items = prev.items.map((it, i) => i === idx ? { ...it, ...patch } : it);
                return { ...prev, items, total: recomputeTotal(items) };
            });
            const pickProduct = (idx, val) => {
                if (val === '__custom') { updateItem(idx, { custom: true, product_id: null, variantIdx: '', product_name: '', price: '' }); return; }
                if (!val) { updateItem(idx, { custom: false, product_id: null, variantIdx: '', product_name: '', price: '' }); return; }
                const p = products.find(x => x.id === val);
                if (!p) return;
                const vars = productVariants(p);
                if (vars.length > 0) {
                    // Has options — wait for the seller to choose the variant + its price.
                    updateItem(idx, { custom: false, product_id: p.id, variantIdx: '', product_name: p.name, price: '' });
                } else {
                    updateItem(idx, { custom: false, product_id: p.id, variantIdx: null, product_name: p.name, price: p.price != null ? String(p.price) : '' });
                }
            };
            const pickVariant = (idx, vIdx) => {
                const it = formData.items[idx];
                const p = products.find(x => x.id === it.product_id);
                if (!p) return;
                if (vIdx === '') { updateItem(idx, { variantIdx: '', product_name: p.name, price: '' }); return; }
                const v = productVariants(p)[vIdx];
                if (!v) return;
                updateItem(idx, {
                    variantIdx: vIdx,
                    product_name: `${p.name} (${variantLabel(v)})`,
                    price: v.price != null ? String(v.price) : (p.price != null ? String(p.price) : '')
                });
            };
            const addItemRow = () => setFormData(prev => ({ ...prev, items: [...prev.items, blankItem()] }));
            const removeItemRow = (idx) => setFormData(prev => {
                const items = prev.items.filter((_, i) => i !== idx);
                return { ...prev, items: items.length ? items : [blankItem()], total: recomputeTotal(items) };
            });

            useLiveRefresh(() => loadOrders(), { realtime: { table: 'orders', filter: 'seller_id=eq.' + seller.id, onInsert: () => window.toast('New order received', 'success') } });

            // Open a specific order's detail when the notification bell requests it.
            useEffect(() => {
                if (!focusOrderId) return;
                (async () => {
                    let ord = orders.find(o => o.id === focusOrderId);
                    if (!ord) {
                        try { const { data } = await supabase.from('orders').select('*').eq('id', focusOrderId).single(); ord = data; } catch (e) {}
                    }
                    if (ord) setDetailOrder(ord);
                    if (onFocusConsumed) onFocusConsumed();
                })();
            }, [focusOrderId]);

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);

                    // Unread buyer messages per order (lights the Message button)
                    const { data: msgs } = await supabase
                        .from('order_messages')
                        .select('order_id')
                        .eq('seller_id', seller.id)
                        .eq('sender', 'buyer')
                        .is('read_by_seller_at', null);
                    const counts = {};
                    (msgs || []).forEach(m => { counts[m.order_id] = (counts[m.order_id] || 0) + 1; });
                    setUnreadByOrder(counts);
                } catch (err) {
                    console.error('Load orders error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const createManualOrder = async () => {
                if (!formData.customer_name || !formData.customer_phone || !formData.total) {
                    window.toast('Please fill in required fields');
                    return;
                }

                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .insert({
                            seller_id: seller.id,
                            order_number: generateOrderNumber(),
                            customer_name: formData.customer_name,
                            customer_phone: formData.customer_phone.replace(/\s+/g, ''),
                            total: parseFloat(formData.total),
                            status: 'new',
                            payment_status: 'pending',
                            delivery_status: 'pending',
                            source: 'manual'
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    for (const item of formData.items) {
                        if (item.product_name) {
                            await supabase.from('order_items').insert({
                                order_id: data.id,
                                product_id: item.product_id || null,
                                product_name: item.product_name,
                                quantity: parseInt(item.quantity) || 1,
                                unit_price: parseFloat(item.price) || 0
                            });
                        }
                    }

                    setShowForm(false);
                    setFormData({ customer_name: '', customer_phone: '', items: [blankItem()], total: '' });
                    loadOrders();
                } catch (err) {
                    window.toast('Create order failed: ' + err.message);
                }
            };

            const updateOrderStatus = async (orderId, field, value) => {
                try {
                    const updateData = { [field]: value };
                    // Unified lifecycle lives on `status`; stamp the progress time on any stage change.
                    if (field === 'status') updateData.delivery_updated_at = new Date().toISOString();
                    const { error } = await supabase
                        .from('orders')
                        .update(updateData)
                        .eq('id', orderId);
                    if (error) throw error;

                    // Offer to notify the buyer via the seller's own WhatsApp (click-to-chat, no API)
                    const notifyStatuses = ['confirmed', 'preparing', 'ready_for_pickup', 'out_for_delivery', 'delivered', 'cancelled'];
                    const shouldNotify = field === 'status' && notifyStatuses.includes(value);

                    if (shouldNotify) {
                        const order = orders.find(o => o.id === orderId) || {};
                        const milestone = ({
                            confirmed: 'order_confirmation', ready_for_pickup: 'ready_for_pickup',
                            out_for_delivery: 'out_for_delivery', delivered: 'delivered'
                        }[value] || 'status_update');
                        const ctx = {
                            name: order.customer_name, order: order.order_number,
                            seller: seller.business_name, total: formatCurrency(order.total),
                            link: trackLink(order.track_token), lang: seller.preferred_language,
                            pickup: seller.pickup_address, statusLabel: getStatusLabel(value)
                        };
                        const auto = (() => { try { return localStorage.getItem('yebosell_autonotify') === '1'; } catch (e) { return false; } })();
                        const go = auto || (await window.confirmDialog({ message: 'Notify the buyer on WhatsApp about this update?', confirmLabel: 'Notify' }));
                        if (go && order.customer_phone && notifyBuyer(order.customer_phone, milestone, ctx)) {
                            try { supabase.from('notification_log').insert({ order_id: orderId, order_number: order.order_number, status_sent: value, customer_phone: order.customer_phone, success: true }); } catch (e) {}
                        }
                    }

                    loadOrders();
                } catch (err) {
                    window.toast('Update failed: ' + err.message);
                }
            };

            const sendWhatsApp = (order) => {
                const message = `Hi ${order.customer_name},\n\nYour order #${order.order_number} is ${getStatusLabel(order.status)}.\nTotal: ${formatCurrency(order.total)}\n\nThank you!`;
                window.open(whatsappLink(order.customer_phone, message), '_blank');
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Orders"
                        subtitle={`${orders.length} total order${orders.length !== 1 ? 's' : ''}`}
                        actions={
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors"
                            >
                                <Icons.plus /> Create Order
                            </button>
                        }
                    />

                    {/* Manual Order Form */}
                    {showForm && (
                        <div className="card card-shadow p-6 mb-6 border-l-4 border-brand-500">
                            <h3 className="font-bold text-gray-900 mb-4 text-lg">New Order</h3>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Customer Name</label>
                                    <input
                                        type="text"
                                        value={formData.customer_name}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_name: e.target.value }))}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Phone Number</label>
                                    <input
                                        type="tel"
                                        inputMode="numeric"
                                        value={formData.customer_phone}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_phone: formatPhoneInput(e.target.value) }))}
                                        placeholder="5772 7054"
                                        maxLength={9}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm tracking-wider focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>
                            </div>

                            <div className="mb-4">
                                <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Items</p>
                                {formData.items.map((item, idx) => (
                                    <div key={idx} className="flex flex-wrap gap-2 mb-2 items-center">
                                        <select
                                            value={item.custom ? '__custom' : (item.product_id || '')}
                                            onChange={(e) => pickProduct(idx, e.target.value)}
                                            className="flex-1 min-w-[150px] px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                                            <option value="">Select a product…</option>
                                            {products.map(p => <option key={p.id} value={p.id}>{p.name}{p.price != null ? ` · M${Number(p.price).toFixed(2)}` : ''}</option>)}
                                            <option value="__custom">Other (type manually)</option>
                                        </select>
                                        {(() => {
                                            const prod = products.find(p => p.id === item.product_id);
                                            const vars = productVariants(prod);
                                            return vars.length > 0 ? (
                                                <select value={item.variantIdx === null || item.variantIdx === undefined ? '' : item.variantIdx}
                                                    onChange={(e) => pickVariant(idx, e.target.value)}
                                                    className="flex-1 min-w-[140px] px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                                                    <option value="">Choose option…</option>
                                                    {vars.map((v, vi) => <option key={vi} value={vi}>{variantLabel(v)}{v.price != null ? ` · M${Number(v.price).toFixed(2)}` : ''}</option>)}
                                                </select>
                                            ) : null;
                                        })()}
                                        {item.custom && (
                                            <input type="text" placeholder="Item name" value={item.product_name}
                                                onChange={(e) => updateItem(idx, { product_name: e.target.value })}
                                                className="flex-1 min-w-[120px] px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500" />
                                        )}
                                        <input type="number" min="1" placeholder="Qty" value={item.quantity}
                                            onChange={(e) => updateItem(idx, { quantity: parseInt(e.target.value) || 1 })}
                                            className="w-16 px-2 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-center" />
                                        <input type="number" step="0.01" placeholder="Price" value={item.price}
                                            onChange={(e) => updateItem(idx, { price: e.target.value })}
                                            className="w-24 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50" />
                                        {formData.items.length > 1 && (
                                            <button onClick={() => removeItemRow(idx)} type="button"
                                                className="text-red-400 hover:text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            </button>
                                        )}
                                    </div>
                                ))}
                                <button onClick={addItemRow} type="button" className="text-xs text-brand-600 hover:text-brand-800 font-semibold py-1">+ Add item</button>
                            </div>

                            <div className="mb-4 max-w-xs">
                                <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Total (M) <span className="normal-case text-gray-400 font-normal">· auto from items, editable</span></label>
                                <input
                                    type="number"
                                    value={formData.total}
                                    onChange={(e) => setFormData(prev => ({ ...prev, total: e.target.value }))}
                                    step="0.01"
                                    className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                />
                            </div>

                            <div className="flex gap-3">
                                <button
                                    onClick={createManualOrder}
                                    className="bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Create Order
                                </button>
                                <button
                                    onClick={() => setShowForm(false)}
                                    className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Orders List */}
                    {orders.length === 0 ? (
                        <div className="card card-shadow p-12 text-center">
                            <Icons.orders className="mx-auto mb-3 text-gray-300" style={{width: 48, height: 48}} />
                            <p className="text-gray-500 text-sm">No orders yet</p>
                        </div>

        // ============================================================================
        // PAYMENT DETAIL MODAL
        // ============================================================================

        const PaymentDetailModal = ({ payment, onClose, onStatusChange }) => {
            const [imgZoom, setImgZoom] = useState(false);
            if (!payment) return null;

            const order = payment.orders || {};
            const PAYMENT_METHODS = { eft: 'EFT / Bank Transfer', ecocash: 'EcoCash', mpesa: 'M-Pesa', mobile_money: 'Mobile Money', cash: 'Cash' };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
                    <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        {/* Header */}

                                    {getStatusLabel(payment.status)}
                                </span>
                            </div>

                            {/* Linked Order */}
                            <div className="bg-gray-50 rounded-xl p-4">

                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="font-semibold text-gray-900">{order.order_number || '—'}</p>
                                        <p className="text-sm text-gray-500">{order.customer_name || '—'}</p>
                                        {order.customer_phone && (
                                            <a href={'https://wa.me/' + window.waNumber(order.customer_phone)} target="_blank" rel="noopener"
                                                className="text-xs text-brand-600 hover:underline flex items-center gap-1 mt-0.5">
                                                <Icons.whatsapp /> {order.customer_phone}
                                            </a>
                                        )}
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm text-gray-500">Order Total</p>
                                        <p className="font-bold text-gray-900">{formatCurrency(order.total)}</p>

                            </div>

                            {/* Payment Info Grid */}
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-gray-50 rounded-xl p-3">
                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Method</p>
                                    <p className="text-sm font-medium text-gray-900">{PAYMENT_METHODS[payment.payment_method] || payment.payment_method}</p>
                                </div>

                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Date</p>

                                    <img src={payment.screenshot_url} alt="Payment proof"
                                        className={'rounded-xl border border-gray-200 cursor-pointer transition ' + (imgZoom ? 'w-full' : 'h-40 object-cover w-full')}
                                        onClick={() => setImgZoom(!imgZoom)} />
                                    <p className="text-xs text-gray-400 mt-1 text-center">Click to {imgZoom ? 'shrink' : 'expand'}</p>
                                </div>
                            )}

                            {/* Action Buttons */}
                            {payment.status === 'pending' && (
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => { onStatusChange(payment.id, 'confirmed'); onClose(); }}

                                        Confirm Payment
                                    </button>

        // ============================================================================
        // PAYMENTS SCREEN
        // ============================================================================

        const PaymentsScreen = ({ seller }) => {
            const [payments, setPayments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({
                order_id: '',
                amount: '',
                payment_method: 'eft',
                screenshot_url: ''
            });
            const [orders, setOrders] = useState([]);
            const fileInputRef = useRef(null);
            const [uploading, setUploading] = useState(false);
            const [selectedPayment, setSelectedPayment] = useState(null);
            const [filterStatus, setFilterStatus] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [dateRange, setDateRange] = useState('all');
            const [customDateFrom, setCustomDateFrom] = useState('');
            const [customDateTo, setCustomDateTo] = useState('');
            const [showReconcile, setShowReconcile] = useState(false);

            useEffect(() => {
                loadPayments();
                loadOrders();
            }, [seller.id]);

            useLiveRefresh(() => { loadPayments(); loadOrders(); });

            const loadPayments = async () => {
                try {
                    const { data, error } = await supabase
                        .from('payments')
                        .select('*, orders(order_number, total, customer_phone, customer_name)')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setPayments(data || []);
                } catch (err) {
                    console.error('Load payments error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('id, order_number, total, payment_status, customer_phone, customer_name, created_at, track_token')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);
                } catch (err) {
                    console.error('Load orders error:', err);
                }
            };

            // Payment summary stats
            const totalCollected = payments.filter(p => p.status === 'confirmed').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
            const totalPending = payments.filter(p => p.status === 'pending').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
            const pendingCount = payments.filter(p => p.status === 'pending').length;
            const totalOrderValue = orders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
            const outstandingBalance = totalOrderValue - totalCollected;

            // Filtered payments
            const filteredPayments = payments
                .filter(p => {
                    // Date filter
                    if (dateRange !== 'all') {
                        const payDate = new Date(p.created_at);
                        const now = new Date();
                        if (dateRange === 'today') {
                            const today = now.toISOString().split('T')[0];
                            if (!p.created_at.startsWith(today)) return false;
                        } else if (dateRange === 'this_week') {
                            const weekAgo = new Date(now);
                            weekAgo.setDate(weekAgo.getDate() - 7);
                            if (payDate < weekAgo) return false;
                        } else if (dateRange === 'this_month') {
                            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                            if (payDate < monthStart) return false;
                        } else if (dateRange === 'custom') {
                            if (customDateFrom && payDate < new Date(customDateFrom)) return false;
                            if (customDateTo && payDate > new Date(customDateTo + 'T23:59:59')) return false;
                        }
                    }
                    // Existing filters
                    if (filterStatus !== 'all' && p.status !== filterStatus) return false;
                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const orderNum = (p.orders?.order_number || '').toLowerCase();
                        const custName = (p.orders?.customer_name || '').toLowerCase();
                        if (!orderNum.includes(q) && !custName.includes(q)) return false;
                    }
                    return true;
                });

            // Calculate total confirmed payments for a given order
            const getPaidTotal = (orderId) => {
                return payments
                    .filter(p => p.order_id === orderId && p.status === 'confirmed')
                    .reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
            };

            // Get orders that still need payment (not fully paid)
            const unpaidOrders = orders.filter(o => {
                const paidSoFar = getPaidTotal(o.id);
                return paidSoFar < parseFloat(o.total);
            });

            // Get balance remaining for selected order in form
            const selectedOrder = orders.find(o => o.id === formData.order_id);
            const selectedPaid = selectedOrder ? getPaidTotal(selectedOrder.id) : 0;
            const selectedBalance = selectedOrder ? (parseFloat(selectedOrder.total) - selectedPaid) : 0;

            const handleScreenshotUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                setUploading(true);
                try {
                    const timestamp = Date.now();
                    const path = `payments/${seller.id}/${timestamp}-${file.name}`;

                    const { error: uploadErr } = await supabase.storage
                        .from('payment-screenshots')
                        .upload(path, file);

                    if (uploadErr) throw uploadErr;

                    const { data } = supabase.storage
                        .from('payment-screenshots')
                        .getPublicUrl(path);

                    setFormData(prev => ({ ...prev, screenshot_url: data.publicUrl }));
                } catch (err) {
                    window.toast('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const submitPayment = async () => {
                if (!formData.order_id || !formData.amount) {
                    window.toast('Please fill in required fields');
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('payments')
                        .insert({
                            seller_id: seller.id,
                            order_id: formData.order_id,
                            amount: parseFloat(formData.amount),
                            payment_method: formData.payment_method,
                            screenshot_url: formData.screenshot_url,
                            status: 'pending'
                        });

                    if (error) throw error;

                    setShowForm(false);
                    setFormData({
                        order_id: '',
                        amount: '',
                        payment_method: 'eft',
                        screenshot_url: ''
                    });
                    loadPayments();
                } catch (err) {
                    window.toast('Submit failed: ' + err.message);
                }
            };

            const updatePaymentStatus = async (paymentId, newStatus) => {
                try {
                    const { error } = await supabase
                        .from('payments')
                        .update({ status: newStatus })
                        .eq('id', paymentId);
                    if (error) throw error;

                    // If confirming, auto-update the order's payment_status and send receipt
                    if (newStatus === 'confirmed') {
                        const payment = payments.find(p => p.id === paymentId);
                        if (payment && payment.order_id) {
                            // Get order details
                            const order = orders.find(o => o.id === payment.order_id);
                            if (order) {
                                const thisAmount = parseFloat(payment.amount) || 0;
                                const previouslyPaid = getPaidTotal(payment.order_id);
                                const newTotalPaid = previouslyPaid + thisAmount;
                                const orderTotal = parseFloat(order.total);
                                const newPaymentStatus = newTotalPaid >= orderTotal ? 'paid' : 'partial';

                                // Update order payment_status
                                await supabase
                                    .from('orders')
                                    .update({ payment_status: newPaymentStatus })
                                    .eq('id', payment.order_id);

                                // Send WhatsApp receipt to buyer
                                const orderData = payment.orders || order;
                                const customerPhone = orderData.customer_phone || '';
                                const customerName = orderData.customer_name || 'Customer';
                                const orderNumber = orderData.order_number || order.order_number;
                                const remaining = orderTotal - newTotalPaid;

                                if (customerPhone) {
                                    const ctx = {
                                        name: customerName, order: orderNumber,
                                        seller: seller.business_name, total: formatCurrency(orderTotal),
                                        link: trackLink(order.track_token), lang: seller.preferred_language,
                                        statusLabel: 'Payment received'
                                    };
                                    const auto = (() => { try { return localStorage.getItem('yebosell_autonotify') === '1'; } catch (e) { return false; } })();
                                    const go = auto || (await window.confirmDialog({ message: 'Send the buyer a payment confirmation on WhatsApp?', confirmLabel: 'Send' }));
                                    if (go && notifyBuyer(customerPhone, 'payment_received', ctx)) {
                                        try { supabase.from('notification_log').insert({ order_id: payment.order_id, order_number: orderNumber, status_sent: 'payment_received', customer_phone: customerPhone, success: true }); } catch (e) {}
                                    }
                                }
                            }
                        }
                    }

                    loadPayments();
                    loadOrders();
                } catch (err) {
                    window.toast('Update failed: ' + err.message);
                }
            };

            const exportToCSV = () => {
                const headers = ['Date', 'Order #', 'Customer', 'Amount', 'Method', 'Status'];
                const rows = filteredPayments.map(p => [
                    new Date(p.created_at).toLocaleDateString(),
                    p.orders?.order_number || '',
                    p.orders?.customer_name || '',
                    (parseFloat(p.amount) || 0).toFixed(2),
                    (p.payment_method || '').replace('_', ' '),
                    p.status
                ]);
                const csv = [headers, ...rows].map(row => row.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `payments-${seller.business_name.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const sendPaymentReminder = (order) => {
                const paid = getPaidTotal(order.id);
                const balance = parseFloat(order.total) - paid;
                const message = `Hi,\n\nThis is a friendly reminder regarding your order *${order.order_number}*.\n\n` +
                    `Order Total: ${formatCurrency(order.total)}\n` +
                    (paid > 0 ? `Amount Paid: ${formatCurrency(paid)}\n` : '') +
                    `Balance Due: *${formatCurrency(balance)}*\n\n` +
                    `Please arrange payment at your earliest convenience.\n\nThank you!\n— ${seller.business_name}`;
                window.open(whatsappLink(order.customer_phone, message), '_blank');
            };

            const getOrderPaymentSummary = () => {
                return orders.map(order => {
                    const orderPayments = payments.filter(p => p.order_id === order.id);
                    const confirmed = orderPayments.filter(p => p.status === 'confirmed').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
                    const pending = orderPayments.filter(p => p.status === 'pending').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
                    const total = parseFloat(order.total) || 0;
                    const balance = total - confirmed;
                    const daysOld = Math.floor((Date.now() - new Date(order.created_at).getTime()) / 86400000);
                    return { ...order, confirmed, pending, balance, paymentCount: orderPayments.length, daysOld };
                }).sort((a, b) => b.balance - a.balance);
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Payments"
                        subtitle={`${payments.length} payment${payments.length !== 1 ? 's' : ''} · ${formatCurrency(totalCollected)} collected`}
                        actions={
                            <div className="flex gap-2">
                                <button onClick={() => setShowReconcile(!showReconcile)}
                                    className={'flex items-center gap-2 font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors ' + (showReconcile ? 'bg-blue-500 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700')}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
                                    Reconcile
                                </button>
                                <button onClick={exportToCSV}
                                    className="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    Export
                                </button>
                                <button onClick={() => setShowForm(!showForm)}
                                    className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
                                    <Icons.plus /> Report Payment
                                </button>
                            </div>
                        }
                    />

                    {/* Payment Summary Cards */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Collected</p>
                            <p className="text-xl font-bold text-green-600">{formatCurrency(totalCollected)}</p>
                            <p className="text-xs text-gray-400 mt-0.5">{payments.filter(p => p.status === 'confirmed').length} confirmed</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Awaiting Confirmation</p>
                            <p className="text-xl font-bold text-amber-600">{formatCurrency(totalPending)}</p>
                            <p className="text-xs text-gray-400 mt-0.5">{pendingCount} pending</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Outstanding Balance</p>
                            <p className="text-xl font-bold text-red-500">{formatCurrency(Math.max(0, outstandingBalance))}</p>

                                                    <span className="badge" style={{ backgroundColor: getStatusColor(payment.status) + '15', color: getStatusColor(payment.status) }}>
                                                        {getStatusLabel(payment.status)}

                                                    {payment.screenshot_url ? (
                                                        <a href={payment.screenshot_url} target="_blank" rel="noopener" className="text-blue-600 hover:text-blue-700 text-sm font-medium">View</a>
                                                    ) : (
                                                        <span className="text-gray-400 text-sm">None</span>

                                                </td>
                                                <td className="text-sm">
                                                    <p className="text-gray-500">{new Date(payment.created_at).toLocaleDateString()}</p>

                                                        const days = Math.floor((Date.now() - new Date(payment.created_at).getTime()) / 86400000);

                                                                onClick={(e) => { e.stopPropagation(); updatePaymentStatus(payment.id, 'rejected'); }}

                                                            >
                                                                Reject

            const templates = [
                {
                    id: 1,
                    title: 'Order Confirmation',
                    en: `Hi {name},\n\nThank you for your order!\nOrder #: {order_number}\nTotal: {total}\n\nWe'll notify you when it's ready for delivery.\n\nThank you for shopping with us!`,
                    st: `Dumela {name},\n\nKe leboha ho ola.`
                },
                {
                    id: 2,
                    title: 'Payment Reminder',
                    en: `Hi {name},\n\nReminder: Your order #{order_number} is waiting for payment.\nAmount due: {total}\n\nPlease confirm payment to proceed.\n\nThank you!`,
                    st: `Dumela {name},\n\nReminder: Odara oa hao #{order_number} e hloka tefo.`
                },
                {
                    id: 3,
                    title: 'Delivery Notification',
                    en: `Hi {name},\n\nGood news! Your order #{order_number} is on the way.\n\nYou'll receive it soon. Thank you for your patience!`,
                    st: `Dumela {name},\n\nMathata a magwe! Odara oa hao #{order_number} e tsamaela.`
                },
                {
                    id: 4,
                    title: 'Feedback Request',
                    en: `Hi {name},\n\nWe hope you enjoyed your purchase from {business_name}!\n\nPlease share your feedback - it helps us improve.\n\nThank you!`,
                    st: `Dumela {name},\n\nRe na le nqo hore o ne o rata odara oa hao.`
                }

            return (
                <div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        {templates.map(template => (
                            <div key={template.id} className="card card-shadow overflow-hidden">
                                <div className="bg-gradient-to-r from-brand-500 to-green-600 px-5 py-3">
                                    <h3 className="font-semibold text-white">{template.title}</h3>
                                </div>

                                <div className="p-5 space-y-4">
                                    {/* English */}
                                    <div>
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">English</p>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg leading-relaxed">
                                            {template.en
                                                .replace('{name}', 'John')
                                                .replace('{order_number}', '123456')
                                                .replace('{total}', 'M499.99')
                                                .replace('{business_name}', seller.business_name)}
                                        </p>
                                        <div className="flex gap-2 mt-2">
                                            <button
                                                onClick={() => copyToClipboard(template.en)}
                                                className="flex items-center gap-1.5 flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.copy /> Copy
