                                            <button
                                                onClick={() => sendViaWhatsApp(template.en)}
                                                className="flex items-center gap-1.5 flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>

                                    {/* Sesotho */}
                                    <div className="border-t pt-4">
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Sesotho</p>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg leading-relaxed">
                                            {template.st
                                                .replace('{name}', 'John')
                                                .replace('{order_number}', '123456')
                                                .replace('{total}', 'M499.99')
                                                .replace('{business_name}', seller.business_name)}
                                        </p>
                                        <div className="flex gap-2 mt-2">
                                            <button
                                                onClick={() => copyToClipboard(template.st)}
                                                className="flex items-center gap-1.5 flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.copy /> Copy
                                            </button>
                                            <button
                                                onClick={() => sendViaWhatsApp(template.st)}
                                                className="flex items-center gap-1.5 flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // SETTINGS HELPERS (defined outside component to prevent re-mount on keystroke)
        // ============================================================================

        const SettingsInputField = ({ label, value, onChange, type = 'text', placeholder = '', textarea = false }) => {
            const [reveal, setReveal] = useState(false);
            const isPw = type === 'password';
            return (
                <div>
                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">{label}</label>
                    {textarea ? (
                        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows="3"
                            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50 resize-none" />
                    ) : (
                        <div className="relative">
                            <input type={isPw && reveal ? 'text' : type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
                                className={`w-full border border-gray-200 rounded-xl px-4 py-2.5 ${isPw ? 'pr-11' : ''} text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50`} />
                            {isPw && (
                                <button type="button" onClick={() => setReveal(v => !v)} aria-label={reveal ? 'Hide' : 'Show'}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <EyeIcon off={reveal} />
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const SettingsSaveButton = ({ onClick, saving, label = 'Save Changes' }) => (
            <button onClick={onClick} disabled={saving}
                className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors shadow-sm disabled:opacity-50">
                <Icons.save /> {saving ? 'Saving...' : label}
            </button>
        );

        const SettingsSectionCard = ({ icon, title, children }) => (
            <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-4 border-b border-gray-100 flex items-center gap-2">
                    {icon}
                    <h3 className="font-bold text-gray-900">{title}</h3>
                </div>
                <div className="p-5 space-y-4">
                    {children}
                </div>
            </div>
        );

        // ============================================================================
        // SETTINGS SCREEN
        // ============================================================================

        const SettingsScreen = ({ seller, onSellerUpdate }) => {
            const supabase = window.supabaseClient;
            const hashPin = window.hashPin;

            const [flash, setFlash] = useState({ show: false, message: '', type: 'success' });
            const showFlash = (message, type = 'success') => {
                setFlash({ show: true, message, type });
                setTimeout(() => setFlash({ show: false, message: '', type: 'success' }), 3000);
            };

            // ---- Profile & Store ----
            const [profile, setProfile] = useState({
                full_name: seller.full_name || '',
                email: seller.email || '',
                business_name: seller.business_name || '',
                business_description: seller.business_description || '',
                seller_phone: seller.seller_phone || seller.phone || '',
                location: seller.location || '',
                address: seller.address || '',
                logo_url: seller.logo_url || '',
                banner_url: seller.banner_url || '',
                preferred_language: seller.preferred_language || 'en',
            });
            const [savingProfile, setSavingProfile] = useState(false);

            const saveProfile = async () => {
                setSavingProfile(true);
                try {
                    const { error } = await supabase.from('sellers').update(profile).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, ...profile };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Profile updated successfully!');
                } catch (err) { showFlash('Failed to update profile: ' + err.message, 'error'); }
                setSavingProfile(false);
            };

            // ---- Change PIN ----
            const [pinData, setPinData] = useState({ current: '', newPin: '', confirm: '' });
            const [savingPin, setSavingPin] = useState(false);

            const changePin = async () => {
                if (!pinData.current || !pinData.newPin || !pinData.confirm) {
                    showFlash('Please fill in all PIN fields', 'error'); return;
                }
                if (pinData.newPin.length < 4) {
                    showFlash('New PIN must be at least 4 digits', 'error'); return;
                }
                if (pinData.newPin !== pinData.confirm) {
                    showFlash('New PIN and confirmation do not match', 'error'); return;
                }
                setSavingPin(true);
                try {
                    const { data: res, error } = await supabase.rpc('seller_change_pin', {
                        p_seller_id: seller.id, p_current_pin: pinData.current, p_new_pin: pinData.newPin
                    });
                    if (error) throw new Error('Could not change PIN. Please try again.');
                    if (!res || res.error) { showFlash((res && res.message) || 'Current PIN is incorrect', 'error'); setSavingPin(false); return; }
                    setPinData({ current: '', newPin: '', confirm: '' });
                    showFlash('PIN changed successfully!');
                } catch (err) { showFlash('Failed to change PIN: ' + err.message, 'error'); }
                setSavingPin(false);
            };

            // ---- Business Hours ----
            const defaultHours = { mon: '', tue: '', wed: '', thu: '', fri: '', sat: '', sun: '' };
            const [hours, setHours] = useState({ ...defaultHours, ...(seller.business_hours || {}) });
            const [savingHours, setSavingHours] = useState(false);
            const dayLabels = { mon: 'Monday', tue: 'Tuesday', wed: 'Wednesday', thu: 'Thursday', fri: 'Friday', sat: 'Saturday', sun: 'Sunday' };

            const saveHours = async () => {
                setSavingHours(true);
                try {
                    const { error } = await supabase.from('sellers').update({ business_hours: hours }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, business_hours: hours };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Business hours saved!');
                } catch (err) { showFlash('Failed to save hours: ' + err.message, 'error'); }
                setSavingHours(false);
            };

            // ---- Delivery & Shipping ----
            const allDeliveryMethods = [
                { id: 'pickup', label: 'Customer Pickup', desc: 'Customer collects from your location' },
                { id: 'self_delivery', label: 'Seller Delivery', desc: 'You deliver to customer address' },
                { id: 'courier', label: 'Third-Party Courier', desc: 'Via Pargo, Aramex, local courier, etc.' }
            ];
            const [deliveryMethods, setDeliveryMethods] = useState(seller.delivery_methods || ['pickup']);
            const [deliveryFee, setDeliveryFee] = useState((seller.delivery_fee || 0).toString());
            const [deliveryFeeType, setDeliveryFeeType] = useState(seller.delivery_fee_type || 'flat');
            const [pickupAddress, setPickupAddress] = useState(seller.pickup_address || seller.address || '');
            const [deliveryNotes, setDeliveryNotes] = useState(seller.delivery_notes || '');
            const [areasText, setAreasText] = useState((seller.delivery_areas || []).join(', '));
            const [savingDelivery, setSavingDelivery] = useState(false);

            const toggleMethod = (id) => {
                setDeliveryMethods(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
            };

            const saveDelivery = async () => {
                if (deliveryMethods.length === 0) { showFlash('Enable at least one delivery method', 'error'); return; }
                setSavingDelivery(true);
                const areasArray = areasText.split(',').map(a => a.trim()).filter(Boolean);
                const updates = {
                    delivery_methods: deliveryMethods,
                    delivery_fee: parseFloat(deliveryFee) || 0,
                    delivery_fee_type: deliveryFeeType,
                    pickup_address: pickupAddress,
                    delivery_notes: deliveryNotes,
                    delivery_areas: areasArray
                };
                try {
                    const { error } = await supabase.from('sellers').update(updates).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, ...updates };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Delivery settings saved!');
                } catch (err) { showFlash('Failed to save delivery settings: ' + err.message, 'error'); }
                setSavingDelivery(false);
            };

            // ---- Payment Options (accepted methods + per-method details) ----
            const [bankDetails, setBankDetails] = useState({
                bank_name: '', account_holder: '', account_number: '', branch_code: '', reference: '',
                ...(seller.bank_details || {})
            });
            const [payOpts, setPayOpts] = useState({
                methods: ['eft'], cash_note: '',
                ...(seller.payment_options || {}),
                ecocash: { number: '', name: '', ...((seller.payment_options || {}).ecocash || {}) },
                mpesa: { number: '', name: '', ...((seller.payment_options || {}).mpesa || {}) }
            });
            const [savingBank, setSavingBank] = useState(false);
            const togglePayMethod = (m) => setPayOpts(p => ({ ...p, methods: (p.methods || []).includes(m) ? p.methods.filter(x => x !== m) : [...(p.methods || []), m] }));
            const hasPayMethod = (m) => (payOpts.methods || []).includes(m);

            const saveBank = async () => {
                setSavingBank(true);
                try {
                    const { error } = await supabase.from('sellers').update({ bank_details: bankDetails, payment_options: payOpts }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, bank_details: bankDetails, payment_options: payOpts };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Payment options saved!');
                } catch (err) { showFlash('Failed to save payment options: ' + err.message, 'error'); }
                setSavingBank(false);
            };

            // ---- Social Links ----
            const [social, setSocial] = useState({
                facebook: '', instagram: '', tiktok: '', website: '',
                ...(seller.social_links || {})
            });
            const [savingSocial, setSavingSocial] = useState(false);

            const saveSocial = async () => {
                setSavingSocial(true);
                try {
                    const { error } = await supabase.from('sellers').update({ social_links: social }).eq('id', seller.id);
                    if (error) throw error;
                    const updated = { ...seller, social_links: social };
                    onSellerUpdate(updated);
                    localStorage.setItem('current_seller', JSON.stringify(updated));
                    showFlash('Social links saved!');
                } catch (err) { showFlash('Failed to save social links: ' + err.message, 'error'); }
                setSavingSocial(false);
            };

            // Helpers — defined outside render to prevent re-creation

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-gray-900">Settings</h2>

                    {/* Flash message */}
                    {flash.show && (
                        <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-lg text-sm font-semibold animate-pulse ${
                            flash.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
                        }`}>
                            {flash.message}
                        </div>
                    )}

                    {/* 1. Profile & Store */}
                    <SettingsSectionCard icon={<Icons.store />} title="Profile & Store">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Full Name" value={profile.full_name} onChange={v => setProfile({...profile, full_name: v})} placeholder="Your name" />
                            <SettingsInputField label="Business Name" value={profile.business_name} onChange={v => setProfile({...profile, business_name: v})} placeholder="Store name" />
                        </div>
                        <SettingsInputField label="Business Description" value={profile.business_description} onChange={v => setProfile({...profile, business_description: v})} placeholder="What do you sell?" textarea />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Phone (WhatsApp)" value={profile.seller_phone} onChange={v => setProfile({...profile, seller_phone: v})} placeholder="+266 5772 7054" type="tel" />
                            <SettingsInputField label="Location" value={profile.location} onChange={v => setProfile({...profile, location: v})} placeholder="City, Province" />
                            <SettingsInputField label="Email (optional)" value={profile.email} onChange={v => setProfile({...profile, email: v})} placeholder="you@example.com" type="email" />
                        </div>
                        <SettingsInputField label="Address" value={profile.address} onChange={v => setProfile({...profile, address: v})} placeholder="Full street address" />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="Logo URL" value={profile.logo_url} onChange={v => setProfile({...profile, logo_url: v})} placeholder="https://..." />
                            <SettingsInputField label="Banner URL" value={profile.banner_url} onChange={v => setProfile({...profile, banner_url: v})} placeholder="https://..." />
                        </div>
                        {(profile.logo_url || profile.banner_url) && (
                            <div className="flex gap-4">
                                {profile.logo_url && (
                                    <div>
                                        <p className="text-xs text-gray-400 mb-1">Logo Preview</p>
                                        <img src={profile.logo_url} alt="Logo" className="w-16 h-16 rounded-xl object-cover border border-gray-200" onError={e => e.target.style.display='none'} />
                                    </div>
                                )}
                                {profile.banner_url && (
                                    <div className="flex-1">
                                        <p className="text-xs text-gray-400 mb-1">Banner Preview</p>
                                        <img src={profile.banner_url} alt="Banner" className="w-full h-16 rounded-xl object-cover border border-gray-200" onError={e => e.target.style.display='none'} />
                                    </div>
                                )}
                            </div>
                        )}
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Preferred Language</label>
                            <select value={profile.preferred_language} onChange={e => setProfile({...profile, preferred_language: e.target.value})}
                                className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50">
                                <option value="en">English</option>
                                <option value="st">Sesotho</option>
                            </select>
                        </div>
                        <SettingsSaveButton onClick={saveProfile} saving={savingProfile} />
                    </SettingsSectionCard>

                    {/* 2. Change PIN */}
                    <SettingsSectionCard icon={<Icons.lock />} title="Change PIN">
                        <SettingsInputField label="Current PIN" value={pinData.current} onChange={v => setPinData({...pinData, current: v})} type="password" placeholder="Enter current PIN" />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <SettingsInputField label="New PIN" value={pinData.newPin} onChange={v => setPinData({...pinData, newPin: v})} type="password" placeholder="At least 4 digits" />
                            <SettingsInputField label="Confirm New PIN" value={pinData.confirm} onChange={v => setPinData({...pinData, confirm: v})} type="password" placeholder="Re-enter new PIN" />
                        </div>
                        <SettingsSaveButton onClick={changePin} saving={savingPin} label="Change PIN" />
                    </SettingsSectionCard>

                    {/* 3. Business Hours */}
                    <SettingsSectionCard icon={<Icons.clock />} title="Business Hours">
                        <p className="text-xs text-gray-400">Enter hours like "08:00 - 17:00" or "Closed"</p>
                        <div className="space-y-2">
                            {Object.keys(dayLabels).map(d => (
                                <div key={d} className="flex items-center gap-3">
                                    <span className="text-sm font-medium text-gray-600 w-24">{dayLabels[d]}</span>
                                    <input type="text" value={hours[d] || ''} onChange={e => setHours({...hours, [d]: e.target.value})}
                                        placeholder="e.g. 08:00 - 17:00"
                                        className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                </div>
                            ))}
                        </div>
                        <SettingsSaveButton onClick={saveHours} saving={savingHours} />
                    </SettingsSectionCard>

                    {/* 4. Delivery & Shipping */}
                    <SettingsSectionCard icon={<Icons.mapPin />} title="Delivery & Shipping">
                        <p className="text-xs text-gray-400 -mt-1">Choose how customers can receive their orders.</p>

                        {/* Delivery Methods */}
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Delivery Methods</label>
                            <div className="space-y-2">
                                {allDeliveryMethods.map(m => (
                                    <label key={m.id} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition ${
                                        deliveryMethods.includes(m.id) ? 'border-brand-500 bg-brand-50' : 'border-gray-200 bg-gray-50 hover:border-gray-300'
                                    }`}>
                                        <input type="checkbox" checked={deliveryMethods.includes(m.id)} onChange={() => toggleMethod(m.id)}
                                            className="w-4 h-4 rounded text-brand-500 focus:ring-brand-500" />
                                        <div>
                                            <span className="text-sm font-semibold text-gray-900">{m.label}</span>
                                            <span className="text-xs text-gray-500 ml-2">{m.desc}</span>
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </div>

                        {/* Seller-delivery fee (your own delivery only; courier is quoted per order) */}
                        {deliveryMethods.includes('self_delivery') && (
                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 space-y-3">
                                <p className="text-xs font-semibold text-amber-800">Seller Delivery Fee — charged when a customer picks "Seller Delivery" (pickup is always free)</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Fee Type</label>
                                        <select value={deliveryFeeType} onChange={e => setDeliveryFeeType(e.target.value)}
                                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                                            <option value="flat">Flat fee (R)</option>
                                            <option value="free_above">Free above threshold (R)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">
                                            {deliveryFeeType === 'flat' ? 'Delivery Fee (R)' : 'Fee (R) — free above this order total'}
                                        </label>
                                        <input type="number" value={deliveryFee} onChange={e => setDeliveryFee(e.target.value)} min="0" step="5"
                                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Courier fee explainer — not a fixed upfront charge */}
                        {deliveryMethods.includes('courier') && (
                            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                <p className="text-xs font-semibold text-blue-900 mb-1">📦 Third-party courier fee</p>
                                <p className="text-xs text-blue-800">Courier orders are <span className="font-semibold">not charged a fixed delivery fee at checkout</span> — the courier sets the cost by parcel size &amp; destination. The buyer sees "fee confirmed by seller", and you tell them the actual courier cost (or have them pay the courier on collection) via the order chat. Add timing/courier details in the Delivery Notes below.</p>
                            </div>
                        )}

                        {/* Pickup Address */}
                        {deliveryMethods.includes('pickup') && (
                            <SettingsInputField label="Pickup Address / Instructions" value={pickupAddress} onChange={setPickupAddress}
                                placeholder="e.g. 123 Main St, Maseru — ring bell at gate" textarea />
                        )}

                        {/* Delivery Areas */}
                        <SettingsInputField label="Delivery Areas (comma separated)" value={areasText} onChange={setAreasText}
                            placeholder="Maseru, Ladybrand, Bloemfontein" textarea />
                        {areasText && (
                            <div className="flex flex-wrap gap-2">
                                {areasText.split(',').map(a => a.trim()).filter(Boolean).map((a, i) => (
                                    <span key={i} className="bg-brand-50 text-brand-700 text-xs font-medium px-3 py-1 rounded-full">{a}</span>
                                ))}
                            </div>
                        )}

                        {/* Delivery Notes */}
                        <SettingsInputField label="Delivery Notes (shown to buyer)" value={deliveryNotes} onChange={setDeliveryNotes}
                            placeholder="e.g. Delivery within 24hrs of order confirmation. Courier orders may take 2-3 days." textarea />

                        <SettingsSaveButton onClick={saveDelivery} saving={savingDelivery} />
                    </SettingsSectionCard>

                    {/* 5. Payment Options */}
                    <SettingsSectionCard icon={<Icons.bank />} title="Payment Options">
                        <p className="text-xs text-gray-400">Choose how buyers can pay you. The details you fill in are shown to buyers at checkout and on their order tracking page.</p>
                        {/* Accepted methods */}
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Accepted Methods</label>
                            <div className="flex flex-wrap gap-2">
                                {[{ k: 'eft', l: 'EFT / Bank Transfer' }, { k: 'ecocash', l: 'EcoCash' }, { k: 'mpesa', l: 'M-Pesa' }, { k: 'cash', l: 'Cash' }].map(m => (
                                    <button key={m.k} type="button" onClick={() => togglePayMethod(m.k)}
                                        className={'px-3 py-1.5 rounded-lg text-sm font-semibold border-2 transition ' + (hasPayMethod(m.k) ? 'border-brand-500 bg-brand-50 text-brand-700' : 'border-gray-200 text-gray-500 hover:border-gray-300')}>
                                        {hasPayMethod(m.k) ? '✓ ' : ''}{m.l}
                                    </button>
                                ))}
                            </div>
                        </div>
                        {/* EFT details */}
                        {hasPayMethod('eft') && (
                            <div className="border-t border-gray-100 pt-4 space-y-4">
                                <p className="text-xs font-bold text-gray-700">Bank Transfer (EFT) details</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <SettingsInputField label="Bank Name" value={bankDetails.bank_name} onChange={v => setBankDetails({...bankDetails, bank_name: v})} placeholder="e.g. FNB, Capitec" />
                                    <SettingsInputField label="Account Holder" value={bankDetails.account_holder} onChange={v => setBankDetails({...bankDetails, account_holder: v})} placeholder="Name on account" />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <SettingsInputField label="Account Number" value={bankDetails.account_number} onChange={v => setBankDetails({...bankDetails, account_number: v})} placeholder="Account number" />
                                    <SettingsInputField label="Branch Code" value={bankDetails.branch_code} onChange={v => setBankDetails({...bankDetails, branch_code: v})} placeholder="Branch code" />
                                </div>
                                <SettingsInputField label="Payment Reference" value={bankDetails.reference} onChange={v => setBankDetails({...bankDetails, reference: v})} placeholder="e.g. Order number" />
                            </div>
                        )}
                        {/* EcoCash details */}
                        {hasPayMethod('ecocash') && (
                            <div className="border-t border-gray-100 pt-4 space-y-4">
                                <p className="text-xs font-bold text-gray-700">EcoCash details</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <SettingsInputField label="EcoCash Number" value={payOpts.ecocash.number} onChange={v => setPayOpts({...payOpts, ecocash: {...payOpts.ecocash, number: v}})} placeholder="e.g. +266 5..." />

                                    <SettingsInputField label="Account Name" value={payOpts.mpesa.name} onChange={v => setPayOpts({...payOpts, mpesa: {...payOpts.mpesa, name: v}})} placeholder="Name registered to the number" />

                            <SettingsInputField label="Website" value={social.website} onChange={v => setSocial({...social, website: v})} placeholder="https://..." />

        // ============================================================================
        // DISCOUNTS SCREEN
        // ============================================================================

        const DiscountsScreen = ({ seller }) => {
            const [codes, setCodes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingCode, setEditingCode] = useState(null);
            const [saving, setSaving] = useState(false);
            const [form, setForm] = useState({
                code: '', type: 'percentage', value: '', min_order: '',
                max_uses: '', expires_at: '', is_active: true
            });

            const supabase = window.supabaseClient;

            useEffect(() => { loadCodes(); }, [seller.id]);
            useLiveRefresh(() => loadCodes());

            const loadCodes = async () => {
                setLoading(true);
                const { data } = await supabase
                    .from('discount_codes')
                    .select('*')
                    .eq('seller_id', seller.id)
                    .order('created_at', { ascending: false });
                setCodes(data || []);
                setLoading(false);
            };

            const resetForm = () => {
                setForm({ code: '', type: 'percentage', value: '', min_order: '', max_uses: '', expires_at: '', is_active: true });
                setEditingCode(null);
                setShowForm(false);
            };

            const openEdit = (dc) => {
                setForm({
                    code: dc.code,
                    type: dc.type,
                    value: dc.value.toString(),
                    min_order: dc.min_order ? dc.min_order.toString() : '',
                    max_uses: dc.max_uses ? dc.max_uses.toString() : '',
                    expires_at: dc.expires_at ? dc.expires_at.slice(0, 16) : '',
                    is_active: dc.is_active
                });
                setEditingCode(dc);
                setShowForm(true);
            };

            const handleSave = async () => {
                if (!form.code.trim() || !form.value) return;
                setSaving(true);
                const payload = {
                    seller_id: seller.id,
                    code: form.code.trim().toUpperCase(),
                    type: form.type,
                    value: parseFloat(form.value),
                    min_order: form.min_order ? parseFloat(form.min_order) : 0,
                    max_uses: form.max_uses ? parseInt(form.max_uses) : null,
                    expires_at: form.expires_at ? new Date(form.expires_at).toISOString() : null,
                    is_active: form.is_active
                };

                if (editingCode) {
                    await supabase.from('discount_codes').update(payload).eq('id', editingCode.id);
                } else {
                    await supabase.from('discount_codes').insert(payload);
                }

                setSaving(false);
                resetForm();
                loadCodes();

            const toggleActive = async (dc) => {
                await supabase.from('discount_codes').update({ is_active: !dc.is_active }).eq('id', dc.id);
                loadCodes();
            };

            const deleteCode = async (dc) => {
                if (!(await window.confirmDialog({ title: 'Delete discount code?', message: `Delete “${dc.code}”? This can’t be undone.`, confirmLabel: 'Delete', danger: true }))) return;
                await supabase.from('discount_codes').delete().eq('id', dc.id);

            const isExpired = (dc) => dc.expires_at && new Date(dc.expires_at) < new Date();

            if (loading) return (

            return (

                            </div>
                        </div>

                    {/* Codes List */}
                    {codes.length === 0 ? (
                        <div className="bg-white rounded-2xl border border-gray-200 p-10 text-center">
                            <Icons.discount style={{ width: 40, height: 40, margin: '0 auto 12px', color: '#9ca3af' }} />

                                                    {dc.expires_at && (
