                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // ORDERS SCREEN
        // ============================================================================

        const OrdersScreen = ({ seller }) => {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [detailOrder, setDetailOrder] = useState(null);
            const [formData, setFormData] = useState({
                customer_name: '',
                customer_phone: '',
                items: [{ product_name: '', quantity: 1, price: '' }],
                total: ''
            });

            useEffect(() => {
                loadOrders();
            }, [seller.id]);

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);
                } catch (err) {
                    console.error('Load orders error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const createManualOrder = async () => {
                if (!formData.customer_name || !formData.customer_phone || !formData.total) {
                    alert('Please fill in required fields');
                    return;
                }

                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .insert({
                            seller_id: seller.id,
                            order_number: generateOrderNumber(),
                            customer_name: formData.customer_name,
                            customer_phone: formData.customer_phone,
                            total: parseFloat(formData.total),
                            status: 'new',
                            payment_status: 'pending',
                            delivery_status: 'pending',
                            source: 'manual'
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    for (const item of formData.items) {
                        if (item.product_name) {
                            await supabase.from('order_items').insert({
                                order_id: data.id,
                                product_name: item.product_name,
                                quantity: parseInt(item.quantity),
                                price: parseFloat(item.price)
                            });
                        }
                    }

                    setShowForm(false);
                    setFormData({
                        customer_name: '',
                        customer_phone: '',
                        items: [{ product_name: '', quantity: 1, price: '' }],
                        total: ''
                    });
                    loadOrders();
                } catch (err) {
                    alert('Create order failed: ' + err.message);
                }
            };

            const updateOrderStatus = async (orderId, field, value) => {
                try {
                    const updateData = { [field]: value };
                    if (field === 'delivery_status') updateData.delivery_updated_at = new Date().toISOString();
                    const { error } = await supabase
                        .from('orders')
                        .update(updateData)
                        .eq('id', orderId);
                    if (error) throw error;

                    // Offer to notify the buyer via the seller's own WhatsApp (click-to-chat, no API)
                    const notifyStatuses = ['confirmed', 'preparing', 'paid', 'dispatched', 'shipped', 'delivered', 'cancelled'];
                    const notifyDelivery = ['ready_for_pickup', 'out_for_delivery', 'in_transit', 'delivered'];
                    const shouldNotify =
                        (field === 'status' && notifyStatuses.includes(value)) ||
                        (field === 'delivery_status' && notifyDelivery.includes(value));

                    if (shouldNotify) {
                        const order = orders.find(o => o.id === orderId) || {};
                        const milestone = (field === 'delivery_status')
                            ? ({ ready_for_pickup: 'ready_for_pickup', out_for_delivery: 'out_for_delivery', in_transit: 'out_for_delivery', delivered: 'delivered' }[value] || 'status_update')
                            : ({ confirmed: 'order_confirmation', paid: 'payment_received', delivered: 'delivered' }[value] || 'status_update');
                        const ctx = {
                            name: order.customer_name, order: order.order_number,
                            seller: seller.business_name, total: formatCurrency(order.total),
                            link: trackLink(order.track_token), lang: seller.preferred_language,
                            pickup: seller.pickup_address, statusLabel: getStatusLabel(value)
                        };
                        const auto = (() => { try { return localStorage.getItem('yebosell_autonotify') === '1'; } catch (e) { return false; } })();
                        const go = auto || window.confirm('Notify the buyer on WhatsApp about this update?');
                        if (go && order.customer_phone && notifyBuyer(order.customer_phone, milestone, ctx)) {
                            try { supabase.from('notification_log').insert({ order_id: orderId, order_number: order.order_number, status_sent: value, customer_phone: order.customer_phone, success: true }); } catch (e) {}
                        }
                    }

                    loadOrders();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            };

            const sendWhatsApp = (order) => {
                const message = `Hi ${order.customer_name},\n\nYour order #${order.order_number} is ${getStatusLabel(order.status)}.\nTotal: ${formatCurrency(order.total)}\n\nThank you!`;
                window.open(whatsappLink(order.customer_phone, message), '_blank');
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Orders"
                        subtitle={`${orders.length} total order${orders.length !== 1 ? 's' : ''}`}
                        actions={
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors"
                            >
                                <Icons.plus /> Create Order
                            </button>
                        }
                    />

                    {/* Manual Order Form */}
                    {showForm && (
                        <div className="card card-shadow p-6 mb-6 border-l-4 border-brand-500">
                            <h3 className="font-bold text-gray-900 mb-4 text-lg">New Order</h3>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Customer Name</label>
                                    <input
                                        type="text"
                                        value={formData.customer_name}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_name: e.target.value }))}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Phone Number</label>
                                    <input
                                        type="tel"
                                        value={formData.customer_phone}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_phone: e.target.value }))}
                                        placeholder="e.g. 27xxxxxxxx or 266xxxxxxx"
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>
                            </div>

                            <div className="mb-4">
                                <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Items</p>
                                {formData.items.map((item, idx) => (
                                    <div key={idx} className="flex gap-3 mb-2">
                                        <input
                                            type="text"
                                            placeholder="Product"
                                            value={item.product_name}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].product_name = e.target.value;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                        <input
                                            type="number"
                                            placeholder="Qty"
                                            value={item.quantity}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].quantity = parseInt(e.target.value) || 1;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="w-20 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                        <input
                                            type="number"
                                            placeholder="Price"
                                            value={item.price}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].price = e.target.value;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="w-28 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                    </div>
                                ))}
                            </div>

                            <div className="mb-4 max-w-xs">
                                <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Total (ZAR)</label>
                                <input
                                    type="number"
                                    value={formData.total}
                                    onChange={(e) => setFormData(prev => ({ ...prev, total: e.target.value }))}
                                    step="0.01"
                                    className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                />
                            </div>

                            <div className="flex gap-3">
                                <button
                                    onClick={createManualOrder}
                                    className="bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Create Order
                                </button>
                                <button
                                    onClick={() => setShowForm(false)}
                                    className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Orders List */}
                    {orders.length === 0 ? (
                        <div className="card card-shadow p-12 text-center">
                            <Icons.orders className="mx-auto mb-3 text-gray-300" style={{width: 48, height: 48}} />
                            <p className="text-gray-500 text-sm">No orders yet</p>
                        </div>
                    ) : (
                        <>
                            {/* Desktop table view */}
                            <div className="hidden lg:block card card-shadow overflow-hidden">
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>Order #</th>
                                            <th>Customer</th>
                                            <th>Status</th>
                                            <th>Payment</th>
                                            <th>Delivery</th>
                                            <th className="text-right">Total</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.map(order => (
                                            <tr key={order.id} className="cursor-pointer hover:bg-green-50/50 transition" onClick={() => setDetailOrder(order)}>
                                                <td className="font-semibold text-gray-900">{order.order_number}</td>
                                                <td>
                                                    <p className="text-gray-900">{order.customer_name}</p>
                                                    <p className="text-xs text-gray-400">{order.customer_phone}</p>
                                                </td>
                                                <td>
                                                    <select
                                                        value={order.status}
                                                        onChange={(e) => updateOrderStatus(order.id, 'status', e.target.value)}
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="text-xs px-2 py-1.5 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
                                                    >
                                                        <option value="new">New</option>
                                                        <option value="confirmed">Confirmed</option>
                                                        <option value="preparing">Preparing</option>
                                                        <option value="dispatched">Dispatched</option>
                                                        <option value="delivered">Delivered</option>
                                                        <option value="cancelled">Cancelled</option>
                                                    </select>
                                                </td>
                                                <td>
                                                    <span className="badge" style={{ backgroundColor: getStatusColor(order.payment_status) + '15', color: getStatusColor(order.payment_status) }}>
                                                        {getStatusLabel(order.payment_status)}
                                                    </span>
                                                </td>
                                                <td>
                                                    <select
                                                        value={order.delivery_status}
                                                        onChange={(e) => updateOrderStatus(order.id, 'delivery_status', e.target.value)}
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="text-xs px-2 py-1.5 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
                                                    >
                                                        <option value="pending">Pending</option>
                                                        <option value="ready_for_pickup">Ready for Pickup</option>
                                                        <option value="out_for_delivery">Out for Delivery</option>
                                                        <option value="in_transit">In Transit</option>
                                                        <option value="delivered">Delivered</option>
                                                    </select>
                                                </td>
                                                <td className="text-right font-semibold text-green-600">{formatCurrency(order.total)}</td>
                                                <td>
                                                    <button
                                                        onClick={(e) => { e.stopPropagation(); sendWhatsApp(order); }}
                                                        className="flex items-center gap-1.5 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"
                                                    >
                                                        <Icons.whatsapp /> Message
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Mobile card view */}
                            <div className="lg:hidden space-y-3">
                                {orders.map(order => (
                                    <div key={order.id} className="card card-shadow p-4 cursor-pointer hover:shadow-md transition" onClick={() => setDetailOrder(order)}>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <p className="font-bold text-gray-900">{order.order_number}</p>
                                                <p className="text-xs text-gray-500">{order.customer_name}</p>
                                            </div>
                                            <p className="text-lg font-bold text-green-600">{formatCurrency(order.total)}</p>
                                        </div>

                                        <div className="flex gap-2 mb-3 flex-wrap">
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.status) + '15', color: getStatusColor(order.status) }}>
                                                {getStatusLabel(order.status)}
                                            </span>
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.payment_status) + '15', color: getStatusColor(order.payment_status) }}>
                                                Pay: {getStatusLabel(order.payment_status)}
                                            </span>
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.delivery_status) + '15', color: getStatusColor(order.delivery_status) }}>
                                                Del: {getStatusLabel(order.delivery_status)}
                                            </span>
                                        </div>

                                        <div className="flex gap-2 flex-wrap text-xs">
                                            <select
                                                value={order.status}
                                                onChange={(e) => updateOrderStatus(order.id, 'status', e.target.value)}
                                                onClick={(e) => e.stopPropagation()}
                                                className="px-2 py-1.5 border border-gray-200 rounded-lg bg-white"
                                            >
                                                <option value="new">New</option>
                                                <option value="confirmed">Confirmed</option>
                                                <option value="preparing">Preparing</option>
                                                <option value="dispatched">Dispatched</option>
                                            </select>

                                            <select
                                                value={order.delivery_status}
                                                onChange={(e) => updateOrderStatus(order.id, 'delivery_status', e.target.value)}
                                                onClick={(e) => e.stopPropagation()}
                                                className="px-2 py-1.5 border border-gray-200 rounded-lg bg-white"
                                            >
                                                <option value="pending">Pending</option>
                                                <option value="in_transit">In Transit</option>
                                                <option value="delivered">Delivered</option>
                                            </select>

                                            <button
                                                onClick={(e) => { e.stopPropagation(); sendWhatsApp(order); }}
                                                className="flex items-center gap-1 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg font-semibold transition-colors"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {/* Order Detail Modal */}
                    {detailOrder && <OrderDetailModal order={detailOrder} onClose={() => setDetailOrder(null)} />}
                </div>
            );
        };

        // ============================================================================
        // PAYMENT DETAIL MODAL
        // ============================================================================

        const PaymentDetailModal = ({ payment, onClose, onStatusChange }) => {
            const [imgZoom, setImgZoom] = useState(false);
            if (!payment) return null;

            const order = payment.orders || {};
            const PAYMENT_METHODS = { eft: 'EFT / Bank Transfer', mobile_money: 'Mobile Money', cash: 'Cash' };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
                    <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
                            <div>
                                <h2 className="text-lg font-bold text-gray-900">Payment Details</h2>
                                <p className="text-xs text-gray-400">{new Date(payment.created_at).toLocaleString()}</p>
                            </div>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>

                        <div className="px-6 py-5 space-y-5">
                            {/* Amount & Status */}
                            <div className="text-center py-3">
                                <p className="text-3xl font-bold text-gray-900">{formatCurrency(payment.amount)}</p>
                                <span className="inline-block mt-2 badge text-sm" style={{ backgroundColor: getStatusColor(payment.status) + '15', color: getStatusColor(payment.status) }}>
                                    {getStatusLabel(payment.status)}
                                </span>
                            </div>

                            {/* Linked Order */}
                            <div className="bg-gray-50 rounded-xl p-4">
                                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Linked Order</p>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="font-semibold text-gray-900">{order.order_number || '—'}</p>
                                        <p className="text-sm text-gray-500">{order.customer_name || '—'}</p>
                                        {order.customer_phone && (
                                            <a href={'https://wa.me/' + order.customer_phone.replace(/[^0-9]/g, '')} target="_blank" rel="noopener"
                                                className="text-xs text-brand-600 hover:underline flex items-center gap-1 mt-0.5">
                                                <Icons.whatsapp /> {order.customer_phone}
                                            </a>
                                        )}
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm text-gray-500">Order Total</p>
                                        <p className="font-bold text-gray-900">{formatCurrency(order.total)}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Payment Info Grid */}
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-gray-50 rounded-xl p-3">
                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Method</p>
                                    <p className="text-sm font-medium text-gray-900">{PAYMENT_METHODS[payment.payment_method] || payment.payment_method}</p>
                                </div>
                                <div className="bg-gray-50 rounded-xl p-3">
                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Date</p>
                                    <p className="text-sm font-medium text-gray-900">{new Date(payment.created_at).toLocaleDateString()}</p>
                                </div>
                            </div>

                            {/* Proof Screenshot */}
                            {payment.screenshot_url && (
                                <div>
                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Payment Proof</p>
                                    <img src={payment.screenshot_url} alt="Payment proof"
                                        className={'rounded-xl border border-gray-200 cursor-pointer transition ' + (imgZoom ? 'w-full' : 'h-40 object-cover w-full')}
                                        onClick={() => setImgZoom(!imgZoom)} />
                                    <p className="text-xs text-gray-400 mt-1 text-center">Click to {imgZoom ? 'shrink' : 'expand'}</p>
                                </div>
                            )}

                            {/* Action Buttons */}
                            {payment.status === 'pending' && (
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => { onStatusChange(payment.id, 'confirmed'); onClose(); }}
                                        className="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-xl text-sm transition-colors">
                                        Confirm Payment
                                    </button>
                                    <button onClick={() => { onStatusChange(payment.id, 'rejected'); onClose(); }}
                                        className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-3 rounded-xl text-sm transition-colors border border-red-200">
                                        Reject
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // PAYMENTS SCREEN
        // ============================================================================

        const PaymentsScreen = ({ seller }) => {
            const [payments, setPayments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({
                order_id: '',
                amount: '',
                payment_method: 'eft',
                screenshot_url: ''
            });
            const [orders, setOrders] = useState([]);
            const fileInputRef = useRef(null);
            const [uploading, setUploading] = useState(false);
            const [selectedPayment, setSelectedPayment] = useState(null);
            const [filterStatus, setFilterStatus] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [dateRange, setDateRange] = useState('all');
            const [customDateFrom, setCustomDateFrom] = useState('');
            const [customDateTo, setCustomDateTo] = useState('');
            const [showReconcile, setShowReconcile] = useState(false);

            useEffect(() => {
                loadPayments();
                loadOrders();
            }, [seller.id]);

            const loadPayments = async () => {
                try {
                    const { data, error } = await supabase
                        .from('payments')
                        .select('*, orders(order_number, total, customer_phone, customer_name)')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setPayments(data || []);
                } catch (err) {
                    console.error('Load payments error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('id, order_number, total, payment_status, customer_phone, customer_name, created_at, track_token')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);
                } catch (err) {
                    console.error('Load orders error:', err);
                }
            };

            // Payment summary stats
            const totalCollected = payments.filter(p => p.status === 'confirmed').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
            const totalPending = payments.filter(p => p.status === 'pending').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
            const pendingCount = payments.filter(p => p.status === 'pending').length;
            const totalOrderValue = orders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
            const outstandingBalance = totalOrderValue - totalCollected;

            // Filtered payments
            const filteredPayments = payments
                .filter(p => {
                    // Date filter
                    if (dateRange !== 'all') {
                        const payDate = new Date(p.created_at);
                        const now = new Date();
                        if (dateRange === 'today') {
                            const today = now.toISOString().split('T')[0];
                            if (!p.created_at.startsWith(today)) return false;
                        } else if (dateRange === 'this_week') {
                            const weekAgo = new Date(now);
                            weekAgo.setDate(weekAgo.getDate() - 7);
                            if (payDate < weekAgo) return false;
                        } else if (dateRange === 'this_month') {
                            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                            if (payDate < monthStart) return false;
                        } else if (dateRange === 'custom') {
                            if (customDateFrom && payDate < new Date(customDateFrom)) return false;
                            if (customDateTo && payDate > new Date(customDateTo + 'T23:59:59')) return false;
                        }
                    }
                    // Existing filters
                    if (filterStatus !== 'all' && p.status !== filterStatus) return false;
                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const orderNum = (p.orders?.order_number || '').toLowerCase();
                        const custName = (p.orders?.customer_name || '').toLowerCase();
                        if (!orderNum.includes(q) && !custName.includes(q)) return false;
                    }
                    return true;
                });

            // Calculate total confirmed payments for a given order
            const getPaidTotal = (orderId) => {
                return payments
                    .filter(p => p.order_id === orderId && p.status === 'confirmed')
                    .reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
            };

            // Get orders that still need payment (not fully paid)
            const unpaidOrders = orders.filter(o => {
                const paidSoFar = getPaidTotal(o.id);
                return paidSoFar < parseFloat(o.total);
            });

            // Get balance remaining for selected order in form
            const selectedOrder = orders.find(o => o.id === formData.order_id);
            const selectedPaid = selectedOrder ? getPaidTotal(selectedOrder.id) : 0;
            const selectedBalance = selectedOrder ? (parseFloat(selectedOrder.total) - selectedPaid) : 0;

            const handleScreenshotUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                setUploading(true);
                try {
                    const timestamp = Date.now();
                    const path = `payments/${seller.id}/${timestamp}-${file.name}`;

                    const { error: uploadErr } = await supabase.storage
                        .from('payment-screenshots')
                        .upload(path, file);

                    if (uploadErr) throw uploadErr;

                    const { data } = supabase.storage
                        .from('payment-screenshots')
                        .getPublicUrl(path);

                    setFormData(prev => ({ ...prev, screenshot_url: data.publicUrl }));
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const submitPayment = async () => {
                if (!formData.order_id || !formData.amount) {
                    alert('Please fill in required fields');
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('payments')
                        .insert({
                            seller_id: seller.id,
                            order_id: formData.order_id,
                            amount: parseFloat(formData.amount),
                            payment_method: formData.payment_method,
                            screenshot_url: formData.screenshot_url,
                            status: 'pending'
                        });

                    if (error) throw error;

                    setShowForm(false);
                    setFormData({
                        order_id: '',
                        amount: '',
                        payment_method: 'eft',
                        screenshot_url: ''
                    });
                    loadPayments();
                } catch (err) {
                    alert('Submit failed: ' + err.message);
                }
            };

            const updatePaymentStatus = async (paymentId, newStatus) => {
                try {
                    const { error } = await supabase
                        .from('payments')
                        .update({ status: newStatus })
                        .eq('id', paymentId);
                    if (error) throw error;

                    // If confirming, auto-update the order's payment_status and send receipt
                    if (newStatus === 'confirmed') {
                        const payment = payments.find(p => p.id === paymentId);
                        if (payment && payment.order_id) {
                            // Get order details
                            const order = orders.find(o => o.id === payment.order_id);
                            if (order) {
                                const thisAmount = parseFloat(payment.amount) || 0;
                                const previouslyPaid = getPaidTotal(payment.order_id);
                                const newTotalPaid = previouslyPaid + thisAmount;
                                const orderTotal = parseFloat(order.total);
                                const newPaymentStatus = newTotalPaid >= orderTotal ? 'paid' : 'partial';

                                // Update order payment_status
                                await supabase
                                    .from('orders')
                                    .update({ payment_status: newPaymentStatus })
                                    .eq('id', payment.order_id);

                                // Send WhatsApp receipt to buyer
                                const orderData = payment.orders || order;
                                const customerPhone = orderData.customer_phone || '';
                                const customerName = orderData.customer_name || 'Customer';
                                const orderNumber = orderData.order_number || order.order_number;
                                const remaining = orderTotal - newTotalPaid;

                                if (customerPhone) {
                                    const ctx = {
                                        name: customerName, order: orderNumber,
                                        seller: seller.business_name, total: formatCurrency(orderTotal),
                                        link: trackLink(order.track_token), lang: seller.preferred_language,
                                        statusLabel: 'Payment received'
                                    };
                                    const auto = (() => { try { return localStorage.getItem('yebosell_autonotify') === '1'; } catch (e) { return false; } })();
                                    const go = auto || window.confirm('Send the buyer a payment confirmation on WhatsApp?');
                                    if (go && notifyBuyer(customerPhone, 'payment_received', ctx)) {
                                        try { supabase.from('notification_log').insert({ order_id: payment.order_id, order_number: orderNumber, status_sent: 'payment_received', customer_phone: customerPhone, success: true }); } catch (e) {}
                                    }
                                }
                            }
                        }
                    }

                    loadPayments();
                    loadOrders();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            };

            const exportToCSV = () => {
                const headers = ['Date', 'Order #', 'Customer', 'Amount', 'Method', 'Status'];
                const rows = filteredPayments.map(p => [
                    new Date(p.created_at).toLocaleDateString(),
                    p.orders?.order_number || '',
                    p.orders?.customer_name || '',
                    (parseFloat(p.amount) || 0).toFixed(2),
                    (p.payment_method || '').replace('_', ' '),
                    p.status
                ]);
                const csv = [headers, ...rows].map(row => row.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `payments-${seller.business_name.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const sendPaymentReminder = (order) => {
                const paid = getPaidTotal(order.id);
                const balance = parseFloat(order.total) - paid;
                const message = `Hi,\n\nThis is a friendly reminder regarding your order *${order.order_number}*.\n\n` +
                    `Order Total: ${formatCurrency(order.total)}\n` +
                    (paid > 0 ? `Amount Paid: ${formatCurrency(paid)}\n` : '') +
                    `Balance Due: *${formatCurrency(balance)}*\n\n` +
                    `Please arrange payment at your earliest convenience.\n\nThank you!\n— ${seller.business_name}`;
                window.open(whatsappLink(order.customer_phone, message), '_blank');
            };

            const getOrderPaymentSummary = () => {
                return orders.map(order => {
                    const orderPayments = payments.filter(p => p.order_id === order.id);
                    const confirmed = orderPayments.filter(p => p.status === 'confirmed').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
                    const pending = orderPayments.filter(p => p.status === 'pending').reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
                    const total = parseFloat(order.total) || 0;
                    const balance = total - confirmed;
                    const daysOld = Math.floor((Date.now() - new Date(order.created_at).getTime()) / 86400000);
                    return { ...order, confirmed, pending, balance, paymentCount: orderPayments.length, daysOld };
                }).sort((a, b) => b.balance - a.balance);
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Payments"
                        subtitle={`${payments.length} payment${payments.length !== 1 ? 's' : ''} · ${formatCurrency(totalCollected)} collected`}
                        actions={
                            <div className="flex gap-2">
                                <button onClick={() => setShowReconcile(!showReconcile)}
                                    className={'flex items-center gap-2 font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors ' + (showReconcile ? 'bg-blue-500 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700')}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
                                    Reconcile
                                </button>
                                <button onClick={exportToCSV}
                                    className="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    Export
                                </button>
                                <button onClick={() => setShowForm(!showForm)}
                                    className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
                                    <Icons.plus /> Report Payment
                                </button>
                            </div>
                        }
                    />

                    {/* Payment Summary Cards */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Collected</p>
                            <p className="text-xl font-bold text-green-600">{formatCurrency(totalCollected)}</p>
                            <p className="text-xs text-gray-400 mt-0.5">{payments.filter(p => p.status === 'confirmed').length} confirmed</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Awaiting Confirmation</p>
                            <p className="text-xl font-bold text-amber-600">{formatCurrency(totalPending)}</p>
                            <p className="text-xs text-gray-400 mt-0.5">{pendingCount} pending</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Outstanding Balance</p>
                            <p className="text-xl font-bold text-red-500">{formatCurrency(Math.max(0, outstandingBalance))}</p>
                            <p className="text-xs text-gray-400 mt-0.5">across all orders</p>
                        </div>
                        <div className="card card-shadow p-4">
                            <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Collection Rate</p>
                            <p className="text-xl font-bold text-gray-900">{totalOrderValue > 0 ? Math.round((totalCollected / totalOrderValue) * 100) : 0}%</p>
                            <div className="w-full h-2 bg-gray-100 rounded-full mt-2 overflow-hidden">
                                <div className="h-full rounded-full bg-green-500 transition-all duration-700" style={{ width: (totalOrderValue > 0 ? Math.min(100, (totalCollected / totalOrderValue) * 100) : 0) + '%' }} />
                            </div>
                        </div>
                    </div>

                    {/* Reconciliation Section */}
                    {showReconcile && (
                        <div className="card card-shadow mb-6 overflow-hidden">
                            <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between bg-blue-50/50">
                                <h3 className="font-semibold text-gray-900 text-sm">Order Payment Reconciliation</h3>
                                <button onClick={() => setShowReconcile(false)} className="text-xs text-gray-500 hover:text-gray-700">Close</button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="data-table text-sm">
                                    <thead>
                                        <tr>
                                            <th>Order #</th>
                                            <th>Customer</th>
                                            <th>Age</th>
                                            <th className="text-right">Order Total</th>
                                            <th className="text-right">Paid</th>
                                            <th className="text-right">Pending</th>
                                            <th className="text-right">Balance</th>
                                            <th>Progress</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {getOrderPaymentSummary().map(o => {
                                            const pct = o.confirmed / (parseFloat(o.total) || 1) * 100;
                                            const agingColor = o.balance > 0 && o.daysOld >= 30 ? 'text-red-600' : o.balance > 0 && o.daysOld >= 14 ? 'text-orange-500' : o.balance > 0 && o.daysOld >= 7 ? 'text-amber-500' : 'text-gray-500';
                                            return (
                                                <tr key={o.id} className={o.balance <= 0 ? 'bg-green-50/30' : ''}>
                                                    <td className="font-semibold text-gray-900">{o.order_number}</td>
                                                    <td className="text-gray-600">{o.customer_name || '—'}</td>
                                                    <td className={agingColor + ' font-medium'}>{o.daysOld}d</td>
                                                    <td className="text-right text-gray-900">{formatCurrency(o.total)}</td>
                                                    <td className="text-right text-green-600 font-medium">{formatCurrency(o.confirmed)}</td>
                                                    <td className="text-right text-amber-600">{o.pending > 0 ? formatCurrency(o.pending) : '—'}</td>
                                                    <td className={'text-right font-bold ' + (o.balance > 0 ? 'text-red-500' : 'text-green-600')}>{o.balance > 0 ? formatCurrency(o.balance) : 'Paid'}</td>
                                                    <td style={{minWidth: '120px'}}>
                                                        <div className="flex items-center gap-2">
                                                            <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                                                <div className="h-full rounded-full transition-all duration-500"
                                                                    style={{ width: Math.min(100, pct) + '%', backgroundColor: pct >= 100 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444' }} />
                                                            </div>
                                                            <span className="text-xs text-gray-500 w-8 text-right">{Math.round(pct)}%</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Filter Bar */}
                    <div className="card card-shadow p-4 mb-6">
                        <div className="flex flex-col sm:flex-row gap-3">
                            <div className="flex-1 relative">
                                <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                                <input type="text" placeholder="Search by order # or customer..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" />
                            </div>
                            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <option value="all">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="rejected">Rejected</option>
                            </select>
                            <select value={dateRange} onChange={e => setDateRange(e.target.value)}
                                className="px-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <option value="all">All Time</option>
                                <option value="today">Today</option>
                                <option value="this_week">This Week</option>
                                <option value="this_month">This Month</option>
                                <option value="custom">Custom Range</option>
                            </select>
                        </div>
                        {dateRange === 'custom' && (
                            <div className="flex gap-3 mt-3 pt-3 border-t border-gray-100">
                                <div className="flex items-center gap-2">
                                    <label className="text-xs text-gray-500 font-medium">From:</label>
                                    <input type="date" value={customDateFrom} onChange={e => setCustomDateFrom(e.target.value)}
                                        className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500" />
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="text-xs text-gray-500 font-medium">To:</label>
                                    <input type="date" value={customDateTo} onChange={e => setCustomDateTo(e.target.value)}

        // ============================================================================
