        // ============================================================================
        // MAIN APP COMPONENT — RESPONSIVE SIDEBAR + BOTTOM NAV
        // ============================================================================

        // Device quick-unlock: when a real Supabase session exists, re-entering the
        // app asks for the PIN instead of a fresh OTP. Verifies PIN via seller_login.
        const LockScreen = ({ seller, onUnlock, onSignOut }) => {
            const [pin, setPin] = useState('');
            const [showPin, setShowPin] = useState(false);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const submit = async () => {
                if (!pin) { setError('Enter your PIN'); return; }
                setLoading(true); setError('');
                try {
                    const { data: res, error: e } = await supabase.rpc('seller_login', { p_phone: seller.phone, p_pin: pin });
                    if (e || !res || res.error) { setError('Incorrect PIN'); setLoading(false); return; }
                    onUnlock();
                } catch (err) { setError('Something went wrong. Please try again.'); setLoading(false); }
            };
            return (
                <div className="gradient-dark min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="mb-8 text-center">
                        <Logo className="mx-auto mb-4" size={72} />
                        <h1 className="text-white text-2xl font-bold">{seller.business_name || 'YeboSell'}</h1>
                        <p className="text-gray-400 text-sm">Enter your PIN to unlock</p>
                    </div>
                    <div className="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
                        <div className="relative mb-4">
                            <input type={showPin ? 'text' : 'password'} value={pin}
                                onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                placeholder="••••••" onKeyDown={e => e.key === 'Enter' && submit()}
                                className="w-full px-4 py-3 pr-12 border border-gray-200 rounded-xl text-center text-2xl tracking-widest bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500" />
                            <button type="button" onClick={() => setShowPin(v => !v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><EyeIcon off={showPin} /></button>
                        </div>
                        {error && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">{error}</div>}
                        <button onClick={submit} disabled={loading} className="w-full bg-green-500 hover:bg-green-600 disabled:bg-gray-400 text-white font-bold py-3 rounded-xl mb-3">{loading ? 'Unlocking...' : 'Unlock'}</button>
                        <button onClick={onSignOut} className="w-full text-center text-gray-500 hover:text-gray-700 text-sm py-1">Sign out</button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // NOTIFICATION BELL — aggregates buyer-driven events across all orders
        // ============================================================================
        const timeAgo = (ts) => {
            const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
            if (s < 60) return 'just now';
            const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
            const d = Math.floor(h / 24); return d + 'd ago';
        };

        const NotifIcon = ({ type }) => {
            const map = {
                new_order: ['#15803d', '#dcfce7'],
                message:   ['#1d4ed8', '#dbeafe'],
                confirm:   ['#15803d', '#dcfce7'],
                dispute:   ['#b91c1c', '#fee2e2'],
                low_stock: ['#b45309', '#fef3c7'],
                out_stock: ['#b91c1c', '#fee2e2'],
                suspended: ['#b91c1c', '#fee2e2'],
            };
            const tone = map[type] || ['#6b7280', '#f3f4f6'];
            return (
                <span className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: tone[1], color: tone[0] }}>
                    {type === 'dispute' || type === 'suspended' ? <Icons.alert /> : type === 'confirm' ? <Icons.check /> : type === 'new_order' ? <Icons.orders style={{ width: 14, height: 14 }} /> : (type === 'low_stock' || type === 'out_stock') ? <Icons.alertTriangle style={{ width: 14, height: 14 }} /> : <Icons.chat />}
                </span>
            );
        };

        const NotificationBell = ({ seller, onOpenOrder, onNavigate, account, onShowSuspension, align = 'right' }) => {
            const [events, setEvents] = useState([]);
            const [open, setOpen] = useState(false);
            const wrapRef = useRef(null);
            const nonceRef = useRef(Math.random().toString(36).slice(2));

            const SEEN_KEY = 'yebosell_notif_seen_' + seller.id;   // new-order "mark all read" cutoff
            const ACK_KEY = 'yebosell_lowstock_ack_' + seller.id;  // acknowledged low-stock keys
            const getSeenMs = () => { try { const v = localStorage.getItem(SEEN_KEY); return v ? new Date(v).getTime() : 0; } catch (e) { return 0; } };
            const getAck = () => { try { return new Set(JSON.parse(localStorage.getItem(ACK_KEY) || '[]')); } catch (e) { return new Set(); } };

            const load = async () => {
                const seenMs = getSeenMs();
                const ack = getAck();
                const [{ data: ords }, { data: msgs }, { data: prods }] = await Promise.all([
                    supabase.from('orders')
                        .select('id, order_number, customer_name, created_at, status, delivery_status')
                        .eq('seller_id', seller.id).order('created_at', { ascending: false }).limit(25),
                    supabase.from('order_messages')
                        .select('id, order_id, body, meta, created_at, read_by_seller_at')
                        .eq('seller_id', seller.id).eq('sender', 'buyer')
                        .order('created_at', { ascending: false }).limit(25),
                    supabase.from('products')
                        .select('id, name, stock, variants, is_active')
                        .eq('seller_id', seller.id),
                ]);
                // A notification stays "unread" until it's actually dealt with — it
                // does NOT clear just because the bell was opened/refreshed. It clears
                // when the seller reads that order's thread (read_by_seller_at), when a
                // new order leaves 'new' status, when "mark all read" sets a cutoff, or
                // when the order is delivered/cancelled. Everything also ages out after a
                // few days so the badge can't run away.
                const DAY = 86400000, FRESH_MS = 4 * DAY, now = Date.now();
                const fresh = (ts) => (now - new Date(ts).getTime()) < FRESH_MS;
                const done = (o) => o && (o.status === 'delivered' || o.status === 'cancelled');
                const omap = {};
                (ords || []).forEach(o => { omap[o.id] = o; });
                const evs = [];
                (ords || []).forEach(o => evs.push({
                    key: 'o-' + o.id, type: 'new_order', order_id: o.id,
                    order_number: o.order_number, who: o.customer_name || 'Buyer', text: 'New order placed', ts: o.created_at,
                    unread: o.status === 'new' && !done(o) && fresh(o.created_at) && new Date(o.created_at).getTime() > seenMs
                }));
                (msgs || []).forEach(m => {
                    const o = omap[m.order_id] || {};
                    const confirm = m.meta && m.meta.confirm;
                    let type = 'message', text = m.body;
                    if (confirm === 'dispute') { type = 'dispute'; text = 'Reported a problem'; }
                    else if (confirm === 'paid') { type = 'confirm'; text = 'Confirmed payment'; }
                    else if (confirm === 'received') { type = 'confirm'; text = 'Confirmed receipt'; }
                    evs.push({
                        key: 'm-' + m.id, type, order_id: m.order_id,
                        order_number: o.order_number || '', who: o.customer_name || 'Buyer', text, ts: m.created_at,
                        unread: !m.read_by_seller_at && fresh(m.created_at)
                    });
                });
                evs.sort((a, b) => new Date(b.ts) - new Date(a.ts));

                // Sold-per-variant lookup (so "out of stock" means stocked-then-depleted,
                // not never-stocked). Mirrors the Inventory tab's matching.
                const soldByPid = {};
                try {
                    const { data: allOrds } = await supabase.from('orders').select('id, status').eq('seller_id', seller.id);
                    const liveIds = (allOrds || []).filter(o => o.status !== 'cancelled').map(o => o.id);
                    if (liveIds.length) {
                        const { data: its } = await supabase.from('order_items').select('product_id, product_name, quantity').in('order_id', liveIds);
                        (its || []).forEach(it => {
                            const pid = it.product_id || '__none';
                            if (!soldByPid[pid]) soldByPid[pid] = {};
                            soldByPid[pid][it.product_name] = (soldByPid[pid][it.product_name] || 0) + (parseInt(it.quantity) || 0);
                        });
                    }
                } catch (e) {}

                // Low-stock alerts (not time-based): pinned above the time feed, unread
                // until acknowledged via "mark all read". Keyed by product+level so a new
                // lower level re-surfaces. Out-of-stock first. Never-stocked variants are
                // ignored (only genuinely stocked-then-low/depleted items alert).
                const lowEvs = [];
                (prods || []).forEach(p => {
                    const soldByName = soldByPid[p.id] || {};
                    const vars = Array.isArray(p.variants) ? p.variants.filter(v => v.size || v.color) : [];
                    let level = null, lowest = null;
                    if (vars.length > 0) {
                        const offered = vars.map(v => {
                            const lbl = [v.color, v.size].filter(Boolean).join(' / ');
                            const remaining = parseInt(v.stock) || 0;
                            return { remaining, initial: remaining + (soldByName[`${p.name} (${lbl})`] || 0) };
                        }).filter(v => v.initial > 0); // stocked or sold at least once
                        if (!offered.length) return;
                        lowest = Math.min(...offered.map(v => v.remaining));
                        if (lowest <= 0) level = 'out_stock';
                        else if (lowest <= STOCK_LOW) level = 'low_stock';
                    } else if (typeof p.stock === 'number') {
                        const remaining = p.stock;
                        const initial = remaining + (soldByName[p.name] || 0);
                        if (remaining <= 0) { if (initial > 0) { level = 'out_stock'; lowest = 0; } }
                        else if (remaining <= STOCK_LOW) { level = 'low_stock'; lowest = remaining; }
                    }
                    if (!level) return;
                    const key = 'ls-' + p.id + ':' + lowest;
                    lowEvs.push({
                        key, type: level, nav: 'inventory', noTime: true,
                        order_number: '', who: p.name,
                        text: level === 'out_stock' ? 'Out of stock' : ('Low stock — only ' + lowest + ' left'),
                        unread: !ack.has(key)
                    });
                });
                lowEvs.sort((a, b) => (b.type === 'out_stock') - (a.type === 'out_stock'));

                setEvents([...lowEvs, ...evs].slice(0, 40));
            };

            const markAllRead = async () => {
                const nowIso = new Date().toISOString();
                try { localStorage.setItem(SEEN_KEY, nowIso); } catch (e) {}
                try {
                    const ack = getAck();
                    events.filter(e => e.type === 'low_stock' || e.type === 'out_stock').forEach(e => ack.add(e.key));
                    localStorage.setItem(ACK_KEY, JSON.stringify([...ack]));
                } catch (e) {}
                try {
                    await supabase.from('order_messages').update({ read_by_seller_at: nowIso })
                        .eq('seller_id', seller.id).eq('sender', 'buyer').is('read_by_seller_at', null);
                } catch (e) {}
                load();
            };

            // Live: poll/visibility backbone + realtime on buyer messages; plus orders changes.
            useLiveRefresh(() => load(), { realtime: { table: 'order_messages', filter: 'seller_id=eq.' + seller.id } });
            useEffect(() => {
                const ch = supabase.channel('notif-orders-' + nonceRef.current)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: 'seller_id=eq.' + seller.id }, () => load())
                    .subscribe();
                return () => { try { supabase.removeChannel(ch); } catch (e) {} };
            }, [seller.id]);

            useEffect(() => {
                if (!open) return;
                const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', onDoc);
                return () => document.removeEventListener('mousedown', onDoc);
            }, [open]);

            // A suspension is always the loudest, top-pinned, un-dismissable notice.
            const suspendedEvent = (account && (account.status === 'suspended' || account.status === 'deactivated')) ? {
                key: 'suspended', type: 'suspended', suspension: true, noTime: true, unread: true,
                who: account.status === 'deactivated' ? 'Store deactivated' : 'Store suspended',
                text: 'Your store is offline — tap to see why and how to reactivate.', order_number: ''
            } : null;
            const allEvents = suspendedEvent ? [suspendedEvent, ...events] : events;

            const unread = allEvents.filter(e => e.unread).length;

            const toggle = () => setOpen(o => !o);
            const pick = (e) => {
                setOpen(false);
                if (e.suspension) { if (onShowSuspension) onShowSuspension(); return; }
                if (e.nav) { if (onNavigate) onNavigate(e.nav); return; }
                if (onOpenOrder) onOpenOrder(e.order_id, e.type !== 'new_order');
            };

            return (
                <div className="relative" ref={wrapRef}>
                    <button onClick={toggle} className="relative p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors" aria-label="Notifications">
                        <Icons.bell />
                        {unread > 0 && (
                            <span className="absolute top-0 right-0 min-w-[18px] h-[18px] px-1 flex items-center justify-center text-[10px] font-bold text-white bg-red-500 rounded-full">{unread > 99 ? '99+' : unread}</span>
                        )}
                    </button>
                    {open && (
                        <div className={`absolute ${align === 'left' ? 'left-0' : 'right-0'} mt-2 w-80 max-w-[88vw] bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden`}>
                            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between gap-2">
                                <p className="font-bold text-sm text-gray-900">Notifications</p>
                                <div className="flex items-center gap-2">
                                    {unread > 0 && <span className="text-[10px] font-bold text-white bg-red-500 rounded-full px-2 py-0.5">{unread} new</span>}
                                    {unread > 0 && <button onClick={markAllRead} className="text-[11px] font-semibold text-brand-600 hover:text-brand-800">Mark all read</button>}
                                </div>
                            </div>
                            <div className="max-h-96 overflow-y-auto">
                                {allEvents.length === 0 ? (
                                    <p className="text-xs text-gray-400 text-center py-8">No updates yet</p>
                                ) : allEvents.map(e => {
                                    const isNew = e.unread;
                                    return (
                                        <button key={e.key} onClick={() => pick(e)}
                                            className={`w-full text-left px-4 py-3 border-b border-gray-50 hover:bg-gray-50 transition flex gap-3 items-start ${e.suspension ? 'bg-red-50' : isNew ? 'bg-brand-50/50' : ''}`}>
                                            <NotifIcon type={e.type} />
                                            <div className="min-w-0 flex-1">
                                                <p className="text-sm text-gray-900 truncate"><span className="font-semibold">{e.who}</span>{e.order_number ? ' · ' + e.order_number : ''}</p>
                                                <p className="text-xs text-gray-500 truncate">{e.text}</p>
                                                {!e.noTime && e.ts && <p className="text-[10px] text-gray-400 mt-0.5">{timeAgo(e.ts)}</p>}
                                            </div>
                                            {isNew && <span className="w-2 h-2 rounded-full bg-brand-500 flex-shrink-0 mt-1.5" />}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Bold banner shown across the dashboard when the store is suspended/deactivated.
        const SuspendedBanner = ({ status, onDetails }) => {
            const deactivated = status === 'deactivated';
            return (
                <div className="mb-4 bg-red-600 text-white rounded-xl px-4 py-3 flex items-center gap-3 shadow-md">
                    <Icons.alert />
                    <div className="min-w-0 flex-1">
                        <p className="text-sm font-bold">{deactivated ? 'Your store has been deactivated' : 'Your store is suspended'}</p>
                        <p className="text-xs text-red-100">Your storefront is offline and you can’t receive new orders. Tap to see why and how to reactivate.</p>
                    </div>
                    <button onClick={onDetails} className="flex-shrink-0 bg-white text-red-700 hover:bg-red-50 text-xs font-bold px-3 py-1.5 rounded-lg">Details</button>
                </div>
            );
        };

        // Explains why a store is suspended and how to get it back online.
        const SuspensionModal = ({ status, reason, onClose }) => {
            const deactivated = status === 'deactivated';
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
                    <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-red-600 text-white px-5 py-4 flex items-center gap-3">
                            <Icons.alert />
                            <h3 className="font-bold text-base">{deactivated ? 'Store deactivated' : 'Store suspended'}</h3>
                        </div>
                        <div className="p-5 space-y-4">
                            <div>
                                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Reason</p>
                                <p className="text-sm text-gray-800">{reason ? reason : 'Your store has been paused by the YeboSell team. This is usually due to outstanding platform fees or a policy review.'}</p>
                            </div>
                            <div>
                                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">What this means</p>
                                <p className="text-sm text-gray-700">Buyers visiting your store see a “temporarily unavailable” message and can’t place new orders. Your products, orders and history are safe.</p>
                            </div>
                            <div>
                                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">How to reactivate</p>
                                <ul className="text-sm text-gray-700 list-disc pl-5 space-y-1">
                                    <li>Settle any outstanding platform fees (see the YeboSell Account card on your Dashboard).</li>
                                    <li>Contact YeboSell support to review and lift the suspension.</li>
                                </ul>
                            </div>
                            <a href="https://wa.me/27761080024?text=Hi%20YeboSell%2C%20my%20store%20is%20suspended%20%E2%80%94%20I%27d%20like%20to%20reactivate%20it."
                                target="_blank" rel="noopener"
                                className="flex items-center justify-center gap-2 w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 rounded-xl transition">
                                <Icons.whatsapp /> Contact YeboSell Support
                            </a>
                            <button onClick={onClose} className="w-full text-sm text-gray-500 hover:text-gray-700 font-medium py-1">Close</button>
                        </div>
                    </div>
                </div>
            );
        };

        // Dismissible banner prompting the seller to enable push (new orders / messages).
        const SellerPushPrompt = ({ sellerId }) => {
            const [perm, setPerm] = useState(pushSupported() ? Notification.permission : 'unsupported');
            const [busy, setBusy] = useState(false);
            const [dismissed, setDismissed] = useState(() => { try { return localStorage.getItem('yebosell_seller_push_dismissed') === '1'; } catch (e) { return false; } });
            if (!pushSupported() || perm === 'granted' || perm === 'denied' || perm === 'unsupported' || dismissed) return null;
            const turnOn = async () => {
                setBusy(true);
                const res = await enableSellerPush(sellerId);
                setPerm(res.ok ? 'granted' : (pushSupported() ? Notification.permission : 'unsupported'));
                setBusy(false);
                if (res.ok) window.toast('Notifications on — we’ll alert you to new orders and messages.', 'success');
                else if (res.step === 'permission' && res.detail === 'denied') window.toast('Notifications blocked. Enable them in your browser settings.', 'error');
                else window.toast('Couldn’t enable notifications (' + res.step + ').', 'error');
            };
            const dismiss = () => { try { localStorage.setItem('yebosell_seller_push_dismissed', '1'); } catch (e) {} setDismissed(true); };
            return (
                <div className="mb-4 bg-brand-50 border border-brand-200 rounded-xl p-3 flex items-center gap-3">
                    <span className="w-8 h-8 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center flex-shrink-0"><Icons.bell /></span>
                    <div className="min-w-0 flex-1">
                        <p className="text-sm font-semibold text-brand-900">Get notified of new orders</p>
                        <p className="text-xs text-brand-700">Turn on alerts for new orders and buyer messages — even when the dashboard is closed.</p>
                    </div>
                    <button onClick={turnOn} disabled={busy} className="flex-shrink-0 bg-brand-500 hover:bg-brand-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg disabled:opacity-50">{busy ? '…' : 'Enable'}</button>
                    <button onClick={dismiss} aria-label="Dismiss" className="flex-shrink-0 text-gray-400 hover:text-gray-600 w-7 h-7 flex items-center justify-center">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [locked, setLocked] = useState(false);
            const [booting, setBooting] = useState(true);
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [focusOrderId, setFocusOrderId] = useState(null);
            const [lowStockCount, setLowStockCount] = useState(0);
            const [account, setAccount] = useState({ status: 'active', reason: null });
            const [showSuspend, setShowSuspend] = useState(false);

            // From the notification bell: jump to the Orders tab and open that order.
            // toThread scrolls the opened order detail straight to its chat thread.
            const openOrderFromNotif = (orderId, toThread) => {
                setCurrentTab('orders');
                setFocusOrderId(orderId);
                if (toThread) setTimeout(() => {
                    const el = document.getElementById('order-conversation');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 700);
            };

            useEffect(() => {
                (async () => {
                    let session = null;
                    try { const { data } = await supabase.auth.getSession(); session = data ? data.session : null; } catch (e) {}
                    const stored = localStorage.getItem('current_seller');
                    if (stored && session) {
                        try {
                            setCurrentUser(JSON.parse(stored));
                            const unlocked = sessionStorage.getItem('yebosell_unlocked') === '1';
                            if (!unlocked) setLocked(true);
                        } catch (e) { console.error('Parse error:', e); }
                    } else if (stored && !session) {
                        // Session expired/absent — don't enter a write-disabled dashboard.
                        // Require a fresh sign-in so RLS-protected actions keep working.
                        localStorage.removeItem('current_seller');
                    }
                    setBooting(false);
                })();
            }, []);

            // Session-liveness guard: if the session ends or a token refresh fails
            // after a long idle (tab open for days), route back to a friendly sign-in
            // instead of silently failing RLS reads in a write-disabled dashboard.
            useEffect(() => {
                const { data: sub } = supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_OUT' || (!session && (event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED'))) {
                        try { sessionStorage.removeItem('yebosell_unlocked'); } catch (e) {}
                        try { localStorage.removeItem('current_seller'); } catch (e) {}
                        setCurrentUser(null);
                        setLocked(false);
                        window.toast('Your session expired — please sign in again.', 'info');
                    }
                });
                return () => { try { sub.subscription.unsubscribe(); } catch (e) {} };
            }, []);

            // Keep this device's seller push subscription current once unlocked
            // (no-op unless the seller already granted notification permission).
            useEffect(() => {
                if (currentUser && !locked) { try { syncSellerPush(currentUser.id); } catch (e) {} }
            }, [currentUser, locked]);

            // Watch this seller's account status so a suspension (set by an admin
            // while they're logged in) surfaces a banner + bell notice without a
            // re-login. Polls while visible; refreshes on tab return.
            useEffect(() => {
                if (!currentUser || locked) return;
                let alive = true;
                const check = async () => {
                    try {
                        const { data } = await supabase.rpc('seller_account_status', { p_seller_id: currentUser.id });
                        if (alive && data) setAccount({ status: data.seller_status || 'active', reason: data.suspension_reason || null });
                    } catch (e) {}
                };
                check();
                const iv = setInterval(() => { if (document.visibilityState === 'visible') check(); }, 60000);
                const onVis = () => { if (document.visibilityState === 'visible') check(); };
                document.addEventListener('visibilitychange', onVis);
                return () => { alive = false; clearInterval(iv); document.removeEventListener('visibilitychange', onVis); };
            }, [currentUser, locked]);

            const onAuthed = (seller) => {
                setCurrentUser(seller);
                setLocked(false);
                try { sessionStorage.setItem('yebosell_unlocked', '1'); } catch (e) {}
            };

            const logout = async () => {
                if (await window.confirmDialog({ title: 'Sign out?', message: 'You’ll need an SMS code to sign in again on this device. To just step away, use “Lock” instead.', confirmLabel: 'Sign out', danger: true })) {
                    try { await supabase.auth.signOut(); } catch (e) {}
                    localStorage.removeItem('current_seller');
                    try { sessionStorage.removeItem('yebosell_unlocked'); } catch (e) {}
                    setCurrentUser(null);
                    setLocked(false);
                }
            };

            // Lock keeps the Supabase session alive and just requires the PIN to re-enter
            // (no SMS code). Use it to step away; Sign Out fully ends the session.
            const lock = () => {
                try { sessionStorage.removeItem('yebosell_unlocked'); } catch (e) {}
                setLocked(true);
            };

            if (booting) {
                return <div className="min-h-screen flex items-center justify-center bg-gray-50"><Spinner size="lg" /></div>;
            }

            if (!currentUser) {
                return <LoginScreen onLoginSuccess={onAuthed} />;
            }

            if (locked) {
                return <LockScreen seller={currentUser}
                    onUnlock={() => { setLocked(false); try { sessionStorage.setItem('yebosell_unlocked', '1'); } catch (e) {} }}
                    onSignOut={logout} />;
            }

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', Icon: Icons.dashboard },
                { id: 'products', label: 'Products', Icon: Icons.products },
                { id: 'inventory', label: 'Inventory', Icon: Icons.inventory, badge: lowStockCount },
                { id: 'orders', label: 'Orders', Icon: Icons.orders },
                { id: 'payments', label: 'Payments', Icon: Icons.payments },
                { id: 'discounts', label: 'Discounts', Icon: Icons.discount },
                { id: 'templates', label: 'Templates', Icon: Icons.templates },
                { id: 'settings', label: 'Settings', Icon: Icons.settings },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* ======= DESKTOP SIDEBAR (hidden on mobile) ======= */}
                    <aside className="hidden lg:flex lg:flex-col lg:fixed lg:inset-y-0 lg:left-0 lg:w-64 bg-white border-r border-gray-200 z-50">
                        {/* Sidebar Header */}
                        <div className="px-5 py-5 border-b border-gray-100">
                            <div className="flex items-center justify-between gap-2 mb-1">
                                <div className="flex items-center gap-3 min-w-0">
                                    <Logo size={40} />
                                    <div className="min-w-0">
                                        <h1 className="font-bold text-base text-gray-900 leading-tight tracking-tight"><span className="kc-green">Yebo</span><span className="kc-gold">Sell</span></h1>
                                        <p className="text-xs text-gray-500 truncate">{currentUser.business_name}</p>
                                    </div>
                                </div>
                                <NotificationBell seller={currentUser} onOpenOrder={openOrderFromNotif} onNavigate={setCurrentTab} account={account} onShowSuspension={() => setShowSuspend(true)} align="left" />
                            </div>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 px-3 py-4 space-y-1 sidebar-scroll overflow-y-auto">
                            {navItems.map(({ id, label, Icon, badge }) => (
                                <button
                                    key={id}
                                    onClick={() => setCurrentTab(id)}
                                    className={`sidebar-link w-full ${currentTab === id ? 'active' : ''}`}
                                >
                                    <Icon />
                                    <span className="flex-1 text-left">{label}</span>
                                    {badge > 0 && (
                                        <span className={`ml-auto text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 ${currentTab === id ? 'bg-white/30 text-white' : 'bg-amber-400 text-white'}`}>
                                            {badge > 9 ? '9+' : badge}
                                        </span>
                                    )}
                                </button>
                            ))}
                        </nav>

                        {/* User info + Sign Out */}
                        <div className="px-4 py-3 border-t border-gray-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-sm">
                                    {currentUser.full_name?.charAt(0)?.toUpperCase() || 'S'}
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="text-sm font-semibold text-gray-900 truncate">{currentUser.full_name}</p>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.phone}</p>
                                </div>
                            </div>
                            <button
                                onClick={lock}
                                className="flex items-center gap-2 w-full text-sm text-gray-500 hover:text-brand-600 hover:bg-brand-50 px-3 py-2 rounded-lg transition-colors font-medium mb-1"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Lock
                            </button>
                            <button
                                onClick={logout}
                                className="flex items-center gap-2 w-full text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors font-medium"
                            >
                                <Icons.logout /> Sign Out
                            </button>
                        </div>

                        {/* Footer branding */}
                        <div className="px-4 py-3 border-t border-gray-100 bg-gray-50/50 text-center">
                            <p className="text-[10px] text-gray-400 leading-tight">Developed by</p>
                            <a href="https://4dcs.co.za" target="_blank" rel="noopener noreferrer" className="text-[11px] font-semibold text-gray-500 hover:text-green-600 transition-colors leading-tight">4D <span className="italic">Climate Solutions</span></a>
                            <p className="text-[10px] text-gray-300 text-center mt-1.5">&copy; 2026 YeboSell · InnovaEarth × 4D</p>
                        </div>
                    </aside>

                    {/* ======= MOBILE TOP HEADER (hidden on desktop) ======= */}
                    <div className="lg:hidden bg-white border-b border-gray-200 sticky top-0 z-40">
                        <div className="px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2.5">
                                <Logo size={36} />
                                <div>
                                    <h1 className="font-bold text-sm text-gray-900 leading-none tracking-tight"><span className="kc-green">Yebo</span><span className="kc-gold">Sell</span></h1>
                                    <p className="text-xs text-gray-500">{currentUser.business_name}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-1">
                                <NotificationBell seller={currentUser} onOpenOrder={openOrderFromNotif} onNavigate={setCurrentTab} account={account} onShowSuspension={() => setShowSuspend(true)} />
                                <button
                                    onClick={lock}
                                    className="text-xs font-semibold text-brand-600 hover:bg-brand-50 px-3 py-1.5 rounded-lg transition-colors"
                                >
                                    Lock
                                </button>
                                <button
                                    onClick={logout}
                                    className="text-xs font-semibold text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors"
                                >
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ======= MAIN CONTENT AREA ======= */}
                    <main className="lg:ml-64 min-h-screen pb-20 lg:pb-0">
                        <div className="max-w-6xl mx-auto px-4 lg:px-8 py-5 lg:py-8">
                            <div className="tab-content">
                                {(account.status === 'suspended' || account.status === 'deactivated') &&
                                    <SuspendedBanner status={account.status} onDetails={() => setShowSuspend(true)} />}
                                <SellerPushPrompt sellerId={currentUser.id} />
                                {currentTab === 'dashboard' && <DashboardScreen seller={currentUser} onNavigate={setCurrentTab} onLowStockUpdate={setLowStockCount} />}
                                {currentTab === 'products' && <ProductsScreen seller={currentUser} onLowStockUpdate={setLowStockCount} />}
                                {currentTab === 'inventory' && <InventoryScreen seller={currentUser} onLowStockUpdate={setLowStockCount} />}
                                {currentTab === 'orders' && <OrdersScreen seller={currentUser} focusOrderId={focusOrderId} onFocusConsumed={() => setFocusOrderId(null)} />}
                                {currentTab === 'payments' && <PaymentsScreen seller={currentUser} />}
                                {currentTab === 'discounts' && <DiscountsScreen seller={currentUser} />}
                                {currentTab === 'templates' && <TemplatesScreen seller={currentUser} />}
                                {currentTab === 'settings' && <SettingsScreen seller={currentUser} onSellerUpdate={setCurrentUser} />}
                            </div>
                        </div>
                    </main>

                    {showSuspend && <SuspensionModal status={account.status} reason={account.reason} onClose={() => setShowSuspend(false)} />}

                    {/* ======= MOBILE BOTTOM NAVIGATION (hidden on desktop) ======= */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40" style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}>
                        <div className="flex overflow-x-auto" style={{ scrollbarWidth: 'none', WebkitOverflowScrolling: 'touch', msOverflowStyle: 'none' }}>
                            <style>{`.mobile-bottom-nav::-webkit-scrollbar { display: none; }`}</style>
                            <div className="flex mobile-bottom-nav" style={{ minWidth: '100%', overflowX: 'auto', scrollbarWidth: 'none' }}>
                                {navItems.map(({ id, label, Icon, badge }) => (
                                    <button
                                        key={id}
                                        onClick={() => setCurrentTab(id)}
                                        className={`flex flex-col items-center gap-0.5 py-2.5 px-4 text-xs font-medium transition-colors whitespace-nowrap flex-shrink-0 ${
                                            currentTab === id
                                                ? 'text-brand-500'
                                                : 'text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <div className="relative">
                                            <Icon style={{ width: 20, height: 20 }} />
                                            {badge > 0 && (
                                                <span className="absolute -top-1 -right-1.5 bg-amber-400 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">
                                                    {badge > 9 ? '9+' : badge}
                                                </span>
                                            )}
                                        </div>
                                        <span>{label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // RENDER APP
        // ============================================================================

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
