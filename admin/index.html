<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeboSell — Admin Panel</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=12"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#15803d', 600: '#166534', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        admin: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#15803d', 600: '#166534', 700: '#14532d' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');
        :root { --kc-gold: #D4A017; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; letter-spacing: -0.01em; }
        .accent { color: var(--kc-gold); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; color: #64748b; transition: all 0.15s; }
        .sidebar-link:hover { background: #f1f5f9; color: #334155; }
        .sidebar-link.active { background: #f0fdf4; color: #15803d; font-weight: 600; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; }
        .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; }
        .table-row:hover { background: #f9fafb; }
        .table-row.clickable { cursor: pointer; }
        .slide-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 100vw; background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 60; transform: translateX(100%); transition: transform 0.25s ease-out; overflow-y: auto; }
        .slide-panel.open { transform: translateX(0); }
        .slide-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 55; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .slide-backdrop.open { opacity: 1; pointer-events: auto; }
        .detail-section { border-bottom: 1px solid #f1f5f9; padding: 16px 20px; }
        .detail-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-value { font-size: 14px; color: #1e293b; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const supabase = window.supabaseClient;
        const { formatCurrency, hashPin, getStatusColor, getStatusLabel } = window;
        const SITE_URL = window.SITE_URL || 'https://yebosell.co.za';

        // ============================================================================
        // ICONS
        // ============================================================================
        const Icons = {
            dashboard: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
            sellers: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            orders: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
            fees: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
            buyers: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            settings: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09c-.658.003-1.25.396-1.51 1z"/></svg>,
            logout: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            check: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
            x: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            refresh: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
            externalLink: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            activity: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            key: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
        };

        // ============================================================================
        // SLIDE PANEL (reusable)
        // ============================================================================
        const SlidePanel = ({ open, onClose, title, children }) => (
            <>
                <div className={`slide-backdrop ${open ? 'open' : ''}`} onClick={onClose} />
                <div className={`slide-panel ${open ? 'open' : ''}`}>
                    <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
                        <h3 className="font-bold text-gray-900 text-lg">{title}</h3>
                        <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500">✕</button>
                    </div>
                    <div>{children}</div>
                </div>
            </>
        );

        // ============================================================================
        // SELLER DETAIL VIEW
        // ============================================================================
        const SellerDetail = ({ seller, orders, fees, onRefresh }) => {
            const [products, setProducts] = useState([]);
            const [lastLogin, setLastLogin] = useState(null);
            const [recentLogins, setRecentLogins] = useState([]);
            const [busy, setBusy] = useState(false);
            const [msg, setMsg] = useState('');
            useEffect(() => {
                if (!seller) return;
                setMsg('');
                supabase.from('products').select('id, name, is_active, stock, price, variants').eq('seller_id', seller.id).then(({ data }) => setProducts(data || []));
                supabase.rpc('admin_seller_detail', { p_seller_id: seller.id }).then(({ data }) => {
                    if (data && !data.error) { setLastLogin(data.last_login || null); setRecentLogins(data.recent_logins || []); }
                });
            }, [seller?.id]);

            if (!seller) return null;
            const sOrders = orders.filter(o => o.seller_id === seller.id);
            const sFees = fees.filter(f => f.seller_id === seller.id);
            const totalGMV = sOrders.reduce((s, o) => s + Number(o.total || 0), 0);
            const totalFees = sFees.reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const pendingFees = sFees.filter(f => f.status === 'pending').reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const status = seller.seller_status || 'active';

            const setStatus = async (newStatus, confirmMsg) => {
                if (confirmMsg && !(await window.confirmDialog({ message: confirmMsg, confirmLabel: 'Confirm', danger: true }))) return;
                // Capture a reason the seller will see on their dashboard.
                let reason = null;
                if (newStatus === 'suspended' || newStatus === 'deactivated') {
                    reason = window.prompt('Reason (shown to the seller on their dashboard) — e.g. "Outstanding platform fees" or "Policy review". Leave blank for a generic message.', '');
                    if (reason === null) return; // cancelled
                }
                setBusy(true); setMsg('');
                const { data } = await supabase.rpc('admin_set_seller_status', { p_seller_id: seller.id, p_status: newStatus, p_reason: reason });
                setBusy(false);
                if (data && data.ok) { onRefresh(); } else { setMsg((data && data.message) || 'Action failed'); }
            };
            const resetPin = async () => {
                if (!(await window.confirmDialog({ title: 'Reset PIN?', message: "Clear this seller's PIN and unlock their account? They'll set a new PIN via “Forgot PIN” (one OTP).", confirmLabel: 'Reset PIN', danger: true }))) return;
                setBusy(true); setMsg('');
                const { data } = await supabase.rpc('admin_reset_seller_pin', { p_seller_id: seller.id });
                setBusy(false);
                setMsg(data && data.ok ? 'PIN cleared. The seller can now set a new PIN via “Forgot PIN”.' : ((data && data.message) || 'Reset failed'));
            };
            const fmtTime = (t) => t ? new Date(t).toLocaleString() : '—';

            return (
                <div>
                    {/* Header info */}
                    <div className="detail-section bg-gray-50">
                        <div className="flex items-center gap-3 mb-3">
                            <div className="w-12 h-12 rounded-xl bg-admin-100 flex items-center justify-center text-admin-600 font-bold text-lg">
                                {seller.business_name?.charAt(0)?.toUpperCase()}
                            </div>
                            <div>
                                <h4 className="font-bold text-gray-900">{seller.business_name}</h4>
                                <p className="text-sm text-gray-500">{seller.full_name} · {seller.phone}</p>
                            </div>
                        </div>
                        <div className="flex gap-2 mt-3">
                            <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ${status === 'active' ? 'bg-green-100 text-green-700' : status === 'suspended' ? 'bg-red-100 text-red-600' : status === 'deactivated' ? 'bg-gray-200 text-gray-600' : 'bg-yellow-100 text-yellow-700'}`}>
                                {getStatusLabel(status)}
                            </span>
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-3 gap-0 border-b border-gray-100">
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">Orders</p><p className="text-lg font-bold text-gray-900">{sOrders.length}</p></div>
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">GMV</p><p className="text-lg font-bold text-gray-900">{formatCurrency(totalGMV)}</p></div>
                        <div className="p-4 text-center"><p className="detail-label">Fees Owed</p><p className="text-lg font-bold text-red-500">{formatCurrency(pendingFees)}</p></div>
                    </div>

                    {/* Details */}
                    <div className="detail-section">
                        <div className="grid grid-cols-2 gap-4">
                            <div><p className="detail-label">Slug</p><p className="detail-value font-mono">{seller.slug}</p></div>
                            <div><p className="detail-label">Joined</p><p className="detail-value">{new Date(seller.created_at).toLocaleDateString()}</p></div>
                            <div><p className="detail-label">Last Login</p><p className="detail-value">{fmtTime(lastLogin)}</p></div>
                            <div><p className="detail-label">Pending Fees</p><p className="detail-value text-red-500 font-semibold">{formatCurrency(pendingFees)}</p></div>
                        </div>
                    </div>

                    {/* Admin actions */}
                    <div className="detail-section">
                        <p className="detail-label mb-2">Admin Actions</p>
                        {msg && <div className="mb-3 text-xs bg-blue-50 border border-blue-200 text-blue-700 rounded-lg px-3 py-2">{msg}</div>}
                        <div className="flex flex-wrap gap-2">
                            {status !== 'suspended' && status !== 'deactivated' && (
                                <button disabled={busy} onClick={() => setStatus('suspended', 'Suspend this seller? Their storefront stays up but you can re-activate anytime.')}
                                    className="px-3 py-2 rounded-xl text-sm font-semibold bg-red-50 text-red-600 hover:bg-red-100 transition disabled:opacity-50">Suspend</button>
                            )}
                            {status !== 'active' && (
                                <button disabled={busy} onClick={() => setStatus('active')}
                                    className="px-3 py-2 rounded-xl text-sm font-semibold bg-green-50 text-green-600 hover:bg-green-100 transition disabled:opacity-50">Reactivate</button>
                            )}
                            {status !== 'deactivated' && (
                                <button disabled={busy} onClick={() => setStatus('deactivated', 'Deactivate this seller? Their storefront goes offline and they cannot log in. Data and order history are kept; this is reversible.')}
                                    className="px-3 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition disabled:opacity-50">Deactivate</button>
                            )}
                            <button disabled={busy} onClick={resetPin}
                                className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-amber-50 text-amber-700 hover:bg-amber-100 transition disabled:opacity-50"><Icons.key /> Reset PIN</button>
                            <a href={`${SITE_URL}/shop/?s=${seller.slug}`} target="_blank" rel="noopener"
                                className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-semibold hover:bg-gray-200 transition">
                                <Icons.externalLink /> Storefront
                            </a>
                        </div>
                    </div>

                    {/* Login activity */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Login Activity</p>
                        {recentLogins.length === 0 ? <p className="text-sm text-gray-400">No logins recorded yet</p> : (
                            <div className="space-y-2">
                                {recentLogins.map((l, i) => (
                                    <div key={i} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                                        <div className="flex items-center gap-2">
                                            <span className={`px-1.5 py-0.5 rounded text-xs font-semibold ${l.success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`}>{l.success ? 'OK' : 'Fail'}</span>
                                            <span className="text-xs font-medium text-gray-700 uppercase">{l.method}</span>
                                        </div>
                                        <span className="text-xs text-gray-400">{fmtTime(l.at)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Products */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Products ({products.length})</p>
                        {products.length === 0 ? <p className="text-sm text-gray-400">No products yet</p> : (
                            <div className="space-y-2">
                                {products.map(p => (
                                    <div key={p.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                                        <div>
                                            <span className="text-sm font-medium text-gray-900">{p.name}</span>
                                            {!p.is_active && <span className="ml-2 text-xs text-gray-400">(inactive)</span>}
                                        </div>
                                        <span className="text-sm font-semibold text-gray-700">{p.price ? formatCurrency(p.price) : (p.variants?.length ? `${p.variants.length} variants` : '—')}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Recent Orders */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Recent Orders</p>
                        {sOrders.length === 0 ? <p className="text-sm text-gray-400">No orders yet</p> : (
                            <div className="space-y-2">
                                {sOrders.slice(0, 10).map(o => (
                                    <div key={o.id} onClick={() => openOrder(o)}
                                        className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2 cursor-pointer hover:bg-gray-100 transition">
                                        <div>
                                            <span className="text-sm font-mono font-semibold text-gray-900">{o.order_number}</span>
                                            <span className="text-xs text-gray-400 ml-2">{o.customer_name}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm font-semibold">{formatCurrency(o.total)}</span>
                                            <span className="px-1.5 py-0.5 rounded text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // ORDER DETAIL VIEW
        // ============================================================================
        const OrderDetail = ({ order, fees, sellers }) => {
            const [items, setItems] = useState([]);
            useEffect(() => {
                if (order) supabase.from('order_items').select('*').eq('order_id', order.id).then(({ data }) => setItems(data || []));
            }, [order?.id]);

            if (!order) return null;
            const seller = sellers.find(s => s.id === order.seller_id);
            const fee = fees.find(f => f.order_id === order.id);
            const subtotal = items.reduce((s, i) => s + Number(i.unit_price) * i.quantity, 0);

            return (
                <div>
                    <div className="detail-section bg-gray-50">
                        <p className="font-mono font-bold text-xl text-gray-900">{order.order_number}</p>
                        <span className="inline-block mt-2 px-2.5 py-1 rounded-full text-xs font-semibold" style={{ background: getStatusColor(order.status) + '20', color: getStatusColor(order.status) }}>
                            {getStatusLabel(order.status)}
                        </span>
                    </div>

                    <div className="detail-section">
                        <div className="grid grid-cols-2 gap-4">
                            <div><p className="detail-label">Buyer</p><p className="detail-value font-semibold">{order.customer_name}</p></div>
                            <div><p className="detail-label">Phone</p><p className="detail-value font-mono text-sm">{order.customer_phone}</p></div>
                            <div><p className="detail-label">Seller</p><p className="detail-value">{seller?.business_name || '—'}</p></div>
                            <div><p className="detail-label">Date</p><p className="detail-value">{new Date(order.created_at).toLocaleString()}</p></div>
                            <div><p className="detail-label">Delivery Method</p><p className="detail-value">{getStatusLabel(order.delivery_method || '—')}</p></div>
                            <div><p className="detail-label">Payment</p><p className="detail-value">{getStatusLabel(order.payment_method || '—')}</p></div>
                            <div><p className="detail-label">Delivery Status</p><p className="detail-value"><span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: getStatusColor(order.delivery_status) + '20', color: getStatusColor(order.delivery_status) }}>{getStatusLabel(order.delivery_status || 'pending')}</span></p></div>
                            {Number(order.delivery_fee) > 0 && <div><p className="detail-label">Delivery Fee</p><p className="detail-value text-amber-600 font-semibold">{formatCurrency(order.delivery_fee)}</p></div>}
                        </div>
                        {order.delivery_address && (
                            <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2.5">
                                <p className="text-xs font-semibold text-amber-800">📍 Delivery Address</p>
                                <p className="text-sm text-amber-900 mt-0.5">{order.delivery_address}</p>
                            </div>
                        )}
                    </div>

                    {/* Line items */}

        // ============================================================================

        const LoginScreen = ({ onLoginSuccess }) => {
            const [mode, setMode] = useState('login');     // 'login' | 'reset'
            const [step, setStep] = useState('phone');     // reset flow: 'phone' -> 'code' -> 'newpass'
            const [phone, setPhone] = useState('');
            const [password, setPassword] = useState('');
            const [otp, setOtp] = useState('');
            const [newPass, setNewPass] = useState('');
            const [newPass2, setNewPass2] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [info, setInfo] = useState('');

            const normPhone = window.normalizePhone;

            const finishAdmin = async () => {
                const { data: sessRes } = await supabase.rpc('admin_session');
                if (!sessRes || !sessRes.admin) {
                    await supabase.auth.signOut();
                    setError('Access denied. Admin privileges required.');
                    setLoading(false);
                    return false;
                }
                onLoginSuccess(sessRes.admin);
                return true;
            };

            // PASSWORD LOGIN — no SMS, no OTP credits used
            const handleLogin = async () => {
                setError('');
                const cleanPhone = normPhone(phone);
                if (!phone || phone.length < 8) { setError('Enter a valid phone number'); return; }
                if (!password) { setError('Enter your password'); return; }
                setLoading(true);
                try {
                    const { data, error: e } = await supabase.auth.signInWithPassword({ phone: cleanPhone, password });
                    if (e || !data || !data.session) {
                        setError('Phone or password incorrect. First time here? Use “Set / forgot password”.');
                        setLoading(false); return;
                    }
                    await finishAdmin();
                } catch (err) { setError('Something went wrong. Please try again.'); setLoading(false); }
            };

            // SET / FORGOT PASSWORD via one OTP, then password is used for all future logins
            const handleReset = async () => {
                setError(''); setInfo('');
                const cleanPhone = normPhone(phone);
                if (step === 'phone') {
                    if (!phone || phone.length < 8) { setError('Enter a valid phone number'); return; }
                    setLoading(true);
                    try {
                        const { error: e } = await supabase.auth.signInWithOtp({ phone: cleanPhone });
                        if (e) { setError(e.message || 'Could not send code'); setLoading(false); return; }
                        setStep('code'); setInfo('We sent a one-time code by SMS.');
                    } catch (err) { setError('Could not send code'); }
                    setLoading(false); return;
                }
                if (step === 'code') {
                    if (!otp || otp.length < 4) { setError('Enter the code sent to your phone'); return; }
                    setLoading(true);
                    try {
                        const { data: vd, error: verr } = await supabase.auth.verifyOtp({ phone: cleanPhone, token: otp, type: 'sms' });
                        if (verr || !vd || !vd.session) { setError((verr && verr.message) || 'Invalid or expired code'); setLoading(false); return; }
                        // must be an admin to proceed
                        const { data: sessRes } = await supabase.rpc('admin_session');
                        if (!sessRes || !sessRes.admin) { await supabase.auth.signOut(); setError('Access denied. Admin privileges required.'); setLoading(false); return; }
                        setStep('newpass'); setInfo('Code verified. Set your password.');
                    } catch (err) { setError('Something went wrong. Please try again.'); }
                    setLoading(false); return;
                }
                // step === 'newpass'
                if ((newPass || '').length < 8) { setError('Password must be at least 8 characters'); return; }
                if (newPass !== newPass2) { setError('Passwords do not match'); return; }
                setLoading(true);
                try {
                    const { error: e } = await supabase.auth.updateUser({ password: newPass });
                    if (e) { setError(e.message || 'Could not set password'); setLoading(false); return; }
                    await finishAdmin();   // already in a verified session
                } catch (err) { setError('Something went wrong. Please try again.'); setLoading(false); }
            };

            const switchMode = (m) => { setMode(m); setStep('phone'); setError(''); setInfo(''); setOtp(''); setPassword(''); setNewPass(''); setNewPass2(''); };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-950 via-green-900 to-gray-950 flex items-center justify-center p-4">

                        <div className="text-center mb-8">

                                <circle cx="100" cy="100" r="86" fill="none" stroke="#334155" strokeWidth="1.5"/>
                                <rect x="40" y="50" width="72" height="55" rx="14" fill="#25A65A"/>
                                <circle cx="58" cy="78" r="5.5" fill="white"/><circle cx="76" cy="78" r="5.5" fill="white"/><circle cx="94" cy="78" r="5.5" fill="white"/>
                                <polygon points="52,105 52,122 68,105" fill="#25A65A"/>
                                <rect x="88" y="85" width="72" height="55" rx="14" fill="#D4A017"/>
                                <circle cx="106" cy="113" r="5.5" fill="#166534"/><circle cx="124" cy="113" r="5.5" fill="#166534"/><circle cx="142" cy="113" r="5.5" fill="#166534"/>
                                <polygon points="148,140 148,157 132,140" fill="#D4A017"/>
                                <circle cx="112" cy="88" r="8" fill="white" stroke="#166534" strokeWidth="2"/>
                                <circle cx="112" cy="88" r="3.5" fill="#D4A017"/>
                            </svg>
                            <h1 className="text-white text-3xl font-bold tracking-tight"><span style={{color:'#4ade80'}}>Yebo</span><span style={{color:'#D4A017'}}>Sell</span></h1>
                            <p className="text-gray-400 text-sm mt-1">Sell smarter. Reach further. Grow together.</p>
                            <div className="inline-flex items-center gap-2 mt-3 bg-white/10 backdrop-blur px-3 py-1 rounded-full">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <span className="text-green-300 text-xs font-semibold">Admin Panel</span>
                            </div>
                        </div>
                    <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-8">
                        <div className="text-center mb-6">
                            <h2 className="text-xl font-bold text-gray-900">{mode === 'login' ? 'Admin Sign In' : 'Set / Forgot Password'}</h2>
                        </div>
                        {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-xl text-sm mb-4">{error}</div>}
                        {info && !error && <div className="bg-green-50 border border-green-200 text-green-700 px-4 py-2.5 rounded-xl text-sm mb-4">{info}</div>}
                        <div className="space-y-3">
                            {mode === 'login' ? (
                                <>
                                    <input type="tel" placeholder="e.g. 5772 7054" value={phone} onChange={e => setPhone(window.formatLocalPhone(e.target.value))}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                        className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                    <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                        className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                    <button onClick={handleLogin} disabled={loading}
                                        className="w-full py-3 bg-admin-600 hover:bg-admin-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                        {loading ? 'Please wait...' : 'Sign In'}
                                    </button>
                                    <button onClick={() => switchMode('reset')} className="w-full text-center text-admin-600 text-xs py-1 hover:text-admin-700 font-medium">Set / forgot password</button>
                                </>
                            ) : (
                                <>
                                    {step === 'phone' && (
                                        <input type="tel" placeholder="e.g. 5772 7054" value={phone} onChange={e => setPhone(window.formatLocalPhone(e.target.value))}
                                            onKeyDown={e => e.key === 'Enter' && handleReset()}
                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                    )}
                                    {step === 'code' && (
                                        <input type="text" inputMode="numeric" placeholder="6-digit code" value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g, '').slice(0, 6))} maxLength={6}
                                            onKeyDown={e => e.key === 'Enter' && handleReset()}
                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 text-center text-lg tracking-widest focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                    )}
                                    {step === 'newpass' && (
                                        <>
                                            <input type="password" placeholder="New password (min 8 chars)" value={newPass} onChange={e => setNewPass(e.target.value)}
                                                className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                            <input type="password" placeholder="Confirm new password" value={newPass2} onChange={e => setNewPass2(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleReset()}
                                                className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                                        </>
                                    )}
                                    <button onClick={handleReset} disabled={loading}
                                        className="w-full py-3 bg-admin-600 hover:bg-admin-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                        {loading ? 'Please wait...' : step === 'phone' ? 'Send Code' : step === 'code' ? 'Verify Code' : 'Save Password'}
                                    </button>
                                    <button onClick={() => switchMode('login')} className="w-full text-center text-gray-500 text-xs py-1 hover:text-gray-700">← Back to sign in</button>
                                </>
                            )}
                        </div>
                    </div>
                    <div className="text-center mt-6">
                        <p className="text-gray-500 text-xs mb-1">Developed by</p>
                        <a href="https://4dcs.co.za" target="_blank" rel="noopener noreferrer" className="text-gray-400 text-sm font-semibold hover:text-white transition-colors">4D <span className="italic">Climate Solutions</span></a>
                    </div>
                    </div>
                </div>
            );

        // ============================================================================
        // DASHBOARD TAB
        // ============================================================================
        const DashboardTab = ({ sellers, orders, fees, config, onNavigate }) => {
            const totalGMV = orders.reduce((s, o) => s + Number(o.total || 0), 0);
            const totalFees = fees.reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const settledFees = fees.filter(f => f.status === 'settled').reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const pendingFees = totalFees - settledFees;
            const activeSellers = sellers.filter(s => s.seller_status === 'active').length;
            const uniqueBuyers = new Set(orders.map(o => o.customer_phone)).size;
            const thisMonth = new Date().toISOString().slice(0, 7);
            const monthOrders = orders.filter(o => o.created_at?.startsWith(thisMonth));
            const monthGMV = monthOrders.reduce((s, o) => s + Number(o.total || 0), 0);

            const StatCard = ({ label, value, sub, color, to }) => (

                        <StatCard label="Platform Fees" value={formatCurrency(totalFees)} sub={`${formatCurrency(pendingFees)} pending`} color="text-admin-600" to="fees" />
                        <StatCard label="Active Sellers" value={activeSellers} sub={`${sellers.length} total`} color="text-brand-600" to="sellers" />
                        <StatCard label="Total Orders" value={orders.length} sub={`${uniqueBuyers} unique buyers`} to="orders" />
                    </div>

                    {/* Fee config summary */}
                    <div onClick={() => onNavigate && onNavigate('settings')} className="card p-5 mb-6 cursor-pointer hover:shadow-md transition">
                        <div className="flex items-center justify-between">

                            &nbsp;·&nbsp; Suspension threshold: <span className="font-bold text-red-500">M{Number(config.suspension_threshold).toFixed(2)}</span> outstanding
                        </p>
                    </div>

                    {/* Recent orders */}
                    <div className="card overflow-hidden">

                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">

                                </tr></thead>
                                <tbody>
                                    {orders.slice(0, 15).map(o => {
