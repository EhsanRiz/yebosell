<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khotso Connect — Admin Panel</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=4"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#25D366', 600: '#1a8a4a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        admin: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>

    <style>
        :root { --kc-gold: #D4A017; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .accent { color: var(--kc-gold); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; color: #64748b; transition: all 0.15s; }
        .sidebar-link:hover { background: #f1f5f9; color: #334155; }
        .sidebar-link.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; }
        .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; }
        .table-row:hover { background: #f9fafb; }
        .table-row.clickable { cursor: pointer; }
        .slide-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 100vw; background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 60; transform: translateX(100%); transition: transform 0.25s ease-out; overflow-y: auto; }
        .slide-panel.open { transform: translateX(0); }
        .slide-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 55; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .slide-backdrop.open { opacity: 1; pointer-events: auto; }
        .detail-section { border-bottom: 1px solid #f1f5f9; padding: 16px 20px; }
        .detail-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-value { font-size: 14px; color: #1e293b; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const supabase = window.supabaseClient;
        const { formatCurrency, hashPin, getStatusColor, getStatusLabel } = window;
        const SITE_URL = window.SITE_URL || 'https://khotsoconnect.com';

        // ============================================================================
        // ICONS
        // ============================================================================
        const Icons = {
            dashboard: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
            sellers: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            orders: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
            fees: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
            buyers: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            settings: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09c-.658.003-1.25.396-1.51 1z"/></svg>,
            logout: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            check: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
            x: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            refresh: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
            externalLink: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
        };

        // ============================================================================
        // SLIDE PANEL (reusable)
        // ============================================================================
        const SlidePanel = ({ open, onClose, title, children }) => (
            <>
                <div className={`slide-backdrop ${open ? 'open' : ''}`} onClick={onClose} />
                <div className={`slide-panel ${open ? 'open' : ''}`}>
                    <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
                        <h3 className="font-bold text-gray-900 text-lg">{title}</h3>
                        <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500">✕</button>
                    </div>
                    <div>{children}</div>
                </div>
            </>
        );

        // ============================================================================
        // SELLER DETAIL VIEW
        // ============================================================================
        const SellerDetail = ({ seller, orders, fees, onRefresh }) => {
            const [products, setProducts] = useState([]);
            useEffect(() => {
                if (seller) supabase.from('products').select('id, name, is_active, stock, price, variants').eq('seller_id', seller.id).then(({ data }) => setProducts(data || []));
            }, [seller?.id]);

            if (!seller) return null;
            const sOrders = orders.filter(o => o.seller_id === seller.id);
            const sFees = fees.filter(f => f.seller_id === seller.id);
            const totalGMV = sOrders.reduce((s, o) => s + Number(o.total || 0), 0);
            const totalFees = sFees.reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const pendingFees = sFees.filter(f => f.status === 'pending').reduce((s, f) => s + Number(f.fee_amount || 0), 0);

            const toggleStatus = async () => {
                const newStatus = seller.seller_status === 'active' ? 'suspended' : 'active';
                await supabase.from('sellers').update({ seller_status: newStatus }).eq('id', seller.id);
                onRefresh();
            };

            return (
                <div>
                    {/* Header info */}
                    <div className="detail-section bg-gray-50">
                        <div className="flex items-center gap-3 mb-3">
                            <div className="w-12 h-12 rounded-xl bg-admin-100 flex items-center justify-center text-admin-600 font-bold text-lg">
                                {seller.business_name?.charAt(0)?.toUpperCase()}
                            </div>
                            <div>
                                <h4 className="font-bold text-gray-900">{seller.business_name}</h4>
                                <p className="text-sm text-gray-500">{seller.full_name} · {seller.phone}</p>
                            </div>
                        </div>
                        <div className="flex gap-2 mt-3">
                            <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ${seller.seller_status === 'active' ? 'bg-green-100 text-green-700' : seller.seller_status === 'suspended' ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-700'}`}>
                                {getStatusLabel(seller.seller_status || 'active')}
                            </span>
                            {seller.is_admin && <span className="px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Admin</span>}
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-3 gap-0 border-b border-gray-100">
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">Orders</p><p className="text-lg font-bold text-gray-900">{sOrders.length}</p></div>
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">GMV</p><p className="text-lg font-bold text-gray-900">{formatCurrency(totalGMV)}</p></div>
                        <div className="p-4 text-center"><p className="detail-label">Fees Owed</p><p className="text-lg font-bold text-red-500">{formatCurrency(pendingFees)}</p></div>
                    </div>

                    {/* Details */}
                    <div className="detail-section">
                        <div className="grid grid-cols-2 gap-4">
                            <div><p className="detail-label">Slug</p><p className="detail-value font-mono">{seller.slug}</p></div>
                            <div><p className="detail-label">Joined</p><p className="detail-value">{new Date(seller.created_at).toLocaleDateString()}</p></div>
                            <div><p className="detail-label">Total Fees</p><p className="detail-value">{formatCurrency(totalFees)}</p></div>
                            <div><p className="detail-label">Pending Fees</p><p className="detail-value text-red-500 font-semibold">{formatCurrency(pendingFees)}</p></div>
                        </div>
                    </div>

                    {/* Actions */}
                    <div className="detail-section">
                        <div className="flex gap-2">
                            <button onClick={toggleStatus}
                                className={`flex-1 py-2 rounded-xl text-sm font-semibold transition ${seller.seller_status === 'active' ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'}`}>
                                {seller.seller_status === 'active' ? 'Suspend Seller' : 'Activate Seller'}
                            </button>
                            <a href={`${SITE_URL}/shop/?s=${seller.slug}`} target="_blank" rel="noopener"
                                className="flex items-center gap-1.5 px-4 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-semibold hover:bg-gray-200 transition">
                                <Icons.externalLink /> Storefront
                            </a>
                        </div>
                    </div>

                    {/* Products */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Products ({products.length})</p>
                        {products.length === 0 ? <p className="text-sm text-gray-400">No products yet</p> : (
                            <div className="space-y-2">
                                {products.map(p => (
                                    <div key={p.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                                        <div>
                                            <span className="text-sm font-medium text-gray-900">{p.name}</span>
                                            {!p.is_active && <span className="ml-2 text-xs text-gray-400">(inactive)</span>}
                                        </div>
                                        <span className="text-sm font-semibold text-gray-700">{p.price ? formatCurrency(p.price) : (p.variants?.length ? `${p.variants.length} variants` : '—')}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Recent Orders */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Recent Orders</p>
                        {sOrders.length === 0 ? <p className="text-sm text-gray-400">No orders yet</p> : (
                            <div className="space-y-2">
                                {sOrders.slice(0, 10).map(o => (
                                    <div key={o.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                                        <div>
                                            <span className="text-sm font-mono font-semibold text-gray-900">{o.order_number}</span>
                                            <span className="text-xs text-gray-400 ml-2">{o.customer_name}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm font-semibold">{formatCurrency(o.total)}</span>
                                            <span className="px-1.5 py-0.5 rounded text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // ORDER DETAIL VIEW
        // ============================================================================
        const OrderDetail = ({ order, fees, sellers }) => {
            const [items, setItems] = useState([]);
            useEffect(() => {
                if (order) supabase.from('order_items').select('*').eq('order_id', order.id).then(({ data }) => setItems(data || []));
            }, [order?.id]);

            if (!order) return null;
            const seller = sellers.find(s => s.id === order.seller_id);
            const fee = fees.find(f => f.order_id === order.id);
            const subtotal = items.reduce((s, i) => s + Number(i.unit_price) * i.quantity, 0);

            return (
                <div>
                    <div className="detail-section bg-gray-50">
                        <p className="font-mono font-bold text-xl text-gray-900">{order.order_number}</p>
                        <span className="inline-block mt-2 px-2.5 py-1 rounded-full text-xs font-semibold" style={{ background: getStatusColor(order.status) + '20', color: getStatusColor(order.status) }}>
                            {getStatusLabel(order.status)}
                        </span>
                    </div>

                    <div className="detail-section">
                        <div className="grid grid-cols-2 gap-4">
                            <div><p className="detail-label">Buyer</p><p className="detail-value font-semibold">{order.customer_name}</p></div>
                            <div><p className="detail-label">Phone</p><p className="detail-value font-mono text-sm">{order.customer_phone}</p></div>
                            <div><p className="detail-label">Seller</p><p className="detail-value">{seller?.business_name || '—'}</p></div>
                            <div><p className="detail-label">Date</p><p className="detail-value">{new Date(order.created_at).toLocaleString()}</p></div>
                            <div><p className="detail-label">Delivery Method</p><p className="detail-value">{getStatusLabel(order.delivery_method || '—')}</p></div>
                            <div><p className="detail-label">Payment</p><p className="detail-value">{getStatusLabel(order.payment_method || '—')}</p></div>
                            <div><p className="detail-label">Delivery Status</p><p className="detail-value"><span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: getStatusColor(order.delivery_status) + '20', color: getStatusColor(order.delivery_status) }}>{getStatusLabel(order.delivery_status || 'pending')}</span></p></div>
                            {Number(order.delivery_fee) > 0 && <div><p className="detail-label">Delivery Fee</p><p className="detail-value text-amber-600 font-semibold">{formatCurrency(order.delivery_fee)}</p></div>}
                        </div>
                        {order.delivery_address && (
                            <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2.5">
                                <p className="text-xs font-semibold text-amber-800">📍 Delivery Address</p>
                                <p className="text-sm text-amber-900 mt-0.5">{order.delivery_address}</p>
                            </div>
                        )}
                    </div>

                    {/* Line items */}
                    <div className="detail-section">
                        <p className="detail-label mb-3">Items</p>
                        <div className="space-y-2">
                            {items.map((item, i) => (
                                <div key={i} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                                    <div>
                                        <span className="text-sm text-gray-900">{item.product_name}</span>
                                        <span className="text-xs text-gray-400 ml-1">×{item.quantity}</span>
                                    </div>
                                    <span className="text-sm font-semibold">{formatCurrency(Number(item.unit_price) * item.quantity)}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Totals */}
                    <div className="detail-section">
                        {order.discount_code && (
                            <div className="flex justify-between text-sm mb-1">
                                <span className="text-gray-500">Subtotal</span>
                                <span>{formatCurrency(subtotal)}</span>
                            </div>
                        )}
                        {order.discount_code && (
                            <div className="flex justify-between text-sm text-green-600 mb-1">
                                <span>Discount ({order.discount_code})</span>
                                <span>-{formatCurrency(order.discount_amount)}</span>
                            </div>
                        )}
                        {Number(order.delivery_fee) > 0 && (
                            <div className="flex justify-between text-sm text-amber-600 mb-1">
                                <span>🚚 Delivery Fee</span>
                                <span>+{formatCurrency(order.delivery_fee)}</span>
                            </div>
                        )}
                        <div className="flex justify-between text-base font-bold mb-2">
                            <span className="text-gray-900">Total</span>
                            <span className="text-gray-900">{formatCurrency(order.total)}</span>
                        </div>
                        {fee && (
                            <div className="flex justify-between text-sm pt-2 border-t border-gray-100">
                                <span className="text-admin-600">Platform Fee</span>
                                <div className="text-right">
                                    <span className="font-semibold text-admin-600">{formatCurrency(fee.fee_amount)}</span>
                                    <span className={`ml-2 px-1.5 py-0.5 rounded text-xs font-semibold ${fee.status === 'settled' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{fee.status}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // BUYER DETAIL VIEW
        // ============================================================================
        const BuyerDetail = ({ phone, orders, sellers }) => {
            if (!phone) return null;
            const buyerOrders = orders.filter(o => o.customer_phone === phone).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const name = buyerOrders.find(o => o.customer_name)?.customer_name || '—';
            const totalSpend = buyerOrders.reduce((s, o) => s + Number(o.total || 0), 0);
            const sellerSet = new Set(buyerOrders.map(o => o.seller_id));
            const sellerNames = [...sellerSet].map(sid => sellers.find(s => s.id === sid)?.business_name || '—');

            return (
                <div>
                    <div className="detail-section bg-gray-50">
                        <h4 className="font-bold text-lg text-gray-900">{name}</h4>
                        <p className="text-sm text-gray-500 font-mono">{phone}</p>
                    </div>

                    <div className="grid grid-cols-3 gap-0 border-b border-gray-100">
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">Orders</p><p className="text-lg font-bold text-gray-900">{buyerOrders.length}</p></div>
                        <div className="p-4 text-center border-r border-gray-100"><p className="detail-label">Total Spend</p><p className="text-lg font-bold text-gray-900">{formatCurrency(totalSpend)}</p></div>
                        <div className="p-4 text-center"><p className="detail-label">Sellers</p><p className="text-lg font-bold text-gray-900">{sellerSet.size}</p></div>
                    </div>

                    <div className="detail-section">
                        <p className="detail-label mb-2">Shops From</p>
                        <div className="flex flex-wrap gap-1.5">
                            {sellerNames.map((n, i) => <span key={i} className="px-2.5 py-1 bg-gray-100 rounded-lg text-xs font-medium text-gray-700">{n}</span>)}
                        </div>
                    </div>

                    <div className="detail-section">
                        <p className="detail-label mb-3">Order History</p>
                        <div className="space-y-2">
                            {buyerOrders.map(o => {
                                const seller = sellers.find(s => s.id === o.seller_id);
                                return (
                                    <div key={o.id} className="bg-gray-50 rounded-xl px-3 py-2.5">
                                        <div className="flex items-center justify-between">
                                            <span className="font-mono font-semibold text-sm text-gray-900">{o.order_number}</span>
                                            <span className="text-sm font-bold">{formatCurrency(o.total)}</span>
                                        </div>
                                        <div className="flex items-center justify-between mt-1">
                                            <span className="text-xs text-gray-400">{seller?.business_name} · {new Date(o.created_at).toLocaleDateString()}</span>
                                            <span className="px-1.5 py-0.5 rounded text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // LOGIN SCREEN (admin-only)
        // ============================================================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [phone, setPhone] = useState('');
            const [pin, setPin] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async () => {
                setError('');
                if (!phone || phone.length < 10) { setError('Enter a valid phone number'); return; }
                if (!pin || pin.length !== 6) { setError('PIN must be 6 digits'); return; }
                setLoading(true);
                try {
                    let cleanPhone = phone.replace(/[^0-9+]/g, '');
                    if (cleanPhone.startsWith('0')) cleanPhone = '+27' + cleanPhone.slice(1);
                    else if (/^27\d/.test(cleanPhone) && !cleanPhone.startsWith('+')) cleanPhone = '+' + cleanPhone;
                    else if (/^266\d/.test(cleanPhone) && !cleanPhone.startsWith('+')) cleanPhone = '+' + cleanPhone;

                    const pinHash = hashPin(pin);
                    const { data, error: qErr } = await supabase.from('sellers').select('*').eq('phone', cleanPhone).single();
                    if (qErr) throw new Error('Phone or PIN incorrect');
                    if (data.pin_hash !== pinHash) throw new Error('Phone or PIN incorrect');
                    if (!data.is_admin) throw new Error('Access denied. Admin privileges required.');
                    localStorage.setItem('admin_user', JSON.stringify(data));
                    onLoginSuccess(data);
                } catch (err) { setError(err.message); }
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-8">
                        <div className="text-center mb-6">
                            <div className="w-14 h-14 bg-admin-500 rounded-2xl flex items-center justify-center mx-auto mb-3">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </div>
                            <h1 className="text-xl font-bold text-gray-900">Admin Panel</h1>
                            <p className="text-sm text-gray-500 mt-1">WhatsApp Khotso Connect</p>
                        </div>
                        {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-xl text-sm mb-4">{error}</div>}
                        <div className="space-y-3">
                            <input type="tel" placeholder="Phone number" value={phone} onChange={e => setPhone(e.target.value.replace(/\D/g, '').slice(0, 12))}
                                className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                            <input type="password" placeholder="6-digit PIN" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 6))} maxLength={6}
                                className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 focus:border-transparent outline-none bg-gray-50" />
                            <button onClick={handleLogin} disabled={loading}
                                className="w-full py-3 bg-admin-600 hover:bg-admin-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                {loading ? 'Signing in...' : 'Sign In as Admin'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // DASHBOARD TAB
        // ============================================================================
        const DashboardTab = ({ sellers, orders, fees, config }) => {
            const totalGMV = orders.reduce((s, o) => s + Number(o.total || 0), 0);
            const totalFees = fees.reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const settledFees = fees.filter(f => f.status === 'settled').reduce((s, f) => s + Number(f.fee_amount || 0), 0);
            const pendingFees = totalFees - settledFees;
            const activeSellers = sellers.filter(s => s.seller_status === 'active').length;
            const uniqueBuyers = new Set(orders.map(o => o.customer_phone)).size;
            const thisMonth = new Date().toISOString().slice(0, 7);
            const monthOrders = orders.filter(o => o.created_at?.startsWith(thisMonth));
            const monthGMV = monthOrders.reduce((s, o) => s + Number(o.total || 0), 0);

            const StatCard = ({ label, value, sub, color }) => (
                <div className="stat-card">
                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</p>
                    <p className={`text-2xl font-bold mt-1 ${color || 'text-gray-900'}`}>{value}</p>
                    {sub && <p className="text-xs text-gray-400 mt-1">{sub}</p>}
                </div>
            );

            return (
                <div className="fade-in">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Platform Overview</h2>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <StatCard label="Total GMV" value={formatCurrency(totalGMV)} sub={`${formatCurrency(monthGMV)} this month`} color="text-gray-900" />
                        <StatCard label="Platform Fees" value={formatCurrency(totalFees)} sub={`${formatCurrency(pendingFees)} pending`} color="text-admin-600" />
                        <StatCard label="Active Sellers" value={activeSellers} sub={`${sellers.length} total`} color="text-brand-600" />
                        <StatCard label="Total Orders" value={orders.length} sub={`${uniqueBuyers} unique buyers`} />
                    </div>

                    {/* Fee config summary */}
                    <div className="card p-5 mb-6">
                        <h3 className="font-semibold text-gray-900 mb-2">Fee Configuration</h3>
                        <p className="text-sm text-gray-600">
                            Current rate: <span className="font-bold text-admin-600">{config.fee_type === 'percentage' ? `${config.fee_value}%` : `R${Number(config.fee_value).toFixed(2)}`}</span> per order
                            &nbsp;·&nbsp; Suspension threshold: <span className="font-bold text-red-500">R{Number(config.suspension_threshold).toFixed(2)}</span> outstanding
                        </p>
                    </div>

                    {/* Recent orders */}
                    <div className="card overflow-hidden">
                        <div className="px-5 py-4 border-b border-gray-100">
                            <h3 className="font-semibold text-gray-900">Recent Orders (All Sellers)</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Order</th><th className="px-5 py-3">Seller</th><th className="px-5 py-3">Buyer</th><th className="px-5 py-3">Total</th><th className="px-5 py-3">Fee</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Date</th>
                                </tr></thead>
                                <tbody>
                                    {orders.slice(0, 15).map(o => {
                                        const fee = fees.find(f => f.order_id === o.id);
                                        return (
                                            <tr key={o.id} className="table-row border-b border-gray-50">
                                                <td className="px-5 py-3 font-mono font-semibold text-xs">{o.order_number}</td>
                                                <td className="px-5 py-3 text-gray-700">{o.seller_name || '—'}</td>
                                                <td className="px-5 py-3 text-gray-600">{o.customer_name}</td>
                                                <td className="px-5 py-3 font-semibold">{formatCurrency(o.total)}</td>
                                                <td className="px-5 py-3 text-admin-600 font-medium">{fee ? formatCurrency(fee.fee_amount) : '—'}</td>
                                                <td className="px-5 py-3"><span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span></td>
                                                <td className="px-5 py-3 text-gray-400 text-xs">{new Date(o.created_at).toLocaleDateString()}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // SELLERS TAB
        // ============================================================================
        const SellersTab = ({ sellers, orders, fees, onRefresh }) => {
            const [search, setSearch] = useState('');
            const [selectedSeller, setSelectedSeller] = useState(null);

            const sellerData = useMemo(() => sellers.map(s => {
                const sOrders = orders.filter(o => o.seller_id === s.id);
                const sFees = fees.filter(f => f.seller_id === s.id);
                const totalGMV = sOrders.reduce((sum, o) => sum + Number(o.total || 0), 0);
                const totalFees = sFees.reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                const settledFees = sFees.filter(f => f.status === 'settled').reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                return { ...s, orderCount: sOrders.length, totalGMV, totalFees, settledFees, balance: totalFees - settledFees };
            }).sort((a, b) => b.totalGMV - a.totalGMV), [sellers, orders, fees]);

            const filtered = sellerData.filter(s =>
                s.business_name?.toLowerCase().includes(search.toLowerCase()) ||
                s.phone?.includes(search)
            );

            const toggleStatus = async (seller) => {
                const newStatus = seller.seller_status === 'active' ? 'suspended' : 'active';
                await supabase.from('sellers').update({ seller_status: newStatus }).eq('id', seller.id);
                onRefresh();
            };

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="text-xl font-bold text-gray-900">Sellers</h2>
                        <input type="text" placeholder="Search sellers..." value={search} onChange={e => setSearch(e.target.value)}
                            className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none w-64" />
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Business</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Orders</th><th className="px-5 py-3">GMV</th><th className="px-5 py-3">Fees Owed</th><th className="px-5 py-3">Balance</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Actions</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.map(s => (
                                        <tr key={s.id} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedSeller(s)}>
                                            <td className="px-5 py-3">
                                                <div className="font-semibold text-gray-900">{s.business_name}</div>
                                                <div className="text-xs text-gray-400">{s.full_name} · {s.slug}</div>
                                            </td>
                                            <td className="px-5 py-3 text-gray-600 text-xs font-mono">{s.phone}</td>
                                            <td className="px-5 py-3 font-medium">{s.orderCount}</td>
                                            <td className="px-5 py-3 font-semibold">{formatCurrency(s.totalGMV)}</td>
                                            <td className="px-5 py-3 text-admin-600 font-medium">{formatCurrency(s.totalFees)}</td>
                                            <td className="px-5 py-3">
                                                <span className={`font-bold ${s.balance > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                                    {s.balance > 0 ? formatCurrency(s.balance) : 'Settled'}
                                                </span>
                                            </td>
                                            <td className="px-5 py-3">
                                                <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${
                                                    s.seller_status === 'active' ? 'bg-green-100 text-green-700' :
                                                    s.seller_status === 'suspended' ? 'bg-red-100 text-red-600' :
                                                    'bg-yellow-100 text-yellow-700'
                                                }`}>{getStatusLabel(s.seller_status || 'active')}</span>
                                            </td>
                                            <td className="px-5 py-3">
                                                <div className="flex items-center gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(s); }}
                                                        className={`px-3 py-1 rounded-lg text-xs font-medium transition ${
                                                            s.seller_status === 'active'
                                                                ? 'bg-red-50 text-red-600 hover:bg-red-100'
                                                                : 'bg-green-50 text-green-600 hover:bg-green-100'
                                                        }`}>
                                                        {s.seller_status === 'active' ? 'Suspend' : 'Activate'}
                                                    </button>
                                                    <a href={`${SITE_URL}/shop/?s=${s.slug}`} target="_blank" rel="noopener"
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="p-1.5 rounded-lg bg-gray-100 text-gray-500 hover:bg-gray-200 transition">
                                                        <Icons.externalLink />
                                                    </a>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <SlidePanel open={!!selectedSeller} onClose={() => setSelectedSeller(null)} title={selectedSeller?.business_name || 'Seller'}>
                        {selectedSeller && <SellerDetail seller={selectedSeller} orders={orders} fees={fees} onRefresh={() => { onRefresh(); setSelectedSeller(null); }} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // ORDERS TAB
        // ============================================================================
        const OrdersTab = ({ orders, fees, sellers }) => {
            const [search, setSearch] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [selectedOrder, setSelectedOrder] = useState(null);

            const sellerMap = useMemo(() => {
                const m = {};
                sellers.forEach(s => { m[s.id] = s; });
                return m;
            }, [sellers]);

            const filtered = orders.filter(o => {
                if (statusFilter !== 'all' && o.status !== statusFilter) return false;
                if (search && !o.order_number?.toLowerCase().includes(search.toLowerCase()) &&
                    !o.customer_name?.toLowerCase().includes(search.toLowerCase()) &&
                    !(sellerMap[o.seller_id]?.business_name || '').toLowerCase().includes(search.toLowerCase())) return false;
                return true;
            });

            const statuses = ['all', ...new Set(orders.map(o => o.status))];

            return (
                <div className="fade-in">
                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-6">
                        <h2 className="text-xl font-bold text-gray-900">All Orders</h2>
                        <div className="flex gap-2">
                            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
                                className="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white">
                                {statuses.map(s => <option key={s} value={s}>{s === 'all' ? 'All Statuses' : getStatusLabel(s)}</option>)}
                            </select>
                            <input type="text" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)}
                                className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none" />
                        </div>
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Order</th><th className="px-5 py-3">Seller</th><th className="px-5 py-3">Buyer</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Total</th><th className="px-5 py-3">Fee</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Date</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.slice(0, 50).map(o => {
                                        const fee = fees.find(f => f.order_id === o.id);
                                        const seller = sellerMap[o.seller_id];
                                        return (
                                            <tr key={o.id} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedOrder(o)}>
                                                <td className="px-5 py-3 font-mono font-semibold text-xs">{o.order_number}</td>
                                                <td className="px-5 py-3 text-gray-700">{seller?.business_name || '—'}</td>
                                                <td className="px-5 py-3 text-gray-700">{o.customer_name}</td>
                                                <td className="px-5 py-3 text-gray-400 text-xs font-mono">{o.customer_phone}</td>
                                                <td className="px-5 py-3 font-semibold">{formatCurrency(o.total)}</td>
                                                <td className="px-5 py-3 text-admin-600">{fee ? formatCurrency(fee.fee_amount) : '—'}</td>
                                                <td className="px-5 py-3"><span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span></td>
                                                <td className="px-5 py-3 text-gray-400 text-xs">{new Date(o.created_at).toLocaleString()}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            {filtered.length > 50 && <p className="text-center text-xs text-gray-400 py-3">Showing 50 of {filtered.length} orders</p>}
                        </div>
                    </div>

                    <SlidePanel open={!!selectedOrder} onClose={() => setSelectedOrder(null)} title={selectedOrder?.order_number || 'Order'}>
                        {selectedOrder && <OrderDetail order={selectedOrder} fees={fees} sellers={sellers} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // FEES & SETTLEMENTS TAB
        // ============================================================================
        const FeesTab = ({ sellers, fees, settlements, onRefresh, adminId }) => {
            const [showSettle, setShowSettle] = useState(null);
            const [settleAmount, setSettleAmount] = useState('');
            const [settleRef, setSettleRef] = useState('');
            const [settleMethod, setSettleMethod] = useState('eft');
            const [settling, setSettling] = useState(false);

            const sellerBalances = useMemo(() => sellers.map(s => {
                const sFees = fees.filter(f => f.seller_id === s.id);
                const sSettlements = settlements.filter(st => st.seller_id === s.id);
                const totalFees = sFees.reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                const totalSettled = sSettlements.reduce((sum, st) => sum + Number(st.amount || 0), 0);
                const pendingFees = sFees.filter(f => f.status === 'pending').reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                return { ...s, totalFees, totalSettled, pendingFees, balance: totalFees - totalSettled };
            }).filter(s => s.totalFees > 0).sort((a, b) => b.balance - a.balance), [sellers, fees, settlements]);

            const recordSettlement = async () => {
                if (!settleAmount || parseFloat(settleAmount) <= 0) return;
                setSettling(true);

                // Record the settlement
                await supabase.from('seller_settlements').insert({
                    seller_id: showSettle.id,
                    amount: parseFloat(settleAmount),
                    method: settleMethod,
                    reference: settleRef,
                    recorded_by: adminId
                });

                // Mark pending fees as settled up to the amount
                let remaining = parseFloat(settleAmount);
                const pendingFees = fees.filter(f => f.seller_id === showSettle.id && f.status === 'pending')
                    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                for (const fee of pendingFees) {
                    if (remaining <= 0) break;
                    if (remaining >= Number(fee.fee_amount)) {
                        await supabase.from('platform_fees').update({ status: 'settled', settled_at: new Date().toISOString(), settled_by: adminId }).eq('id', fee.id);
                        remaining -= Number(fee.fee_amount);
                    } else {
                        break;
                    }
                }

                setSettling(false);
                setShowSettle(null);
                setSettleAmount('');
                setSettleRef('');
                onRefresh();
            };

            return (
                <div className="fade-in">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Fees & Settlements</h2>

                    {/* Summary cards */}
                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Total Fees Earned</p>
                            <p className="text-2xl font-bold text-admin-600 mt-1">{formatCurrency(fees.reduce((s, f) => s + Number(f.fee_amount || 0), 0))}</p>
                        </div>
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Collected</p>
                            <p className="text-2xl font-bold text-green-600 mt-1">{formatCurrency(settlements.reduce((s, st) => s + Number(st.amount || 0), 0))}</p>
                        </div>
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Outstanding</p>
                            <p className="text-2xl font-bold text-red-500 mt-1">{formatCurrency(sellerBalances.reduce((s, sb) => s + Math.max(0, sb.balance), 0))}</p>
                        </div>
                    </div>

                    {/* Seller balances */}
                    <div className="card overflow-hidden">
                        <div className="px-5 py-4 border-b border-gray-100">
                            <h3 className="font-semibold text-gray-900">Seller Balances</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Seller</th><th className="px-5 py-3">Total Fees</th><th className="px-5 py-3">Settled</th><th className="px-5 py-3">Balance</th><th className="px-5 py-3">Actions</th>
                                </tr></thead>
                                <tbody>
                                    {sellerBalances.map(s => (
                                        <tr key={s.id} className="table-row border-b border-gray-50">
                                            <td className="px-5 py-3">
                                                <div className="font-semibold text-gray-900">{s.business_name}</div>
                                                <div className="text-xs text-gray-400">{s.phone}</div>
                                            </td>
                                            <td className="px-5 py-3 font-medium">{formatCurrency(s.totalFees)}</td>
                                            <td className="px-5 py-3 text-green-600">{formatCurrency(s.totalSettled)}</td>
                                            <td className="px-5 py-3">
                                                <span className={`font-bold ${s.balance > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                                    {s.balance > 0 ? formatCurrency(s.balance) : 'Settled'}
                                                </span>
                                            </td>
                                            <td className="px-5 py-3">
                                                {s.balance > 0 && (
                                                    <button onClick={() => { setShowSettle(s); setSettleAmount(s.balance.toFixed(2)); }}
                                                        className="px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs font-semibold hover:bg-green-100 transition">
                                                        Record Payment
                                                    </button>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Settlement Modal */}
                    {showSettle && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-lg text-gray-900 mb-1">Record Payment</h3>
                                <p className="text-sm text-gray-500 mb-4">From: <strong>{showSettle.business_name}</strong> · Balance: <strong className="text-red-500">{formatCurrency(showSettle.balance)}</strong></p>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Amount (R)</label>
                                        <input type="number" value={settleAmount} onChange={e => setSettleAmount(e.target.value)} step="0.01" min="0"
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Method</label>
                                        <select value={settleMethod} onChange={e => setSettleMethod(e.target.value)}
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm bg-white outline-none focus:ring-2 focus:ring-admin-500">
                                            <option value="eft">EFT / Bank Transfer</option>
                                            <option value="cash">Cash</option>
                                            <option value="mobile_money">Mobile Money</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Reference (optional)</label>
                                        <input type="text" value={settleRef} onChange={e => setSettleRef(e.target.value)} placeholder="e.g. EFT ref number"
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-5">
                                    <button onClick={recordSettlement} disabled={settling || !settleAmount}
                                        className="flex-1 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                        {settling ? 'Recording...' : 'Record Payment'}
                                    </button>
                                    <button onClick={() => setShowSettle(null)}
                                        className="px-5 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 transition">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // BUYERS TAB (read-only)
        // ============================================================================
        const BuyersTab = ({ orders, sellers }) => {
            const [search, setSearch] = useState('');
            const [selectedBuyer, setSelectedBuyer] = useState(null);

            const buyers = useMemo(() => {
                const map = {};
                orders.forEach(o => {
                    const phone = o.customer_phone || 'unknown';
                    if (!map[phone]) map[phone] = { phone, name: o.customer_name, orders: 0, totalSpend: 0, lastOrder: o.created_at, sellers: new Set() };
                    map[phone].orders++;
                    map[phone].totalSpend += Number(o.total || 0);
                    if (o.customer_name && o.customer_name.length > (map[phone].name || '').length) map[phone].name = o.customer_name;
                    if (o.created_at > map[phone].lastOrder) map[phone].lastOrder = o.created_at;
                    if (o.seller_id) map[phone].sellers.add(o.seller_id);
                });
                return Object.values(map)
                    .map(b => ({ ...b, sellerCount: b.sellers.size }))
                    .sort((a, b) => b.totalSpend - a.totalSpend);
            }, [orders]);

            const filtered = buyers.filter(b =>
                b.name?.toLowerCase().includes(search.toLowerCase()) ||
                b.phone?.includes(search)
            );

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h2 className="text-xl font-bold text-gray-900">Buyers</h2>
                            <p className="text-sm text-gray-500 mt-0.5">{buyers.length} unique buyers across the platform</p>
                        </div>
                        <input type="text" placeholder="Search buyers..." value={search} onChange={e => setSearch(e.target.value)}
                            className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none w-64" />
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Buyer</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Orders</th><th className="px-5 py-3">Total Spend</th><th className="px-5 py-3">Sellers</th><th className="px-5 py-3">Last Order</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.slice(0, 50).map(b => (
                                        <tr key={b.phone} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedBuyer(b.phone)}>
                                            <td className="px-5 py-3 font-semibold text-gray-900">{b.name || '—'}</td>
                                            <td className="px-5 py-3 text-gray-500 font-mono text-xs">{b.phone}</td>
                                            <td className="px-5 py-3 font-medium">{b.orders}</td>
                                            <td className="px-5 py-3 font-semibold">{formatCurrency(b.totalSpend)}</td>
                                            <td className="px-5 py-3 text-gray-600">{b.sellerCount}</td>
                                            <td className="px-5 py-3 text-gray-400 text-xs">{new Date(b.lastOrder).toLocaleDateString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filtered.length > 50 && <p className="text-center text-xs text-gray-400 py-3">Showing 50 of {filtered.length} buyers</p>}
                        </div>
                    </div>

                    <SlidePanel open={!!selectedBuyer} onClose={() => setSelectedBuyer(null)} title={buyers.find(b => b.phone === selectedBuyer)?.name || 'Buyer'}>
                        {selectedBuyer && <BuyerDetail phone={selectedBuyer} orders={orders} sellers={sellers} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // SETTINGS TAB
        // ============================================================================
        const SettingsTab = ({ config, onRefresh }) => {
            const [feeType, setFeeType] = useState(config.fee_type);
            const [feeValue, setFeeValue] = useState(config.fee_value?.toString() || '5');
            const [threshold, setThreshold] = useState(config.suspension_threshold?.toString() || '500');
            const [saving, setSaving] = useState(false);
            const [saved, setSaved] = useState(false);

            const handleSave = async () => {
                setSaving(true);
                await supabase.from('platform_config').update({
                    fee_type: feeType,
                    fee_value: parseFloat(feeValue),
                    suspension_threshold: parseFloat(threshold),
                    updated_at: new Date().toISOString()
                }).eq('id', config.id);
                setSaving(false);
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
                onRefresh();
            };

            return (
                <div className="fade-in max-w-lg">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Platform Settings</h2>
                    <div className="card p-6 space-y-5">
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Fee Type</label>
                            <select value={feeType} onChange={e => setFeeType(e.target.value)}
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm bg-white outline-none focus:ring-2 focus:ring-admin-500">
                                <option value="percentage">Percentage of order total (%)</option>
                                <option value="fixed">Fixed amount per order (R)</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">
                                {feeType === 'percentage' ? 'Fee Percentage (%)' : 'Fee Amount (R)'}
                            </label>
                            <input type="number" value={feeValue} onChange={e => setFeeValue(e.target.value)} min="0" step={feeType === 'percentage' ? '0.5' : '0.01'}
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                            <p className="text-xs text-gray-400 mt-1">
                                {feeType === 'percentage' ? `On a R100 order, platform earns R${(100 * parseFloat(feeValue || 0) / 100).toFixed(2)}` : `Flat R${parseFloat(feeValue || 0).toFixed(2)} per order`}
                            </p>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Suspension Threshold (R)</label>
                            <input type="number" value={threshold} onChange={e => setThreshold(e.target.value)} min="0" step="50"
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                            <p className="text-xs text-gray-400 mt-1">Sellers with unpaid fees above this amount can be suspended</p>
                        </div>
                        <button onClick={handleSave} disabled={saving}
                            className="w-full py-2.5 bg-admin-600 hover:bg-admin-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                            {saving ? 'Saving...' : saved ? '✓ Saved!' : 'Save Settings'}
                        </button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN APP
        // ============================================================================
        const App = () => {
            const [admin, setAdmin] = useState(null);
            const [tab, setTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [sellers, setSellers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [fees, setFees] = useState([]);
            const [settlements, setSettlements] = useState([]);
            const [config, setConfig] = useState({ fee_type: 'percentage', fee_value: 5, suspension_threshold: 500 });

            // Auto-login from localStorage
            useEffect(() => {
                const stored = localStorage.getItem('admin_user');
                if (stored) {
                    try {
                        const user = JSON.parse(stored);
                        if (user.is_admin) { setAdmin(user); return; }
                    } catch (e) {}
                }
                setLoading(false);
            }, []);

            useEffect(() => { if (admin) loadAllData(); }, [admin]);

            const loadAllData = async () => {
                setLoading(true);
                const [sellersRes, ordersRes, feesRes, settlementsRes, configRes] = await Promise.all([
                    supabase.from('sellers').select('*').order('created_at', { ascending: false }),
                    supabase.from('orders').select('id, order_number, seller_id, customer_name, customer_phone, total, status, payment_status, delivery_method, payment_method, discount_code, discount_amount, created_at').order('created_at', { ascending: false }),
                    supabase.from('platform_fees').select('*').order('created_at', { ascending: false }),
                    supabase.from('seller_settlements').select('*').order('created_at', { ascending: false }),
                    supabase.from('platform_config').select('*').limit(1).single(),
                ]);
                setSellers(sellersRes.data || []);
                setOrders(ordersRes.data || []);
                setFees(feesRes.data || []);
                setSettlements(settlementsRes.data || []);
                if (configRes.data) setConfig(configRes.data);
                setLoading(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('admin_user');
                setAdmin(null);
            };

            if (!admin && !loading) return <LoginScreen onLoginSuccess={(u) => { setAdmin(u); }} />;

            if (loading) return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                    <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-admin-500"></div>
                </div>
            );

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', Icon: Icons.dashboard },
                { id: 'sellers', label: 'Sellers', Icon: Icons.sellers },
                { id: 'orders', label: 'Orders', Icon: Icons.orders },
                { id: 'fees', label: 'Fees', Icon: Icons.fees },
                { id: 'buyers', label: 'Buyers', Icon: Icons.buyers },
                { id: 'settings', label: 'Settings', Icon: Icons.settings },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Desktop sidebar */}
                    <aside className="hidden lg:flex lg:flex-col lg:fixed lg:inset-y-0 lg:left-0 lg:w-64 bg-white border-r border-gray-200 z-50">
                        <div className="px-5 py-5 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-admin-500 rounded-xl flex items-center justify-center">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <div>
                                    <h1 className="font-bold text-sm text-gray-900">Admin Panel</h1>
                                    <p className="text-xs text-gray-500">Khotso Connect Platform</p>
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 px-3 py-4 space-y-1">
                            {navItems.map(({ id, label, Icon }) => (
                                <button key={id} onClick={() => setTab(id)}
                                    className={`sidebar-link w-full ${tab === id ? 'active' : ''}`}>
                                    <Icon /> <span>{label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="px-4 py-3 border-t border-gray-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-8 h-8 rounded-full bg-admin-100 flex items-center justify-center text-admin-600 font-bold text-xs">
                                    {admin.full_name?.charAt(0)?.toUpperCase() || 'A'}
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="text-sm font-semibold text-gray-900 truncate">{admin.full_name}</p>
                                    <p className="text-xs text-gray-500">Admin</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="sidebar-link w-full text-red-500 hover:bg-red-50 hover:text-red-600">
                                <Icons.logout /> Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* Main content */}
                    <div className="lg:ml-64">
                        {/* Mobile header */}
                        <div className="lg:hidden flex items-center justify-between px-4 py-3 bg-white border-b border-gray-200 sticky top-0 z-40">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-admin-500 rounded-lg flex items-center justify-center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <span className="font-bold text-sm text-gray-900">Admin</span>
                            </div>
                            <button onClick={loadAllData} className="p-2 text-gray-400 hover:text-gray-600"><Icons.refresh /></button>
                        </div>

                        <div className="p-4 lg:p-8 pb-24 lg:pb-8">
                            {tab === 'dashboard' && <DashboardTab sellers={sellers} orders={orders} fees={fees} config={config} />}
                            {tab === 'sellers' && <SellersTab sellers={sellers} orders={orders} fees={fees} onRefresh={loadAllData} />}
                            {tab === 'orders' && <OrdersTab orders={orders} fees={fees} sellers={sellers} />}
                            {tab === 'fees' && <FeesTab sellers={sellers} fees={fees} settlements={settlements} onRefresh={loadAllData} adminId={admin.id} />}
                            {tab === 'buyers' && <BuyersTab orders={orders} sellers={sellers} />}
                            {tab === 'settings' && <SettingsTab config={config} onRefresh={loadAllData} />}
                        </div>
                    </div>

                    {/* Mobile bottom nav */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
                        <div className="flex">
                            {navItems.map(({ id, label, Icon }) => (
                                <button key={id} onClick={() => setTab(id)}
                                    className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 px-1 text-xs font-medium transition-colors ${
                                        tab === id ? 'text-admin-500' : 'text-gray-400 hover:text-gray-600'
                                    }`}>
                                    <Icon style={{ width: 20, height: 20 }} />
                                    <span>{label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
