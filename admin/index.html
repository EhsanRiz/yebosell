        };

        // ============================================================================
        // SELLERS TAB
        // ============================================================================
        const SellersTab = ({ sellers, orders, fees, onRefresh }) => {
            const [search, setSearch] = useState('');
            const [selectedSeller, setSelectedSeller] = useState(null);

            const sellerData = useMemo(() => sellers.map(s => {
                const sOrders = orders.filter(o => o.seller_id === s.id);
                const sFees = fees.filter(f => f.seller_id === s.id);
                const totalGMV = sOrders.reduce((sum, o) => sum + Number(o.total || 0), 0);
                const totalFees = sFees.reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                const settledFees = sFees.filter(f => f.status === 'settled').reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                return { ...s, orderCount: sOrders.length, totalGMV, totalFees, settledFees, balance: totalFees - settledFees };
            }).sort((a, b) => b.totalGMV - a.totalGMV), [sellers, orders, fees]);

            const filtered = sellerData.filter(s =>
                s.business_name?.toLowerCase().includes(search.toLowerCase()) ||
                s.phone?.includes(search)
            );

            const toggleStatus = async (seller) => {
                const newStatus = seller.seller_status === 'active' ? 'suspended' : 'active';
                await supabase.rpc('admin_set_seller_status', { p_seller_id: seller.id, p_status: newStatus });
                onRefresh();
            };

            const exportCSV = () => {
                const head = ['Business', 'Full Name', 'Phone', 'Slug', 'Status', 'Orders', 'GMV', 'Total Fees', 'Balance', 'Joined'];
                const rows = filtered.map(s => [s.business_name, s.full_name, s.phone, s.slug, s.seller_status || 'active', s.orderCount, s.totalGMV, s.totalFees, s.balance, new Date(s.created_at).toISOString().slice(0, 10)]);
                const csv = [head, ...rows].map(r => r.map(c => '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"').join(',')).join('\n');
                const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                const a = document.createElement('a');
                a.href = url; a.download = 'yebosell-sellers-' + new Date().toISOString().slice(0, 10) + '.csv';
                document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
            };

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6 gap-3 flex-wrap">
                        <h2 className="text-xl font-bold text-gray-900">Sellers</h2>
                        <div className="flex items-center gap-2">
                            <input type="text" placeholder="Search name or phone..." value={search} onChange={e => setSearch(e.target.value)}
                                className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none w-64" />
                            <button onClick={exportCSV} className="px-4 py-2 rounded-xl bg-admin-50 text-admin-700 text-sm font-semibold hover:bg-admin-100 transition whitespace-nowrap">Export CSV</button>
                        </div>
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Business</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Orders</th><th className="px-5 py-3">GMV</th><th className="px-5 py-3">Fees Owed</th><th className="px-5 py-3">Balance</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Actions</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.map(s => (
                                        <tr key={s.id} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedSeller(s)}>
                                            <td className="px-5 py-3">
                                                <div className="font-semibold text-gray-900">{s.business_name}</div>
                                                <div className="text-xs text-gray-400">{s.full_name} · {s.slug}</div>
                                            </td>
                                            <td className="px-5 py-3 text-gray-600 text-xs font-mono">{s.phone}</td>
                                            <td className="px-5 py-3 font-medium">{s.orderCount}</td>
                                            <td className="px-5 py-3 font-semibold">{formatCurrency(s.totalGMV)}</td>
                                            <td className="px-5 py-3 text-admin-600 font-medium">{formatCurrency(s.totalFees)}</td>
                                            <td className="px-5 py-3">
                                                <span className={`font-bold ${s.balance > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                                    {s.balance > 0 ? formatCurrency(s.balance) : 'Settled'}
                                                </span>
                                            </td>
                                            <td className="px-5 py-3">
                                                <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${
                                                    s.seller_status === 'active' ? 'bg-green-100 text-green-700' :
                                                    s.seller_status === 'suspended' ? 'bg-red-100 text-red-600' :
                                                    s.seller_status === 'deactivated' ? 'bg-gray-200 text-gray-600' :
                                                    'bg-yellow-100 text-yellow-700'
                                                }`}>{getStatusLabel(s.seller_status || 'active')}</span>
                                            </td>
                                            <td className="px-5 py-3">
                                                <div className="flex items-center gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(s); }}
                                                        className={`px-3 py-1 rounded-lg text-xs font-medium transition ${
                                                            s.seller_status === 'active'
                                                                ? 'bg-red-50 text-red-600 hover:bg-red-100'
                                                                : 'bg-green-50 text-green-600 hover:bg-green-100'
                                                        }`}>
                                                        {s.seller_status === 'active' ? 'Suspend' : 'Activate'}
                                                    </button>
                                                    <a href={`${SITE_URL}/shop/?s=${s.slug}`} target="_blank" rel="noopener"
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="p-1.5 rounded-lg bg-gray-100 text-gray-500 hover:bg-gray-200 transition">
                                                        <Icons.externalLink />
                                                    </a>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <SlidePanel open={!!selectedSeller} onClose={() => setSelectedSeller(null)} title={selectedSeller?.business_name || 'Seller'}>
                        {selectedSeller && <SellerDetail seller={selectedSeller} orders={orders} fees={fees} onRefresh={() => { onRefresh(); setSelectedSeller(null); }} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // ORDERS TAB
        // ============================================================================
        const OrdersTab = ({ orders, fees, sellers }) => {
            const [search, setSearch] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [selectedOrder, setSelectedOrder] = useState(null);

            const sellerMap = useMemo(() => {
                const m = {};
                sellers.forEach(s => { m[s.id] = s; });
                return m;
            }, [sellers]);

            const filtered = orders.filter(o => {
                if (statusFilter !== 'all' && o.status !== statusFilter) return false;
                if (search && !o.order_number?.toLowerCase().includes(search.toLowerCase()) &&
                    !o.customer_name?.toLowerCase().includes(search.toLowerCase()) &&
                    !(sellerMap[o.seller_id]?.business_name || '').toLowerCase().includes(search.toLowerCase())) return false;
                return true;
            });

            const statuses = ['all', ...new Set(orders.map(o => o.status))];

            return (
                <div className="fade-in">
                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-6">
                        <h2 className="text-xl font-bold text-gray-900">All Orders</h2>
                        <div className="flex gap-2">
                            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
                                className="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white">
                                {statuses.map(s => <option key={s} value={s}>{s === 'all' ? 'All Statuses' : getStatusLabel(s)}</option>)}
                            </select>
                            <input type="text" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)}
                                className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none" />
                        </div>
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Order</th><th className="px-5 py-3">Seller</th><th className="px-5 py-3">Buyer</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Total</th><th className="px-5 py-3">Fee</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Date</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.slice(0, 50).map(o => {
                                        const fee = fees.find(f => f.order_id === o.id);
                                        const seller = sellerMap[o.seller_id];
                                        return (
                                            <tr key={o.id} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedOrder(o)}>
                                                <td className="px-5 py-3 font-mono font-semibold text-xs">{o.order_number}</td>
                                                <td className="px-5 py-3 text-gray-700">{seller?.business_name || '—'}</td>
                                                <td className="px-5 py-3 text-gray-700">{o.customer_name}</td>
                                                <td className="px-5 py-3 text-gray-400 text-xs font-mono">{o.customer_phone}</td>
                                                <td className="px-5 py-3 font-semibold">{formatCurrency(o.total)}</td>
                                                <td className="px-5 py-3 text-admin-600">{fee ? formatCurrency(fee.fee_amount) : '—'}</td>
                                                <td className="px-5 py-3"><span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: getStatusColor(o.status) + '20', color: getStatusColor(o.status) }}>{getStatusLabel(o.status)}</span></td>
                                                <td className="px-5 py-3 text-gray-400 text-xs">{new Date(o.created_at).toLocaleString()}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            {filtered.length > 50 && <p className="text-center text-xs text-gray-400 py-3">Showing 50 of {filtered.length} orders</p>}
                        </div>
                    </div>

                    <SlidePanel open={!!selectedOrder} onClose={() => setSelectedOrder(null)} title={selectedOrder?.order_number || 'Order'}>
                        {selectedOrder && <OrderDetail order={selectedOrder} fees={fees} sellers={sellers} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // FEES & SETTLEMENTS TAB
        // ============================================================================
        const FeesTab = ({ sellers, fees, settlements, settlementRequests = [], onRefresh, adminId }) => {
            const [showSettle, setShowSettle] = useState(null);
            const [settleAmount, setSettleAmount] = useState('');
            const [settleRef, setSettleRef] = useState('');
            const [settleMethod, setSettleMethod] = useState('eft');
            const [settling, setSettling] = useState(false);
            const [approving, setApproving] = useState(null);
            const [rejectTarget, setRejectTarget] = useState(null);
            const [rejectNotes, setRejectNotes] = useState('');

            const sellerBalances = useMemo(() => sellers.map(s => {
                const sFees = fees.filter(f => f.seller_id === s.id);
                const sSettlements = settlements.filter(st => st.seller_id === s.id);
                const totalFees = sFees.reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                const totalSettled = sSettlements.reduce((sum, st) => sum + Number(st.amount || 0), 0);
                const pendingFees = sFees.filter(f => f.status === 'pending').reduce((sum, f) => sum + Number(f.fee_amount || 0), 0);
                return { ...s, totalFees, totalSettled, pendingFees, balance: totalFees - totalSettled };
            }).filter(s => s.totalFees > 0).sort((a, b) => b.balance - a.balance), [sellers, fees, settlements]);

            const recordSettlement = async () => {
                if (!settleAmount || parseFloat(settleAmount) <= 0) return;
                setSettling(true);

                // Record the settlement
                await supabase.from('seller_settlements').insert({
                    seller_id: showSettle.id,
                    amount: parseFloat(settleAmount),
                    method: settleMethod,
                    reference: settleRef,
                    recorded_by: adminId
                });

                // Mark pending fees as settled up to the amount
                let remaining = parseFloat(settleAmount);
                const pendingFees = fees.filter(f => f.seller_id === showSettle.id && f.status === 'pending')
                    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                for (const fee of pendingFees) {
                    if (remaining <= 0) break;
                    if (remaining >= Number(fee.fee_amount)) {
                        await supabase.from('platform_fees').update({ status: 'settled', settled_at: new Date().toISOString(), settled_by: adminId }).eq('id', fee.id);
                        remaining -= Number(fee.fee_amount);
                    } else {
                        break;
                    }
                }

                setSettling(false);
                setShowSettle(null);
                setSettleAmount('');
                setSettleRef('');
                onRefresh();
            };

            const approveRequest = async (req) => {
                setApproving(req.id);
                try {
                    await supabase.from('seller_settlements').insert({
                        seller_id: req.seller_id,
                        amount: req.amount_claimed,
                        method: req.payment_method || 'unknown',
                        reference: req.payment_ref || null,
                        recorded_by: adminId,
                    });
                    let remaining = req.amount_claimed;
                    const pendingFees = fees.filter(f => f.seller_id === req.seller_id && f.status === 'pending')
                        .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    for (const fee of pendingFees) {
                        if (remaining <= 0) break;
                        if (remaining >= Number(fee.fee_amount)) {
                            await supabase.from('platform_fees').update({ status: 'settled', settled_at: new Date().toISOString(), settled_by: adminId }).eq('id', fee.id);
                            remaining -= Number(fee.fee_amount);
                        } else { break; }
                    }
                    await supabase.from('fee_settlement_requests').update({ status: 'approved', reviewed_by: adminId, reviewed_at: new Date().toISOString() }).eq('id', req.id);
                    onRefresh();
                } catch (e) {
                    console.error('Approve error:', e);
                } finally { setApproving(null); }
            };

            const rejectRequest = async (req, notes) => {
                setApproving(req.id);
                try {
                    await supabase.from('fee_settlement_requests').update({ status: 'rejected', reviewed_by: adminId, reviewed_at: new Date().toISOString(), review_notes: notes || null }).eq('id', req.id);
                    setRejectTarget(null);
                    setRejectNotes('');
                    onRefresh();
                } catch (e) {
                    console.error('Reject error:', e);
                } finally { setApproving(null); }
            };

            const pendingRequests = settlementRequests.filter(r => r.status === 'pending');
            const reviewedRequests = settlementRequests.filter(r => r.status !== 'pending');

            return (
                <div className="fade-in">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Fees & Settlements</h2>

                    {/* Summary cards */}
                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Total Fees Earned</p>
                            <p className="text-2xl font-bold text-admin-600 mt-1">{formatCurrency(fees.reduce((s, f) => s + Number(f.fee_amount || 0), 0))}</p>
                        </div>
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Collected</p>
                            <p className="text-2xl font-bold text-green-600 mt-1">{formatCurrency(settlements.reduce((s, st) => s + Number(st.amount || 0), 0))}</p>
                        </div>
                        <div className="stat-card">
                            <p className="text-xs font-semibold text-gray-500 uppercase">Outstanding</p>
                            <p className="text-2xl font-bold text-red-500 mt-1">{formatCurrency(sellerBalances.reduce((s, sb) => s + Math.max(0, sb.balance), 0))}</p>
                        </div>
                    </div>

                    {/* Pending payment requests from sellers */}
                    {pendingRequests.length > 0 && (
                        <div className="card overflow-hidden mb-6">
                            <div className="px-5 py-4 border-b border-amber-100 bg-amber-50 flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b45309" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                                <h3 className="font-semibold text-amber-900 text-sm">
                                    {pendingRequests.length} Pending Payment Request{pendingRequests.length !== 1 ? 's' : ''} from Sellers
                                </h3>
                            </div>
                            <div className="divide-y divide-gray-100">
                                {pendingRequests.map(req => (
                                    <div key={req.id} className="px-5 py-4 flex items-start justify-between gap-4">
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 mb-0.5">
                                                <span className="font-semibold text-gray-900 text-sm">{req.sellers && req.sellers.business_name || req.seller_id}</span>
                                                <span className="text-xs text-gray-400">{req.sellers && req.sellers.phone}</span>
                                            </div>
                                            <div className="flex items-center gap-2 text-sm flex-wrap">
                                                <span className="font-bold text-gray-900">{formatCurrency(req.amount_claimed)}</span>
                                                <span className="text-gray-300">·</span>
                                                <span className="text-gray-600 capitalize">{(req.payment_method || 'unknown').replace(/_/g, ' ')}</span>
                                                {req.payment_ref && (
                                                    <><span className="text-gray-300">·</span><span className="font-mono text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">{req.payment_ref}</span></>
                                                )}
                                            </div>
                                            {req.notes && <p className="text-xs text-gray-500 mt-1 italic">"{req.notes}"</p>}
                                            <p className="text-xs text-gray-400 mt-1">{new Date(req.created_at).toLocaleString()}</p>
                                        </div>
                                        <div className="flex gap-2 flex-shrink-0 mt-1">
                                            <button onClick={() => approveRequest(req)} disabled={approving === req.id}
                                                className="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-xs font-semibold transition disabled:opacity-50">
                                                {approving === req.id ? '…' : 'Approve'}
                                            </button>
                                            <button onClick={() => setRejectTarget(req)} disabled={!!approving}
                                                className="px-3 py-1.5 border border-red-200 text-red-600 hover:bg-red-50 rounded-lg text-xs font-semibold transition disabled:opacity-50">
                                                Reject
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Seller balances */}
                    <div className="card overflow-hidden mb-6">
                        <div className="px-5 py-4 border-b border-gray-100">
                            <h3 className="font-semibold text-gray-900">Seller Balances</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Seller</th><th className="px-5 py-3">Total Fees</th><th className="px-5 py-3">Settled</th><th className="px-5 py-3">Balance</th><th className="px-5 py-3">Actions</th>
                                </tr></thead>
                                <tbody>
                                    {sellerBalances.map(s => (
                                        <tr key={s.id} className="table-row border-b border-gray-50">
                                            <td className="px-5 py-3">
                                                <div className="font-semibold text-gray-900">{s.business_name}</div>
                                                <div className="text-xs text-gray-400">{s.phone}</div>
                                            </td>
                                            <td className="px-5 py-3 font-medium">{formatCurrency(s.totalFees)}</td>
                                            <td className="px-5 py-3 text-green-600">{formatCurrency(s.totalSettled)}</td>
                                            <td className="px-5 py-3">
                                                <span className={`font-bold ${s.balance > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                                    {s.balance > 0 ? formatCurrency(s.balance) : 'Settled'}
                                                </span>
                                            </td>
                                            <td className="px-5 py-3">
                                                {s.balance > 0 && (
                                                    <button onClick={() => { setShowSettle(s); setSettleAmount(s.balance.toFixed(2)); }}
                                                        className="px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs font-semibold hover:bg-green-100 transition">
                                                        Record Payment
                                                    </button>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Settlement request history */}
                    {reviewedRequests.length > 0 && (
                        <div className="card overflow-hidden mb-6">
                            <div className="px-5 py-4 border-b border-gray-100">
                                <h3 className="font-semibold text-gray-900 text-sm">Payment Request History</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                        <th className="px-5 py-3">Seller</th><th className="px-5 py-3">Amount</th><th className="px-5 py-3">Method</th><th className="px-5 py-3">Reference</th><th className="px-5 py-3">Status</th><th className="px-5 py-3">Date</th>
                                    </tr></thead>
                                    <tbody>
                                        {reviewedRequests.map(req => (
                                            <tr key={req.id} className="table-row border-b border-gray-50">
                                                <td className="px-5 py-3 font-medium">{req.sellers && req.sellers.business_name || '—'}</td>
                                                <td className="px-5 py-3">{formatCurrency(req.amount_claimed)}</td>
                                                <td className="px-5 py-3 capitalize">{(req.payment_method || '—').replace(/_/g, ' ')}</td>
                                                <td className="px-5 py-3 font-mono text-xs text-gray-600">{req.payment_ref || '—'}</td>
                                                <td className="px-5 py-3">
                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${req.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {req.status}
                                                    </span>
                                                </td>
                                                <td className="px-5 py-3 text-gray-400 text-xs">{new Date(req.reviewed_at || req.created_at).toLocaleDateString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Manual Record Payment modal */}
                    {showSettle && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-lg text-gray-900 mb-1">Record Payment</h3>
                                <p className="text-sm text-gray-500 mb-4">From: <strong>{showSettle.business_name}</strong> · Balance: <strong className="text-red-500">{formatCurrency(showSettle.balance)}</strong></p>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Amount (M)</label>
                                        <input type="number" value={settleAmount} onChange={e => setSettleAmount(e.target.value)} step="0.01" min="0"
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Method</label>
                                        <select value={settleMethod} onChange={e => setSettleMethod(e.target.value)}
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm bg-white outline-none focus:ring-2 focus:ring-admin-500">
                                            <option value="eft">EFT / Bank Transfer</option>
                                            <option value="cash">Cash</option>
                                            <option value="ecocash">EcoCash</option>
                                            <option value="mpesa">M-Pesa</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Reference (optional)</label>
                                        <input type="text" value={settleRef} onChange={e => setSettleRef(e.target.value)} placeholder="e.g. EcoCash transaction ref"
                                            className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-5">
                                    <button onClick={recordSettlement} disabled={settling || !settleAmount}
                                        className="flex-1 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                        {settling ? 'Recording...' : 'Record Payment'}
                                    </button>
                                    <button onClick={() => setShowSettle(null)}
                                        className="px-5 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 transition">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Reject request modal */}
                    {rejectTarget && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-lg text-gray-900 mb-1">Reject Request</h3>
                                <p className="text-sm text-gray-500 mb-4">
                                    From <strong>{rejectTarget.sellers && rejectTarget.sellers.business_name}</strong> for <strong>{formatCurrency(rejectTarget.amount_claimed)}</strong>
                                </p>
                                <textarea value={rejectNotes} onChange={e => setRejectNotes(e.target.value)} rows={3}
                                    placeholder="Reason for rejection (internal note, seller won't see this)"
                                    className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-red-400 resize-none mb-4" />
                                <div className="flex gap-3">
                                    <button onClick={() => rejectRequest(rejectTarget, rejectNotes)} disabled={!!approving}
                                        className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                                        {approving ? '…' : 'Reject'}
                                    </button>
                                    <button onClick={() => { setRejectTarget(null); setRejectNotes(''); }}
                                        className="px-5 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 transition">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // BUYERS TAB (read-only)
        // ============================================================================
        const BuyersTab = ({ orders, sellers }) => {
            const [search, setSearch] = useState('');
            const [selectedBuyer, setSelectedBuyer] = useState(null);

            const buyers = useMemo(() => {
                const map = {};
                orders.forEach(o => {
                    const phone = o.customer_phone || 'unknown';
                    if (!map[phone]) map[phone] = { phone, name: o.customer_name, orders: 0, totalSpend: 0, lastOrder: o.created_at, sellers: new Set() };
                    map[phone].orders++;
                    map[phone].totalSpend += Number(o.total || 0);
                    if (o.customer_name && o.customer_name.length > (map[phone].name || '').length) map[phone].name = o.customer_name;
                    if (o.created_at > map[phone].lastOrder) map[phone].lastOrder = o.created_at;
                    if (o.seller_id) map[phone].sellers.add(o.seller_id);
                });
                return Object.values(map)
                    .map(b => ({ ...b, sellerCount: b.sellers.size }))
                    .sort((a, b) => b.totalSpend - a.totalSpend);
            }, [orders]);

            const filtered = buyers.filter(b =>
                b.name?.toLowerCase().includes(search.toLowerCase()) ||
                b.phone?.includes(search)
            );

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h2 className="text-xl font-bold text-gray-900">Buyers</h2>
                            <p className="text-sm text-gray-500 mt-0.5">{buyers.length} unique buyers across the platform</p>
                        </div>
                        <input type="text" placeholder="Search buyers..." value={search} onChange={e => setSearch(e.target.value)}
                            className="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-admin-500 outline-none w-64" />
                    </div>
                    <div className="card overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                    <th className="px-5 py-3">Buyer</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Orders</th><th className="px-5 py-3">Total Spend</th><th className="px-5 py-3">Sellers</th><th className="px-5 py-3">Last Order</th>
                                </tr></thead>
                                <tbody>
                                    {filtered.slice(0, 50).map(b => (
                                        <tr key={b.phone} className="table-row clickable border-b border-gray-50" onClick={() => setSelectedBuyer(b.phone)}>
                                            <td className="px-5 py-3 font-semibold text-gray-900">{b.name || '—'}</td>
                                            <td className="px-5 py-3 text-gray-500 font-mono text-xs">{b.phone}</td>
                                            <td className="px-5 py-3 font-medium">{b.orders}</td>
                                            <td className="px-5 py-3 font-semibold">{formatCurrency(b.totalSpend)}</td>
                                            <td className="px-5 py-3 text-gray-600">{b.sellerCount}</td>
                                            <td className="px-5 py-3 text-gray-400 text-xs">{new Date(b.lastOrder).toLocaleDateString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filtered.length > 50 && <p className="text-center text-xs text-gray-400 py-3">Showing 50 of {filtered.length} buyers</p>}
                        </div>
                    </div>

                    <SlidePanel open={!!selectedBuyer} onClose={() => setSelectedBuyer(null)} title={buyers.find(b => b.phone === selectedBuyer)?.name || 'Buyer'}>
                        {selectedBuyer && <BuyerDetail phone={selectedBuyer} orders={orders} sellers={sellers} />}
                    </SlidePanel>
                </div>
            );
        };

        // ============================================================================
        // SETTINGS TAB
        // ============================================================================
        const SettingsTab = ({ config, onRefresh }) => {
            const [feeType, setFeeType] = useState(config.fee_type);
            const [feeValue, setFeeValue] = useState(config.fee_value?.toString() || '5');
            const [threshold, setThreshold] = useState(config.suspension_threshold?.toString() || '500');
            const [saving, setSaving] = useState(false);
            const [saved, setSaved] = useState(false);

            const handleSave = async () => {
                setSaving(true);
                await supabase.from('platform_config').update({
                    fee_type: feeType,
                    fee_value: parseFloat(feeValue),
                    suspension_threshold: parseFloat(threshold),
                    updated_at: new Date().toISOString()
                }).eq('id', config.id);
                setSaving(false);
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
                onRefresh();
            };

            return (
                <div className="fade-in max-w-lg">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">Platform Settings</h2>
                    <div className="card p-6 space-y-5">
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Fee Type</label>
                            <select value={feeType} onChange={e => setFeeType(e.target.value)}
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm bg-white outline-none focus:ring-2 focus:ring-admin-500">
                                <option value="percentage">Percentage of order total (%)</option>
                                <option value="fixed">Fixed amount per order (R)</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">
                                {feeType === 'percentage' ? 'Fee Percentage (%)' : 'Fee Amount (R)'}
                            </label>
                            <input type="number" value={feeValue} onChange={e => setFeeValue(e.target.value)} min="0" step={feeType === 'percentage' ? '0.5' : '0.01'}
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                            <p className="text-xs text-gray-400 mt-1">
                                {feeType === 'percentage' ? `On a M100 order, platform earns M${(100 * parseFloat(feeValue || 0) / 100).toFixed(2)}` : `Flat M${parseFloat(feeValue || 0).toFixed(2)} per order`}
                            </p>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Suspension Threshold (R)</label>
                            <input type="number" value={threshold} onChange={e => setThreshold(e.target.value)} min="0" step="50"
                                className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-admin-500" />
                            <p className="text-xs text-gray-400 mt-1">Sellers with unpaid fees above this amount can be suspended</p>
                        </div>
                        <button onClick={handleSave} disabled={saving}
                            className="w-full py-2.5 bg-admin-600 hover:bg-admin-700 text-white rounded-xl font-semibold text-sm transition disabled:opacity-50">
                            {saving ? 'Saving...' : saved ? '✓ Saved!' : 'Save Settings'}
                        </button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // ACTIVITY TAB (login audit + admin action log)
        // ============================================================================
        const ActivityTab = () => {
            const [view, setView] = useState('logins');
            const [logins, setLogins] = useState([]);
            const [actions, setActions] = useState([]);
            const [loading, setLoading] = useState(true);

            const load = async () => {
                setLoading(true);
                const [l, a] = await Promise.all([
                    supabase.rpc('admin_login_audit', { p_seller_id: null, p_limit: 200 }),
                    supabase.rpc('admin_actions_log', { p_limit: 200 }),
                ]);
                setLogins(Array.isArray(l.data) ? l.data : []);
                setActions(Array.isArray(a.data) ? a.data : []);
                setLoading(false);
            };
            useEffect(() => { load(); }, []);

            const fmt = (t) => t ? new Date(t).toLocaleString() : '—';
            const actionLabel = (a) => {
                if (a.action === 'set_status') return 'Set status → ' + (a.detail || '');
                if (a.action === 'reset_pin') return a.detail === 'temp_pin_set' ? 'Reset PIN (temp set)' : 'Reset PIN (cleared)';
                return a.action;
            };

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6 gap-3 flex-wrap">
                        <h2 className="text-xl font-bold text-gray-900">Activity</h2>
                        <div className="flex items-center gap-2">
                            <div className="inline-flex rounded-xl bg-gray-100 p-1">
                                <button onClick={() => setView('logins')} className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition ${view === 'logins' ? 'bg-white text-admin-700 shadow-sm' : 'text-gray-500'}`}>Seller Logins</button>
                                <button onClick={() => setView('actions')} className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition ${view === 'actions' ? 'bg-white text-admin-700 shadow-sm' : 'text-gray-500'}`}>Admin Actions</button>
                            </div>
                            <button onClick={load} className="p-2 text-gray-400 hover:text-gray-600"><Icons.refresh /></button>
                        </div>
                    </div>

                    {loading ? <p className="text-sm text-gray-400">Loading…</p> : view === 'logins' ? (
                        <div className="card overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                        <th className="px-5 py-3">Seller</th><th className="px-5 py-3">Phone</th><th className="px-5 py-3">Method</th><th className="px-5 py-3">Result</th><th className="px-5 py-3">When</th>
                                    </tr></thead>
                                    <tbody>
                                        {logins.length === 0 ? <tr><td colSpan="5" className="px-5 py-6 text-center text-gray-400">No login events yet</td></tr> :
                                        logins.map(e => (
                                            <tr key={e.id} className="border-b border-gray-50">
                                                <td className="px-5 py-3 font-medium text-gray-900">{e.seller_name || '—'}</td>
                                                <td className="px-5 py-3 text-gray-600 text-xs font-mono">{e.phone}</td>
                                                <td className="px-5 py-3 text-xs uppercase font-medium text-gray-600">{e.method}</td>
                                                <td className="px-5 py-3"><span className={`px-1.5 py-0.5 rounded text-xs font-semibold ${e.success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`}>{e.success ? 'OK' : 'Fail'}</span></td>
                                                <td className="px-5 py-3 text-gray-500 text-xs">{fmt(e.created_at)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : (
                        <div className="card overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead><tr className="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
                                        <th className="px-5 py-3">Action</th><th className="px-5 py-3">Seller</th><th className="px-5 py-3">By</th><th className="px-5 py-3">When</th>
                                    </tr></thead>
                                    <tbody>
                                        {actions.length === 0 ? <tr><td colSpan="4" className="px-5 py-6 text-center text-gray-400">No admin actions yet</td></tr> :
                                        actions.map(a => (
                                            <tr key={a.id} className="border-b border-gray-50">
                                                <td className="px-5 py-3 font-medium text-gray-900">{actionLabel(a)}</td>
                                                <td className="px-5 py-3 text-gray-600">{a.seller_name || '—'}</td>
                                                <td className="px-5 py-3 text-gray-500 text-xs">{a.admin_name || 'Admin'}</td>
                                                <td className="px-5 py-3 text-gray-500 text-xs">{fmt(a.created_at)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // MAIN APP
        // ============================================================================
        const App = () => {
            const [admin, setAdmin] = useState(null);
            const [tab, setTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [sellers, setSellers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [fees, setFees] = useState([]);
            const [settlements, setSettlements] = useState([]);
            const [settlementRequests, setSettlementRequests] = useState([]);
            const [config, setConfig] = useState({ fee_type: 'percentage', fee_value: 5, suspension_threshold: 500 });
            const [popOrder, setPopOrder] = useState(null);

            // Global order opener so any view (dashboard / buyer / seller drill-down)
            // can pop the same order detail.
            useEffect(() => { window.__openOrder = (o) => setPopOrder(o); return () => { try { delete window.__openOrder; } catch (e) {} }; }, []);

            // Auto-login from the shared Supabase session (set when an admin OTP's in here or in the dashboard)
            useEffect(() => {
                (async () => {
                    try {
                        const { data: sess } = await supabase.auth.getSession();
                        if (sess && sess.session) {
                            const { data: sessRes } = await supabase.rpc('admin_session');
                            if (sessRes && sessRes.admin) { setAdmin(sessRes.admin); setLoading(false); return; }
                        }
                    } catch (e) {}
                    setLoading(false);
                })();
            }, []);

            useEffect(() => { if (admin) loadAllData(); }, [admin]);

            const loadAllData = async () => {
                setLoading(true);
                const [sellersRes, ordersRes, feesRes, settlementsRes, configRes, settlementRequestsRes] = await Promise.all([
                    supabase.from('sellers').select('id, full_name, phone, business_name, location, preferred_language, is_active, created_at, updated_at, slug, business_description, banner_url, logo_url, business_hours, delivery_areas, social_links, address, seller_phone, is_admin, seller_status, delivery_methods, delivery_fee, delivery_fee_type, pickup_address, delivery_notes, is_demo').order('created_at', { ascending: false }),
                    supabase.from('orders').select('id, order_number, seller_id, customer_name, customer_phone, total, status, payment_status, delivery_method, payment_method, discount_code, discount_amount, created_at').order('created_at', { ascending: false }),
                    supabase.from('platform_fees').select('*').order('created_at', { ascending: false }),
                    supabase.from('seller_settlements').select('*').order('created_at', { ascending: false }),
                    supabase.from('platform_config').select('*').limit(1).single(),
                    supabase.from('fee_settlement_requests').select('*, sellers(business_name, phone)').order('created_at', { ascending: false }),
                ]);
                setSellers(sellersRes.data || []);
                setOrders(ordersRes.data || []);
                setFees(feesRes.data || []);
                setSettlements(settlementsRes.data || []);
                if (configRes.data) setConfig(configRes.data);
                setSettlementRequests(settlementRequestsRes.data || []);
                setLoading(false);
            };

            const handleLogout = async () => {
                try { await supabase.auth.signOut(); } catch (e) {}
                localStorage.removeItem('admin_user');
                setAdmin(null);
            };

            if (!admin && !loading) return <LoginScreen onLoginSuccess={(u) => { setAdmin(u); }} />;

            if (loading) return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                    <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-admin-500"></div>
                </div>
            );

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', Icon: Icons.dashboard },
                { id: 'sellers', label: 'Sellers', Icon: Icons.sellers },
                { id: 'orders', label: 'Orders', Icon: Icons.orders },
                { id: 'fees', label: 'Fees', Icon: Icons.fees },
                { id: 'buyers', label: 'Buyers', Icon: Icons.buyers },
                { id: 'activity', label: 'Activity', Icon: Icons.activity },
                { id: 'settings', label: 'Settings', Icon: Icons.settings },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Desktop sidebar */}
                    <aside className="hidden lg:flex lg:flex-col lg:fixed lg:inset-y-0 lg:left-0 lg:w-64 bg-white border-r border-gray-200 z-50">
                        <div className="px-5 py-5 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <svg viewBox="0 0 200 200" width="38" height="38">
                                    <circle cx="100" cy="100" r="92" fill="none" stroke="#166534" strokeWidth="4"/>
                                    <rect x="40" y="50" width="72" height="55" rx="14" fill="#25A65A"/>
                                    <circle cx="58" cy="78" r="5.5" fill="white"/><circle cx="76" cy="78" r="5.5" fill="white"/><circle cx="94" cy="78" r="5.5" fill="white"/>
                                    <polygon points="52,105 52,122 68,105" fill="#25A65A"/>
                                    <rect x="88" y="85" width="72" height="55" rx="14" fill="#D4A017"/>
                                    <circle cx="106" cy="113" r="5.5" fill="#166534"/><circle cx="124" cy="113" r="5.5" fill="#166534"/><circle cx="142" cy="113" r="5.5" fill="#166534"/>
                                    <polygon points="148,140 148,157 132,140" fill="#D4A017"/>
                                </svg>
                                <div>
                                    <h1 className="font-bold text-sm text-gray-900"><span style={{color:'#1a8a4a'}}>Yebo</span><span style={{color:'#D4A017'}}>Sell</span></h1>
                                    <p className="text-xs text-gray-500">Admin Panel</p>
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 px-3 py-4 space-y-1">
                            {navItems.map(({ id, label, Icon }) => (
                                <button key={id} onClick={() => setTab(id)}
                                    className={`sidebar-link w-full ${tab === id ? 'active' : ''}`}>
                                    <Icon /> <span>{label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="px-4 py-3 border-t border-gray-100">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-8 h-8 rounded-full bg-admin-100 flex items-center justify-center text-admin-600 font-bold text-xs">
                                    {admin.full_name?.charAt(0)?.toUpperCase() || 'A'}
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="text-sm font-semibold text-gray-900 truncate">{admin.full_name}</p>
                                    <p className="text-xs text-gray-500">Admin</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="sidebar-link w-full text-red-500 hover:bg-red-50 hover:text-red-600">
                                <Icons.logout /> Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* Main content */}
                    <div className="lg:ml-64">
                        {/* Mobile header */}
                        <div className="lg:hidden flex items-center justify-between px-4 py-3 bg-white border-b border-gray-200 sticky top-0 z-40">
                            <div className="flex items-center gap-2">
                                <svg viewBox="0 0 200 200" width="32" height="32">
                                    <circle cx="100" cy="100" r="92" fill="none" stroke="#166534" strokeWidth="5"/>
                                    <rect x="40" y="50" width="72" height="55" rx="14" fill="#25A65A"/>
                                    <circle cx="58" cy="78" r="5.5" fill="white"/><circle cx="76" cy="78" r="5.5" fill="white"/><circle cx="94" cy="78" r="5.5" fill="white"/>
                                    <polygon points="52,105 52,122 68,105" fill="#25A65A"/>
                                    <rect x="88" y="85" width="72" height="55" rx="14" fill="#D4A017"/>
                                    <circle cx="106" cy="113" r="5.5" fill="#166534"/><circle cx="124" cy="113" r="5.5" fill="#166534"/><circle cx="142" cy="113" r="5.5" fill="#166534"/>
                                    <polygon points="148,140 148,157 132,140" fill="#D4A017"/>
                                </svg>
                                <span className="font-bold text-sm text-gray-900"><span style={{color:'#1a8a4a'}}>Yebo</span><span style={{color:'#D4A017'}}>Sell</span></span>
                            </div>
                            <button onClick={loadAllData} className="p-2 text-gray-400 hover:text-gray-600"><Icons.refresh /></button>
                        </div>

                        <div className="p-4 lg:p-8 pb-24 lg:pb-8">
                            {tab === 'dashboard' && <DashboardTab sellers={sellers} orders={orders} fees={fees} config={config} onNavigate={setTab} />}
                            {tab === 'sellers' && <SellersTab sellers={sellers} orders={orders} fees={fees} onRefresh={loadAllData} />}
                            {tab === 'orders' && <OrdersTab orders={orders} fees={fees} sellers={sellers} />}
                            {tab === 'fees' && <FeesTab sellers={sellers} fees={fees} settlements={settlements} settlementRequests={settlementRequests} onRefresh={loadAllData} adminId={admin.auth_user_id} />}
                            {tab === 'buyers' && <BuyersTab orders={orders} sellers={sellers} />}
                            {tab === 'activity' && <ActivityTab />}
                            {tab === 'settings' && <SettingsTab config={config} onRefresh={loadAllData} />}
                        </div>
                    </div>

                    {popOrder && <AdminOrderModal order={popOrder} fees={fees} sellers={sellers} onClose={() => setPopOrder(null)} />}

                    {/* Mobile bottom nav */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
                        <div className="flex">
                            {navItems.map(({ id, label, Icon }) => (
                                <button key={id} onClick={() => setTab(id)}
                                    className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 px-1 text-xs font-medium transition-colors ${
                                        tab === id ? 'text-admin-500' : 'text-gray-400 hover:text-gray-600'
                                    }`}>
                                    <Icon style={{ width: 20, height: 20 }} />
                                    <span>{label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
