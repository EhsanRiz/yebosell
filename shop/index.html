<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Seller OS</title>
    <meta name="description" content="Browse and shop from your favorite local seller">
    <meta property="og:title" content="WhatsApp Seller Store">
    <meta property="og:description" content="Browse products from a local WhatsApp seller">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://via.placeholder.com/1200x630?text=WhatsApp+Seller+Store">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=2"></script>

    <style>
        .whatsapp-green { color: #25D366; }
        .bg-whatsapp-green { background-color: #25D366; }
        .hover\:bg-whatsapp-green:hover { background-color: #20a853; }
        .text-whatsapp-green { color: #25D366; }
        .border-whatsapp-green { border-color: #25D366; }

        .cart-drawer {
            transform: translateY(100%);
            transition: transform 0.3s ease-in-out;
        }

        .cart-drawer.active {
            transform: translateY(0);
        }

        .placeholder-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .loading-spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Pull shared config from window (config.js attaches everything there)
        const supabase = window.supabaseClient;
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
        const SITE_URL = window.SITE_URL;
        const formatCurrency = window.formatCurrency;
        const getStatusColor = window.getStatusColor;
        const getStatusLabel = window.getStatusLabel;
        const whatsappLink = window.whatsappLink;

        // ==================== STORE COMPONENT ====================
        function Store() {
            const [seller, setSeller] = useState(null);
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [showConfirmation, setShowConfirmation] = useState(false);
            const [orderData, setOrderData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({
                name: '',
                phone: '',
                delivery_method: 'self_delivery',
                payment_method: 'eft',
                notes: ''
            });

            // Get slug from URL
            const getSellerSlug = () => {
                return new URLSearchParams(window.location.search).get('s');
            };

            // Load seller and products
            useEffect(() => {
                const loadStore = async () => {
                    setLoading(true);
                    setError(null);

                    const slug = getSellerSlug();

                    if (!slug) {
                        setError('Store not found. Please use a valid seller link.');
                        setLoading(false);
                        return;
                    }

                    try {
                        // Fetch seller
                        const { data: sellerData, error: sellerError } = await supabase
                            .from('sellers')
                            .select('*')
                            .eq('slug', slug)
                            .single();

                        if (sellerError || !sellerData) {
                            setError('This store doesn\'t exist. Please check the link and try again.');
                            setLoading(false);
                            return;
                        }

                        setSeller(sellerData);
                        document.title = `${sellerData.business_name} | WhatsApp Seller OS`;
                        document.querySelector('meta[property="og:title"]').content = sellerData.business_name;
                        document.querySelector('meta[property="og:description"]').content = sellerData.business_description || 'Browse products from our store';

                        // Fetch products
                        const { data: productsData, error: productsError } = await supabase
                            .from('products')
                            .select('*')
                            .eq('seller_id', sellerData.id)
                            .eq('is_active', true)
                            .order('sort_order', { ascending: true });

                        if (productsError) {
                            console.error('Products error:', productsError);
                            setProducts([]);
                        } else {
                            setProducts(productsData || []);
                        }
                    } catch (err) {
                        console.error('Error loading store:', err);
                        setError('Something went wrong. Please try again.');
                    }

                    setLoading(false);
                };

                loadStore();
            }, []);

            // Add to cart
            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);

                if (existingItem) {
                    setCart(cart.map(item =>
                        item.id === product.id
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
            };

            // Update cart quantity
            const updateQuantity = (productId, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    setCart(cart.map(item =>
                        item.id === productId
                            ? { ...item, quantity }
                            : item
                    ));
                }
            };

            // Remove from cart
            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.id !== productId));
            };

            // Calculate totals
            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            // Submit order
            const submitOrder = async (e) => {
                e.preventDefault();

                if (!formData.name || !formData.phone) {
                    alert('Please fill in name and phone number');
                    return;
                }

                if (cart.length === 0) {
                    alert('Cart is empty');
                    return;
                }

                try {
                    const orderNumber = generateOrderNumber();

                    // Create order
                    const { data: orderInsert, error: orderError } = await supabase
                        .from('orders')
                        .insert([
                            {
                                seller_id: seller.id,
                                customer_name: formData.name,
                                customer_phone: formData.phone,
                                order_number: orderNumber,
                                status: 'new',
                                delivery_method: formData.delivery_method,
                                payment_method: formData.payment_method,
                                total: cartTotal,
                                notes: formData.notes,
                                source: 'storefront'
                            }
                        ])
                        .select()
                        .single();

                    if (orderError) {
                        console.error('Order error:', orderError);
                        alert('Failed to create order. Please try again.');
                        return;
                    }

                    const order = orderInsert;

                    // Create order items
                    const orderItems = cart.map(item => ({
                        order_id: order.id,
                        product_id: item.id,
                        product_name: item.name,
                        quantity: item.quantity,
                        unit_price: item.price
                    }));

                    const { error: itemsError } = await supabase
                        .from('order_items')
                        .insert(orderItems);

                    if (itemsError) {
                        console.error('Order items error:', itemsError);
                        alert('Order created but items failed. Contact seller with order number: ' + orderNumber);
                        return;
                    }

                    // Success
                    setOrderData({
                        order_number: orderNumber,
                        total: cartTotal,
                        items: cart,
                        seller_phone: seller.seller_phone,
                        seller_name: seller.business_name
                    });

                    setCart([]);
                    setShowCheckout(false);
                    setShowConfirmation(true);
                } catch (err) {
                    console.error('Order submission error:', err);
                    alert('An error occurred. Please try again.');
                }
            };

            // Handle checkout button
            const handleCheckout = () => {
                if (cart.length === 0) {
                    alert('Your cart is empty');
                    return;
                }
                setShowCheckout(true);
                setShowCart(false);
            };

            // Continue shopping
            const continueShopping = () => {
                setShowConfirmation(false);
                setFormData({
                    name: '',
                    phone: '',
                    delivery_method: 'self_delivery',
                    payment_method: 'eft',
                    notes: ''
                });
            };

            // Loading state
            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-50">
                        <div className="text-center">
                            <div className="loading-spinner mx-auto mb-4"></div>
                            <p className="text-gray-600">Loading store...</p>
                        </div>
                    </div>
                );
            }

            // Error state
            if (error) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-50">
                        <div className="text-center px-4">
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">Oops!</h1>
                            <p className="text-gray-600 mb-6">{error}</p>
                            <a href="/" className="inline-block bg-whatsapp-green text-white px-6 py-2 rounded-lg hover:bg-whatsapp-green transition">
                                Back to WhatsApp Seller OS
                            </a>
                        </div>
                    </div>
                );
            }

            // Main store view
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-6">
                            <h1 className="text-3xl font-bold text-gray-800">{seller?.business_name}</h1>
                            <p className="text-gray-600 mt-1">{seller?.business_description}</p>
                        </div>
                    </header>

                    {/* Products Grid */}
                    <main className="max-w-4xl mx-auto px-4 py-8">
                        {products.length === 0 ? (
                            <div className="text-center py-12">
                                <p className="text-gray-600 text-lg">No products available yet</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-4 md:grid-cols-3 md:gap-6">
                                {products.map(product => (
                                    <ProductCard
                                        key={product.id}
                                        product={product}
                                        onAddToCart={addToCart}
                                    />
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Floating Cart Button */}
                    {cartCount > 0 && (
                        <button
                            onClick={() => setShowCart(!showCart)}
                            className="fixed bottom-6 right-6 bg-whatsapp-green text-white rounded-full p-4 shadow-lg hover:bg-whatsapp-green transition flex items-center gap-2 z-20"
                        >
                            <span className="text-xl">🛒</span>
                            <span className="font-bold text-lg">{cartCount}</span>
                        </button>
                    )}

                    {/* Cart Drawer */}
                    {showCart && (
                        <CartDrawer
                            cart={cart}
                            total={cartTotal}
                            onUpdateQuantity={updateQuantity}
                            onRemove={removeFromCart}
                            onCheckout={handleCheckout}
                            onClose={() => setShowCart(false)}
                        />
                    )}

                    {/* Checkout Modal */}
                    {showCheckout && (
                        <CheckoutModal
                            formData={formData}
                            setFormData={setFormData}
                            onSubmit={submitOrder}
                            onCancel={() => setShowCheckout(false)}
                            total={cartTotal}
                            itemCount={cartCount}
                        />
                    )}

                    {/* Confirmation Modal */}
                    {showConfirmation && orderData && (
                        <ConfirmationModal
                            orderData={orderData}
                            onContinueShopping={continueShopping}
                        />
                    )}

                    {/* Footer */}
                    <footer className="bg-gray-100 border-t border-gray-200 py-8 mt-12">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <p className="text-gray-600 text-sm mb-2">
                                Powered by <a href="/" className="text-whatsapp-green font-semibold hover:underline">WhatsApp Seller OS</a>
                            </p>
                            <p className="text-gray-500 text-xs">Simple, fast, local commerce</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // ==================== PRODUCT CARD COMPONENT ====================
        function ProductCard({ product, onAddToCart }) {
            return (
                <div className="bg-white rounded-lg shadow-sm overflow-hidden hover:shadow-md transition">
                    {product.photo_url ? (
                        <img
                            src={product.photo_url}
                            alt={product.name}
                            className="product-image bg-gray-200"
                            loading="lazy"
                        />
                    ) : (
                        <div className="product-image placeholder-gradient flex items-center justify-center">
                            <span className="text-white text-center px-2 font-semibold text-sm">
                                {product.name}
                            </span>
                        </div>
                    )}

                    <div className="p-4">
                        <h3 className="font-semibold text-gray-800 line-clamp-2">{product.name}</h3>
                        <p className="text-sm text-gray-600 mt-1 line-clamp-2">{product.description}</p>

                        <div className="mt-4 flex items-center justify-between">
                            <span className="text-xl font-bold text-whatsapp-green">
                                {formatCurrency(product.price)}
                            </span>
                            <button
                                onClick={() => onAddToCart(product)}
                                className="bg-whatsapp-green text-white px-3 py-2 rounded-lg text-sm font-semibold hover:bg-whatsapp-green transition"
                            >
                                Add
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== CART DRAWER COMPONENT ====================
        function CartDrawer({ cart, total, onUpdateQuantity, onRemove, onCheckout, onClose }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-30" onClick={onClose}>
                    <div
                        className="fixed bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-lg max-h-96 overflow-y-auto"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="sticky top-0 bg-white border-b border-gray-200 p-4 flex items-center justify-between">
                            <h2 className="text-xl font-bold text-gray-800">Your Cart</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
                        </div>

                        <div className="p-4">
                            {cart.length === 0 ? (
                                <p className="text-gray-600 text-center py-8">Your cart is empty</p>
                            ) : (
                                <div className="space-y-4">
                                    {cart.map(item => (
                                        <CartItem
                                            key={item.id}
                                            item={item}
                                            onUpdateQuantity={onUpdateQuantity}
                                            onRemove={onRemove}
                                        />
                                    ))}
                                </div>
                            )}

                            {cart.length > 0 && (
                                <div className="mt-6 border-t border-gray-200 pt-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-lg font-semibold text-gray-800">Subtotal:</span>
                                        <span className="text-lg font-bold text-whatsapp-green">
                                            {formatCurrency(total)}
                                        </span>
                                    </div>
                                    <button
                                        onClick={onCheckout}
                                        className="w-full bg-whatsapp-green text-white font-bold py-3 rounded-lg hover:bg-whatsapp-green transition"
                                    >
                                        Proceed to Checkout
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== CART ITEM COMPONENT ====================
        function CartItem({ item, onUpdateQuantity, onRemove }) {
            return (
                <div className="flex gap-4 border border-gray-200 rounded-lg p-3">
                    {item.photo_url && (
                        <img
                            src={item.photo_url}
                            alt={item.name}
                            className="w-16 h-16 object-cover rounded"
                            loading="lazy"
                        />
                    )}

                    <div className="flex-1">
                        <h4 className="font-semibold text-gray-800">{item.name}</h4>
                        <p className="text-whatsapp-green font-bold mt-1">{formatCurrency(item.price)}</p>

                        <div className="flex items-center gap-2 mt-2">
                            <button
                                onClick={() => onUpdateQuantity(item.id, item.quantity - 1)}
                                className="bg-gray-200 text-gray-800 w-7 h-7 rounded flex items-center justify-center hover:bg-gray-300 transition"
                            >
                                −
                            </button>
                            <span className="w-8 text-center font-semibold">{item.quantity}</span>
                            <button
                                onClick={() => onUpdateQuantity(item.id, item.quantity + 1)}
                                className="bg-gray-200 text-gray-800 w-7 h-7 rounded flex items-center justify-center hover:bg-gray-300 transition"
                            >
                                +
                            </button>
                            <button
                                onClick={() => onRemove(item.id)}
                                className="ml-auto text-red-600 hover:text-red-800 text-sm font-semibold"
                            >
                                Remove
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== CHECKOUT MODAL COMPONENT ====================
        function CheckoutModal({ formData, setFormData, onSubmit, onCancel, total, itemCount }) {
            const deliveryMethods = [
                { value: 'self_delivery', label: 'Deliver to Me', emoji: '🚗' },
                { value: 'pickup', label: 'I\'ll Pickup', emoji: '🏪' },
                { value: 'taxi', label: 'Via Taxi', emoji: '🚕' },
                { value: 'bus', label: 'Via Bus', emoji: '🚌' },
                { value: 'local_courier', label: 'Local Courier', emoji: '📦' }
            ];

            const paymentMethods = [
                { value: 'eft', label: 'EFT / Bank Transfer' },
                { value: 'mobile_money', label: 'Mobile Money' },
                { value: 'cash', label: 'Cash on Delivery/Pickup' }
            ];

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4">
                    <div className="bg-white rounded-lg max-w-md w-full max-h-96 overflow-y-auto">
                        <div className="sticky top-0 bg-white border-b border-gray-200 p-4 flex items-center justify-between">
                            <h2 className="text-xl font-bold text-gray-800">Checkout</h2>
                            <button onClick={onCancel} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
                        </div>

                        <form onSubmit={onSubmit} className="p-4 space-y-4">
                            {/* Name */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">
                                    Your Name <span className="text-red-600">*</span>
                                </label>
                                <input
                                    type="text"
                                    required
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    placeholder="Full name"
                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-whatsapp-green"
                                />
                            </div>

                            {/* Phone */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">
                                    WhatsApp Number <span className="text-red-600">*</span>
                                </label>
                                <input
                                    type="tel"
                                    required
                                    value={formData.phone}
                                    onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                                    placeholder="+27... or +266..."
                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-whatsapp-green"
                                />
                            </div>

                            {/* Delivery Method */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">
                                    How should we deliver? <span className="text-red-600">*</span>
                                </label>
                                <div className="space-y-2">
                                    {deliveryMethods.map(method => (
                                        <label key={method.value} className="flex items-center p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                            <input
                                                type="radio"
                                                name="delivery"
                                                value={method.value}
                                                checked={formData.delivery_method === method.value}
                                                onChange={(e) => setFormData({ ...formData, delivery_method: e.target.value })}
                                                className="w-4 h-4"
                                            />
                                            <span className="ml-3 text-gray-800">
                                                {method.emoji} {method.label}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Payment Method */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">
                                    How will you pay? <span className="text-red-600">*</span>
                                </label>
                                <div className="space-y-2">
                                    {paymentMethods.map(method => (
                                        <label key={method.value} className="flex items-center p-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                            <input
                                                type="radio"
                                                name="payment"
                                                value={method.value}
                                                checked={formData.payment_method === method.value}
                                                onChange={(e) => setFormData({ ...formData, payment_method: e.target.value })}
                                                className="w-4 h-4"
                                            />
                                            <span className="ml-3 text-gray-800">{method.label}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Notes */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">
                                    Special instructions (optional)
                                </label>
                                <textarea
                                    value={formData.notes}
                                    onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
                                    placeholder="E.g., 'Call before delivery', 'No onions', etc."
                                    rows="3"
                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-whatsapp-green resize-none"
                                />
                            </div>

                            {/* Order Summary */}
                            <div className="border-t border-gray-200 pt-4">
                                <div className="flex justify-between mb-3">
                                    <span className="text-gray-700">{itemCount} item(s)</span>
                                    <span className="text-whatsapp-green font-bold">{formatCurrency(total)}</span>
                                </div>

                                <button
                                    type="submit"
                                    className="w-full bg-whatsapp-green text-white font-bold py-3 rounded-lg hover:bg-whatsapp-green transition"
                                >
                                    Place Order
                                </button>

                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="w-full mt-2 bg-gray-200 text-gray-800 font-semibold py-2 rounded-lg hover:bg-gray-300 transition"
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ==================== CONFIRMATION MODAL COMPONENT ====================
        function ConfirmationModal({ orderData, onContinueShopping }) {
            const whatsappLink = `https://wa.me/${orderData.seller_phone}?text=Hi, I just placed order %23${orderData.order_number} for R${orderData.total.toFixed(2)} on your store.`;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4">
                    <div className="bg-white rounded-lg max-w-md w-full">
                        <div className="bg-whatsapp-green text-white p-6 text-center rounded-t-lg">
                            <div className="text-4xl mb-3">✓</div>
                            <h2 className="text-2xl font-bold">Order Confirmed!</h2>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Order Number */}
                            <div className="text-center border-b border-gray-200 pb-4">
                                <p className="text-sm text-gray-600 mb-1">Order Number</p>
                                <p className="text-2xl font-bold text-gray-800">{orderData.order_number}</p>
                            </div>

                            {/* Items Summary */}
                            <div>
                                <h3 className="font-semibold text-gray-800 mb-3">Your Order:</h3>
                                <div className="space-y-2">
                                    {orderData.items.map(item => (
                                        <div key={item.id} className="flex justify-between text-sm text-gray-700">
                                            <span>{item.name} × {item.quantity}</span>
                                            <span className="font-semibold">{formatCurrency(item.price * item.quantity)}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Total */}
                            <div className="border-t border-gray-200 pt-4">
                                <div className="flex justify-between items-center">
                                    <span className="text-lg font-semibold text-gray-800">Total:</span>
                                    <span className="text-2xl font-bold text-whatsapp-green">
                                        {formatCurrency(orderData.total)}
                                    </span>
                                </div>
                            </div>

                            {/* WhatsApp Message Button */}
                            <a
                                href={whatsappLink}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="w-full bg-whatsapp-green text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition flex items-center justify-center gap-2"
                            >
                                <span>💬</span>
                                Message {orderData.seller_name} on WhatsApp
                            </a>

                            {/* Continue Shopping Button */}
                            <button
                                onClick={onContinueShopping}
                                className="w-full bg-gray-200 text-gray-800 font-semibold py-2 rounded-lg hover:bg-gray-300 transition"
                            >
                                Continue Shopping
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Store />);
    </script>
</body>
</html>
