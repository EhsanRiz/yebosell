<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Seller OS</title>
    <meta name="description" content="Browse and shop from your favorite local seller">
    <meta property="og:title" content="WhatsApp Seller Store">
    <meta property="og:description" content="Browse products from a local WhatsApp seller">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2325D366'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-weight='bold'>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=4"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#25D366', 600: '#1da851', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .product-image { width: 100%; height: 220px; object-fit: cover; }
        @media (min-width: 768px) { .product-image { height: 260px; } }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .modal-enter { animation: modalIn 0.25s ease-out; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Custom scrollbar for modals */
        .modal-scroll::-webkit-scrollbar { width: 5px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = window.supabaseClient;
        const SUPABASE_URL = window.SUPABASE_URL;
        const SITE_URL = window.SITE_URL;
        const formatCurrency = window.formatCurrency;
        const generateOrderNumber = window.generateOrderNumber;

        // ==================== STORE ====================
        function Store() {
            const [seller, setSeller] = useState(null);
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [showConfirmation, setShowConfirmation] = useState(false);
            const [orderData, setOrderData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({
                name: '', phone: '', delivery_method: 'self_delivery', payment_method: 'eft', notes: ''
            });

            const getSellerSlug = () => new URLSearchParams(window.location.search).get('s');

            useEffect(() => {
                const loadStore = async () => {
                    setLoading(true);
                    const slug = getSellerSlug();
                    if (!slug) { setError('Store not found. Please use a valid seller link.'); setLoading(false); return; }
                    try {
                        const { data: sellerData, error: sellerError } = await supabase
                            .from('sellers').select('*').eq('slug', slug).single();
                        if (sellerError || !sellerData) { setError("This store doesn't exist. Please check the link."); setLoading(false); return; }
                        setSeller(sellerData);
                        document.title = `${sellerData.business_name} | WhatsApp Seller OS`;

                        const { data: productsData } = await supabase
                            .from('products').select('*').eq('seller_id', sellerData.id).eq('is_active', true).order('sort_order', { ascending: true });
                        setProducts(productsData || []);
                    } catch (err) { setError('Something went wrong. Please try again.'); }
                    setLoading(false);
                };
                loadStore();
            }, []);

            const addToCart = (product) => {
                const existing = cart.find(i => i.id === product.id);
                if (existing) { setCart(cart.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i)); }
                else { setCart([...cart, { ...product, quantity: 1 }]); }
            };
            const updateQuantity = (id, qty) => { if (qty <= 0) removeFromCart(id); else setCart(cart.map(i => i.id === id ? { ...i, quantity: qty } : i)); };
            const removeFromCart = (id) => setCart(cart.filter(i => i.id !== id));
            const cartTotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const cartCount = cart.reduce((s, i) => s + i.quantity, 0);

            const submitOrder = async (e) => {
                e.preventDefault();
                if (!formData.name || !formData.phone) { alert('Please fill in name and phone number'); return; }
                if (cart.length === 0) { alert('Cart is empty'); return; }
                try {
                    const orderNumber = generateOrderNumber();
                    const { data: order, error: orderError } = await supabase.from('orders').insert([{
                        seller_id: seller.id, customer_name: formData.name, customer_phone: formData.phone,
                        order_number: orderNumber, status: 'new', delivery_method: formData.delivery_method,
                        payment_method: formData.payment_method, total: cartTotal, notes: formData.notes, source: 'storefront'
                    }]).select().single();
                    if (orderError) { alert('Failed to create order. Please try again.'); return; }

                    await supabase.from('order_items').insert(cart.map(i => ({
                        order_id: order.id, product_id: i.id, product_name: i.name, quantity: i.quantity, unit_price: i.price
                    })));

                    setOrderData({ order_number: orderNumber, total: cartTotal, items: cart, seller_phone: seller.phone, seller_name: seller.business_name });
                    setCart([]); setShowCheckout(false); setShowConfirmation(true);
                } catch (err) { alert('An error occurred. Please try again.'); }
            };

            const handleCheckout = () => { if (cart.length === 0) { alert('Your cart is empty'); return; } setShowCheckout(true); setShowCart(false); };
            const continueShopping = () => { setShowConfirmation(false); setFormData({ name: '', phone: '', delivery_method: 'self_delivery', payment_method: 'eft', notes: '' }); };

            if (loading) return (
                <div className="flex items-center justify-center min-h-screen bg-gray-50">
                    <div className="text-center">
                        <div className="spin border-4 border-gray-200 border-t-brand-500 rounded-full w-10 h-10 mx-auto mb-4" />
                        <p className="text-gray-500 text-sm">Loading store...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="flex items-center justify-center min-h-screen bg-gray-50">
                    <div className="text-center px-6 py-12">
                        <div className="text-5xl mb-4">🛍️</div>
                        <h1 className="text-2xl font-bold text-gray-800 mb-2">Store Not Found</h1>
                        <p className="text-gray-500 mb-6">{error}</p>
                        <a href="/" className="inline-block bg-brand-500 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-brand-600 transition">Back to Home</a>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* ===== STORE HEADER ===== */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center text-white font-bold text-lg shadow-md">
                                    {seller?.business_name?.charAt(0)?.toUpperCase() || 'S'}
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-gray-900 leading-tight">{seller?.business_name}</h1>
                                    {seller?.business_description && <p className="text-xs text-gray-500 line-clamp-1">{seller.business_description}</p>}
                                </div>
                            </div>
                            {seller?.phone && (
                                <a href={`https://wa.me/${seller.phone.replace(/[^0-9]/g, '')}`} target="_blank" rel="noopener"
                                    className="flex items-center gap-1.5 bg-brand-50 text-brand-600 px-3 py-2 rounded-lg text-xs font-semibold hover:bg-brand-100 transition">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    Chat
                                </a>
                            )}
                        </div>
                    </header>

                    {/* ===== PRODUCTS ===== */}
                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {products.length === 0 ? (
                            <div className="text-center py-16">
                                <div className="text-5xl mb-4">📦</div>
                                <p className="text-gray-500 text-lg">No products available yet</p>
                                <p className="text-gray-400 text-sm mt-1">Check back soon!</p>
                            </div>
                        ) : (
                            <>
                                <p className="text-sm text-gray-400 mb-4">{products.length} product{products.length !== 1 ? 's' : ''}</p>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {products.map(product => (
                                        <ProductCard key={product.id} product={product} onAddToCart={addToCart} />
                                    ))}
                                </div>
                            </>
                        )}
                    </main>

                    {/* ===== FLOATING CART BUTTON ===== */}
                    {cartCount > 0 && (
                        <button onClick={() => setShowCart(true)}
                            className="fixed bottom-6 right-6 bg-brand-500 text-white rounded-2xl px-5 py-3.5 shadow-xl hover:bg-brand-600 transition-all flex items-center gap-2.5 z-20 hover:shadow-2xl hover:scale-105">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                            </svg>
                            <span className="font-bold">{cartCount}</span>
                            <span className="text-brand-100 text-sm font-medium hidden sm:inline">· {formatCurrency(cartTotal)}</span>
                        </button>
                    )}

                    {/* ===== CART MODAL (centered popup) ===== */}
                    {showCart && (
                        <div className="fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4 fade-in" onClick={() => setShowCart(false)}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-900">Your Cart</h2>
                                        <p className="text-xs text-gray-400">{cartCount} item{cartCount !== 1 ? 's' : ''}</p>
                                    </div>
                                    <button onClick={() => setShowCart(false)} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto modal-scroll p-4 space-y-3">
                                    {cart.map(item => (
                                        <div key={item.id} className="flex gap-3 bg-gray-50 rounded-xl p-3">
                                            {item.photo_url && <img src={item.photo_url} alt={item.name} className="w-16 h-16 object-cover rounded-lg flex-shrink-0" loading="lazy" />}
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-semibold text-gray-900 text-sm truncate">{item.name}</h4>
                                                <p className="text-brand-600 font-bold text-sm mt-0.5">{formatCurrency(item.price * item.quantity)}</p>
                                                <div className="flex items-center gap-2 mt-2">
                                                    <button onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                        className="w-7 h-7 rounded-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-sm font-bold transition">−</button>
                                                    <span className="w-6 text-center font-semibold text-sm">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                        className="w-7 h-7 rounded-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-sm font-bold transition">+</button>
                                                    <button onClick={() => removeFromCart(item.id)}
                                                        className="ml-auto text-red-500 hover:text-red-700 text-xs font-semibold transition">Remove</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="px-5 py-4 border-t border-gray-100 bg-gray-50 rounded-b-2xl">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-sm font-medium text-gray-600">Subtotal</span>
                                        <span className="text-xl font-bold text-gray-900">{formatCurrency(cartTotal)}</span>
                                    </div>
                                    <button onClick={handleCheckout}
                                        className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition-colors shadow-md">
                                        Proceed to Checkout
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== CHECKOUT MODAL ===== */}
                    {showCheckout && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4 fade-in">
                            <div className="bg-white rounded-2xl max-w-md w-full max-h-[90vh] flex flex-col modal-enter shadow-2xl">
                                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-900">Checkout</h2>
                                        <p className="text-xs text-gray-400">{cartCount} item{cartCount !== 1 ? 's' : ''} · {formatCurrency(cartTotal)}</p>
                                    </div>
                                    <button onClick={() => setShowCheckout(false)} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                                </div>

                                <form onSubmit={submitOrder} className="flex-1 overflow-y-auto modal-scroll p-5 space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Your Name <span className="text-red-500">*</span></label>
                                        <input type="text" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})}
                                            placeholder="Full name" className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">WhatsApp Number <span className="text-red-500">*</span></label>
                                        <input type="tel" required value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})}
                                            placeholder="+27... or +266..." className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Delivery Method</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {[
                                                { value: 'self_delivery', label: 'Deliver to Me', icon: '🚗' },
                                                { value: 'pickup', label: "I'll Pickup", icon: '🏪' },
                                                { value: 'taxi', label: 'Via Taxi', icon: '🚕' },
                                                { value: 'bus', label: 'Via Bus', icon: '🚌' },
                                                { value: 'local_courier', label: 'Local Courier', icon: '📦' }
                                            ].map(m => (
                                                <label key={m.value} className={`flex items-center gap-2 p-2.5 rounded-xl border-2 cursor-pointer transition text-sm ${formData.delivery_method === m.value ? 'border-brand-500 bg-brand-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                                    <input type="radio" name="delivery" value={m.value} checked={formData.delivery_method === m.value}
                                                        onChange={e => setFormData({...formData, delivery_method: e.target.value})} className="hidden"/>
                                                    <span>{m.icon}</span>
                                                    <span className="font-medium text-gray-700">{m.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Payment Method</label>
                                        <div className="space-y-2">
                                            {[
                                                { value: 'eft', label: 'EFT / Bank Transfer', icon: '🏦' },
                                                { value: 'mobile_money', label: 'Mobile Money', icon: '📱' },
                                                { value: 'cash', label: 'Cash on Delivery', icon: '💵' }
                                            ].map(m => (
                                                <label key={m.value} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition ${formData.payment_method === m.value ? 'border-brand-500 bg-brand-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                                    <input type="radio" name="payment" value={m.value} checked={formData.payment_method === m.value}
                                                        onChange={e => setFormData({...formData, payment_method: e.target.value})} className="hidden"/>
                                                    <span>{m.icon}</span>
                                                    <span className="text-sm font-medium text-gray-700">{m.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Special Instructions</label>
                                        <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}
                                            placeholder="Any special requests..." rows="2"
                                            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50 resize-none"/>
                                    </div>
                                    <div className="pt-2 border-t border-gray-100">
                                        <div className="flex justify-between mb-3">
                                            <span className="text-sm text-gray-600">{cartCount} item{cartCount !== 1 ? 's' : ''}</span>
                                            <span className="text-lg font-bold text-gray-900">{formatCurrency(cartTotal)}</span>
                                        </div>
                                        <button type="submit" className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md">
                                            Place Order
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ===== CONFIRMATION MODAL ===== */}
                    {showConfirmation && orderData && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4 fade-in">
                            <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl modal-enter overflow-hidden">
                                <div className="bg-brand-500 text-white p-6 text-center">
                                    <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                    </div>
                                    <h2 className="text-xl font-bold">Order Placed!</h2>
                                    <p className="text-brand-100 text-sm mt-1">We'll notify you on WhatsApp</p>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div className="text-center bg-gray-50 rounded-xl py-3 px-4">
                                        <p className="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Order Number</p>
                                        <p className="text-xl font-bold text-gray-900">{orderData.order_number}</p>
                                    </div>
                                    <div>
                                        {orderData.items.map(item => (
                                            <div key={item.id} className="flex justify-between text-sm py-1.5 border-b border-gray-50 last:border-0">
                                                <span className="text-gray-600">{item.name} × {item.quantity}</span>
                                                <span className="font-semibold text-gray-900">{formatCurrency(item.price * item.quantity)}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between items-center pt-2 border-t border-gray-200">
                                        <span className="font-semibold text-gray-700">Total</span>
                                        <span className="text-2xl font-bold text-brand-600">{formatCurrency(orderData.total)}</span>
                                    </div>
                                    <a href={`https://wa.me/${(orderData.seller_phone || '').replace(/[^0-9]/g, '')}?text=Hi, I just placed order %23${orderData.order_number} for ${formatCurrency(orderData.total)} on your store.`}
                                        target="_blank" rel="noopener"
                                        className="flex items-center justify-center gap-2 w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                        Message {orderData.seller_name} on WhatsApp
                                    </a>
                                    <button onClick={continueShopping}
                                        className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition">
                                        Continue Shopping
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== FOOTER ===== */}
                    <footer className="bg-white border-t border-gray-200 py-8 mt-12">
                        <div className="max-w-5xl mx-auto px-4 text-center">
                            <p className="text-gray-500 text-sm mb-3">
                                Powered by <a href="/" className="text-brand-600 font-semibold hover:underline">WhatsApp Seller OS</a>
                            </p>
                            <div className="flex items-center justify-center mb-2">
                                <svg viewBox="0 0 160 38" width="140" height="33">
                                    <g transform="translate(2,4)">
                                        <polygon points="6,8 12,4 12,16 6,20" fill="#5bb8f0"/>
                                        <polygon points="12,4 18,8 18,20 12,16" fill="#3a8fd4"/>
                                        <polygon points="6,8 12,4 18,8 12,12" fill="#7ecbf5"/>
                                        <polygon points="0,16 6,12 6,24 0,28" fill="#a3c83a"/>
                                        <polygon points="6,12 12,16 12,28 6,24" fill="#7da82e"/>
                                        <polygon points="0,16 6,12 12,16 6,20" fill="#c2de5a"/>
                                        <polygon points="10,16 16,12 16,24 10,28" fill="#c4a882"/>
                                        <polygon points="16,12 22,16 22,28 16,24" fill="#a68c6a"/>
                                        <polygon points="10,16 16,12 22,16 16,20" fill="#dcc4a0"/>
                                    </g>
                                    <text x="30" y="11" fill="#9ca3af" fontSize="7" fontFamily="Inter, sans-serif">Developed by</text>
                                    <text x="30" y="22" fill="#2e8b57" fontSize="9" fontWeight="bold" fontFamily="Inter, sans-serif">4D</text>
                                    <text x="46" y="22" fill="#2e8b57" fontSize="9" fontStyle="italic" fontWeight="600" fontFamily="Inter, sans-serif">Climate Solutions</text>
                                    <text x="30" y="32" fill="#b0b0b0" fontSize="5" fontFamily="Inter, sans-serif">creative · innovative · green · sustainable</text>
                                </svg>
                            </div>
                            <p className="text-gray-300 text-xs">&copy; 2026 All rights reserved</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // ==================== PRODUCT CARD ====================
        function ProductCard({ product, onAddToCart }) {
            const [added, setAdded] = useState(false);
            const handleAdd = () => {
                onAddToCart(product);
                setAdded(true);
                setTimeout(() => setAdded(false), 1200);
            };
            return (
                <div className="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-lg transition-all duration-300 group border border-gray-100">
                    <div className="relative overflow-hidden">
                        {product.photo_url ? (
                            <img src={product.photo_url} alt={product.name} className="product-image bg-gray-100 group-hover:scale-105 transition-transform duration-500" loading="lazy"/>
                        ) : (
                            <div className="product-image bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center">
                                <span className="text-white text-center px-3 font-bold text-base drop-shadow">{product.name}</span>
                            </div>
                        )}
                    </div>
                    <div className="p-3.5">
                        <h3 className="font-semibold text-gray-900 text-sm leading-snug line-clamp-2 mb-1">{product.name}</h3>
                        {product.description && <p className="text-xs text-gray-400 line-clamp-2 mb-2">{product.description}</p>}
                        <div className="flex items-center justify-between mt-auto">
                            <span className="text-lg font-bold text-brand-600">{formatCurrency(product.price)}</span>
                            <button onClick={handleAdd}
                                className={`px-3.5 py-2 rounded-xl text-sm font-bold transition-all ${added ? 'bg-brand-600 text-white scale-95' : 'bg-brand-50 text-brand-600 hover:bg-brand-500 hover:text-white'}`}>
                                {added ? '✓ Added' : 'Add'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Store />);
    </script>
</body>
</html>
