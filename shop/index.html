        // ==================== PRODUCT CARD ====================
        function ProductCard({ product, onClick, rating, reviewCount, isWishlisted, onToggleWishlist, isNew, isOOS }) {
            const photos = Array.isArray(product.photos) && product.photos.length > 0
                ? product.photos : (product.photo_url ? [product.photo_url] : []);
            const variants = Array.isArray(product.variants) ? product.variants.filter(v => v.color || v.size) : [];
            const hasVariants = variants.length > 0;
            const prices = variants.map(v => parseFloat(v.price) || product.price);
            const minPrice = hasVariants ? Math.min(...prices) : product.price;
            const maxPrice = hasVariants ? Math.max(...prices) : product.price;

            return (
                <div onClick={() => onClick(product)}
                     className={`product-card bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 cursor-pointer relative group ${isOOS ? 'opacity-75' : ''}`}>
                    <div className="relative overflow-hidden">
                        {photos.length > 0 ? (
                            <img src={photos[0]} alt={product.name} className={`product-image bg-gray-100 transition-transform duration-500 ${isOOS ? 'grayscale' : 'group-hover:scale-105'}`} loading="lazy" />
                        ) : (
                            <div className={`product-image flex items-center justify-center ${isOOS ? 'bg-gray-400' : 'bg-gradient-to-br from-brand-400 to-brand-600'}`}>
                                <span className="text-white text-center px-3 font-bold text-base drop-shadow">{product.name}</span>
                            </div>
                        )}
                        {/* NEW badge */}
                        {isNew && !isOOS && <span className="new-badge">New</span>}
                        {/* Out of stock overlay */}
                        {isOOS && <div className="oos-overlay"><span className="oos-label">Sold Out</span></div>}
                        {/* Wishlist heart */}
                        <button onClick={onToggleWishlist}
                            className="absolute top-2 left-2 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center shadow-md hover:bg-white transition z-[1]">
                            <HeartIcon filled={isWishlisted} />
                        </button>
                        {photos.length > 1 && (
                            <span className="absolute top-2 right-2 bg-black/50 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-md backdrop-blur-sm">
                                {photos.length} photos
                            </span>
                        )}
                        {hasVariants && (
                            <div className="absolute bottom-2 left-2 flex gap-1">
                                {[...new Set(variants.map(v => v.color).filter(Boolean))].slice(0, 5).map(c => (
                                    <span key={c} className="w-4 h-4 rounded-full border border-white/70 shadow-sm" style={{ backgroundColor: getColorHex(c) }} title={c}></span>
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="p-3.5">
                        <h3 className="font-semibold text-gray-900 text-sm leading-snug line-clamp-2 mb-1">{product.name}</h3>
                        {rating > 0 && <div className="mb-1"><StarRating rating={rating} size={12} count={reviewCount} /></div>}
                        {product.description && <p className="text-xs text-gray-400 line-clamp-1 mb-2">{product.description}</p>}
                        <div className="flex items-center justify-between">
                            {hasVariants && minPrice !== maxPrice ? (
                                <span className={`text-sm font-bold ${isOOS ? 'text-gray-400 line-through' : 'text-brand-600'}`}>From {formatCurrency(minPrice)}</span>
                            ) : (
                                <span className={`text-lg font-bold ${isOOS ? 'text-gray-400 line-through' : 'text-brand-600'}`}>{formatCurrency(hasVariants ? minPrice : product.price)}</span>
                            )}
                            <span className={`text-xs font-semibold px-2.5 py-1 rounded-lg transition-colors ${isOOS ? 'text-gray-400 bg-gray-100' : 'text-brand-500 bg-brand-50 group-hover:bg-brand-500 group-hover:text-white'}`}>{isOOS ? 'Sold Out' : 'View'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== PRODUCT DETAIL MODAL ====================
        function ProductDetailModal({ product, onAddToCart, onClose, cart, reviews, avgRating, sellerId, onReviewAdded, isWishlisted, onToggleWishlist, isDemo }) {
            const [activePhoto, setActivePhoto] = useState(0);
            const [selectedColor, setSelectedColor] = useState('');
            const [selectedSize, setSelectedSize] = useState('');
            const [qty, setQty] = useState(1);
            const [added, setAdded] = useState(false);
            const [showReviewForm, setShowReviewForm] = useState(false);
            const [reviewRating, setReviewRating] = useState(5);
            const [reviewText, setReviewText] = useState('');
            const [reviewName, setReviewName] = useState('');
            const [submittingReview, setSubmittingReview] = useState(false);

            const photos = Array.isArray(product.photos) && product.photos.length > 0
                ? product.photos : (product.photo_url ? [product.photo_url] : []);
            const variants = Array.isArray(product.variants) ? product.variants.filter(v => v.color || v.size) : [];
            const hasVariants = variants.length > 0;
            const colors = [...new Set(variants.map(v => v.color).filter(Boolean))];
            const sizes = [...new Set(variants.map(v => v.size).filter(Boolean))];

            const availableSizes = selectedColor
                ? [...new Set(variants.filter(v => v.color === selectedColor).map(v => v.size).filter(Boolean))]
                : sizes;
            const availableColors = selectedSize
                ? [...new Set(variants.filter(v => v.size === selectedSize).map(v => v.color).filter(Boolean))]
                : colors;

            const matchedVariant = variants.find(v =>
                (!colors.length || v.color === selectedColor) &&
                (!sizes.length || v.size === selectedSize)
            );
            const displayPrice = hasVariants && matchedVariant && matchedVariant.price
                ? parseFloat(matchedVariant.price) : product.price;
            // Before a variant is chosen, show the cheapest variant price ("From M…") to match
            // the product card — not the base price, which can mislead.
            const variantPrices = variants.map(v => parseFloat(v.price) || product.price);
            const minVariantPrice = hasVariants && variantPrices.length ? Math.min(...variantPrices) : product.price;
            const needsSelection = hasVariants && ((colors.length > 0 && !selectedColor) || (sizes.length > 0 && !selectedSize));

            const getStock = () => {
                if (hasVariants && matchedVariant) return parseInt(matchedVariant.stock) || 0;
                if (hasVariants && !matchedVariant) return null;
                return product.stock !== null && product.stock !== undefined ? parseInt(product.stock) : null;
            };
            const stock = getStock();
            const cartKey = hasVariants ? `${product.id}-${selectedColor}-${selectedSize}` : `${product.id}`;
            const inCart = (cart || []).find(i => (i.cartKey || `${i.id}`) === cartKey);
            const alreadyInCart = inCart ? inCart.quantity : 0;
            const maxQty = stock !== null ? Math.max(0, stock - alreadyInCart) : 99;
            const isOutOfStock = stock !== null && stock <= 0;
            const canAdd = !isOutOfStock && qty > 0 && qty <= maxQty;

            useEffect(() => { setQty(1); }, [selectedColor, selectedSize]);

            const getVariantStock = (color, size) => {
                const v = variants.find(x => x.color === color && x.size === size);
                return v ? (parseInt(v.stock) || 0) : 0;
            };

            const handleAdd = () => {
                if (hasVariants && colors.length > 0 && !selectedColor) { window.toast('Please select a color'); return; }
                if (hasVariants && sizes.length > 0 && !selectedSize) { window.toast('Please select a size'); return; }
                if (!canAdd) { window.toast(isOutOfStock ? 'This item is out of stock' : 'Not enough stock available'); return; }
                for (let n = 0; n < qty; n++) {
                    onAddToCart({
                        ...product,
                        price: displayPrice,
                        cartKey,
                        selectedColor,
                        selectedSize,
                        variantStock: stock,
                    });
                }
                setAdded(true);
                setTimeout(() => { setAdded(false); onClose(); }, 800);
            };

            const submitReview = async () => {
                if (!reviewName.trim()) { window.toast('Please enter your name'); return; }
                if (!reviewText.trim()) { window.toast('Please write a review'); return; }
                setSubmittingReview(true);
                try {
                    const { data, error } = await supabase.from('product_reviews').insert([{
                        product_id: product.id,
                        seller_id: sellerId,
                        reviewer_name: reviewName.trim(),
                        reviewer_phone: '',
                        rating: reviewRating,
                        review_text: reviewText.trim(),
                    }]).select().single();
                    if (error) throw error;
                    onReviewAdded(data);
                    setShowReviewForm(false);
                    setReviewText('');
                    setReviewRating(5);
                } catch (err) {
                    window.toast('Failed to submit review. Please try again.');
                }
                setSubmittingReview(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[55] flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-enter relative modal-scroll" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose}
                            className="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-white/90 shadow-lg flex items-center justify-center text-gray-600 hover:bg-white transition">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>

                        {/* Wishlist button */}
                        <button onClick={(e) => { e.stopPropagation(); onToggleWishlist(); }}
                            className="absolute top-3 left-3 z-10 w-8 h-8 rounded-full bg-white/90 shadow-lg flex items-center justify-center hover:bg-white transition">
                            <HeartIcon filled={isWishlisted} />
                        </button>

                        {/* Photo gallery */}
                        <div className="relative">
                            {photos.length > 0 ? (
                                <img src={photos[activePhoto]} alt={product.name} className="w-full h-64 sm:h-80 object-contain bg-gray-50 rounded-t-2xl" />
                            ) : (
                                <div className="w-full h-64 bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center rounded-t-2xl">
                                    <span className="text-white font-bold text-xl drop-shadow">{product.name}</span>
                                </div>
                            )}
                            {photos.length > 1 && (
                                <>
                                    <button onClick={() => setActivePhoto((activePhoto - 1 + photos.length) % photos.length)}
                                        className="absolute left-2 top-1/2 -translate-y-1/2 bg-white/90 w-8 h-8 rounded-full flex items-center justify-center shadow hover:bg-white transition">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                                    </button>
                                    <button onClick={() => setActivePhoto((activePhoto + 1) % photos.length)}
                                        className="absolute right-2 top-1/2 -translate-y-1/2 bg-white/90 w-8 h-8 rounded-full flex items-center justify-center shadow hover:bg-white transition">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                                    </button>
                                </>
                            )}
                            {isOutOfStock && (
                                <div className="absolute inset-0 bg-black/30 flex items-center justify-center rounded-t-2xl">
                                    <span className="bg-red-600 text-white font-bold px-4 py-2 rounded-xl text-sm shadow-lg">Out of Stock</span>
                                </div>
                            )}
                        </div>

                        {/* Thumbnail strip */}
                        {photos.length > 1 && (
                            <div className="flex gap-2 px-5 py-3 bg-gray-50 border-b border-gray-100">
                                {photos.map((url, i) => (
                                    <button key={i} onClick={() => setActivePhoto(i)}
                                        className="w-12 h-12 rounded-lg overflow-hidden border-2 transition-all flex-shrink-0"
                                        style={{ borderColor: i === activePhoto ? '#25D366' : '#e5e7eb' }}>
                                        <img src={url} alt="" className="w-full h-full object-cover" />
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Product info */}
                        <div className="p-5 space-y-4">
                            <div>
                                <h2 className="text-xl font-bold text-gray-900">{product.name}</h2>
                                {avgRating > 0 && <div className="mt-1"><StarRating rating={avgRating} count={reviews.length} /></div>}
                                {product.description && <p className="text-sm text-gray-500 mt-1">{product.description}</p>}
                            </div>

                            {/* Color selector */}
                            {colors.length > 0 && (
                                <div>
                                    <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">
                                        Color{selectedColor ? <span className="text-brand-600 normal-case font-bold ml-1">— {selectedColor}</span> : ''}
                                    </p>
                                    <div className="flex flex-wrap gap-2">
                                        {colors.map(c => {
                                            const available = !selectedSize || availableColors.includes(c);
                                            const colorVariants = variants.filter(v => v.color === c);
                                            const colorStock = colorVariants.reduce((s, v) => s + (parseInt(v.stock) || 0), 0);
                                            const colorOos = colorStock <= 0;
                                            const hex = getColorHex(c);
                                            const isLight = hex === '#fff' || hex === '#eab308' || hex === '#d4c5a9';
                                            return (
                                                <button key={c} onClick={() => setSelectedColor(selectedColor === c ? '' : c)}
                                                    disabled={!available || colorOos}
                                                    className={`relative w-9 h-9 rounded-full border-2 transition-all ${(!available || colorOos) ? 'opacity-25 cursor-not-allowed' : 'hover:scale-110 cursor-pointer'}`}
                                                    style={{
                                                        backgroundColor: hex,
                                                        borderColor: selectedColor === c ? '#25D366' : (isLight ? '#d1d5db' : hex),
                                                        boxShadow: selectedColor === c ? '0 0 0 3px rgba(37,211,102,0.3)' : 'inset 0 0 0 0 transparent'
                                                    }}
                                                    title={colorOos ? `${c} — Out of stock` : c}>
                                                    {selectedColor === c && (
                                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={isLight ? '#333' : '#fff'} strokeWidth="3" className="absolute inset-0 m-auto">
                                                            <polyline points="20 6 9 17 4 12"/>
                                                        </svg>
                                                    )}
                                                    {colorOos && (
                                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" className="absolute inset-0 m-auto">
                                                            <line x1="4" y1="4" x2="20" y2="20"/>
                                                        </svg>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* Size selector */}
                            {sizes.length > 0 && (
                                <div>
                                    <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Size</p>
                                    <div className="flex flex-wrap gap-2">
                                        {sizes.map(s => {
                                            const available = !selectedColor || availableSizes.includes(s);
                                            const sizeStock = selectedColor ? getVariantStock(selectedColor, s) : variants.filter(v => v.size === s).reduce((sum, v) => sum + (parseInt(v.stock) || 0), 0);
                                            const sizeOos = sizeStock <= 0;
                                            return (
                                                <button key={s} onClick={() => setSelectedSize(selectedSize === s ? '' : s)}
                                                    disabled={!available || sizeOos}
                                                    className={`px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all ${
                                                        selectedSize === s
                                                            ? 'bg-brand-500 text-white border-brand-500 shadow-md'
                                                            : (!available || sizeOos)
                                                                ? 'bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed line-through'
                                                                : 'bg-white text-gray-700 border-gray-200 hover:border-brand-400 hover:bg-brand-50'
                                                    }`}>
                                                    {s}
                                                    {available && !sizeOos && sizeStock <= 3 && (
                                                        <span className="block text-[9px] text-amber-600 font-normal mt-0.5">Only {sizeStock} left</span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* Stock indicator */}
                            {stock !== null && !isOutOfStock && (
                                <p className="text-xs text-gray-500">
                                    {stock <= 5
                                        ? <span className="text-amber-600 font-semibold">Only {stock} left in stock!</span>
                                        : <span className="text-green-600">{stock} available</span>
                                    }
                                    {alreadyInCart > 0 && <span className="text-gray-400 ml-1">({alreadyInCart} in your cart)</span>}
                                </p>
                            )}

                            {/* Price + Qty + Add */}
                            <div className="pt-3 border-t border-gray-100 space-y-3">
                                <div className="flex items-center justify-between">
                                    <span className="text-2xl font-bold text-brand-600">{needsSelection ? `From ${formatCurrency(minVariantPrice)}` : formatCurrency(displayPrice)}</span>
                                    {!isDemo && <div className="flex items-center gap-3">
                                        <span className="text-xs font-semibold text-gray-500 uppercase">Qty</span>
                                        <div className="flex items-center border border-gray-200 rounded-xl overflow-hidden">
                                            <button onClick={() => setQty(Math.max(1, qty - 1))}
                                                className="w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition font-bold text-lg">−</button>
                                            <span className="w-10 text-center font-bold text-sm">{qty}</span>
                                            <button onClick={() => setQty(Math.min(maxQty, qty + 1))}
                                                disabled={qty >= maxQty}
                                                className="w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition font-bold text-lg disabled:opacity-30">+</button>
                                        </div>
                                    </div>}
                                </div>
                                {isDemo ? (
                                    <a href="/dashboard/" className="w-full font-bold py-3 rounded-xl transition-all shadow-md text-white bg-amber-500 hover:bg-amber-600 text-center block">
                                        <span style={{display:'inline-flex',alignItems:'center',gap:'6px',justifyContent:'center'}}><StoreIcon /> This is a demo — Open your own free store →</span>
                                    </a>
                                ) : (
                                    <button onClick={handleAdd} disabled={!canAdd || needsSelection}
                                        className={`w-full font-bold py-3 rounded-xl transition-all shadow-md text-white ${
                                            added ? 'bg-green-500' : (canAdd && !needsSelection) ? 'bg-brand-500 hover:bg-brand-600' : 'bg-gray-300 cursor-not-allowed'
                                        }`}>
                                        {added ? '✓ Added to Cart!' : isOutOfStock ? 'Out of Stock' : needsSelection ? (colors.length > 0 && !selectedColor ? 'Select a color' : 'Select a size') : `Add to Cart · ${formatCurrency(displayPrice * qty)}`}
                                    </button>
                                )}
                            </div>

                            {/* Reviews section */}
                            <div className="pt-4 border-t border-gray-100">
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="font-bold text-gray-900">Reviews ({reviews.length})</h3>
                                    <button onClick={() => setShowReviewForm(!showReviewForm)}
                                        className="text-xs font-semibold text-brand-600 hover:underline">
                                        {showReviewForm ? 'Cancel' : 'Write a Review'}
                                    </button>
                                </div>

                                {showReviewForm && (
                                    <div className="bg-gray-50 rounded-xl p-4 mb-4 space-y-3 slide-up">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-600 mb-1">Your Name</label>
                                            <input type="text" value={reviewName} onChange={e => setReviewName(e.target.value)}
                                                placeholder="Enter your name" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-600 mb-1">Rating</label>
                                            <StarInput value={reviewRating} onChange={setReviewRating} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-600 mb-1">Your Review</label>
                                            <textarea value={reviewText} onChange={e => setReviewText(e.target.value)}
                                                placeholder="Share your experience..." rows="3"
                                                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                                        </div>
                                        <button onClick={submitReview} disabled={submittingReview}
                                            className="bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2 rounded-lg text-sm transition disabled:opacity-50">
                                            {submittingReview ? 'Submitting...' : 'Submit Review'}
                                        </button>
                                    </div>
                                )}

                                {reviews.length === 0 ? (
                                    <p className="text-sm text-gray-400 text-center py-4">No reviews yet. Be the first!</p>
                                ) : (
                                    <div className="space-y-3 max-h-60 overflow-y-auto modal-scroll">
                                        {reviews.slice(0, 10).map(r => (
                                            <div key={r.id} className="border-b border-gray-50 pb-3 last:border-0">
                                                <div className="flex items-center justify-between mb-1">
                                                    <span className="font-semibold text-sm text-gray-800">{r.reviewer_name}</span>
                                                    <span className="text-[10px] text-gray-400">{new Date(r.created_at).toLocaleDateString()}</span>
                                                </div>
                                                <StarRating rating={r.rating} size={12} />
                                                {r.review_text && <p className="text-sm text-gray-600 mt-1">{r.review_text}</p>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== MY ORDERS MODAL ====================
        function MyOrdersModal({ sellerId, onClose, products, onBuyAgain, sellerSlug }) {
            const [step, setStep] = useState('phone'); // phone → otp → orders
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [sendingHistory, setSendingHistory] = useState(false);
            const [historySent, setHistorySent] = useState(false);

            const normalizePhone = window.normalizePhone;

            const requestOtp = async () => {
                if (!phone.trim()) { setError('Please enter your phone number'); return; }
                setLoading(true); setError('');
                const normalized = normalizePhone(phone);
                try {
                    // Send the code by SMS (server-side via BulkSMS; no WhatsApp API)
                    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ phone: normalized }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) { setError(data.error || 'Failed to send code. Please try again.'); setLoading(false); return; }
                    setStep('otp');
                } catch (err) { setError('Failed to send code. Please try again.'); }
                setLoading(false);
            };

            const verifyOtp = async () => {
                if (!otp.trim()) { setError('Please enter the code'); return; }
                setLoading(true); setError('');
                const normalized = normalizePhone(phone);
                try {
                    // Verify the SMS code server-side (marks it used) and get this buyer's orders+items
                    const { data: verified, error: vErr } = await supabase.rpc('get_orders_by_otp', { p_phone: normalized, p_otp: otp.trim() });
                    if (vErr || !verified || !verified.length) { setError('Invalid or expired code. Please try again.'); setLoading(false); return; }

                    // Keep only this shop's orders; map RPC shape -> the shape the UI expects
                    const ordersData = (verified || [])
                        .filter(o => o.seller_id === sellerId)
                        .map(o => ({
                            order_number: o.order_number, created_at: o.created_at, status: o.status,
                            payment_status: o.payment_status, delivery_status: o.delivery_status,
                            total: o.total, track_token: o.token,
                            order_items: (o.items || []).map(it => ({ product_name: it.product_name, product_id: it.product_id, quantity: it.quantity, unit_price: it.unit_price }))
                        }));

                    setOrders(ordersData);
                    setStep('orders');
                } catch (err) { setError('Verification failed. Please try again.'); }
                setLoading(false);
            };

            const sendOrderHistoryToWhatsApp = async () => {
                setSendingHistory(true);
                const normalized = normalizePhone(phone);
                try {
                    // Build a summary of all orders
                    let lines = [];
                    lines.push('🛍️ *Your Order History*');
                    lines.push('━━━━━━━━━━━━━━━');
                    let grandTotal = 0;
                    orders.forEach((order, idx) => {
                        const date = new Date(order.created_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
                        const statusLabel = window.getStatusLabel(order.status);
                        lines.push('');
                        lines.push(`📦 *Order ${order.order_number}*`);
                        lines.push(`📅 ${date} — ${statusLabel}`);
                        if (order.order_items) {
                            order.order_items.forEach(item => {
                                lines.push(`  • ${item.product_name} ×${item.quantity} — ${formatCurrency(item.unit_price * item.quantity)}`);
                            });
                        }
                        lines.push(`💰 Total: *${formatCurrency(order.total)}*`);
                        grandTotal += Number(order.total) || 0;
                    });
                    lines.push('');
                    lines.push('━━━━━━━━━━━━━━━');
                    lines.push(`📊 *${orders.length} order${orders.length !== 1 ? 's' : ''}* — Grand Total: *${formatCurrency(grandTotal)}*`);
                    lines.push('');
                    lines.push('_Sent from YeboSell_');

                    const message = lines.join('\n');

                    await fetch(`${SUPABASE_URL}/functions/v1/whatsapp-notify`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ type: 'order_history', phone: normalized, message: message }),
                    });
                    setHistorySent(true);
                    setTimeout(() => setHistorySent(false), 5000);
                } catch (err) {
                    window.toast('Failed to send order history. Please try again.');
                }
                setSendingHistory(false);
            };

            const statusTimeline = ['new', 'confirmed', 'preparing', 'dispatched', 'delivered'];
            const getStatusIndex = (status) => statusTimeline.indexOf(status);

            return (
                <div className="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                            <h2 className="text-lg font-bold text-gray-900">My Orders</h2>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                        </div>

                        <div className="flex-1 overflow-y-auto modal-scroll p-5">
                            {step === 'phone' && (
                                <div className="space-y-4 slide-up">
                                    <p className="text-sm text-gray-500">Enter your phone number to view your orders. We'll text you a verification code.</p>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Phone Number</label>
                                        <input type="tel" value={phone} onChange={e => setPhone(window.formatLocalPhone(e.target.value))}
                                            placeholder="e.g. 5772 7054" className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50"
                                            onKeyDown={e => e.key === 'Enter' && requestOtp()} />
                                    </div>
                                    {error && <p className="text-red-500 text-xs">{error}</p>}
                                    <button onClick={requestOtp} disabled={loading}
                                        className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition disabled:opacity-50">
                                        {loading ? 'Sending...' : 'Text me a code'}
                                    </button>
                                </div>
                            )}

                            {step === 'otp' && (
                                <div className="space-y-4 slide-up">
                                    <p className="text-sm text-gray-500">We sent a 6-digit code by SMS. Enter it below.</p>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Verification Code</label>
                                        <input type="text" value={otp} onChange={e => setOtp(e.target.value)}
                                            placeholder="123456" maxLength={6}
                                            className="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-2xl font-bold tracking-[0.3em] focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50"
                                            onKeyDown={e => e.key === 'Enter' && verifyOtp()} />
                                    </div>
                                    {error && <p className="text-red-500 text-xs">{error}</p>}
                                    <button onClick={verifyOtp} disabled={loading}
                                        className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition disabled:opacity-50">
                                        {loading ? 'Verifying...' : 'Verify & View Orders'}
                                    </button>
                                    <button onClick={() => { setStep('phone'); setOtp(''); setError(''); }}
                                        className="w-full text-gray-500 text-sm font-medium hover:text-gray-700">
                                        Back
                                    </button>
                                </div>
                            )}

                            {step === 'orders' && (
                                <div className="slide-up">
                                    {orders.length === 0 ? (
                                        <div className="text-center py-8">
                                            <div className="flex justify-center mb-3"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05"/><path d="M12 22.08V12"/></svg></div>
                                            <p className="text-gray-500">No orders found for this number.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {/* Send to WhatsApp button */}
                                            <button onClick={sendOrderHistoryToWhatsApp} disabled={sendingHistory}
                                                className={`w-full flex items-center justify-center gap-2 font-semibold py-3 rounded-xl transition-all shadow-sm ${
                                                    historySent
                                                        ? 'bg-green-500 text-white'
                                                        : 'bg-brand-500 hover:bg-brand-600 text-white'
                                                } disabled:opacity-50`}>
                                                <WhatsAppIcon size={18} />
                                                {historySent ? 'Sent to your WhatsApp!' : sendingHistory ? 'Sending...' : 'Send Order History to My WhatsApp'}
                                            </button>

                                            {orders.map(order => (
                                                <div key={order.id} className="bg-gray-50 rounded-xl p-4 space-y-3">
                                                    <div className="flex items-center justify-between">
                                                        <div>
                                                            <p className="font-bold text-gray-900 text-sm">{order.order_number}</p>
                                                            <p className="text-[11px] text-gray-400">{new Date(order.created_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
                                                        </div>
                                                        <span className="text-sm font-bold" style={{ color: window.getStatusColor(order.status) }}>
                                                            {window.getStatusLabel(order.status)}
                                                        </span>
                                                    </div>
                                                    {/* Status timeline */}
                                                    {order.status !== 'cancelled' && (
                                                        <div className="flex items-center gap-1">
                                                            {statusTimeline.map((s, i) => (
                                                                <React.Fragment key={s}>
                                                                    <div className={`w-3 h-3 rounded-full flex-shrink-0 ${i <= getStatusIndex(order.status) ? 'bg-brand-500' : 'bg-gray-200'}`} title={window.getStatusLabel(s)} />
                                                                    {i < statusTimeline.length - 1 && (
                                                                        <div className={`flex-1 h-0.5 ${i < getStatusIndex(order.status) ? 'bg-brand-500' : 'bg-gray-200'}`} />
                                                                    )}
                                                                </React.Fragment>
                                                            ))}
                                                        </div>
                                                    )}
                                                    {/* Items */}
                                                    {order.order_items && order.order_items.map(item => (
                                                        <div key={item.id} className="flex justify-between text-xs text-gray-600">
                                                            <span>{item.product_name} × {item.quantity}</span>
                                                            <span className="font-semibold">{formatCurrency(item.unit_price * item.quantity)}</span>
                                                        </div>
                                                    ))}
                                                    <div className="flex justify-between pt-2 border-t border-gray-200">
                                                        <span className="text-xs font-medium text-gray-500">Total</span>
                                                        <span className="font-bold text-brand-600">{formatCurrency(order.total)}</span>
                                                    </div>
                                                    {/* Buy Again + Track */}
                                                    <div className="flex gap-2 pt-2">
                                                        {order.order_items && order.status !== 'cancelled' && (
                                                            <button onClick={() => onBuyAgain(order.order_items)}
                                                                className="flex-1 bg-brand-50 hover:bg-brand-100 text-brand-700 font-semibold text-xs py-2 rounded-lg transition flex items-center justify-center gap-1">
                                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                                                Buy Again
                                                            </button>
                                                        )}
                                                        <a href={`${SITE_URL}/shop/?s=${sellerSlug}&track=${order.order_number}`}
                                                            target="_blank" rel="noopener"
                                                            className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold text-xs py-2 rounded-lg transition flex items-center justify-center gap-1">
                                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                                            Track
                                                        </a>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== ORDER TRACKING MODAL ====================
        function OrderTrackingModal({ order, seller, onClose }) {
            const [refreshing, setRefreshing] = useState(false);
            const [currentOrder, setCurrentOrder] = useState(order);
            const statusTimeline = ['new', 'confirmed', 'preparing', 'dispatched', 'delivered'];
            const statusIcons = {
                new: (<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>),
                confirmed: (<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>),
                preparing: (<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>),
                dispatched: (<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>),
                delivered: (<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 16l2 2 4-4"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg>),
            };
            const statusDescriptions = { new: 'Your order has been received', confirmed: 'The seller has confirmed your order', preparing: 'Your order is being prepared', dispatched: 'Your order is on its way', delivered: 'Your order has been delivered' };
            const getStatusIndex = (s) => statusTimeline.indexOf(s);
            const currentIdx = getStatusIndex(currentOrder.status);

            const refreshStatus = async () => {
                setRefreshing(true);
                const { data } = await supabase.from('orders').select('*, order_items(*)').eq('id', currentOrder.id).single();
                if (data) setCurrentOrder(data);
                setRefreshing(false);
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                            <div>
                                <h2 className="text-lg font-bold text-gray-900">Order Tracking</h2>
                                <p className="text-xs text-gray-400">{currentOrder.order_number}</p>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                        </div>

                        <div className="flex-1 overflow-y-auto modal-scroll p-5 space-y-5">
                            {/* Status header */}
                            <div className="text-center">
                                <div className="flex justify-center mb-2" style={{ color: window.getStatusColor(currentOrder.status) }}>{currentOrder.status === 'cancelled' ? (
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                                ) : (statusIcons[currentOrder.status] || statusIcons.new)}</div>
                                <h3 className="text-xl font-bold" style={{ color: window.getStatusColor(currentOrder.status) }}>
                                    {window.getStatusLabel(currentOrder.status)}
                                </h3>
                                <p className="text-sm text-gray-500 mt-1">
                                    {currentOrder.status === 'cancelled' ? 'This order was cancelled' : (statusDescriptions[currentOrder.status] || '')}
                                </p>
                            </div>

                            {/* Timeline */}
                            {currentOrder.status !== 'cancelled' && (
                                <div className="space-y-0">
                                    {statusTimeline.map((s, i) => {
                                        const reached = i <= currentIdx;
                                        const isCurrent = i === currentIdx;
                                        return (
                                            <div key={s} className="flex items-start gap-3">
                                                <div className="flex flex-col items-center">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${reached ? 'bg-brand-500 text-white' : 'bg-gray-100 text-gray-400'} ${isCurrent ? 'ring-4 ring-brand-100' : ''}`}>
                                                        {reached ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg> : <span className="text-xs font-bold">{i + 1}</span>}
                                                    </div>
                                                    {i < statusTimeline.length - 1 && <div className={`w-0.5 h-8 ${i < currentIdx ? 'bg-brand-500' : 'bg-gray-200'}`} />}
                                                </div>
                                                <div className="pt-1">
                                                    <p className={`text-sm font-semibold ${reached ? 'text-gray-900' : 'text-gray-400'}`}>{window.getStatusLabel(s)}</p>
                                                    {isCurrent && <p className="text-xs text-gray-500 mt-0.5">{statusDescriptions[s]}</p>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {/* Order details */}
                            <div className="bg-gray-50 rounded-xl p-4 space-y-2">
                                <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Order Details</p>
                                <p className="text-xs text-gray-500">Placed {new Date(currentOrder.created_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                                {currentOrder.order_items && currentOrder.order_items.map(item => (
                                    <div key={item.id} className="flex justify-between text-sm py-1 border-b border-gray-100 last:border-0">
                                        <span className="text-gray-700">{item.product_name} × {item.quantity}</span>
                                        <span className="font-semibold text-gray-900">{formatCurrency(item.unit_price * item.quantity)}</span>
                                    </div>
                                ))}
                                <div className="flex justify-between pt-2 border-t border-gray-200">
                                    <span className="font-semibold text-gray-700">Total</span>
                                    <span className="text-lg font-bold text-brand-600">{formatCurrency(currentOrder.total)}</span>
                                </div>
                            </div>

                            {/* Refresh + WhatsApp */}
                            <button onClick={refreshStatus} disabled={refreshing}
                                className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition flex items-center justify-center gap-2 disabled:opacity-50">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={refreshing ? 'spin' : ''}><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                {refreshing ? 'Refreshing...' : 'Refresh Status'}
                            </button>
                            {seller?.phone && (
                                <a href={`https://wa.me/${window.waNumber(seller.phone)}?text=Hi, I'd like an update on my order ${currentOrder.order_number}`}
                                    target="_blank" rel="noopener"
                                    className="flex items-center justify-center gap-2 w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md">
                                    <WhatsAppIcon size={18} /> Ask About This Order
                                </a>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== STORE INFO MODAL ====================
        function StoreInfoModal({ seller, onClose }) {
            const hours = seller?.business_hours || {};
            const areas = seller?.delivery_areas || [];
            const bank = seller?.bank_details || {};
            const social = seller?.social_links || {};
            const dayNames = ['mon','tue','wed','thu','fri','sat','sun'];
            const dayLabels = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday', sat:'Saturday', sun:'Sunday' };

            return (
                <div className="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                            <h2 className="text-lg font-bold text-gray-900">Store Info</h2>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                        </div>

                        <div className="flex-1 overflow-y-auto modal-scroll p-5 space-y-5">
                            {/* Logo + Name */}
                            <div className="text-center">
                                <div className="w-16 h-16 rounded-2xl bg-brand-100 flex items-center justify-center mx-auto mb-2 overflow-hidden">
                                    {seller?.logo_url
                                        ? <img src={seller.logo_url} alt="" className="w-full h-full object-cover" />
                                        : <span className="text-brand-600 text-2xl font-bold">{seller?.business_name?.charAt(0)}</span>
                                    }
                                </div>
                                <h3 className="font-bold text-gray-900 text-lg">{seller?.business_name}</h3>
                                {seller?.business_description && <p className="text-sm text-gray-500 mt-1">{seller.business_description}</p>}
                            </div>

                            {/* Address */}
                            {(seller?.address || seller?.location) && (
                                <div>
                                    <h4 className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 flex items-center gap-1"><MapPinIcon /> Address</h4>
                                    <p className="text-sm text-gray-700">{seller.address || seller.location}</p>
                                </div>
                            )}

                            {/* Business Hours */}
                            {Object.keys(hours).length > 0 && (
                                <div>
                                    <h4 className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 flex items-center gap-1"><ClockIcon /> Business Hours</h4>
                                    <div className="space-y-1">
                                        {dayNames.map(d => (
                                            <div key={d} className="flex justify-between text-sm">
                                                <span className="text-gray-500">{dayLabels[d]}</span>
                                                <span className="text-gray-800 font-medium">{hours[d] || 'Closed'}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Delivery Areas */}
                            {areas.length > 0 && (
                                <div>
                                    <h4 className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 flex items-center gap-1"><TruckIcon /> Delivery Areas</h4>
                                    <div className="flex flex-wrap gap-2">
                                        {areas.map((a, i) => (
                                            <span key={i} className="bg-brand-50 text-brand-700 text-xs font-medium px-3 py-1 rounded-full">{a}</span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Payment Methods */}
                            <div>
                                <h4 className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Payment Methods</h4>
                                <div className="flex flex-wrap gap-2">
                                    <span className="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs font-medium px-3 py-1.5 rounded-lg"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="21" x2="21" y2="21"/><path d="M4 21V10l8-5 8 5v11"/><line x1="9" y1="21" x2="9" y2="13"/><line x1="15" y1="21" x2="15" y2="13"/></svg>EFT</span>
                                    <span className="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs font-medium px-3 py-1.5 rounded-lg"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>Mobile Money</span>
                                    <span className="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs font-medium px-3 py-1.5 rounded-lg"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01"/><path d="M18 12h.01"/></svg>Cash</span>
                                </div>
                            </div>

                            {/* Bank Details */}
                            {bank.bank_name && (
                                <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-800 space-y-1">
                                    <p className="font-bold text-blue-900">Bank Details for EFT:</p>
                                    {bank.bank_name && <p>Bank: {bank.bank_name}</p>}
                                    {bank.account_holder && <p>Account Holder: {bank.account_holder}</p>}
                                    {bank.account_number && <p>Account No: {bank.account_number}</p>}
                                    {bank.branch_code && <p>Branch Code: {bank.branch_code}</p>}
                                    {bank.reference && <p>Reference: {bank.reference}</p>}
                                </div>
                            )}

                            {/* WhatsApp chat */}
                            {seller?.phone && (
                                <a href={`https://wa.me/${window.waNumber(seller.phone)}`} target="_blank" rel="noopener"
                                    className="flex items-center justify-center gap-2 w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md">
                                    <WhatsAppIcon size={18} /> Chat on WhatsApp
                                </a>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== RENDER ====================
        ReactDOM.createRoot(document.getElementById('root')).render(<Store />);
    </script>
</body>
</html>
