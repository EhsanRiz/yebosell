<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeboSell</title>
    <meta name="description" content="Browse and shop from your favorite local seller">
    <meta property="og:title" content="YeboSell Store">
    <meta property="og:description" content="Browse products from a local WhatsApp seller">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="/assets/favicon.png">

    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=10"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#15803d', 600: '#166534', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        h1, h2, h3, h4 { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; letter-spacing: -0.01em; }

        .hero-gradient {
            background: linear-gradient(135deg, #14532d 0%, #166534 45%, #15803d 100%);
        }
        .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.18); }
        .product-card { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        .product-image { width: 100%; height: 220px; object-fit: cover; }
        @media (min-width: 768px) { .product-image { height: 260px; } }

        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .modal-enter { animation: modalIn 0.25s ease-out; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .badge-cart {
            position: absolute; top: -6px; right: -6px;
            background: #ef4444; color: white; font-size: 10px; font-weight: 700;
            width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .modal-scroll::-webkit-scrollbar { width: 5px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        .category-pill { scroll-snap-align: start; }
        .category-bar { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .category-bar::-webkit-scrollbar { display: none; }

        .new-badge { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 1; }
        .oos-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; }
        .oos-label { background: #374151; color: white; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 8px; }
        .sort-select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const supabase = window.supabaseClient;
        const SUPABASE_URL = window.SUPABASE_URL;
        const SITE_URL = window.SITE_URL;
        const formatCurrency = window.formatCurrency;
        const generateOrderNumber = window.generateOrderNumber;

        // ==================== ICONS ====================
        const HeartIcon = ({ filled }) => filled
            ? <svg width="18" height="18" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;

        const CartIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>;

        const SearchIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;

        const ClockIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

        const MapPinIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;

        const TruckIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>;

        const StoreIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M9 20v-6h6v6"/></svg>;

        const WhatsAppIcon = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>;

        // ==================== STAR RATING ====================
        const StarRating = ({ rating, size = 14, count }) => (
            <div className="flex items-center gap-1">
                {[1,2,3,4,5].map(i => (
                    <svg key={i} width={size} height={size} viewBox="0 0 24 24"
                        fill={i <= Math.round(rating) ? '#f59e0b' : '#e5e7eb'}
                        stroke={i <= Math.round(rating) ? '#f59e0b' : '#e5e7eb'} strokeWidth="1">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                ))}
                {count !== undefined && <span className="text-xs text-gray-400 ml-1">({count})</span>}
            </div>
        );

        const StarInput = ({ value, onChange }) => (
            <div className="flex gap-1">
                {[1,2,3,4,5].map(i => (
                    <button key={i} type="button" onClick={() => onChange(i)}
                        className="focus:outline-none transition-transform hover:scale-110">
                        <svg width="24" height="24" viewBox="0 0 24 24"
                            fill={i <= value ? '#f59e0b' : '#e5e7eb'}
                            stroke={i <= value ? '#f59e0b' : '#d1d5db'} strokeWidth="1.5">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </button>
                ))}
            </div>
        );

        // ==================== COLOR HELPER ====================
        const colorMap = {
            black:'#111',white:'#fff',red:'#ef4444',blue:'#3b82f6',green:'#22c55e',navy:'#1e3a5f',
            grey:'#9ca3af',gray:'#9ca3af',brown:'#92400e',pink:'#ec4899',yellow:'#eab308',
            orange:'#f97316',purple:'#a855f7',beige:'#d4c5a9',maroon:'#7f1d1d',teal:'#14b8a6'
        };
        const getColorHex = (name) => colorMap[(name || '').toLowerCase()] || '#d1d5db';

        // ==================== STORE ====================
        function Store() {
            const [seller, setSeller] = useState(null);
            const [products, setProducts] = useState([]);
            const [reviews, setReviews] = useState([]);
            const [cart, setCart] = useState([]);
            const [wishlist, setWishlist] = useState([]);
            const [search, setSearch] = useState('');
            const [sortBy, setSortBy] = useState('default');
            const [activeCategory, setActiveCategory] = useState('All');
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [showConfirmation, setShowConfirmation] = useState(false);
            const [showMyOrders, setShowMyOrders] = useState(false);
            const [showStoreInfo, setShowStoreInfo] = useState(false);
            const [orderData, setOrderData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isDemo, setIsDemo] = useState(false);
            const [formData, setFormData] = useState({
                name: '', phone: '', delivery_method: '', payment_method: 'eft', notes: '', delivery_address: ''
            });
            const [lightbox, setLightbox] = useState({ open: false, photos: [], index: 0 });
            const openLightbox = (photos, index) => setLightbox({ open: true, photos, index });
            const closeLightbox = () => setLightbox({ open: false, photos: [], index: 0 });
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [submittingOrder, setSubmittingOrder] = useState(false);
            const [showTrackOrder, setShowTrackOrder] = useState(false);
            const [trackingOrder, setTrackingOrder] = useState(null);
            const [discountCode, setDiscountCode] = useState('');
            const [discountApplied, setDiscountApplied] = useState(null);
            const [discountError, setDiscountError] = useState('');
            const [applyingDiscount, setApplyingDiscount] = useState(false);

            const getSellerSlug = () => new URLSearchParams(window.location.search).get('s');
            const getTrackParam = () => new URLSearchParams(window.location.search).get('track');

            // Load wishlist + saved buyer info from localStorage
            useEffect(() => {
                try {
                    const slug = getSellerSlug();
                    const saved = JSON.parse(localStorage.getItem(`wishlist_${slug}`) || '[]');
                    setWishlist(saved);
                    // Pre-fill buyer name/phone from last order
                    const buyerInfo = JSON.parse(localStorage.getItem(`buyer_${slug}`) || 'null');
                    if (buyerInfo) {
                        setFormData(prev => ({ ...prev, name: buyerInfo.name || '', phone: buyerInfo.phone || '' }));
                    }
                } catch(e) {}
            }, []);

            const toggleWishlist = (productId) => {
                setWishlist(prev => {
                    const next = prev.includes(productId) ? prev.filter(id => id !== productId) : [...prev, productId];
                    try { localStorage.setItem(`wishlist_${getSellerSlug()}`, JSON.stringify(next)); } catch(e) {}
                    return next;
                });
            };

            useEffect(() => {
                const loadStore = async () => {
                    setLoading(true);
                    const slug = getSellerSlug();
                    if (!slug) { setError('Store not found. Please use a valid seller link.'); setLoading(false); return; }
                    try {
                        const { data: sellerData, error: sellerError } = await supabase
                            .from('sellers').select('id, full_name, phone, business_name, location, preferred_language, is_active, created_at, updated_at, slug, business_description, banner_url, logo_url, business_hours, delivery_areas, social_links, address, seller_phone, is_admin, seller_status, delivery_methods, delivery_fee, delivery_fee_type, pickup_address, delivery_notes, is_demo').eq('slug', slug).single();
                        if (sellerError || !sellerData) { setError("This store doesn't exist. Please check the link."); setLoading(false); return; }
                        if (sellerData.seller_status === 'suspended') { setError("This store is temporarily unavailable. Please check back later."); setLoading(false); return; }
                        setSeller(sellerData);
                        if (sellerData.is_demo) setIsDemo(true);
                        // Set default delivery method from seller's enabled methods
                        const methods = sellerData.delivery_methods || ['pickup'];
                        if (methods.length > 0) {
                            setFormData(prev => ({ ...prev, delivery_method: prev.delivery_method || methods[0] }));
                        }
                        document.title = `${sellerData.business_name} | YeboSell`;

                        const { data: productsData } = await supabase
                            .from('products').select('*').eq('seller_id', sellerData.id).eq('is_active', true).order('sort_order', { ascending: true });
                        setProducts(productsData || []);

                        // Load reviews
                        const productIds = (productsData || []).map(p => p.id);
                        if (productIds.length > 0) {
                            const { data: reviewsData } = await supabase
                                .from('product_reviews').select('*').in('product_id', productIds).order('created_at', { ascending: false });
                            setReviews(reviewsData || []);
                        }
                    } catch (err) { setError('Something went wrong. Please try again.'); }
                    setLoading(false);
                };
                loadStore();
            }, []);

            // Check for order tracking link
            useEffect(() => {
                const trackNum = getTrackParam();
                if (trackNum && seller) {
                    (async () => {
                        const { data } = await supabase.from('orders')
                            .select('*, order_items(*)')
                            .eq('seller_id', seller.id)
                            .eq('order_number', trackNum)
                            .single();
                        if (data) { setTrackingOrder(data); setShowTrackOrder(true); }
                    })();
                }
            }, [seller]);

            // Categories derived from products
            const categories = useMemo(() => {
                const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
                return ['All', ...cats.sort()];
            }, [products]);

            // Helper: is product "new" (added in last 7 days)
            const isNewArrival = (product) => {
                if (!product.created_at) return false;
                const daysOld = (Date.now() - new Date(product.created_at).getTime()) / (1000 * 60 * 60 * 24);
                return daysOld <= 7;
            };

            // Helper: is product out of stock (check variants OR stock field)
            const isProductOOS = (product) => {
                const variants = Array.isArray(product.variants) ? product.variants.filter(v => v.color || v.size) : [];
                if (variants.length > 0) {
                    return variants.every(v => (parseInt(v.stock) || 0) <= 0);
                }
                return product.stock !== null && product.stock !== undefined && parseInt(product.stock) <= 0;
            };

            // Filtered + sorted products
            const filteredProducts = useMemo(() => {
                let result = products.filter(p => {
                    const matchCategory = activeCategory === 'All' || p.category === activeCategory;
                    const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || (p.description || '').toLowerCase().includes(search.toLowerCase());
                    return matchCategory && matchSearch;
                });
                // Sort — out-of-stock always goes to the bottom
                result.sort((a, b) => {
                    const aOOS = isProductOOS(a) ? 1 : 0;
                    const bOOS = isProductOOS(b) ? 1 : 0;
                    if (aOOS !== bOOS) return aOOS - bOOS;
                    if (sortBy === 'price_low') return (a.price || 0) - (b.price || 0);
                    if (sortBy === 'price_high') return (b.price || 0) - (a.price || 0);
                    if (sortBy === 'newest') return new Date(b.created_at || 0) - new Date(a.created_at || 0);
                    if (sortBy === 'rating') return (getProductRating(b.id) || 0) - (getProductRating(a.id) || 0);
                    return 0; // default = sort_order from DB
                });
                return result;
            }, [products, activeCategory, search, sortBy]);

            // Review helpers
            const getProductReviews = (productId) => reviews.filter(r => r.product_id === productId);
            const getProductRating = (productId) => {
                const pReviews = getProductReviews(productId);
                if (pReviews.length === 0) return 0;
                return pReviews.reduce((s, r) => s + r.rating, 0) / pReviews.length;
            };

            const addToCart = (product) => {
                if (isDemo) return; // Demo stores are browse-only
                const key = product.cartKey || `${product.id}`;
                const maxStock = product.variantStock !== null && product.variantStock !== undefined ? product.variantStock : 999;
                setCart(prev => {
                    const existing = prev.find(i => (i.cartKey || `${i.id}`) === key);
                    if (existing) {
                        if (existing.quantity >= maxStock) return prev;
                        return prev.map(i => (i.cartKey || `${i.id}`) === key ? { ...i, quantity: i.quantity + 1 } : i);
                    }
                    return [...prev, { ...product, cartKey: key, quantity: 1 }];
                });
            };
            const updateQuantity = (key, qty) => {
                if (qty <= 0) { removeFromCart(key); return; }
                setCart(prev => prev.map(i => {
                    if ((i.cartKey || `${i.id}`) !== key) return i;
                    const maxStock = i.variantStock !== null && i.variantStock !== undefined ? i.variantStock : 999;
                    return { ...i, quantity: Math.min(qty, maxStock) };
                }));
            };
            const removeFromCart = (key) => setCart(prev => prev.filter(i => (i.cartKey || `${i.id}`) !== key));
            const cartTotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const cartCount = cart.reduce((s, i) => s + i.quantity, 0);

            // Discount calculations
            const discountAmount = discountApplied
                ? (discountApplied.type === 'percentage'
                    ? Math.min(cartTotal, cartTotal * discountApplied.value / 100)
                    : Math.min(cartTotal, discountApplied.value))
                : 0;
            const subtotalAfterDiscount = Math.max(0, cartTotal - discountAmount);

            // Delivery fee calculation
            const sellerDeliveryMethods = seller?.delivery_methods || ['pickup'];
            const needsDelivery = formData.delivery_method && formData.delivery_method !== 'pickup';
            const computedDeliveryFee = (() => {
                if (!needsDelivery || !seller) return 0;
                const fee = Number(seller.delivery_fee || 0);
                if (seller.delivery_fee_type === 'free_above' && subtotalAfterDiscount >= fee) return 0;
                return fee;
            })();
            const finalTotal = subtotalAfterDiscount + computedDeliveryFee;

            const applyDiscount = async () => {
                if (!discountCode.trim()) return;
                setApplyingDiscount(true);
                setDiscountError('');
                try {
                    const { data, error } = await supabase
                        .from('discount_codes')
                        .select('*')
                        .eq('seller_id', seller.id)
                        .eq('is_active', true)
                        .ilike('code', discountCode.trim())
                        .single();
                    if (error || !data) { setDiscountError('Invalid discount code'); setDiscountApplied(null); setApplyingDiscount(false); return; }
                    if (data.expires_at && new Date(data.expires_at) < new Date()) { setDiscountError('This code has expired'); setDiscountApplied(null); setApplyingDiscount(false); return; }
                    if (data.max_uses && data.used_count >= data.max_uses) { setDiscountError('This code has reached its usage limit'); setDiscountApplied(null); setApplyingDiscount(false); return; }
                    if (data.min_order > 0 && cartTotal < data.min_order) { setDiscountError(`Minimum order of M${parseFloat(data.min_order).toFixed(2)} required`); setDiscountApplied(null); setApplyingDiscount(false); return; }
                    setDiscountApplied(data);
                    setDiscountError('');
                } catch (err) { setDiscountError('Could not validate code'); }
                setApplyingDiscount(false);
            };

            const removeDiscount = () => { setDiscountApplied(null); setDiscountCode(''); setDiscountError(''); };

            const submitOrder = async (e) => {
                e.preventDefault();
                if (submittingOrder) return; // Prevent double-click
                if (!formData.name || !formData.phone) { window.toast('Please fill in name and phone number'); return; }
                if (!formData.delivery_method) { window.toast('Please select a delivery method'); return; }
                if ((formData.delivery_method === 'self_delivery' || formData.delivery_method === 'courier') && !formData.delivery_address.trim()) { window.toast('Please enter a delivery address'); return; }
                if (cart.length === 0) { window.toast('Cart is empty'); return; }
                setSubmittingOrder(true);
                try {
                    const orderItems = cart.map(i => {
                        const variantLabel = [i.selectedColor, i.selectedSize].filter(Boolean).join(' / ');
                        return {
                            product_id: i.id,
                            product_name: variantLabel ? `${i.name} (${variantLabel})` : i.name,
                            quantity: i.quantity, unit_price: i.price,
                            // Variant selection so the RPC can decrement the right variant's stock.
                            variant_color: i.selectedColor || null,
                            variant_size: i.selectedSize || null
                        };
                    });
                    const { data: result, error: orderError } = await supabase.rpc('create_storefront_order', {
                        p_seller_id: seller.id,
                        p_customer_name: formData.name,
                        p_customer_phone: formData.phone,
                        p_delivery_method: formData.delivery_method,
                        p_delivery_address: formData.delivery_address || '',
                        p_delivery_fee: computedDeliveryFee,
                        p_payment_method: formData.payment_method,
                        p_total: finalTotal,
                        p_notes: formData.notes,
                        p_discount_code: discountApplied ? discountApplied.code : null,
                        p_discount_amount: discountAmount,
                        p_items: orderItems
                    });
                    if (orderError || !result || result.error) { window.toast('Failed to create order. Please try again.'); setSubmittingOrder(false); return; }
                    const orderNumber = result.order_number;
                    const trackToken = result.track_token;

                    // Order + items + platform fee + inventory decrement + discount usage are all
                    // handled atomically, server-side, by create_storefront_order (SECURITY DEFINER).
                    // The storefront no longer writes to products/discount_codes directly.

                    // Tokenized tracking link (source of truth; no WhatsApp API needed)
                    const trackUrl = `${SITE_URL}/track/?t=${trackToken}`;
                    // Persist to the buyer's device so all their orders live in one place (the YeboSell app)
                    try {
                        const list = JSON.parse(localStorage.getItem('yebosell_orders') || '[]');
                        const entry = { token: trackToken, order_number: orderNumber, seller_name: seller.business_name, seller_slug: getSellerSlug(), created_at: new Date().toISOString() };
                        const next = [entry, ...list.filter(o => o && o.token !== trackToken)];
                        localStorage.setItem('yebosell_orders', JSON.stringify(next.slice(0, 100)));
                    } catch (e) {}
                    setOrderData({ order_number: orderNumber, total: finalTotal, items: cart, seller_phone: seller.phone, seller_name: seller.business_name, track_url: trackUrl, discount_code: discountApplied?.code, discount_amount: discountAmount, delivery_method: formData.delivery_method, delivery_fee: computedDeliveryFee, pickup_address: seller.pickup_address });
                    // Save buyer info for next time
                    try { localStorage.setItem(`buyer_${getSellerSlug()}`, JSON.stringify({ name: formData.name, phone: formData.phone })); } catch(e) {}
                    setCart([]); setShowCheckout(false); setShowConfirmation(true);
                    setSubmittingOrder(false); setDiscountApplied(null); setDiscountCode(''); setDiscountError('');
                } catch (err) { setSubmittingOrder(false); window.toast('An error occurred. Please try again.'); }
            };

            const handleCheckout = () => { if (cart.length === 0) { window.toast('Your cart is empty'); return; } setShowCheckout(true); setShowCart(false); };
            const continueShopping = () => {
                setShowConfirmation(false);
                // Keep name/phone pre-filled from saved buyer info
                const saved = (() => { try { return JSON.parse(localStorage.getItem(`buyer_${getSellerSlug()}`) || 'null'); } catch(e) { return null; } })();
                setFormData({ name: saved?.name || '', phone: saved?.phone || '', delivery_method: '', payment_method: 'eft', notes: '', delivery_address: '' });
            };

            if (loading) return (
                <div className="flex items-center justify-center min-h-screen bg-gray-50">
                    <div className="text-center">
                        <div className="spin border-4 border-gray-200 border-t-brand-500 rounded-full w-10 h-10 mx-auto mb-4" />
                        <p className="text-gray-500 text-sm">Loading store...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="flex items-center justify-center min-h-screen bg-gray-50">
                    <div className="text-center px-6 py-12">
                        <div className="flex justify-center mb-4"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M9 20v-6h6v6"/></svg></div>
                        <h1 className="text-2xl font-bold text-gray-800 mb-2">Store Not Found</h1>
                        <p className="text-gray-500 mb-6">{error}</p>
                        <a href="/" className="inline-block bg-brand-500 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-brand-600 transition">Back to Home</a>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* ===== LIGHTBOX ===== */}
                    {lightbox.open && (
                        <div className="fixed inset-0 bg-black/85 z-[60] flex items-center justify-center p-4" onClick={closeLightbox}>
                            <div className="relative max-w-2xl w-full" onClick={(e) => e.stopPropagation()}>
                                <img src={lightbox.photos[lightbox.index]} alt="Product"
                                     className="w-full max-h-[80vh] object-contain rounded-xl" />
                                {lightbox.photos.length > 1 && (
                                    <>
                                        <button onClick={() => setLightbox(prev => ({ ...prev, index: (prev.index - 1 + prev.photos.length) % prev.photos.length }))}
                                            className="absolute left-2 top-1/2 -translate-y-1/2 bg-white/90 w-9 h-9 rounded-full flex items-center justify-center shadow-lg hover:bg-white transition">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                                        </button>
                                        <button onClick={() => setLightbox(prev => ({ ...prev, index: (prev.index + 1) % prev.photos.length }))}
                                            className="absolute right-2 top-1/2 -translate-y-1/2 bg-white/90 w-9 h-9 rounded-full flex items-center justify-center shadow-lg hover:bg-white transition">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                                        </button>
                                        <div className="flex justify-center gap-2 mt-3">
                                            {lightbox.photos.map((url, i) => (
                                                <button key={i} onClick={() => setLightbox(prev => ({ ...prev, index: i }))}
                                                    className="w-12 h-12 rounded-lg overflow-hidden border-2 transition-all"
                                                    style={{ borderColor: i === lightbox.index ? '#25D366' : 'rgba(255,255,255,0.4)' }}>
                                                    <img src={url} alt="" className="w-full h-full object-cover" />
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                <button onClick={closeLightbox}
                                    className="absolute -top-3 -right-3 bg-white text-gray-700 w-8 h-8 rounded-full shadow-lg flex items-center justify-center hover:bg-gray-100 transition">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ===== PRODUCT DETAIL MODAL ===== */}
                    {selectedProduct && (
                        <ProductDetailModal
                            product={selectedProduct}
                            onAddToCart={addToCart}
                            onClose={() => setSelectedProduct(null)}
                            cart={cart}
                            reviews={getProductReviews(selectedProduct.id)}
                            avgRating={getProductRating(selectedProduct.id)}
                            sellerId={seller.id}
                            onReviewAdded={(r) => setReviews(prev => [r, ...prev])}
                            isWishlisted={wishlist.includes(selectedProduct.id)}
                            onToggleWishlist={() => toggleWishlist(selectedProduct.id)}
                            isDemo={isDemo}
                        />
                    )}

                    {/* ===== MY ORDERS MODAL ===== */}
                    {showMyOrders && (
                        <MyOrdersModal sellerId={seller.id} onClose={() => setShowMyOrders(false)}
                            products={products} onBuyAgain={(items) => {
                                // Add all items from a past order back to cart
                                items.forEach(item => {
                                    const product = products.find(p => p.name === item.product_name || p.id === item.product_id);
                                    if (product) { for (let i = 0; i < item.quantity; i++) addToCart(product); }
                                });
                                setShowMyOrders(false);
                                setShowCart(true);
                            }}
                            sellerSlug={getSellerSlug()}
                        />
                    )}

                    {/* ===== STORE INFO MODAL ===== */}
                    {showStoreInfo && (
                        <StoreInfoModal seller={seller} onClose={() => setShowStoreInfo(false)} />
                    )}

                    {/* ===== ORDER TRACKING MODAL ===== */}
                    {showTrackOrder && trackingOrder && (
                        <OrderTrackingModal order={trackingOrder} seller={seller} onClose={() => { setShowTrackOrder(false); window.history.replaceState({}, '', `${window.location.pathname}?s=${getSellerSlug()}`); }} />
                    )}

                    {/* ===== DEMO STORE BANNER ===== */}
                    {isDemo && (
                        <div style={{background:'linear-gradient(90deg,#fef3c7,#fde68a)',padding:'10px 16px',textAlign:'center',fontSize:'13px',fontWeight:600,color:'#92400e',borderBottom:'1px solid #f59e0b'}}>
                            <span style={{display:'inline-flex',alignItems:'center',gap:'6px'}}><StoreIcon /> This is a demo store — browse products to see how a YeboSell store looks!</span>
                            <a href="/dashboard/" style={{marginLeft:'8px',color:'#166534',textDecoration:'underline',fontWeight:700}}>Open your own free store →</a>
                        </div>
                    )}

                    {/* ===== HERO HEADER ===== */}
                    <header className="hero-gradient relative overflow-hidden">
                        {seller?.banner_url && (
                            <div className="absolute inset-0">
                                <img src={seller.banner_url} alt="" className="w-full h-full object-cover opacity-20" />
                            </div>
                        )}
                        <div className="relative max-w-5xl mx-auto px-4 py-8 sm:py-12">
                            <div className="flex flex-col sm:flex-row items-center sm:items-start gap-4">
                                {/* Logo / Initial */}
                                <div className="w-20 h-20 rounded-2xl bg-white/20 backdrop-blur-sm border-2 border-white/30 flex items-center justify-center overflow-hidden shadow-lg flex-shrink-0">
                                    {seller?.logo_url
                                        ? <img src={seller.logo_url} alt={seller.business_name} className="w-full h-full object-cover" />
                                        : <span className="text-white text-3xl font-bold">{seller?.business_name?.charAt(0)?.toUpperCase() || 'S'}</span>
                                    }
                                </div>
                                <div className="text-center sm:text-left flex-1">
                                    <h1 className="text-2xl sm:text-3xl font-bold text-white mb-1">{seller?.business_name}</h1>
                                    {seller?.business_description && <p className="text-white/70 text-sm max-w-md">{seller.business_description}</p>}
                                    {seller?.location && (
                                        <p className="text-white/60 text-xs mt-1 flex items-center gap-1 justify-center sm:justify-start">
                                            <MapPinIcon /> {seller.location}
                                        </p>
                                    )}
                                    {/* Action buttons */}
                                    <div className="flex flex-wrap gap-2 mt-3 justify-center sm:justify-start">
                                        {seller?.phone && (
                                            <a href={`https://wa.me/${window.waNumber(seller.phone)}`} target="_blank" rel="noopener"
                                                className="glass text-white px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-1.5 hover:bg-white/20 transition">
                                                <WhatsAppIcon size={14} /> Chat with Us
                                            </a>
                                        )}
                                        <button onClick={() => setShowStoreInfo(true)}
                                            className="glass text-white px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-1.5 hover:bg-white/20 transition">
                                            <ClockIcon /> Store Info
                                        </button>
                                        <button onClick={() => setShowMyOrders(true)}
                                            className="glass text-white px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-1.5 hover:bg-white/20 transition">
                                            <TruckIcon /> My Orders
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* ===== SEARCH + SORT + CATEGORY BAR ===== */}
                    <div className="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 py-3">
                            <div className="flex gap-2 mb-2">
                                <div className="relative flex-1">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><SearchIcon /></span>
                                    <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                                        placeholder="Search products..."
                                        className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
                                    {search && (
                                        <button onClick={() => setSearch('')}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-sm font-bold">✕</button>
                                    )}
                                </div>
                                <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                                    className="sort-select bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-medium text-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent min-w-[110px]">
                                    <option value="default">Sort by</option>
                                    <option value="price_low">Price: Low → High</option>
                                    <option value="price_high">Price: High → Low</option>
                                    <option value="newest">Newest First</option>
                                    <option value="rating">Top Rated</option>
                                </select>
                            </div>
                            {categories.length > 2 && (
                                <div className="flex gap-2 overflow-x-auto category-bar pb-1">
                                    {categories.map(cat => (
                                        <button key={cat} onClick={() => setActiveCategory(cat)}
                                            className={`category-pill whitespace-nowrap px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all ${
                                                activeCategory === cat
                                                    ? 'bg-brand-500 text-white shadow-md'
                                                    : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                            }`}>
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ===== PRODUCTS ===== */}
                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {filteredProducts.length === 0 ? (
                            <div className="text-center py-16">
                                <div className="flex justify-center mb-4">{search || activeCategory !== 'All' ? (
                                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                ) : (
                                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05"/><path d="M12 22.08V12"/></svg>
                                )}</div>
                                <p className="text-gray-500 text-lg">{search ? 'No products match your search' : 'No products available yet'}</p>
                                <p className="text-gray-400 text-sm mt-1">{search ? 'Try a different keyword' : 'Check back soon!'}</p>
                                {(search || activeCategory !== 'All') && (
                                    <button onClick={() => { setSearch(''); setActiveCategory('All'); }}
                                        className="mt-4 text-brand-600 text-sm font-semibold hover:underline">Clear filters</button>
                                )}
                            </div>
                        ) : (
                            <>
                                <p className="text-sm text-gray-400 mb-4">{filteredProducts.length} product{filteredProducts.length !== 1 ? 's' : ''}{activeCategory !== 'All' ? ` in ${activeCategory}` : ''}</p>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {filteredProducts.map(product => (
                                        <ProductCard
                                            key={product.id}
                                            product={product}
                                            onClick={setSelectedProduct}
                                            rating={getProductRating(product.id)}
                                            reviewCount={getProductReviews(product.id).length}
                                            isWishlisted={wishlist.includes(product.id)}
                                            onToggleWishlist={(e) => { e.stopPropagation(); toggleWishlist(product.id); }}
                                            isNew={isNewArrival(product)}
                                            isOOS={isProductOOS(product)}
                                        />
                                    ))}
                                </div>
                            </>
                        )}
                    </main>

                    {/* ===== FLOATING CART BUTTON ===== */}
                    {cartCount > 0 && (
                        <button onClick={() => setShowCart(true)}
                            className="fixed bottom-6 right-6 bg-brand-500 text-white rounded-2xl px-5 py-3.5 shadow-xl hover:bg-brand-600 transition-all flex items-center gap-2.5 z-20 hover:shadow-2xl hover:scale-105">
                            <div className="relative">
                                <CartIcon />
                                <span className="badge-cart">{cartCount}</span>
                            </div>
                            <span className="font-bold ml-1">{formatCurrency(cartTotal)}</span>
                        </button>
                    )}

                    {/* ===== CART MODAL ===== */}
                    {showCart && (
                        <div className="fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4 fade-in" onClick={() => setShowCart(false)}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-900">Your Cart</h2>
                                        <p className="text-xs text-gray-400">{cartCount} item{cartCount !== 1 ? 's' : ''}</p>
                                    </div>
                                    <button onClick={() => setShowCart(false)} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto modal-scroll p-4 space-y-3">
                                    {cart.map(item => {
                                        const key = item.cartKey || `${item.id}`;
                                        const coverImg = (Array.isArray(item.photos) && item.photos[0]) || item.photo_url;
                                        const maxStock = item.variantStock !== null && item.variantStock !== undefined ? item.variantStock : 999;
                                        return (
                                            <div key={key} className="bg-gray-50 rounded-xl p-3">
                                                <div className="flex gap-3">
                                                    {coverImg && <img src={coverImg} alt={item.name} className="w-16 h-16 object-cover rounded-lg flex-shrink-0" loading="lazy" />}
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="font-semibold text-gray-900 text-sm truncate">{item.name}</h4>
                                                        {(item.selectedColor || item.selectedSize) && (
                                                            <p className="text-xs text-gray-500 mt-0.5">
                                                                {[item.selectedColor, item.selectedSize].filter(Boolean).join(' / ')}
                                                            </p>
                                                        )}
                                                        <p className="text-xs text-gray-400 mt-0.5">{formatCurrency(item.price)} each</p>
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <p className="text-brand-600 font-bold text-sm">{formatCurrency(item.price * item.quantity)}</p>
                                                        <button onClick={() => removeFromCart(key)}
                                                            className="text-red-400 hover:text-red-600 text-[11px] font-medium mt-1 transition">Remove</button>
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-end gap-0 mt-2">
                                                    <button onClick={() => updateQuantity(key, item.quantity - 1)}
                                                        className="w-10 h-10 rounded-l-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-base font-bold transition">−</button>
                                                    <span className="w-12 h-10 border-t border-b border-gray-200 bg-white flex items-center justify-center font-bold text-sm">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(key, item.quantity + 1)}
                                                        disabled={item.quantity >= maxStock}
                                                        className="w-10 h-10 rounded-r-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-base font-bold transition disabled:opacity-30 disabled:cursor-not-allowed">+</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="px-5 py-4 border-t border-gray-100 bg-gray-50 rounded-b-2xl">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-sm font-medium text-gray-600">Subtotal</span>
                                        <span className="text-xl font-bold text-gray-900">{formatCurrency(cartTotal)}</span>
                                    </div>
                                    <button onClick={handleCheckout}
                                        className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition-colors shadow-md">
                                        Proceed to Checkout
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== CHECKOUT MODAL ===== */}
                    {showCheckout && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4 fade-in">
                            <div className="bg-white rounded-2xl max-w-md w-full max-h-[90vh] flex flex-col modal-enter shadow-2xl">
                                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-900">Checkout</h2>
                                        <p className="text-xs text-gray-400">{cartCount} item{cartCount !== 1 ? 's' : ''} · {formatCurrency(cartTotal)}</p>
                                    </div>
                                    <button onClick={() => setShowCheckout(false)} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition">✕</button>
                                </div>

                                <form onSubmit={submitOrder} className="flex-1 overflow-y-auto modal-scroll p-5 space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Your Name <span className="text-red-500">*</span></label>
                                        <input type="text" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})}
                                            placeholder="Full name" className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">WhatsApp Number <span className="text-red-500">*</span></label>
                                        <input type="tel" required value={formData.phone} onChange={e => setFormData({...formData, phone: window.formatLocalPhone(e.target.value)})}
                                            placeholder="e.g. 5772 7054" className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-gray-50"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Delivery Method <span className="text-red-500">*</span></label>
                                        <div className="space-y-2">
                                            {[
                                                { value: 'pickup', label: "I'll Pickup", icon: '🏪', desc: 'Collect from seller', fee: 'Free' },
                                                { value: 'self_delivery', label: 'Seller Delivery', icon: '🚗', desc: 'Delivered to your address', fee: seller?.delivery_fee > 0 ? (seller?.delivery_fee_type === 'free_above' ? `M${Number(seller.delivery_fee).toFixed(0)} (free above M${Number(seller.delivery_fee).toFixed(0)})` : `M${Number(seller.delivery_fee).toFixed(2)}`) : 'Free' },
                                                { value: 'courier', label: 'Courier / Third Party', icon: '📦', desc: 'Via courier service', fee: seller?.delivery_fee > 0 ? `M${Number(seller.delivery_fee).toFixed(2)}` : 'Free' }
                                            ].filter(m => sellerDeliveryMethods.includes(m.value)).map(m => (
                                                <label key={m.value} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition ${formData.delivery_method === m.value ? 'border-brand-500 bg-brand-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                                    <input type="radio" name="delivery" value={m.value} checked={formData.delivery_method === m.value}
