        };

        // ============================================================================
        // ORDERS SCREEN
        // ============================================================================

        const OrdersScreen = ({ seller }) => {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [formData, setFormData] = useState({
                customer_name: '',
                customer_phone: '',
                items: [{ product_name: '', quantity: 1, price: '' }],
                total: ''
            });

            useEffect(() => {
                loadOrders();
            }, [seller.id]);

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);
                } catch (err) {
                    console.error('Load orders error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const createManualOrder = async () => {
                if (!formData.customer_name || !formData.customer_phone || !formData.total) {
                    alert('Please fill in required fields');
                    return;
                }

                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .insert({
                            seller_id: seller.id,
                            order_number: generateOrderNumber(),
                            customer_name: formData.customer_name,
                            customer_phone: formData.customer_phone,
                            total: parseFloat(formData.total),
                            status: 'new',
                            payment_status: 'pending',
                            delivery_status: 'pending',
                            source: 'manual'
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    for (const item of formData.items) {
                        if (item.product_name) {
                            await supabase.from('order_items').insert({
                                order_id: data.id,
                                product_name: item.product_name,
                                quantity: parseInt(item.quantity),
                                price: parseFloat(item.price)
                            });
                        }
                    }

                    setShowForm(false);
                    setFormData({
                        customer_name: '',
                        customer_phone: '',
                        items: [{ product_name: '', quantity: 1, price: '' }],
                        total: ''
                    });
                    loadOrders();
                } catch (err) {
                    alert('Create order failed: ' + err.message);
                }
            };

            const updateOrderStatus = async (orderId, field, value) => {
                try {
                    const { error } = await supabase
                        .from('orders')
                        .update({ [field]: value })
                        .eq('id', orderId);
                    if (error) throw error;

                    // Determine which statuses should trigger a WhatsApp notification
                    const notifyStatuses = ['confirmed', 'preparing', 'paid', 'dispatched', 'shipped', 'delivered', 'cancelled'];
                    const notifyDelivery = ['in_transit', 'delivered'];

                    const shouldNotify =
                        (field === 'status' && notifyStatuses.includes(value)) ||
                        (field === 'delivery_status' && notifyDelivery.includes(value));

                    if (shouldNotify) {
                        try {
                            const notifyStatus = (field === 'delivery_status')
                                ? (value === 'in_transit' ? 'dispatched' : value)
                                : value;

                            await fetch(`${SUPABASE_URL}/functions/v1/whatsapp-notify`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                },
                                body: JSON.stringify({ order_id: orderId, new_status: notifyStatus }),
                            });
                            console.log(`WhatsApp notification sent for order ${orderId} → ${notifyStatus} (field: ${field})`);
                        } catch (waErr) {
                            console.warn('WhatsApp notification failed (non-blocking):', waErr);
                        }
                    }

                    loadOrders();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            };

            const sendWhatsApp = (order) => {
                const message = `Hi ${order.customer_name},\n\nYour order #${order.order_number} is ${getStatusLabel(order.status)}.\nTotal: ${formatCurrency(order.total)}\n\nThank you!`;
                window.open(whatsappLink(order.customer_phone, message), '_blank');
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Orders"
                        subtitle={`${orders.length} total order${orders.length !== 1 ? 's' : ''}`}
                        actions={
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors"
                            >
                                <Icons.plus /> Create Order
                            </button>
                        }
                    />

                    {/* Manual Order Form */}
                    {showForm && (
                        <div className="card card-shadow p-6 mb-6 border-l-4 border-brand-500">
                            <h3 className="font-bold text-gray-900 mb-4 text-lg">New Order</h3>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Customer Name</label>
                                    <input
                                        type="text"
                                        value={formData.customer_name}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_name: e.target.value }))}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Phone Number</label>
                                    <input
                                        type="tel"
                                        value={formData.customer_phone}
                                        onChange={(e) => setFormData(prev => ({ ...prev, customer_phone: e.target.value }))}
                                        placeholder="e.g. 27xxxxxxxx or 266xxxxxxx"
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>
                            </div>

                            <div className="mb-4">
                                <p className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Items</p>
                                {formData.items.map((item, idx) => (
                                    <div key={idx} className="flex gap-3 mb-2">
                                        <input
                                            type="text"
                                            placeholder="Product"
                                            value={item.product_name}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].product_name = e.target.value;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                        <input
                                            type="number"
                                            placeholder="Qty"
                                            value={item.quantity}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].quantity = parseInt(e.target.value) || 1;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="w-20 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                        <input
                                            type="number"
                                            placeholder="Price"
                                            value={item.price}
                                            onChange={(e) => {
                                                const newItems = [...formData.items];
                                                newItems[idx].price = e.target.value;
                                                setFormData(prev => ({ ...prev, items: newItems }));
                                            }}
                                            className="w-28 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                        />
                                    </div>
                                ))}
                            </div>

                            <div className="mb-4 max-w-xs">
                                <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Total (ZAR)</label>
                                <input
                                    type="number"
                                    value={formData.total}
                                    onChange={(e) => setFormData(prev => ({ ...prev, total: e.target.value }))}
                                    step="0.01"
                                    className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                />
                            </div>

                            <div className="flex gap-3">
                                <button
                                    onClick={createManualOrder}
                                    className="bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Create Order
                                </button>
                                <button
                                    onClick={() => setShowForm(false)}
                                    className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Orders List */}
                    {orders.length === 0 ? (
                        <div className="card card-shadow p-12 text-center">
                            <Icons.orders className="mx-auto mb-3 text-gray-300" style={{width: 48, height: 48}} />
                            <p className="text-gray-500 text-sm">No orders yet</p>
                        </div>
                    ) : (
                        <>
                            {/* Desktop table view */}
                            <div className="hidden lg:block card card-shadow overflow-hidden">
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>Order #</th>
                                            <th>Customer</th>
                                            <th>Status</th>
                                            <th>Payment</th>
                                            <th>Delivery</th>
                                            <th className="text-right">Total</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {orders.map(order => (
                                            <tr key={order.id}>
                                                <td className="font-semibold text-gray-900">{order.order_number}</td>
                                                <td>
                                                    <p className="text-gray-900">{order.customer_name}</p>
                                                    <p className="text-xs text-gray-400">{order.customer_phone}</p>
                                                </td>
                                                <td>
                                                    <select
                                                        value={order.status}
                                                        onChange={(e) => updateOrderStatus(order.id, 'status', e.target.value)}
                                                        className="text-xs px-2 py-1.5 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
                                                    >
                                                        <option value="new">New</option>
                                                        <option value="confirmed">Confirmed</option>
                                                        <option value="preparing">Preparing</option>
                                                        <option value="dispatched">Dispatched</option>
                                                        <option value="delivered">Delivered</option>
                                                        <option value="cancelled">Cancelled</option>
                                                    </select>
                                                </td>
                                                <td>
                                                    <span className="badge" style={{ backgroundColor: getStatusColor(order.payment_status) + '15', color: getStatusColor(order.payment_status) }}>
                                                        {getStatusLabel(order.payment_status)}
                                                    </span>
                                                </td>
                                                <td>
                                                    <select
                                                        value={order.delivery_status}
                                                        onChange={(e) => updateOrderStatus(order.id, 'delivery_status', e.target.value)}
                                                        className="text-xs px-2 py-1.5 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-green-500"
                                                    >
                                                        <option value="pending">Pending</option>
                                                        <option value="in_transit">In Transit</option>
                                                        <option value="delivered">Delivered</option>
                                                    </select>
                                                </td>
                                                <td className="text-right font-semibold text-green-600">{formatCurrency(order.total)}</td>
                                                <td>
                                                    <button
                                                        onClick={() => sendWhatsApp(order)}
                                                        className="flex items-center gap-1.5 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"
                                                    >
                                                        <Icons.whatsapp /> Message
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Mobile card view */}
                            <div className="lg:hidden space-y-3">
                                {orders.map(order => (
                                    <div key={order.id} className="card card-shadow p-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <p className="font-bold text-gray-900">{order.order_number}</p>
                                                <p className="text-xs text-gray-500">{order.customer_name}</p>
                                            </div>
                                            <p className="text-lg font-bold text-green-600">{formatCurrency(order.total)}</p>
                                        </div>

                                        <div className="flex gap-2 mb-3 flex-wrap">
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.status) + '15', color: getStatusColor(order.status) }}>
                                                {getStatusLabel(order.status)}
                                            </span>
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.payment_status) + '15', color: getStatusColor(order.payment_status) }}>
                                                Pay: {getStatusLabel(order.payment_status)}
                                            </span>
                                            <span className="badge" style={{ backgroundColor: getStatusColor(order.delivery_status) + '15', color: getStatusColor(order.delivery_status) }}>
                                                Del: {getStatusLabel(order.delivery_status)}
                                            </span>
                                        </div>

                                        <div className="flex gap-2 flex-wrap text-xs">
                                            <select
                                                value={order.status}
                                                onChange={(e) => updateOrderStatus(order.id, 'status', e.target.value)}
                                                className="px-2 py-1.5 border border-gray-200 rounded-lg bg-white"
                                            >
                                                <option value="new">New</option>
                                                <option value="confirmed">Confirmed</option>
                                                <option value="preparing">Preparing</option>
                                                <option value="dispatched">Dispatched</option>
                                            </select>

                                            <select
                                                value={order.delivery_status}
                                                onChange={(e) => updateOrderStatus(order.id, 'delivery_status', e.target.value)}
                                                className="px-2 py-1.5 border border-gray-200 rounded-lg bg-white"
                                            >
                                                <option value="pending">Pending</option>
                                                <option value="in_transit">In Transit</option>
                                                <option value="delivered">Delivered</option>
                                            </select>

                                            <button
                                                onClick={() => sendWhatsApp(order)}
                                                className="flex items-center gap-1 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg font-semibold transition-colors"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // ============================================================================
        // PAYMENTS SCREEN
        // ============================================================================

        const PaymentsScreen = ({ seller }) => {
            const [payments, setPayments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({
                order_id: '',
                amount: '',
                payment_method: 'eft',
                screenshot_url: ''
            });
            const [orders, setOrders] = useState([]);
            const fileInputRef = useRef(null);
            const [uploading, setUploading] = useState(false);

            useEffect(() => {
                loadPayments();
                loadOrders();
            }, [seller.id]);

            const loadPayments = async () => {
                try {
                    const { data, error } = await supabase
                        .from('payments')
                        .select('*, orders(order_number, total, customer_phone, customer_name)')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setPayments(data || []);
                } catch (err) {
                    console.error('Load payments error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const loadOrders = async () => {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('id, order_number, total, payment_status')
                        .eq('seller_id', seller.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setOrders(data || []);
                } catch (err) {
                    console.error('Load orders error:', err);
                }
            };

            // Calculate total confirmed payments for a given order
            const getPaidTotal = (orderId) => {
                return payments
                    .filter(p => p.order_id === orderId && p.status === 'confirmed')
                    .reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
            };

            // Get orders that still need payment (not fully paid)
            const unpaidOrders = orders.filter(o => {
                const paidSoFar = getPaidTotal(o.id);
                return paidSoFar < parseFloat(o.total);
            });

            // Get balance remaining for selected order in form
            const selectedOrder = orders.find(o => o.id === formData.order_id);
            const selectedPaid = selectedOrder ? getPaidTotal(selectedOrder.id) : 0;
            const selectedBalance = selectedOrder ? (parseFloat(selectedOrder.total) - selectedPaid) : 0;

            const handleScreenshotUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                setUploading(true);
                try {
                    const timestamp = Date.now();
                    const path = `payments/${seller.id}/${timestamp}-${file.name}`;

                    const { error: uploadErr } = await supabase.storage
                        .from('payment-screenshots')
                        .upload(path, file);

                    if (uploadErr) throw uploadErr;

                    const { data } = supabase.storage
                        .from('payment-screenshots')
                        .getPublicUrl(path);

                    setFormData(prev => ({ ...prev, screenshot_url: data.publicUrl }));
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const submitPayment = async () => {
                if (!formData.order_id || !formData.amount) {
                    alert('Please fill in required fields');
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('payments')
                        .insert({
                            seller_id: seller.id,
                            order_id: formData.order_id,
                            amount: parseFloat(formData.amount),
                            payment_method: formData.payment_method,
                            screenshot_url: formData.screenshot_url,
                            status: 'pending'
                        });

                    if (error) throw error;

                    setShowForm(false);
                    setFormData({
                        order_id: '',
                        amount: '',
                        payment_method: 'eft',
                        screenshot_url: ''
                    });
                    loadPayments();
                } catch (err) {
                    alert('Submit failed: ' + err.message);
                }
            };

            const updatePaymentStatus = async (paymentId, newStatus) => {
                try {
                    const { error } = await supabase
                        .from('payments')
                        .update({ status: newStatus })
                        .eq('id', paymentId);
                    if (error) throw error;

                    // If confirming, auto-update the order's payment_status and send receipt
                    if (newStatus === 'confirmed') {
                        const payment = payments.find(p => p.id === paymentId);
                        if (payment && payment.order_id) {
                            // Get order details
                            const order = orders.find(o => o.id === payment.order_id);
                            if (order) {
                                const thisAmount = parseFloat(payment.amount) || 0;
                                const previouslyPaid = getPaidTotal(payment.order_id);
                                const newTotalPaid = previouslyPaid + thisAmount;
                                const orderTotal = parseFloat(order.total);
                                const newPaymentStatus = newTotalPaid >= orderTotal ? 'paid' : 'partial';

                                // Update order payment_status
                                await supabase
                                    .from('orders')
                                    .update({ payment_status: newPaymentStatus })
                                    .eq('id', payment.order_id);

                                // Send WhatsApp receipt to buyer
                                const orderData = payment.orders || order;
                                const customerPhone = orderData.customer_phone || '';
                                const customerName = orderData.customer_name || 'Customer';
                                const orderNumber = orderData.order_number || order.order_number;
                                const remaining = orderTotal - newTotalPaid;

                                if (customerPhone) {
                                    try {
                                        await fetch(SUPABASE_URL + '/functions/v1/whatsapp-notify', {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json',
                                                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                                            },
                                            body: JSON.stringify({
                                                order_id: payment.order_id,
                                                new_status: 'payment_receipt',
                                                receipt_data: {
                                                    amount_paid: thisAmount,
                                                    payment_method: payment.payment_method,
                                                    total_paid: newTotalPaid,
                                                    order_total: orderTotal,
                                                    remaining: remaining > 0 ? remaining : 0,
                                                    fully_paid: newTotalPaid >= orderTotal,
                                                }
                                            }),
                                        });
                                        console.log('Payment receipt sent for order ' + orderNumber);
                                    } catch (waErr) {
                                        console.warn('Receipt notification failed:', waErr);
                                    }
                                }
                            }
                        }
                    }

                    loadPayments();
                    loadOrders();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            };

            if (loading) {
                return <div className="flex items-center justify-center p-12"><Spinner size="lg" /></div>;
            }

            return (
                <div>
                    <PageHeader
                        title="Payments"
                        subtitle={`${payments.length} payment record${payments.length !== 1 ? 's' : ''}`}
                        actions={
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors"
                            >
                                <Icons.plus /> Report Payment
                            </button>
                        }
                    />

                    {/* Payment Form */}
                    {showForm && (
                        <div className="card card-shadow p-6 mb-6 border-l-4 border-brand-500">
                            <h3 className="font-bold text-gray-900 mb-4 text-lg">Report Payment</h3>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Order</label>
                                    <select
                                        value={formData.order_id}
                                        onChange={(e) => setFormData(prev => ({ ...prev, order_id: e.target.value, amount: '' }))}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    >
                                        <option value="">Select an order</option>
                                        {unpaidOrders.map(order => {
                                            const paid = getPaidTotal(order.id);
                                            const bal = parseFloat(order.total) - paid;
                                            return (
                                                <option key={order.id} value={order.id}>
                                                    {order.order_number} — Total: {formatCurrency(order.total)}{paid > 0 ? ` | Paid: ${formatCurrency(paid)} | Due: ${formatCurrency(bal)}` : ''}
                                                </option>
                                            );
                                        })}
                                    </select>
                                    {unpaidOrders.length === 0 && (
                                        <p className="mt-1 text-xs text-green-600 font-medium">All orders are fully paid!</p>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Amount (ZAR)</label>
                                    {selectedOrder && (
                                        <div className="mb-1.5 flex items-center gap-2 text-xs">
                                            <span className="text-gray-500">Balance due:</span>
                                            <span className="font-bold text-orange-600">{formatCurrency(selectedBalance)}</span>
                                            <button
                                                type="button"
                                                onClick={() => setFormData(prev => ({ ...prev, amount: selectedBalance.toFixed(2) }))}
                                                className="text-brand-600 hover:text-brand-700 font-semibold underline"
                                            >
                                                Pay full balance
                                            </button>
                                        </div>
                                    )}
                                    <input
                                        type="number"
                                        value={formData.amount}
                                        onChange={(e) => setFormData(prev => ({ ...prev, amount: e.target.value }))}
                                        step="0.01"
                                        max={selectedBalance > 0 ? selectedBalance : undefined}
                                        placeholder={selectedBalance > 0 ? `Max ${formatCurrency(selectedBalance)}` : '0.00'}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Payment Method</label>
                                    <select
                                        value={formData.payment_method}
                                        onChange={(e) => setFormData(prev => ({ ...prev, payment_method: e.target.value }))}
                                        className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent bg-gray-50"
                                    >
                                        <option value="eft">EFT Bank Transfer</option>
                                        <option value="mobile_money">Mobile Money</option>
                                        <option value="cash">Cash</option>
                                    </select>
                                </div>
                            </div>

                            <div className="mb-4 max-w-sm">
                                <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Proof Screenshot</label>
                                {formData.screenshot_url && (
                                    <div className="mb-2 relative inline-block">
                                        <img src={formData.screenshot_url} alt="Proof" className="h-24 object-cover rounded-lg" />
                                        <button
                                            onClick={() => setFormData(prev => ({ ...prev, screenshot_url: '' }))}
                                            className="absolute top-2 right-2 bg-red-600 text-white px-2 py-1 rounded-md text-xs font-medium"
                                        >
                                            Remove
                                        </button>
                                    </div>
                                )}
                                <button
                                    onClick={() => fileInputRef.current?.click()}
                                    disabled={uploading}
                                    className="w-full bg-gray-50 hover:bg-gray-100 disabled:bg-gray-200 text-gray-600 py-3 rounded-lg border-2 border-dashed border-gray-300 text-sm font-medium transition-colors"
                                >
                                    {uploading ? <Spinner size="sm" /> : 'Upload Screenshot'}
                                </button>
                                <input
                                    ref={fileInputRef}
                                    type="file"
                                    accept="image/*"
                                    onChange={handleScreenshotUpload}
                                    className="hidden"
                                />
                            </div>

                            <div className="flex gap-3">
                                <button
                                    onClick={submitPayment}
                                    className="bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Submit Payment
                                </button>
                                <button
                                    onClick={() => setShowForm(false)}
                                    className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Payments List */}
                    {payments.length === 0 ? (
                        <div className="card card-shadow p-12 text-center">
                            <Icons.payments className="mx-auto mb-3 text-gray-300" style={{width: 48, height: 48}} />
                            <p className="text-gray-500 text-sm">No payments reported yet</p>
                        </div>
                    ) : (
                        <>
                            {/* Desktop table */}
                            <div className="hidden lg:block card card-shadow overflow-hidden">
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>Order</th>
                                            <th>Amount</th>
                                            <th>Method</th>
                                            <th>Status</th>
                                            <th>Proof</th>
                                            <th>Date</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {payments.map(payment => (
                                            <tr key={payment.id}>
                                                <td className="font-medium text-gray-700 text-sm">{payment.orders?.order_number || '—'}</td>
                                                <td className="font-semibold text-gray-900">{formatCurrency(payment.amount)}</td>
                                                <td className="capitalize text-gray-600">{payment.payment_method.replace('_', ' ')}</td>
                                                <td>
                                                    <span className="badge" style={{ backgroundColor: getStatusColor(payment.status) + '15', color: getStatusColor(payment.status) }}>
                                                        {getStatusLabel(payment.status)}
                                                    </span>
                                                </td>
                                                <td>
                                                    {payment.screenshot_url ? (
                                                        <a href={payment.screenshot_url} target="_blank" rel="noopener" className="text-blue-600 hover:text-blue-700 text-sm font-medium">View</a>
                                                    ) : (
                                                        <span className="text-gray-400 text-sm">None</span>
                                                    )}
                                                </td>
                                                <td className="text-gray-500 text-sm">{new Date(payment.created_at).toLocaleDateString()}</td>
                                                <td>
                                                    {payment.status === 'pending' && (
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={() => updatePaymentStatus(payment.id, 'confirmed')}
                                                                className="bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"
                                                            >
                                                                Confirm
                                                            </button>
                                                            <button
                                                                onClick={() => updatePaymentStatus(payment.id, 'rejected')}
                                                                className="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"
                                                            >
                                                                Reject
                                                            </button>
                                                        </div>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Mobile cards */}
                            <div className="lg:hidden space-y-3">
                                {payments.map(payment => (
                                    <div key={payment.id} className="card card-shadow p-4">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <p className="text-xs text-brand-600 font-semibold mb-0.5">{payment.orders?.order_number || '—'}</p>
                                                <p className="font-bold text-gray-900">{formatCurrency(payment.amount)}</p>
                                                <p className="text-xs text-gray-500 capitalize">{payment.payment_method.replace('_', ' ')}</p>
                                            </div>
                                            <span className="badge" style={{ backgroundColor: getStatusColor(payment.status) + '15', color: getStatusColor(payment.status) }}>
                                                {getStatusLabel(payment.status)}
                                            </span>
                                        </div>

                                        {payment.screenshot_url && (
                                            <img src={payment.screenshot_url} alt="Proof" className="w-full h-24 object-cover rounded-lg mb-3" />
                                        )}

                                        {payment.status === 'pending' && (
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={() => updatePaymentStatus(payment.id, 'confirmed')}
                                                    className="flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 rounded-lg text-xs transition-colors"
                                                >
                                                    Confirm
                                                </button>
                                                <button
                                                    onClick={() => updatePaymentStatus(payment.id, 'rejected')}
                                                    className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-2 rounded-lg text-xs transition-colors"
                                                >
                                                    Reject
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // ============================================================================
        // TEMPLATES SCREEN
        // ============================================================================

        const TemplatesScreen = ({ seller }) => {
            const templates = [
                {
                    id: 1,
                    title: 'Order Confirmation',
                    en: `Hi {name},\n\nThank you for your order!\nOrder #: {order_number}\nTotal: {total}\n\nWe'll notify you when it's ready for delivery.\n\nThank you for shopping with us!`,
                    st: `Dumela {name},\n\nKe leboha ho ola.`
                },
                {
                    id: 2,
                    title: 'Payment Reminder',
                    en: `Hi {name},\n\nReminder: Your order #{order_number} is waiting for payment.\nAmount due: {total}\n\nPlease confirm payment to proceed.\n\nThank you!`,
                    st: `Dumela {name},\n\nReminder: Odara oa hao #{order_number} e hloka tefo.`
                },
                {
                    id: 3,
                    title: 'Delivery Notification',
                    en: `Hi {name},\n\nGood news! Your order #{order_number} is on the way.\n\nYou'll receive it soon. Thank you for your patience!`,
                    st: `Dumela {name},\n\nMathata a magwe! Odara oa hao #{order_number} e tsamaela.`
                },
                {
                    id: 4,
                    title: 'Feedback Request',
                    en: `Hi {name},\n\nWe hope you enjoyed your purchase from {business_name}!\n\nPlease share your feedback - it helps us improve.\n\nThank you!`,
                    st: `Dumela {name},\n\nRe na le nqo hore o ne o rata odara oa hao.`
                }
            ];

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            };

            const sendViaWhatsApp = (message) => {
                window.open(whatsappShareLink(message), '_blank');
            };

            return (
                <div>
                    <PageHeader title="Message Templates" subtitle="Pre-built messages for customer communication" />

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        {templates.map(template => (
                            <div key={template.id} className="card card-shadow overflow-hidden">
                                <div className="bg-gradient-to-r from-brand-500 to-green-600 px-5 py-3">
                                    <h3 className="font-semibold text-white">{template.title}</h3>
                                </div>

                                <div className="p-5 space-y-4">
                                    {/* English */}
                                    <div>
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">English</p>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg leading-relaxed">
                                            {template.en
                                                .replace('{name}', 'John')
                                                .replace('{order_number}', '123456')
                                                .replace('{total}', 'R499.99')
                                                .replace('{business_name}', seller.business_name)}
                                        </p>
                                        <div className="flex gap-2 mt-2">
                                            <button
                                                onClick={() => copyToClipboard(template.en)}
                                                className="flex items-center gap-1.5 flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.copy /> Copy
                                            </button>
                                            <button
                                                onClick={() => sendViaWhatsApp(template.en)}
                                                className="flex items-center gap-1.5 flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>

                                    {/* Sesotho */}
                                    <div className="border-t pt-4">
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Sesotho</p>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg leading-relaxed">
                                            {template.st
                                                .replace('{name}', 'John')
                                                .replace('{order_number}', '123456')
                                                .replace('{total}', 'R499.99')
                                                .replace('{business_name}', seller.business_name)}
                                        </p>
                                        <div className="flex gap-2 mt-2">
                                            <button
                                                onClick={() => copyToClipboard(template.st)}
                                                className="flex items-center gap-1.5 flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.copy /> Copy
                                            </button>
                                            <button
                                                onClick={() => sendViaWhatsApp(template.st)}
                                                className="flex items-center gap-1.5 flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 rounded-lg text-xs transition-colors justify-center"
                                            >
                                                <Icons.whatsapp /> WhatsApp
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // MAIN APP COMPONENT — RESPONSIVE SIDEBAR + BOTTOM NAV
        // ============================================================================

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('current_seller');
                if (stored) {
                    try {
                        setCurrentUser(JSON.parse(stored));
                    } catch (e) {
                        console.error('Parse error:', e);
                    }
                }
            }, []);

            const logout = () => {
                if (window.confirm('Sign out?')) {
                    localStorage.removeItem('current_seller');
                    setCurrentUser(null);
                }
            };

            if (!currentUser) {
                return <LoginScreen onLoginSuccess={setCurrentUser} />;
            }

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', Icon: Icons.dashboard },
                { id: 'products', label: 'Products', Icon: Icons.products },
                { id: 'orders', label: 'Orders', Icon: Icons.orders },
                { id: 'payments', label: 'Payments', Icon: Icons.payments },
                { id: 'templates', label: 'Templates', Icon: Icons.templates },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* ======= DESKTOP SIDEBAR (hidden on mobile) ======= */}
                    <aside className="hidden lg:flex lg:flex-col lg:fixed lg:inset-y-0 lg:left-0 lg:w-64 bg-white border-r border-gray-200 z-50">
                        {/* Sidebar Header */}
                        <div className="px-5 py-5 border-b border-gray-100">
                            <div className="flex items-center gap-3 mb-1">
                                <Logo size={40} />
                                <div className="min-w-0">
                                    <h1 className="font-bold text-base text-gray-900 leading-tight tracking-tight">WhatsApp <span className="text-brand-500">Seller OS</span></h1>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.business_name}</p>
                                </div>
                            </div>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 px-3 py-4 space-y-1 sidebar-scroll overflow-y-auto">
                            {navItems.map(({ id, label, Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setCurrentTab(id)}
                                    className={`sidebar-link w-full ${currentTab === id ? 'active' : ''}`}
                                >
                                    <Icon />
                                    <span>{label}</span>
                                </button>
                            ))}
                        </nav>

                        {/* Sidebar Footer */}
                        <div className="px-4 py-4 border-t border-gray-100">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-sm">
                                    {currentUser.full_name?.charAt(0)?.toUpperCase() || 'S'}
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="text-sm font-semibold text-gray-900 truncate">{currentUser.full_name}</p>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.phone}</p>
                                </div>
                            </div>
                            <button
                                onClick={logout}
                                className="flex items-center gap-2 w-full text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors font-medium"
                            >
                                <Icons.logout /> Sign Out
                            </button>
                            <div className="mt-4 pt-3 border-t border-gray-100 flex items-center justify-center gap-2.5">
                                <img src="/assets/4d-logo.png" alt="4D" className="w-8 h-8 opacity-75" />
                                <div className="text-left">
                                    <p className="text-xs text-gray-400 leading-tight">Developed by</p>
                                    <p className="text-xs font-semibold text-gray-500 leading-tight">4D <span className="italic">Climate Solutions</span></p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* ======= MOBILE TOP HEADER (hidden on desktop) ======= */}
                    <div className="lg:hidden bg-white border-b border-gray-200 sticky top-0 z-40">
                        <div className="px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2.5">
                                <Logo size={36} />
                                <div>
                                    <h1 className="font-bold text-sm text-gray-900 leading-none tracking-tight">WhatsApp <span className="text-brand-500">Seller OS</span></h1>
                                    <p className="text-xs text-gray-500">{currentUser.business_name}</p>
                                </div>
                            </div>
                            <button
                                onClick={logout}
                                className="text-xs font-semibold text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors"
                            >
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* ======= MAIN CONTENT AREA ======= */}
                    <main className="lg:ml-64 min-h-screen pb-20 lg:pb-0">
                        <div className="max-w-6xl mx-auto px-4 lg:px-8 py-5 lg:py-8">
                            <div className="tab-content">
                                {currentTab === 'dashboard' && <DashboardScreen seller={currentUser} />}
                                {currentTab === 'products' && <ProductsScreen seller={currentUser} />}
                                {currentTab === 'orders' && <OrdersScreen seller={currentUser} />}
                                {currentTab === 'payments' && <PaymentsScreen seller={currentUser} />}
                                {currentTab === 'templates' && <TemplatesScreen seller={currentUser} />}
                            </div>
                        </div>
                    </main>

                    {/* ======= MOBILE BOTTOM NAVIGATION (hidden on desktop) ======= */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 safe-area-bottom">
                        <div className="flex justify-around">
                            {navItems.map(({ id, label, Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setCurrentTab(id)}
                                    className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 px-1 text-xs font-medium transition-colors ${
                                        currentTab === id
                                            ? 'text-brand-500'
                                            : 'text-gray-400 hover:text-gray-600'
                                    }`}
                                >
                                    <Icon style={{ width: 20, height: 20 }} />
                                    <span>{label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // RENDER APP
        // ============================================================================

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
