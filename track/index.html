<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Orders — YeboSell</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <!-- PWA: installable, permanent buyer app -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YeboSell">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=11"></script>
    <script>
        // ---- PWA: service worker + install prompt capture (plain JS, runs before React) ----
        window.__yeboDeferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__yeboDeferredPrompt = e;
            window.dispatchEvent(new Event('yebo-can-install'));
        });
        window.addEventListener('appinstalled', () => {
            try { localStorage.setItem('yebosell_installed', '1'); } catch (e) {}
            window.__yeboDeferredPrompt = null;
            window.dispatchEvent(new Event('yebo-installed'));
        });
        window.__yeboPromptInstall = async () => {
            const p = window.__yeboDeferredPrompt;
            if (!p) return;
            p.prompt();
            try { await p.userChoice; } catch (e) {}
            try { localStorage.setItem('yebosell_installed', '1'); } catch (e) {}
            window.__yeboDeferredPrompt = null;
            window.dispatchEvent(new Event('yebo-installed'));
        };
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#15803d', 600: '#166534', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');
        :root { --kc-gold: #D4A017; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; letter-spacing: -0.01em; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .accent { color: var(--kc-gold); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabase = window.supabaseClient;
        const formatCurrency = window.formatCurrency;
        const getStatusColor = window.getStatusColor;
        const getStatusLabel = window.getStatusLabel;
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

        const DELIVERY_LABELS = {
            pickup: 'Customer Pickup', self_delivery: 'Seller Delivery',
            courier: 'Courier / Third Party', taxi: 'Via Taxi', bus: 'Via Bus', local_courier: 'Local Courier'
        };

        const DELIVERY_STATUS_STEPS = [
            { key: 'pending', label: 'Order Received', icon: '📋', desc: 'Your order has been received' },
            { key: 'ready_for_pickup', label: 'Ready for Pickup', icon: '🏪', desc: 'Your order is ready to collect', pickupOnly: true },
            { key: 'out_for_delivery', label: 'Out for Delivery', icon: '🚗', desc: 'Your order is on its way', deliveryOnly: true },
            { key: 'in_transit', label: 'In Transit', icon: '📦', desc: 'Your order is being transported', deliveryOnly: true },
            { key: 'delivered', label: 'Delivered', icon: '✅', desc: 'Your order has been delivered' }
        ];

        // ---- buyer order list persistence (the permanent app) ----
        const readMyOrders = () => {
            try { return JSON.parse(localStorage.getItem('yebosell_orders') || '[]').filter(o => o && o.token); }
            catch (e) { return []; }
        };
        const persistMyOrder = (token, data) => {
            try {
                const list = readMyOrders();
                const entry = {
                    token,
                    order_number: (data && data.order && data.order.order_number) || '',
                    seller_name: (data && data.seller && data.seller.business_name) || '',
                    seller_slug: (data && data.seller && data.seller.slug) || '',
                    created_at: (data && data.order && data.order.created_at) || new Date().toISOString()
                };
                const next = [entry, ...list.filter(o => o.token !== token)];
                localStorage.setItem('yebosell_orders', JSON.stringify(next.slice(0, 100)));
            } catch (e) {}
        };

        // Buyer-side order conversation (mirrors the seller dashboard thread).
        // Anon buyers reach the thread only through token-scoped SECURITY DEFINER
        // RPCs; no direct table access. Realtime isn't available to anon, so we
        // poll while the page is open / on tab focus (SPEC_internal_messaging §5).
        function BuyerThread({ token, sellerName }) {
            const [msgs, setMsgs] = useState([]);
            const [text, setText] = useState('');
            const [sending, setSending] = useState(false);
            const [loaded, setLoaded] = useState(false);
            const endRef = React.useRef(null);

            const load = async (markRead) => {
                try {
                    const { data } = await supabase.rpc('get_order_thread', { p_token: token });
                    setMsgs((data && data.messages) || []);
                    setLoaded(true);
                    if (markRead) { try { await supabase.rpc('mark_thread_read_buyer', { p_token: token }); } catch (e) {} }
                } catch (e) {}
            };

            useEffect(() => {
                if (!token) return;
                load(true);
                const iv = setInterval(() => { if (document.visibilityState === 'visible') load(true); }, 7000);
                const onVis = () => { if (document.visibilityState === 'visible') load(true); };
                document.addEventListener('visibilitychange', onVis);
                return () => { clearInterval(iv); document.removeEventListener('visibilitychange', onVis); };
            }, [token]);

            useEffect(() => { try { endRef.current && endRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch (e) {} }, [msgs]);

            const send = async () => {
                const body = text.trim();
                if (!body || sending) return;
                setSending(true);
                try {
                    const { data, error } = await supabase.rpc('post_order_message', { p_token: token, p_body: body });
                    if (error || (data && data.error)) {
                        window.toast((data && data.message) || 'Could not send. Please try again.', 'error');
                    } else { setText(''); load(true); }
                } catch (e) { window.toast('Something went wrong. Please try again.', 'error'); }
                setSending(false);
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-1">💬 Messages</h3>
                    <p className="text-xs text-gray-500 mb-3">Chat directly with {sellerName || 'the seller'} about this order — they'll see your replies in their dashboard.</p>
                    <div className="bg-gray-50 rounded-xl p-3 max-h-72 overflow-y-auto space-y-2">
                        {!loaded ? (
                            <p className="text-xs text-gray-400 text-center py-3">Loading…</p>
                        ) : msgs.length === 0 ? (
                            <p className="text-xs text-gray-400 text-center py-3">No messages yet. Send the seller a message below.</p>
                        ) : msgs.map(m => (
                            m.kind === 'status' ? (
                                <div key={m.id} className="text-center">
                                    <span className="inline-block text-[11px] text-gray-500 bg-gray-200/70 rounded-full px-3 py-1">{m.body}</span>
                                </div>
                            ) : (m.meta && m.meta.confirm) ? (
                                <div key={m.id} className="text-center">
                                    <span className={`inline-block text-[11px] font-semibold rounded-full px-3 py-1 ${m.meta.confirm === 'dispute' ? 'bg-amber-100 text-amber-800' : 'bg-green-100 text-green-800'}`}>{m.body}</span>
                                </div>
                            ) : (
                                <div key={m.id} className={`flex ${m.sender === 'buyer' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] px-3 py-2 rounded-2xl text-sm ${m.sender === 'buyer' ? 'bg-brand-500 text-white rounded-br-sm' : m.sender === 'admin' ? 'bg-amber-100 text-amber-900 rounded-bl-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-bl-sm'}`}>
                                        {m.sender === 'admin' && <span className="block text-[10px] font-bold uppercase opacity-70">YeboSell Support</span>}
                                        {m.sender === 'seller' && <span className="block text-[10px] font-bold uppercase opacity-60 text-brand-600">{sellerName || 'Seller'}</span>}
                                        {m.body}
                                    </div>
                                </div>
                            )
                        ))}
                        <div ref={endRef} />
                    </div>
                    <div className="flex gap-2 mt-2">
                        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') send(); }}
                            placeholder="Message the seller…"
                            className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                        <button onClick={send} disabled={sending || !text.trim()}
                            className="bg-brand-500 hover:bg-brand-600 disabled:bg-gray-300 text-white font-semibold px-4 py-2 rounded-xl text-sm">Send</button>
                    </div>
                </div>
            );
        }

        function TrackingPage() {
            const [orderNumber, setOrderNumber] = useState('');
            const [phone, setPhone] = useState('');
            const [order, setOrder] = useState(null);
            const [items, setItems] = useState([]);
            const [seller, setSeller] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [searched, setSearched] = useState(false);
            const [myOrders, setMyOrders] = useState([]);
            const [showLegacyForm, setShowLegacyForm] = useState(false);
            const [canInstall, setCanInstall] = useState(typeof window !== 'undefined' && !!window.__yeboDeferredPrompt);
            const [syncStep, setSyncStep] = useState('idle'); // 'idle' | 'code'
            const [syncPhone, setSyncPhone] = useState('');
            const [syncCode, setSyncCode] = useState('');
            const [syncError, setSyncError] = useState('');
            const [syncLoading, setSyncLoading] = useState(false);
            const [activeToken, setActiveToken] = useState('');
            const [confirmBusy, setConfirmBusy] = useState('');
            const [showDispute, setShowDispute] = useState(false);
            const [disputeNote, setDisputeNote] = useState('');

            // PWA install availability
            useEffect(() => {
                const on = () => setCanInstall(true);
                const off = () => setCanInstall(false);
                window.addEventListener('yebo-can-install', on);
                window.addEventListener('yebo-installed', off);
                return () => { window.removeEventListener('yebo-can-install', on); window.removeEventListener('yebo-installed', off); };
            }, []);

            const isStandalone = (typeof window !== 'undefined') &&
                (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone);
            const installed = (() => { try { return localStorage.getItem('yebosell_installed') === '1'; } catch (e) { return false; } })();
            const showInstall = canInstall && !isStandalone && !installed;

            // On load: token link → load that order; else show My Orders (+ legacy form)
            useEffect(() => {
                setMyOrders(readMyOrders());
                trySilentRefresh();
                const params = new URLSearchParams(window.location.search);
                const token = params.get('t');
                if (token) {
                    loadByToken(token);
                    return;
                }
                const ord = params.get('order') || params.get('o');
                const ph = params.get('phone') || params.get('p');
                if (ord) { setOrderNumber(ord.toUpperCase()); setShowLegacyForm(true); }
                if (ph) { setPhone(ph); setShowLegacyForm(true); }
                if (ord && ph) { setTimeout(() => lookupOrder(ord.toUpperCase(), ph), 100); }
            }, []);

            const loadByToken = async (token) => {
                setLoading(true); setError(''); setSearched(true);
                try {
                    const { data, error: rpcError } = await supabase.rpc('get_tracked_order', { p_token: token });
                    if (rpcError || !data || !data.order) {
                        setError('Order not found. This tracking link may be incorrect or expired.');
                        setOrder(null); setLoading(false);
                        return;
                    }
                    setOrder(data.order);
                    setItems(data.items || []);
                    setSeller(data.seller || null);
                    setActiveToken(token);
                    persistMyOrder(token, data);
                    setMyOrders(readMyOrders());
                    try { window.history.replaceState({}, '', `/track/?t=${token}`); } catch (e) {}
                } catch (err) {
                    setError('Something went wrong. Please try again.');
                }
                setLoading(false);
            };

            // Buyer-side confirmation: records the buyer's own assertion (paid /
            // received / problem) independently of the seller, into the order thread.
            const confirmOrder = async (action, note) => {
                if (!activeToken || confirmBusy) return;
                if (action === 'dispute' && !showDispute) { setShowDispute(true); return; }
                setConfirmBusy(action);
                try {
                    const { data, error: rpcErr } = await supabase.rpc('buyer_confirm_order', {
                        p_token: activeToken, p_action: action, p_note: note || null });
                    if (rpcErr || !data || data.error) {
                        window.toast((data && data.message) || 'Could not save just now. Please try again.', 'error');
                    } else {
                        setOrder(o => Object.assign({}, o, {
                            buyer_paid_confirmed_at: data.buyer_paid_confirmed_at,
                            buyer_received_confirmed_at: data.buyer_received_confirmed_at,
                            buyer_dispute_at: data.buyer_dispute_at,
                            buyer_dispute_reason: data.buyer_dispute_reason
                        }));
                        setShowDispute(false); setDisputeNote('');
                        window.toast(
                            action === 'paid' ? "Thanks — we've let the seller know you paid." :
                            action === 'received' ? 'Thanks for confirming you received your order.' :
                            "Reported. The seller and YeboSell can now see this.",
                            action === 'dispute' ? 'info' : 'success');
                    }
                } catch (e) {
                    window.toast('Something went wrong. Please try again.', 'error');
                }
                setConfirmBusy('');
            };

            // Legacy lookup by order number + phone (kept ~60 days for old links)
            const lookupOrder = async (num, ph) => {
                const searchNum = num || orderNumber;
                const searchPhone = ph || phone;
                if (!searchNum.trim()) { setError('Please enter your order number'); return; }
                if (!searchPhone.trim()) { setError('Please enter your phone number for verification'); return; }
                setLoading(true); setError(''); setSearched(true);
                try {
                    // Server-side verified lookup (phone checked in the DB; no PII exposed to anon)
                    const { data, error: rpcErr } = await supabase.rpc('get_tracked_order_by_lookup', { p_order_number: searchNum.trim(), p_phone: searchPhone });
                    if (rpcErr || !data || !data.order) { setError('Order not found. Please check your order number and phone.'); setOrder(null); setLoading(false); return; }
                    setOrder(data.order);
                    setItems(data.items || []);
                    setSeller(data.seller || null);
                } catch (err) { setError('Something went wrong. Please try again.'); }
                setLoading(false);
            };

            // Merge a server-returned order list into the device's persistent "My Orders"
            const mergeServerOrders = (serverList) => {
                try {
                    const map = {};
                    readMyOrders().forEach(o => { if (o.token) map[o.token] = o; });
                    (serverList || []).forEach(o => {
                        if (!o || !o.token) return;
                        map[o.token] = Object.assign({}, map[o.token], {
                            token: o.token, order_number: o.order_number, seller_name: o.seller_name,
                            created_at: o.created_at, status: o.status, payment_status: o.payment_status,
                            delivery_status: o.delivery_status, total: o.total
                        });
                    });
                    const merged = Object.keys(map).map(k => map[k])
                        .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                    localStorage.setItem('yebosell_orders', JSON.stringify(merged.slice(0, 200)));
                    setMyOrders(merged);
                    return merged;
                } catch (e) { return readMyOrders(); }
            };

            // After verifying once, silently refresh the full list on every app open
            const trySilentRefresh = () => {
                let sync = null;
                try { sync = JSON.parse(localStorage.getItem('yebosell_sync') || 'null'); } catch (e) {}
                if (sync && sync.phone && sync.proof) {
                    supabase.rpc('get_orders_by_phone', { p_phone: sync.phone, p_order_number: sync.proof })
                        .then(({ data }) => { if (data && data.length) mergeServerOrders(data); })
                        .catch(() => {});
                }
            };

            const sendCode = async () => {
                const p = syncPhone.trim();
                if (!p) { setSyncError('Please enter your phone number'); return; }
                setSyncLoading(true); setSyncError('');
                try {
                    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ phone: p })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) { setSyncError(data.error || 'Could not send the code. Please try again.'); setSyncLoading(false); return; }
                    setSyncStep('code');
                } catch (e) { setSyncError('Network error. Please try again.'); }
                setSyncLoading(false);
            };

            const verifyCode = async () => {
                const p = syncPhone.trim(); const c = syncCode.trim();
                if (!c) { setSyncError('Please enter the code'); return; }
                setSyncLoading(true); setSyncError('');
                try {
                    const { data, error: rpcErr } = await supabase.rpc('get_orders_by_otp', { p_phone: p, p_otp: c });
                    if (rpcErr) { setSyncError('Verification failed. Please try again.'); setSyncLoading(false); return; }
                    const list = data || [];
                    if (!list.length) { setSyncError('Invalid or expired code, or no orders found for this number.'); setSyncLoading(false); return; }
                    mergeServerOrders(list);
                    try { localStorage.setItem('yebosell_sync', JSON.stringify({ phone: p, proof: list[0].order_number })); } catch (e) {}
                    setSyncStep('idle'); setSyncCode(''); setSyncPhone('');
                } catch (e) { setSyncError('Something went wrong. Please try again.'); }
                setSyncLoading(false);
            };

            const backToHome = () => {
                setOrder(null); setSeller(null); setItems([]); setError(''); setSearched(false);
                setActiveToken(''); setShowDispute(false); setDisputeNote('');
                setMyOrders(readMyOrders());
                try { window.history.replaceState({}, '', '/track/'); } catch (e) {}
            };

            const getActiveSteps = () => {
                if (!order) return [];
                const isPickup = order.delivery_method === 'pickup';
                return DELIVERY_STATUS_STEPS.filter(s => {
                    if (isPickup && s.deliveryOnly) return false;
                    if (!isPickup && s.pickupOnly) return false;
                    return true;
                });
            };
            const getStepStatus = (stepKey, steps) => {
                const currentIndex = steps.findIndex(s => s.key === (order?.delivery_status || 'pending'));
                const stepIndex = steps.findIndex(s => s.key === stepKey);
                if (stepIndex < currentIndex) return 'completed';
                if (stepIndex === currentIndex) return 'current';
                return 'upcoming';
            };

            const InstallButton = () => showInstall ? (
                <button onClick={() => window.__yeboPromptInstall()}
                    className="flex items-center justify-center gap-2 w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-2xl transition shadow-md">
                    📲 Add YeboSell to your phone
                </button>
            ) : null;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-white border-b border-gray-200">
                        <div className="max-w-lg mx-auto px-4 py-4 flex items-center gap-3">
                            <div className="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-gray-900">{order ? 'Track Your Order' : 'My Orders'}</h1>
                                <p className="text-xs text-gray-400">Powered by YeboSell</p>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-lg mx-auto px-4 py-6 space-y-4">

                        {/* ===== HOME / MY ORDERS (no order loaded) ===== */}
                        {!order && (
                            <div className="space-y-4 fade-in">
                                {loading && (
                                    <div className="flex justify-center py-10"><div className="spin w-8 h-8 border-brand-500 border-t-transparent rounded-full" style={{ borderWidth: 3, borderStyle: 'solid' }}></div></div>
                                )}

                                {showInstall && (
                                    <div className="bg-brand-50 border border-brand-200 rounded-2xl p-4 space-y-2">
                                        <p className="text-sm font-semibold text-brand-900">Keep all your orders in one place</p>
                                        <p className="text-xs text-brand-700">Add YeboSell to your home screen — install once, and every future order shows up here automatically.</p>
                                        <InstallButton />
                                    </div>
                                )}

                                {/* My Orders list */}
                                {myOrders.length > 0 && (
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                                        <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-3">Your Orders</h3>
                                        <div className="space-y-2">
                                            {myOrders.map((o) => (
                                                <button key={o.token} onClick={() => loadByToken(o.token)}
                                                    className="w-full flex items-center justify-between gap-3 p-3 rounded-xl border border-gray-100 hover:border-brand-300 hover:bg-brand-50 transition text-left">
                                                    <div className="min-w-0">
                                                        <p className="text-sm font-bold text-gray-900 font-mono truncate">{o.order_number || 'Order'}</p>
                                                        <p className="text-xs text-gray-500 truncate">{o.seller_name || 'Seller'} · {o.created_at ? new Date(o.created_at).toLocaleDateString() : ''}</p>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1 flex-shrink-0">
                                                        {o.status && (
                                                            <span className="px-2 py-0.5 rounded-full text-[10px] font-bold" style={{ background: getStatusColor(o.status) + '15', color: getStatusColor(o.status) }}>
                                                                {getStatusLabel(o.status)}
                                                            </span>
                                                        )}
                                                        <span className="text-brand-600 text-xs font-bold">Track →</span>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {myOrders.length === 0 && !loading && (
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                                        <div className="text-4xl mb-2">📦</div>
                                        <h2 className="text-lg font-bold text-gray-900">No orders yet</h2>
                                        <p className="text-sm text-gray-500">Orders you place will appear here automatically. Have a tracking link or order number? Use the option below.</p>
                                    </div>
                                )}

                                {/* Get all my orders — one-time SMS verify, then auto-syncs */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-1">Get all my orders</h3>
                                    <p className="text-xs text-gray-500 mb-3">Verify your phone once and every order you've placed shows up here — and stays up to date automatically, on this device and future ones.</p>

                                    {syncStep === 'idle' && (
                                        <div className="space-y-3">
                                            <input type="tel" value={syncPhone} onChange={e => setSyncPhone(e.target.value)}
                                                placeholder="+27... or +266..."
                                                className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                            {syncError && (<div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">{syncError}</div>)}
                                            <button onClick={sendCode} disabled={syncLoading}
                                                className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md disabled:opacity-50">
                                                {syncLoading ? 'Sending...' : 'Text me a code'}
                                            </button>
                                        </div>
                                    )}

                                    {syncStep === 'code' && (
                                        <div className="space-y-3 fade-in">
                                            <p className="text-xs text-gray-500">Enter the 6-digit code sent to <strong>{syncPhone}</strong></p>
                                            <input type="text" inputMode="numeric" value={syncCode}
                                                onChange={e => setSyncCode(e.target.value.replace(/[^0-9]/g, ''))}
                                                placeholder="123456" maxLength={6}
                                                onKeyDown={e => e.key === 'Enter' && verifyCode()}
                                                className="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-lg font-mono tracking-[0.4em] focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                            {syncError && (<div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">{syncError}</div>)}
                                            <button onClick={verifyCode} disabled={syncLoading}
                                                className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl transition shadow-md disabled:opacity-50">
                                                {syncLoading ? 'Verifying...' : 'Verify & load my orders'}
                                            </button>
                                            <button onClick={() => { setSyncStep('idle'); setSyncError(''); }}
                                                className="w-full text-xs font-semibold text-gray-500 hover:text-gray-700">← Use a different number</button>
                                        </div>
                                    )}

                                    <div className="mt-3 pt-3 border-t border-gray-100">
                                        <button onClick={() => setShowLegacyForm(v => !v)}
                                            className="w-full flex items-center justify-between text-xs font-semibold text-gray-500">
                                            <span>Track a single order by number instead</span>
                                            <span className="text-gray-400">{showLegacyForm ? '−' : '+'}</span>
                                        </button>
                                        {showLegacyForm && (
                                            <div className="space-y-3 mt-3 fade-in">
                                                <input type="text" value={orderNumber} onChange={e => setOrderNumber(e.target.value.toUpperCase())}
                                                    placeholder="ORD-20260411-123"
                                                    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono tracking-wider focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                                <input type="tel" value={phone} onChange={e => setPhone(e.target.value)}
                                                    placeholder="Phone for verification"
                                                    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-gray-50" />
                                                {error && (<div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">{error}</div>)}
                                                <button onClick={() => lookupOrder()} disabled={loading}
                                                    className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl transition disabled:opacity-50">
                                                    {loading ? 'Searching...' : 'Track Order'}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Error when a token link failed (no form open) */}
                                {error && !showLegacyForm && (
                                    <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">{error}</div>
                                )}
                            </div>
                        )}

                        {/* ===== ORDER DETAIL ===== */}
                        {order && (
                            <div className="space-y-4 fade-in">
                                {myOrders.length > 0 && (
                                    <button onClick={backToHome} className="text-sm font-semibold text-brand-600 hover:underline">← My Orders</button>
                                )}

                                {/* Order header card */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-brand-500 text-white px-5 py-4">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-brand-100 text-xs uppercase tracking-wide">Order</p>
                                                <p className="text-xl font-bold">{order.order_number}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-brand-100 text-xs">Total</p>
                                                <p className="text-xl font-bold">{formatCurrency(order.total)}</p>
                                            </div>
                                        </div>
                                        {seller && (<p className="text-brand-100 text-xs mt-2">From: <strong className="text-white">{seller.business_name}</strong></p>)}
                                    </div>
                                    <div className="px-5 py-4">
                                        <div className="flex items-center gap-2 mb-3 flex-wrap">
                                            <span className="px-3 py-1 rounded-full text-xs font-bold" style={{ background: getStatusColor(order.status) + '15', color: getStatusColor(order.status) }}>
                                                {getStatusLabel(order.status)}
                                            </span>
                                            <span className="px-3 py-1 rounded-full text-xs font-bold" style={{ background: getStatusColor(order.payment_status) + '15', color: getStatusColor(order.payment_status) }}>
                                                Payment: {getStatusLabel(order.payment_status)}
                                            </span>
                                        </div>
                                        <div className="flex items-center gap-4 text-xs text-gray-500">
                                            <span>🛒 {DELIVERY_LABELS[order.delivery_method] || order.delivery_method}</span>
                                            <span>📅 {new Date(order.created_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Buyer confirmation — two-sided state. Only on token links. */}
                                {activeToken && (
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                                        <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-1">Confirm your order</h3>
                                        <p className="text-xs text-gray-500 mb-4">Your confirmation is recorded for the seller and YeboSell — it protects you if anything goes wrong.</p>

                                        {/* I've paid */}
                                        {order.buyer_paid_confirmed_at ? (
                                            <div className="flex items-center gap-2 text-sm text-brand-700 font-semibold mb-2">
                                                <span className="w-5 h-5 rounded-full bg-brand-500 text-white flex items-center justify-center text-xs">✓</span>
                                                You confirmed payment · {new Date(order.buyer_paid_confirmed_at).toLocaleDateString()}
                                            </div>
                                        ) : (
                                            <button onClick={() => confirmOrder('paid')} disabled={!!confirmBusy}
                                                className="w-full flex items-center justify-center gap-2 border-2 border-brand-500 text-brand-700 font-bold py-2.5 rounded-xl transition hover:bg-brand-50 disabled:opacity-50 mb-2">
                                                {confirmBusy === 'paid' ? 'Saving…' : "✓ I've paid for this order"}
                                            </button>
                                        )}

                                        {/* Confirm receipt */}
                                        {order.buyer_received_confirmed_at ? (
                                            <div className="flex items-center gap-2 text-sm text-brand-700 font-semibold mb-2">
                                                <span className="w-5 h-5 rounded-full bg-brand-500 text-white flex items-center justify-center text-xs">✓</span>
                                                You confirmed receipt · {new Date(order.buyer_received_confirmed_at).toLocaleDateString()}
                                            </div>
                                        ) : (
                                            <button onClick={() => confirmOrder('received')} disabled={!!confirmBusy}
                                                className="w-full flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl transition disabled:opacity-50 mb-2">
                                                {confirmBusy === 'received' ? 'Saving…' : '✓ Confirm I received my order'}
                                            </button>
                                        )}

                                        {/* Report a problem */}
                                        {order.buyer_dispute_at ? (
                                            <div className="mt-2 bg-amber-50 border border-amber-200 rounded-xl p-3">
                                                <p className="text-xs font-bold text-amber-900">⚠ You reported a problem · {new Date(order.buyer_dispute_at).toLocaleDateString()}</p>
                                                {order.buyer_dispute_reason && <p className="text-xs text-amber-800 mt-1">"{order.buyer_dispute_reason}"</p>}
                                                <p className="text-xs text-amber-700 mt-1">The seller and YeboSell can see this. You can keep messaging the seller below.</p>
                                            </div>
                                        ) : showDispute ? (
                                            <div className="mt-2 border border-gray-200 rounded-xl p-3">
                                                <label className="text-xs font-semibold text-gray-700">What went wrong?</label>
                                                <textarea value={disputeNote} onChange={e => setDisputeNote(e.target.value)} rows="2" maxLength="500"
                                                    placeholder="e.g. I paid but haven't received my order"
                                                    className="w-full mt-1 text-sm border border-gray-200 rounded-lg p-2 focus:outline-none focus:border-brand-500" />
                                                <div className="flex gap-2 mt-2">
                                                    <button onClick={() => confirmOrder('dispute', disputeNote)} disabled={!!confirmBusy}
                                                        className="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-lg text-sm transition disabled:opacity-50">
                                                        {confirmBusy === 'dispute' ? 'Sending…' : 'Submit report'}
                                                    </button>
                                                    <button onClick={() => { setShowDispute(false); setDisputeNote(''); }}
                                                        className="px-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2 rounded-lg text-sm transition">Cancel</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <button onClick={() => setShowDispute(true)} disabled={!!confirmBusy}
                                                className="w-full text-center text-amber-700 hover:text-amber-800 font-semibold py-2 text-sm transition">
                                                ⚠ Report a problem with this order
                                            </button>
                                        )}
                                    </div>
                                )}

                                {/* Delivery Timeline */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-4">
                                        {order.delivery_method === 'pickup' ? '🏪 Pickup Status' : '🚚 Delivery Status'}
                                    </h3>
                                    <div className="space-y-0">
                                        {getActiveSteps().map((step, i, arr) => {
                                            const status = getStepStatus(step.key, arr);
                                            const isLast = i === arr.length - 1;
                                            return (
                                                <div key={step.key} className="relative flex gap-4 pb-6">
                                                    {!isLast && (
                                                        <div className={`absolute left-[15px] top-[36px] bottom-0 w-0.5 ${status === 'completed' ? 'bg-brand-500' : 'bg-gray-200'}`} />
                                                    )}
                                                    <div className={`relative z-10 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${
                                                        status === 'completed' ? 'bg-brand-500 text-white' :
                                                        status === 'current' ? 'bg-brand-100 border-2 border-brand-500 text-brand-600' :
                                                        'bg-gray-100 text-gray-400'}`}>
                                                        {status === 'completed' ? '✓' : step.icon}
                                                    </div>
                                                    <div className="flex-1 pt-1">
                                                        <p className={`text-sm font-semibold ${status === 'upcoming' ? 'text-gray-400' : 'text-gray-900'}`}>{step.label}</p>
                                                        <p className={`text-xs ${status === 'upcoming' ? 'text-gray-300' : 'text-gray-500'}`}>{step.desc}</p>
                                                        {status === 'current' && order.delivery_updated_at && (
                                                            <p className="text-xs text-brand-600 mt-0.5">Updated: {new Date(order.delivery_updated_at).toLocaleString()}</p>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* In-app conversation — token-scoped, only on track links */}
                                {activeToken && <BuyerThread token={activeToken} sellerName={seller && seller.business_name} />}

                                {/* Delivery address or pickup location */}
                                {order.delivery_method === 'pickup' && seller?.pickup_address && (
                                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4">
                                        <p className="text-xs font-bold text-blue-900 uppercase tracking-wide mb-1">📍 Pickup Location</p>
                                        <p className="text-sm text-blue-800">{seller.pickup_address}</p>
                                    </div>
                                )}
                                {order.delivery_address && order.delivery_method !== 'pickup' && (
                                    <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                                        <p className="text-xs font-bold text-amber-900 uppercase tracking-wide mb-1">📍 Delivering To</p>
                                        <p className="text-sm text-amber-800">{order.delivery_address}</p>
                                    </div>
                                )}

                                {/* Order items */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-3">Order Items</h3>
                                    <div className="space-y-2">
                                        {items.map((item, i) => (
                                            <div key={i} className="flex justify-between py-2 border-b border-gray-50 last:border-0">
                                                <div>
                                                    <p className="text-sm font-medium text-gray-900">{item.product_name}</p>
                                                    <p className="text-xs text-gray-400">Qty: {item.quantity}</p>
                                                </div>
                                                <p className="text-sm font-bold text-gray-900">{formatCurrency((item.unit_price || 0) * item.quantity)}</p>
                                            </div>
                                        ))}
                                    </div>
                                    {Number(order.discount_amount) > 0 && (
                                        <div className="flex justify-between text-sm text-green-600 pt-2 mt-2 border-t border-gray-100">
                                            <span>Discount {order.discount_code && `(${order.discount_code})`}</span>
                                            <span>-{formatCurrency(order.discount_amount)}</span>
                                        </div>
                                    )}
                                    {Number(order.delivery_fee) > 0 && (
                                        <div className="flex justify-between text-sm text-amber-600 pt-1">
                                            <span>🚚 Delivery Fee</span>
                                            <span>+{formatCurrency(order.delivery_fee)}</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center pt-3 mt-3 border-t border-gray-200">
                                        <span className="font-semibold text-gray-700">Total</span>
                                        <span className="text-xl font-bold text-brand-600">{formatCurrency(order.total)}</span>
                                    </div>
                                </div>

                                {/* Contact seller */}
                                {seller && seller.phone && (
                                    <a href={`https://wa.me/${window.waNumber(seller.phone)}?text=Hi, I'd like an update on my order ${order.order_number}`}
                                        target="_blank" rel="noopener"
                                        className="flex items-center justify-center gap-2 w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-2xl transition shadow-md">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.611.611l4.458-1.495A11.96 11.96 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.395 0-4.6-.804-6.368-2.155l-.444-.34-2.632.882.882-2.632-.34-.444A9.955 9.955 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                                        Message {seller.business_name} on WhatsApp
                                    </a>
                                )}

                                <InstallButton />

                                <button onClick={backToHome}
                                    className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-2xl transition text-sm">
                                    {myOrders.length > 0 ? 'Back to My Orders' : 'Track Another Order'}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="text-center py-6 text-xs text-gray-400">
                        <p>Powered by <a href="https://yebosell.co.za" className="font-semibold hover:underline"><span className="text-brand-600">Yebo</span><span className="text-amber-500">Sell</span></a></p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TrackingPage />);
    </script>
</body>
</html>
