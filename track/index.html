<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Orders — YeboSell</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <!-- PWA: installable, permanent buyer app -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YeboSell">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/config.js?v=12"></script>
    <script>
        // ---- PWA: service worker + install prompt capture (plain JS, runs before React) ----
        window.__yeboDeferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__yeboDeferredPrompt = e;
            // This event only fires when the app is NOT installed, so clear any
            // stale "installed" flag left over from a previous install/uninstall.
            try { localStorage.removeItem('yebosell_installed'); } catch (e) {}
            window.dispatchEvent(new Event('yebo-can-install'));
        });
        window.addEventListener('appinstalled', () => {
            try { localStorage.setItem('yebosell_installed', '1'); } catch (e) {}
            window.__yeboDeferredPrompt = null;
            window.dispatchEvent(new Event('yebo-installed'));
        });
        window.__yeboPromptInstall = async () => {
            const p = window.__yeboDeferredPrompt;
            if (!p) return;
            p.prompt();
            try { await p.userChoice; } catch (e) {}
            try { localStorage.setItem('yebosell_installed', '1'); } catch (e) {}
            window.__yeboDeferredPrompt = null;
            window.dispatchEvent(new Event('yebo-installed'));
        };
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#15803d', 600: '#166534', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');
        :root { --kc-gold: #D4A017; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; letter-spacing: -0.01em; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .accent { color: var(--kc-gold); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabase = window.supabaseClient;
        const formatCurrency = window.formatCurrency;
        const getStatusColor = window.getStatusColor;
        // Normalise bank_details into a list of accounts (multi-account array or legacy flat).
        const bankAccountList = (bank) => {
            if (!bank) return [];
            if (Array.isArray(bank.accounts) && bank.accounts.length)
                return bank.accounts.filter(a => a && (a.bank_name || a.account_number || a.account_holder));
            if (bank.bank_name || bank.account_number)
                return [{ bank_name: bank.bank_name, account_holder: bank.account_holder, account_number: bank.account_number, branch_code: bank.branch_code }];
            return [];
        };
        const getStatusLabel = window.getStatusLabel;
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

        const DELIVERY_LABELS = {
            pickup: 'Customer Pickup', self_delivery: 'Seller Delivery',
            courier: 'Courier / Third Party', taxi: 'Via Taxi', bus: 'Via Bus', local_courier: 'Local Courier'
        };

        // ---- buyer order list persistence (the permanent app) ----
        const readMyOrders = () => {
            try { return JSON.parse(localStorage.getItem('yebosell_orders') || '[]').filter(o => o && o.token); }
            catch (e) { return []; }
        };
        const persistMyOrder = (token, data) => {
            try {
                const list = readMyOrders();
                const entry = {
                    token,
                    order_number: (data && data.order && data.order.order_number) || '',
                    seller_name: (data && data.seller && data.seller.business_name) || '',
                    seller_slug: (data && data.seller && data.seller.slug) || '',
                    created_at: (data && data.order && data.order.created_at) || new Date().toISOString()
                };
                const next = [entry, ...list.filter(o => o.token !== token)];
                localStorage.setItem('yebosell_orders', JSON.stringify(next.slice(0, 100)));
            } catch (e) {}
        };

        // YeboSell platform support line (WhatsApp Business) — escalation only;
        // a buyer's first contact is the seller via the in-app thread above.
        const YEBOSELL_SUPPORT_WA = '+26657299369';
        // ---- Web Push (Phase 2): subscribe the device + register its order tokens ----
        const VAPID_PUBLIC = 'BAOUC3r1CqP-_UxUWmX_237sTfOwseK0N2xR2FBxIU-RdKNHybH99rJlHIEwqyaScb4eFUFjBV6TlEUAEjcLpbg';
        const pushSupported = () =>
            (typeof window !== 'undefined') && 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
        function urlB64ToUint8Array(b64) {
            const padding = '='.repeat((4 - (b64.length % 4)) % 4);
            const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            const out = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
            return out;
        }
        // Ensure this device has a push subscription and that the server knows
        // every order token it holds (so any order can notify it). Returns
        // { ok:true } or { ok:false, step, detail } so failures are visible
        // instead of being swallowed. Safe to call repeatedly.
        async function syncPushSubscription() {
            if (!pushSupported()) return { ok: false, step: 'support', detail: 'Push not supported on this browser' };
            if (Notification.permission !== 'granted') return { ok: false, step: 'permission', detail: 'Permission ' + Notification.permission };
            let reg, sub;
            try {
                reg = await Promise.race([
                    navigator.serviceWorker.ready,
                    new Promise((_, rej) => setTimeout(() => rej(new Error('service worker not ready (timeout)')), 8000))
                ]);
            } catch (e) { return { ok: false, step: 'sw-ready', detail: String(e && e.message || e) }; }
            try {
                sub = await reg.pushManager.getSubscription();
                if (!sub) {
                    sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC) });
                }
            } catch (e) { return { ok: false, step: 'subscribe', detail: String(e && e.message || e) }; }
            try {
                const j = sub.toJSON();
                const tokens = readMyOrders().map(o => o.token).filter(Boolean);
                const { error } = await supabase.rpc('register_push_subscription', { p_endpoint: sub.endpoint, p_keys: j.keys, p_tokens: tokens });
                if (error) return { ok: false, step: 'register-rpc', detail: error.message || JSON.stringify(error) };
            } catch (e) { return { ok: false, step: 'register-rpc', detail: String(e && e.message || e) }; }
            return { ok: true };
        }
        async function enablePush() {
            if (!pushSupported()) return { ok: false, step: 'support', detail: 'unsupported' };
            let perm = Notification.permission;
            if (perm === 'default') { try { perm = await Notification.requestPermission(); } catch (e) { return { ok: false, step: 'permission', detail: String(e && e.message || e) }; } }
            if (perm !== 'granted') return { ok: false, step: 'permission', detail: perm };
            return await syncPushSubscription();
        }

        // Small prompt to turn on push. Hidden when unsupported, denied, or already on.
        function PushPrompt() {
            const [perm, setPerm] = useState(pushSupported() ? Notification.permission : 'unsupported');
            const [busy, setBusy] = useState(false);
            if (!pushSupported() || perm === 'granted' || perm === 'denied' || perm === 'unsupported') return null;
            const turnOn = async () => {
                setBusy(true);
                const res = await enablePush();
                setPerm(res.ok ? 'granted' : (pushSupported() ? Notification.permission : 'unsupported'));
                setBusy(false);
                if (res.ok) window.toast('Notifications on — we’ll alert you when the seller replies.', 'success');
                else if (res.step === 'permission' && res.detail === 'denied') window.toast('Notifications blocked. Enable them in your browser settings.', 'error');
                else window.toast('Couldn’t enable notifications (' + res.step + '): ' + res.detail, 'error');
            };
            return (
                <div className="bg-brand-50 border border-brand-200 rounded-2xl p-4 flex items-center gap-3">
                    <span className="w-9 h-9 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center flex-shrink-0">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    </span>
                    <div className="min-w-0 flex-1">
                        <p className="text-sm font-semibold text-brand-900">Turn on notifications</p>
                        <p className="text-xs text-brand-700">Get alerted when the seller replies — even when YeboSell is closed.</p>
                    </div>
                    <button onClick={turnOn} disabled={busy}
                        className="bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white font-bold text-sm px-4 py-2 rounded-xl flex-shrink-0">
                        {busy ? '…' : 'Enable'}
                    </button>
                </div>
            );
        }

        // Buyer-side order conversation (mirrors the seller dashboard thread).
        // Anon buyers reach the thread only through token-scoped SECURITY DEFINER
        // RPCs; no direct table access. Realtime isn't available to anon, so we
        // poll while the page is open / on tab focus (SPEC_internal_messaging §5).
        function BuyerThread({ token, sellerName }) {
            const [msgs, setMsgs] = useState([]);
            const [text, setText] = useState('');
            const [sending, setSending] = useState(false);
            const [loaded, setLoaded] = useState(false);
            const endRef = React.useRef(null);
            const chatContainerRef = React.useRef(null);
            // Only mark the thread read once the buyer actually sees it (scrolls it
            // into view) — not just because the page is mounted. Otherwise an arriving
            // seller/system message is marked read instantly and the cross-order bell
            // never badges even though the buyer never looked at the messages.
            const visibleRef = React.useRef(false);

            const load = async (markRead) => {
                try {
                    const { data } = await supabase.rpc('get_order_thread', { p_token: token });
                    setMsgs((data && data.messages) || []);
                    setLoaded(true);
                    if (markRead) {
                        try {
                            await supabase.rpc('mark_thread_read_buyer', { p_token: token });
                            window.dispatchEvent(new Event('yebo-thread-read'));
                        } catch (e) {}
                    }
                } catch (e) {}
            };

            useEffect(() => {
                if (!token) return;
                load(false); // fetch on mount, but don't mark read until seen
                const iv = setInterval(() => { if (document.visibilityState === 'visible') load(visibleRef.current); }, 7000);
                const onVis = () => { if (document.visibilityState === 'visible') load(visibleRef.current); };
                document.addEventListener('visibilitychange', onVis);
                // Instant updates via Realtime Broadcast (DB-emitted on the public
                // topic order-rt:<token>); polling above stays as a fallback.
                let ch = null;
                try {
                    ch = supabase.channel('order-rt:' + token)
                        .on('broadcast', { event: 'msg' }, () => load(visibleRef.current))
                        .subscribe();
                } catch (e) {}
                // Mark read only while the messages are on screen.
                let io = null;
                const el = chatContainerRef.current;
                if (el && 'IntersectionObserver' in window) {
                    io = new IntersectionObserver((entries) => {
                        const vis = entries.some(en => en.isIntersecting);
                        visibleRef.current = vis;
                        if (vis) load(true);
                    }, { threshold: 0.25 });
                    io.observe(el);
                } else {
                    visibleRef.current = true; // no IO support: keep old eager behavior
                    load(true);
                }
                return () => {
                    clearInterval(iv);
                    document.removeEventListener('visibilitychange', onVis);
                    if (ch) { try { supabase.removeChannel(ch); } catch (e) {} }
                    if (io) { try { io.disconnect(); } catch (e) {} }
                };
            }, [token]);

            useEffect(() => { try { if (chatContainerRef.current) chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight; } catch (e) {} }, [msgs]);

            const send = async () => {
                const body = text.trim();
                if (!body || sending) return;
                setSending(true);
                try {
                    const { data, error } = await supabase.rpc('post_order_message', { p_token: token, p_body: body });
                    if (error || (data && data.error)) {
                        window.toast((data && data.message) || 'Could not send. Please try again.', 'error');
                    } else { setText(''); load(true); }
                } catch (e) { window.toast('Something went wrong. Please try again.', 'error'); }
                setSending(false);
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-1">💬 Messages</h3>
                    <p className="text-xs text-gray-500 mb-3">Chat directly with {sellerName || 'the seller'} about this order — they'll see your replies in their dashboard.</p>
                    <div ref={chatContainerRef} className="bg-gray-50 rounded-xl p-3 max-h-72 overflow-y-auto space-y-2">
                        {!loaded ? (
                            <p className="text-xs text-gray-400 text-center py-3">Loading…</p>
                        ) : msgs.length === 0 ? (
                            <p className="text-xs text-gray-400 text-center py-3">No messages yet. Send the seller a message below.</p>
                        ) : msgs.map(m => (
                            m.kind === 'status' ? (
                                <div key={m.id} className="text-center">
                                    <span className="inline-block text-[11px] text-gray-500 bg-gray-200/70 rounded-full px-3 py-1">{m.body}</span>
                                </div>
                            ) : (m.meta && m.meta.confirm) ? (
                                <div key={m.id} className="text-center">
                                    <span className={`inline-block text-[11px] font-semibold rounded-full px-3 py-1 ${m.meta.confirm === 'dispute' ? 'bg-amber-100 text-amber-800' : 'bg-green-100 text-green-800'}`}>{m.body}</span>
                                </div>
                            ) : (
                                <div key={m.id} className={`flex ${m.sender === 'buyer' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] px-3 py-2 rounded-2xl text-sm ${m.sender === 'buyer' ? 'bg-brand-500 text-white rounded-br-sm' : m.sender === 'admin' ? 'bg-amber-100 text-amber-900 rounded-bl-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-bl-sm'}`}>
                                        {m.sender === 'admin' && <span className="block text-[10px] font-bold uppercase opacity-70">YeboSell Support</span>}
                                        {m.sender === 'seller' && <span className="block text-[10px] font-bold uppercase opacity-60 text-brand-600">{sellerName || 'Seller'}</span>}
                                        {m.body}
                                    </div>
                                </div>
                            )
                        ))}
                        <div ref={endRef} />
                    </div>
                    <div className="flex gap-2 mt-2">
                        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') send(); }}
                            placeholder="Message the seller…"
                            className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                        <button onClick={send} disabled={sending || !text.trim()}
                            className="bg-brand-500 hover:bg-brand-600 disabled:bg-gray-300 text-white font-semibold px-4 py-2 rounded-xl text-sm">Send</button>
                    </div>
                </div>
            );
        }

        const DOC_LABELS = { payment_proof: 'Proof of payment', receipt: 'Receipt / invoice', delivery_proof: 'Delivery proof', other: 'Document' };

        // Shared per-order document hub (buyer side). Lists every document on the
        // order — proof of payment, seller receipts, delivery proof — that both
        // parties can open anytime. Anon buyers can't touch the private bucket
        // directly: uploads go through upload-payment-proof and views through
        // get-order-document, both token-validated Edge Functions.
        // "How to pay" — the seller's accepted methods + details, so the buyer
        // knows exactly where to send money (payments are off-platform). Shown
        // only while the order is unpaid.
        function HowToPay({ seller, order }) {
            if (!seller || !order || order.payment_status === 'paid') return null;
            const po = seller.payment_options || {};
            const bank = seller.bank_details || {};
            const eco = po.ecocash || {};
            const mpesa = po.mpesa || {};
            const bankAccts = bankAccountList(bank);
            const hasBank = bankAccts.length > 0;
            const methods = (po.methods && po.methods.length) ? po.methods : (hasBank ? ['eft'] : []);
            const show = {
                eft: methods.includes('eft') && hasBank,
                ecocash: methods.includes('ecocash') && eco.number,
                mpesa: methods.includes('mpesa') && mpesa.number,
                cash: methods.includes('cash')
            };
            if (!show.eft && !show.ecocash && !show.mpesa && !show.cash) return (
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                    <h3 className="text-sm font-bold text-amber-900 uppercase tracking-wide mb-2">💳 How to Pay</h3>
                    <p className="text-sm text-amber-800">The seller hasn't listed payment details yet. Message them on WhatsApp to arrange payment.</p>
                </div>
            );
            return (
                <div className="bg-green-50 border border-green-200 rounded-2xl p-5">
                    <h3 className="text-sm font-bold text-green-900 uppercase tracking-wide mb-3">💳 How to Pay</h3>
                    <div className="space-y-3 text-sm text-green-900">
                        {show.eft && (
                            <div>
                                <p className="font-bold">Bank Transfer (EFT){bankAccts.length > 1 ? ' — pay into any one' : ''}</p>
                                {bankAccts.map((acct, i) => (
                                    <div key={i} className={i > 0 ? 'mt-1.5 pt-1.5 border-t border-green-200' : ''}>
                                        {acct.bank_name && <p>Bank: {acct.bank_name}</p>}
                                        {acct.account_holder && <p>Account holder: {acct.account_holder}</p>}
                                        {acct.account_number && <p>Account no: {acct.account_number}</p>}
                                        {acct.branch_code && <p>Branch code: {acct.branch_code}</p>}
                                    </div>
                                ))}
                                <p className="mt-1">Reference: {bank.reference || order.order_number}</p>
                            </div>
                        )}
                        {show.ecocash && (
                            <div>
                                <p className="font-bold">EcoCash</p>
                                <p>Number: {eco.number}</p>
                                {eco.name && <p>Name: {eco.name}</p>}
                            </div>
                        )}
                        {show.mpesa && (
                            <div>
                                <p className="font-bold">M-Pesa</p>
                                <p>Number: {mpesa.number}</p>
                                {mpesa.name && <p>Name: {mpesa.name}</p>}
                            </div>
                        )}
                        {show.cash && (
                            <div>
                                <p className="font-bold">Cash</p>
                                <p>{po.cash_note || 'Pay in cash on collection / delivery.'}</p>
                            </div>
                        )}
                    </div>
                    <p className="text-xs text-green-700 mt-3">After paying, tap "I've paid" below and attach your proof of payment.</p>
                </div>
            );
        }

        function OrderDocuments({ token, sellerName, reloadTrigger }) {
            const [docs, setDocs] = useState([]);
            const [busy, setBusy] = useState(false);
            const [viewing, setViewing] = useState('');
            const inputRef = React.useRef(null);

            const load = async () => {
                try { const { data } = await supabase.rpc('get_order_documents', { p_token: token }); setDocs(Array.isArray(data) ? data : []); } catch (e) {}
            };
            useEffect(() => { if (token) load(); }, [token, reloadTrigger]);

            const view = async (d) => {
                setViewing(d.id);
                try {
                    const resp = await fetch(`${SUPABASE_URL}/functions/v1/get-order-document`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ token, document_id: d.id })
                    });
                    const data = await resp.json().catch(() => ({}));
                    if (data.url) window.open(data.url, '_blank');
                    else window.toast(data.message || 'Could not open the file.', 'error');
                } catch (e) { window.toast('Could not open the file.', 'error'); }
                setViewing('');
            };

            const onPick = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const okTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
                if (!okTypes.includes(file.type)) { window.toast('Please upload a JPG, PNG, WebP or PDF.', 'error'); if (inputRef.current) inputRef.current.value = ''; return; }
                if (file.size > 5 * 1024 * 1024) { window.toast('File is too large (max 5MB).', 'error'); if (inputRef.current) inputRef.current.value = ''; return; }
                setBusy(true);
                try {
                    const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
                    const resp = await fetch(`${SUPABASE_URL}/functions/v1/upload-payment-proof`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ token, content_type: file.type, file_name: file.name, file_base64: b64 })
                    });
                    const data = await resp.json().catch(() => ({}));
                    if (!resp.ok || data.error) window.toast(data.message || 'Upload failed. Please try again.', 'error');
                    else { window.toast('Proof of payment uploaded — the seller can see it now.', 'success'); load(); }
                } catch (e) { window.toast('Upload failed. Please try again.', 'error'); }
                setBusy(false);
                if (inputRef.current) inputRef.current.value = '';
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                    <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-1">📁 Order Documents</h3>
                    <p className="text-xs text-gray-500 mb-3">Receipts and proofs for this order. You and {sellerName || 'the seller'} can both open these anytime.</p>
                    {docs.length > 0 ? (
                        <div className="space-y-2 mb-3">
                            {docs.map(d => (
                                <div key={d.id} className="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                                    <span className="w-9 h-9 rounded-lg bg-brand-100 text-brand-700 flex items-center justify-center flex-shrink-0">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                                    </span>
                                    <div className="min-w-0 flex-1">
                                        <p className="text-sm font-medium text-gray-900 truncate">{DOC_LABELS[d.doc_type] || 'Document'}</p>
                                        <p className="text-xs text-gray-400 truncate">{d.file_name ? d.file_name + ' · ' : ''}{d.source === 'seller' ? 'From seller' : 'You uploaded'} · {new Date(d.created_at).toLocaleDateString()}</p>
                                    </div>

                                        {viewing === d.id ? '…' : 'View'}

                                </div>
                            ))}
                        </div>
                    ) : (
                        <p className="text-xs text-gray-400 text-center py-2 mb-2">No documents yet.</p>
                    )}
                    <input ref={inputRef} type="file" accept="image/jpeg,image/png,image/webp,application/pdf" onChange={onPick} disabled={busy} className="hidden" />
                    <button onClick={() => inputRef.current && inputRef.current.click()} disabled={busy}
                        className="w-full text-center text-brand-700 hover:text-brand-800 border border-dashed border-brand-300 rounded-lg py-2 text-sm font-semibold transition disabled:opacity-50">
                        {busy ? 'Uploading…' : '📎 Attach payment screenshot / receipt'}
                    </button>
                    <p className="text-[10px] text-gray-400 mt-1">JPG, PNG, WebP or PDF · max 5MB</p>
                </div>
            );
        }

        // Cross-order notification bell for the buyer: a per-message feed of
        // seller/admin/system messages across every order saved on this device
        // (SPEC_internal_messaging §7a). Each message is its own row (newest first),
        // read ones kept as history (dimmed) and unread highlighted; the badge counts
        // unread only. Tapping a message opens its order and jumps to the thread.
        function BuyerBell({ onOpenOrder }) {
            const [items, setItems] = useState([]);
            const [open, setOpen] = useState(false);
            const wrapRef = React.useRef(null);

            const refresh = async () => {
                const tokens = readMyOrders().map(o => o.token).filter(Boolean);
                if (!tokens.length) { setItems([]); return; }
                try {
                    const { data } = await supabase.rpc('buyer_notifications', { p_tokens: tokens });
                    setItems(Array.isArray(data) ? data : []);
                } catch (e) {}
            };

            useEffect(() => {
                refresh();
                const iv = setInterval(() => { if (document.visibilityState === 'visible') refresh(); }, 12000);
                const onVis = () => { if (document.visibilityState === 'visible') refresh(); };
                const onRead = () => setTimeout(refresh, 400);
                document.addEventListener('visibilitychange', onVis);
                window.addEventListener('yebo-thread-read', onRead);
                // Instant cross-order updates: one Broadcast channel per saved order
                // (capped). Any ping → recount. Polling stays as a fallback.
                const chans = readMyOrders().map(o => o.token).filter(Boolean).slice(0, 25).map(tok => {
                    try { return supabase.channel('order-rt:' + tok).on('broadcast', { event: 'msg' }, () => setTimeout(refresh, 300)).subscribe(); }
                    catch (e) { return null; }
                }).filter(Boolean);
                return () => {
                    clearInterval(iv);
                    document.removeEventListener('visibilitychange', onVis);
                    window.removeEventListener('yebo-thread-read', onRead);
                    chans.forEach(c => { try { supabase.removeChannel(c); } catch (e) {} });
                };
            }, []);

            useEffect(() => {
                if (!open) return;
                const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', onDoc);
                return () => document.removeEventListener('mousedown', onDoc);
            }, [open]);

            const total = items.reduce((n, m) => n + (m.read ? 0 : 1), 0);
            const pick = (m) => { setOpen(false); if (onOpenOrder) onOpenOrder(m.token); };

            return (
                <div className="relative" ref={wrapRef}>
                    <button onClick={() => setOpen(v => !v)} aria-label="Notifications"
                        className="relative p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        {total > 0 && (
                            <span className="absolute top-0 right-0 min-w-[18px] h-[18px] px-1 flex items-center justify-center text-[10px] font-bold text-white bg-red-500 rounded-full">{total > 99 ? '99+' : total}</span>
                        )}
                    </button>
                    {open && (
                        <div className="fixed left-2 right-2 top-16 w-auto sm:absolute sm:top-auto sm:left-auto sm:right-0 sm:mt-2 sm:w-72 sm:max-w-[88vw] bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden">
                            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                                <p className="font-bold text-sm text-gray-900">Notifications</p>
                                {total > 0 && <span className="text-[10px] font-bold text-white bg-red-500 rounded-full px-2 py-0.5">{total} new</span>}
                            </div>
                            <div className="max-h-96 overflow-y-auto">
                                {items.length === 0 ? (
                                    <p className="text-xs text-gray-400 text-center py-8">No notifications yet</p>
                                ) : items.map(m => (
                                    <button key={m.id} onClick={() => pick(m)}
                                        className={`w-full text-left px-4 py-3 border-b border-gray-50 hover:bg-gray-50 transition flex gap-3 items-start ${m.read ? '' : 'bg-brand-50/40'}`}>
                                        <span className={`mt-0.5 w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 ${m.read ? 'bg-gray-100 text-gray-400' : 'bg-brand-100 text-brand-700'}`}>
                                            {m.kind === 'status'
                                                ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                                                : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>}
                                        </span>
                                        <div className="min-w-0 flex-1">
                                            <div className="flex items-baseline justify-between gap-2">
                                                <p className="text-[11px] font-semibold text-gray-700 truncate font-mono">{m.order_number || 'Order'}</p>
                                                <span className="text-[10px] text-gray-400 flex-shrink-0">{m.created_at ? new Date(m.created_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : ''}</span>
                                            </div>
                                            <p className={`text-xs line-clamp-2 ${m.read ? 'text-gray-500' : 'text-gray-800 font-medium'}`}>{m.body}</p>
                                            <p className="text-[10px] text-gray-400 truncate mt-0.5">{m.seller_name || 'Seller'}</p>
                                        </div>
                                        {!m.read && <span className="mt-1.5 w-2 h-2 rounded-full bg-brand-500 flex-shrink-0" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TrackingPage() {
            const [orderNumber, setOrderNumber] = useState('');
            const [phone, setPhone] = useState('');
            const [order, setOrder] = useState(null);
            const [items, setItems] = useState([]);
            const [seller, setSeller] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [searched, setSearched] = useState(false);
            const [myOrders, setMyOrders] = useState([]);
            const [showLegacyForm, setShowLegacyForm] = useState(false);
            const [canInstall, setCanInstall] = useState(typeof window !== 'undefined' && !!window.__yeboDeferredPrompt);
            const [syncStep, setSyncStep] = useState('idle'); // 'idle' | 'code'
            const [syncPhone, setSyncPhone] = useState('');
            const [syncCode, setSyncCode] = useState('');
            const [syncError, setSyncError] = useState('');
            const [syncLoading, setSyncLoading] = useState(false);
            const [activeToken, setActiveToken] = useState('');
            const [confirmBusy, setConfirmBusy] = useState('');
            const [showDispute, setShowDispute] = useState(false);
            const [disputeNote, setDisputeNote] = useState('');
            const [showCancel, setShowCancel] = useState(false);
            const [cancelNote, setCancelNote] = useState('');
            const [cancelBusy, setCancelBusy] = useState(false);
            const [showPayModal, setShowPayModal] = useState(false);
            const [payProofFile, setPayProofFile] = useState(null);
            const [payProofBusy, setPayProofBusy] = useState(false);
            const [paidProofName, setPaidProofName] = useState('');
            const [docsReloadTrigger, setDocsReloadTrigger] = useState(0);
            const payProofInputRef = React.useRef(null);
            const orderDocsRef = React.useRef(null);

            // PWA install availability
            useEffect(() => {
                const on = () => setCanInstall(true);
                const off = () => setCanInstall(false);
                window.addEventListener('yebo-can-install', on);
                window.addEventListener('yebo-installed', off);
                return () => { window.removeEventListener('yebo-can-install', on); window.removeEventListener('yebo-installed', off); };
            }, []);

            const isStandalone = (typeof window !== 'undefined') &&
                (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone);
            const installed = (() => { try { return localStorage.getItem('yebosell_installed') === '1'; } catch (e) { return false; } })();
            const showInstall = canInstall && !isStandalone && !installed;

            // Keep the push subscription's order-token list current (no-op unless the
            // buyer has already granted notifications). Runs on mount + when orders change.
            useEffect(() => { syncPushSubscription(); }, [myOrders]);

            // On load: token link → load that order; else show My Orders (+ legacy form)
            useEffect(() => {
                setMyOrders(readMyOrders());
                trySilentRefresh();
                const params = new URLSearchParams(window.location.search);
                const token = params.get('t');
                if (token) {
                    loadByToken(token);
                    return;
                }
                const ord = params.get('order') || params.get('o');
                const ph = params.get('phone') || params.get('p');
                if (ord) { setOrderNumber(ord.toUpperCase()); setShowLegacyForm(true); }
                if (ph) { setPhone(ph); setShowLegacyForm(true); }
                if (ord && ph) { setTimeout(() => lookupOrder(ord.toUpperCase(), ph), 100); }
            }, []);

            // Keep the order itself live. The messages thread self-refreshes, but the
            // Order Progress stepper + payment status are driven by `order`, which was
            // only fetched once on load — so it went stale until a manual reload. Mirror
            // the thread's Realtime Broadcast (same order-rt:<token> topic the DB emits
            // on) plus visible-polling, refreshing silently (no spinner / no error reset).
            useEffect(() => {
                if (!activeToken) return;
                const refreshOrder = async () => {
                    try {
                        const { data } = await supabase.rpc('get_tracked_order', { p_token: activeToken });
                        if (data && data.order) {
                            setOrder(data.order);
                            setItems(data.items || []);
                            if (data.seller) setSeller(data.seller);
                        }
                    } catch (e) {}
                };
                const iv = setInterval(() => { if (document.visibilityState === 'visible') refreshOrder(); }, 7000);
                const onVis = () => { if (document.visibilityState === 'visible') refreshOrder(); };
                document.addEventListener('visibilitychange', onVis);
                let ch = null;
                try {
                    ch = supabase.channel('order-rt:' + activeToken)
                        .on('broadcast', { event: 'msg' }, () => refreshOrder())
                        .subscribe();
                } catch (e) {}
                return () => {
                    clearInterval(iv);
                    document.removeEventListener('visibilitychange', onVis);
                    if (ch) { try { supabase.removeChannel(ch); } catch (e) {} }
                };
            }, [activeToken]);

            const loadByToken = async (token) => {
                setLoading(true); setError(''); setSearched(true);
                try {
                    const { data, error: rpcError } = await supabase.rpc('get_tracked_order', { p_token: token });
                    if (rpcError || !data || !data.order) {
                        setError('Order not found. This tracking link may be incorrect or expired.');
                        setOrder(null); setLoading(false);
                        return;
                    }
                    setOrder(data.order);
                    setItems(data.items || []);
                    setSeller(data.seller || null);
                    setActiveToken(token);
                    persistMyOrder(token, data);
                    setMyOrders(readMyOrders());
                    try { window.history.replaceState({}, '', `/track/?t=${token}`); } catch (e) {}
                } catch (err) {
                    setError('Something went wrong. Please try again.');
                }
                setLoading(false);
            };

            // From the bell: open the order (if not already shown) and jump straight to
            // its messages, so the buyer reads the update without hunting for the thread.
            const openOrderToMessages = (tok) => {
                const sameOrder = tok === activeToken;
                if (!sameOrder) loadByToken(tok);
                setTimeout(() => {
                    const el = document.getElementById('order-messages');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, sameOrder ? 80 : 500);
            };

            // Buyer-side confirmation: records the buyer's own assertion (paid /
            // received / problem) independently of the seller, into the order thread.
            const confirmOrder = async (action, note) => {
                if (!activeToken || confirmBusy) return;
                if (action === 'dispute' && !showDispute) { setShowDispute(true); return; }
                setConfirmBusy(action);
                try {
                    const { data, error: rpcErr } = await supabase.rpc('buyer_confirm_order', {
                        p_token: activeToken, p_action: action, p_note: note || null });
                    if (rpcErr || !data || data.error) {
                        window.toast((data && data.message) || 'Could not save just now. Please try again.', 'error');
                    } else {
                        setOrder(o => Object.assign({}, o, {
                            buyer_paid_confirmed_at: data.buyer_paid_confirmed_at,
                            buyer_received_confirmed_at: data.buyer_received_confirmed_at,
                            buyer_dispute_at: data.buyer_dispute_at,
                            buyer_dispute_reason: data.buyer_dispute_reason
                        }));
                        setShowDispute(false); setDisputeNote('');
                        window.toast(
                            action === 'paid' ? "Thanks — we've let the seller know you paid." :
                            action === 'received' ? 'Thanks for confirming you received your order.' :
                            "Reported. The seller and YeboSell can now see this.",
                            action === 'dispute' ? 'info' : 'success');
                    }
                } catch (e) {
                    window.toast('Something went wrong. Please try again.', 'error');
                }
                setConfirmBusy('');
            };

            // Buyer cancels their own order (allowed until it's out for delivery).
            // Stock is restored and the seller is notified, server-side.
            const CANCELLABLE = ['new', 'confirmed', 'preparing', 'paid', 'ready_for_pickup'];
            const cancelOrder = async () => {
                if (!activeToken || cancelBusy) return;
                setCancelBusy(true);
                try {
                    const { data, error: rpcErr } = await supabase.rpc('buyer_cancel_order', {
                        p_token: activeToken, p_reason: cancelNote || null });
                    if (rpcErr || !data || data.error) {
                        window.toast((data && data.message) || 'Could not cancel just now. Please try again.', 'error');
                    } else {
                        setOrder(o => Object.assign({}, o, {
                            status: 'cancelled', delivery_status: 'cancelled',
                            buyer_cancelled_at: new Date().toISOString(),
                            buyer_cancel_reason: cancelNote || null
                        }));
                        setShowCancel(false); setCancelNote('');
                        window.toast('Your order has been cancelled. The seller has been notified.', 'success');
                    }
                } catch (e) {
                    window.toast('Something went wrong. Please try again.', 'error');
                }
                setCancelBusy(false);
            };

            // Upload optional proof then record payment confirmation in one action.
            const confirmWithProof = async () => {
                if (payProofBusy || confirmBusy) return;
                setPayProofBusy(true);
                try {
                    if (payProofFile) {
                        const okTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
                        if (!okTypes.includes(payProofFile.type) || payProofFile.size > 5 * 1024 * 1024) {
                            window.toast('File must be JPG, PNG, WebP or PDF, max 5 MB.', 'error');
                            setPayProofBusy(false); return;
                        }
                        const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(payProofFile); });
                        const resp = await fetch(`${SUPABASE_URL}/functions/v1/upload-payment-proof`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                            body: JSON.stringify({ token: activeToken, content_type: payProofFile.type, file_name: payProofFile.name, file_base64: b64 })
                        });
                        const ud = await resp.json().catch(() => ({}));
                        if (!resp.ok || ud.error) { window.toast(ud.message || 'Upload failed. Please try again.', 'error'); setPayProofBusy(false); return; }
                    }
                    setConfirmBusy('paid');
                    const { data, error: rpcErr } = await supabase.rpc('buyer_confirm_order', { p_token: activeToken, p_action: 'paid', p_note: null });
                    if (rpcErr || !data || data.error) {
                        window.toast((data && data.message) || 'Could not save just now. Please try again.', 'error');
                    } else {
                        setOrder(o => Object.assign({}, o, {
                            buyer_paid_confirmed_at: data.buyer_paid_confirmed_at,
                            buyer_received_confirmed_at: data.buyer_received_confirmed_at,
                            buyer_dispute_at: data.buyer_dispute_at,
                            buyer_dispute_reason: data.buyer_dispute_reason
                        }));
                        if (payProofFile) { setPaidProofName(payProofFile.name); setDocsReloadTrigger(t => t + 1); }
                        setShowPayModal(false); setPayProofFile(null);
                        window.toast(payProofFile ? "Payment confirmed and proof uploaded — the seller can see it now." : "Thanks — we've let the seller know you paid.", 'success');
                    }
                    setConfirmBusy('');
                } catch (e) { window.toast('Something went wrong. Please try again.', 'error'); }
                setPayProofBusy(false);
            };

            // Legacy lookup by order number + phone (kept ~60 days for old links)
            const lookupOrder = async (num, ph) => {
                const searchNum = num || orderNumber;
                const searchPhone = ph || phone;
                if (!searchNum.trim()) { setError('Please enter your order number'); return; }
                if (!searchPhone.trim()) { setError('Please enter your phone number for verification'); return; }
                setLoading(true); setError(''); setSearched(true);
                try {
                    // Server-side verified lookup (phone checked in the DB; no PII exposed to anon)
                    const { data, error: rpcErr } = await supabase.rpc('get_tracked_order_by_lookup', { p_order_number: searchNum.trim(), p_phone: searchPhone });
                    if (rpcErr || !data || !data.order) { setError('Order not found. Please check your order number and phone.'); setOrder(null); setLoading(false); return; }
                    setOrder(data.order);
                    setItems(data.items || []);
                    setSeller(data.seller || null);
                } catch (err) { setError('Something went wrong. Please try again.'); }
                setLoading(false);
            };

            // Merge a server-returned order list into the device's persistent "My Orders"
            const mergeServerOrders = (serverList) => {
                try {
                    const map = {};
                    readMyOrders().forEach(o => { if (o.token) map[o.token] = o; });
                    (serverList || []).forEach(o => {
                        if (!o || !o.token) return;
                        map[o.token] = Object.assign({}, map[o.token], {
                            token: o.token, order_number: o.order_number, seller_name: o.seller_name,
                            created_at: o.created_at, status: o.status, payment_status: o.payment_status,
                            delivery_status: o.delivery_status, total: o.total
                        });
                    });
                    const merged = Object.keys(map).map(k => map[k])
                        .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                    localStorage.setItem('yebosell_orders', JSON.stringify(merged.slice(0, 200)));
                    setMyOrders(merged);
                    return merged;
                } catch (e) { return readMyOrders(); }
            };

            // After verifying once, silently refresh the full list on every app open
            const trySilentRefresh = () => {
                let sync = null;
                try { sync = JSON.parse(localStorage.getItem('yebosell_sync') || 'null'); } catch (e) {}
                if (sync && sync.phone && sync.proof) {
                    supabase.rpc('get_orders_by_phone', { p_phone: sync.phone, p_order_number: sync.proof })
                        .then(({ data }) => { if (data && data.length) mergeServerOrders(data); })
                        .catch(() => {});
                }
            };

            const sendCode = async () => {
                const p = syncPhone.trim();
                if (!p) { setSyncError('Please enter your phone number'); return; }
                setSyncLoading(true); setSyncError('');
                try {
                    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ phone: p })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) { setSyncError(data.error || 'Could not send the code. Please try again.'); setSyncLoading(false); return; }
                    setSyncStep('code');
                } catch (e) { setSyncError('Network error. Please try again.'); }
                setSyncLoading(false);
            };

            const verifyCode = async () => {
                const p = syncPhone.trim(); const c = syncCode.trim();
                if (!c) { setSyncError('Please enter the code'); return; }
                setSyncLoading(true); setSyncError('');
                try {
                    const { data, error: rpcErr } = await supabase.rpc('get_orders_by_otp', { p_phone: p, p_otp: c });
                    if (rpcErr) { setSyncError('Verification failed. Please try again.'); setSyncLoading(false); return; }
                    const list = data || [];
                    if (!list.length) { setSyncError('Invalid or expired code, or no orders found for this number.'); setSyncLoading(false); return; }
                    mergeServerOrders(list);
                    try { localStorage.setItem('yebosell_sync', JSON.stringify({ phone: p, proof: list[0].order_number })); } catch (e) {}
                    setSyncStep('idle'); setSyncCode(''); setSyncPhone('');
                } catch (e) { setSyncError('Something went wrong. Please try again.'); }
                setSyncLoading(false);
            };

            const backToHome = () => {
                setOrder(null); setSeller(null); setItems([]); setError(''); setSearched(false);
                setActiveToken(''); setShowDispute(false); setDisputeNote('');
                setMyOrders(readMyOrders());
                try { window.history.replaceState({}, '', '/track/'); } catch (e) {}
            };

            // Unified lifecycle, identical to the seller's: New → Confirmed →
            // Preparing → (Ready for Pickup | Out for Delivery) → Delivered.
            // Step 4 adapts to the delivery method (pickup vs delivery).
            const getActiveSteps = () => {
                if (!order) return [];
                return window.orderStages(order.delivery_method);
            };
            const getStepStatus = (stepKey, steps) => {
                const currentIndex = steps.findIndex(s => s.key === (order?.status || 'new'));
                const stepIndex = steps.findIndex(s => s.key === stepKey);
                if (stepIndex < currentIndex) return 'completed';
                if (stepIndex === currentIndex) return 'current';
                return 'upcoming';
            };

            const InstallButton = () => showInstall ? (
                <button onClick={() => window.__yeboPromptInstall()}
                    className="flex items-center justify-center gap-2 w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-2xl transition shadow-md">
                    📲 Add YeboSell to your phone
                </button>
            ) : null;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header — sticky, full-width, wider on desktop */}
                    <div className="bg-white border-b border-gray-200 sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
                            <div className="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center flex-shrink-0">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                            </div>
                            <div className="flex-1 min-w-0">

                                            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                                                <p className="text-xs font-bold text-amber-900 uppercase tracking-wide mb-1">📍 Delivering To</p>
                                                <p className="text-sm text-amber-800">{order.delivery_address}</p>
                                            </div>

                                        {/* WhatsApp contact */}

                                                Message {seller.business_name} on WhatsApp
                                            </a>
                                        )}

                                        <button onClick={backToHome}
                                            className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-2xl transition text-sm">
                                            {myOrders.length > 0 ? 'Back to My Orders' : 'Track Another Order'}
                                        </button>
                                    </div>

                                    {/* === RIGHT: status, actions, communication === */}
                                    {/* order-1 on mobile = this column appears first (above order details) */}
                                    <div className="lg:w-7/12 space-y-4 order-1 lg:order-2">
                                        {/* How to pay (while unpaid) */}
                                        <HowToPay seller={seller} order={order} />

                                            <div className="bg-brand-50 border border-brand-200 rounded-2xl p-4 flex items-center gap-3">

                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

                                                </div>
                                            </div>

                                                <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                                                    <p className="text-sm font-bold text-red-700">✕ Order Cancelled</p>

                                                        <>
                                                            <p className="text-xs text-red-600 mt-1">You cancelled this order · {new Date(order.buyer_cancelled_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</p>

                                                        <p className="text-xs text-red-600 mt-1">This order has been cancelled. Message the seller below if you have any questions.</p>
                                                    )}

                                                        const status = getStepStatus(step.key, arr);
                                                        const isLast = i === arr.length - 1;
                                                        return (
                                                            <div key={step.key} className="relative flex gap-4 pb-6">
                                                                {!isLast && (
                                                                    <div className={`absolute left-[15px] top-[36px] bottom-0 w-0.5 ${status === 'completed' ? 'bg-brand-500' : 'bg-gray-200'}`} />

                                                                    status === 'completed' ? 'bg-brand-500 text-white' :
                                                                    status === 'current' ? 'bg-brand-100 border-2 border-brand-500 text-brand-600' :
                                                                    'bg-gray-100 text-gray-400'}`}>
                                                                    {status === 'completed' ? '✓' : (i + 1)}

                                                                        <p className="text-xs text-gray-500 mt-0.5">{new Date(order.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</p>

                                                                        <p className="text-xs text-brand-600 mt-0.5">Updated: {new Date(order.delivery_updated_at).toLocaleString()}</p>

                                                            </div>

                                                            You confirmed payment · {new Date(order.buyer_paid_confirmed_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}
                                                        </div>

                                                            <button onClick={() => orderDocsRef.current && orderDocsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' })}

                                                        )}

                                                    <button onClick={() => setShowPayModal(true)} disabled={!!confirmBusy || payProofBusy}

                                                        {confirmBusy === 'paid' ? 'Saving…' : "✓ I've paid for this order"}
                                                    </button>

                                                    <div className="flex items-center gap-2 text-sm text-brand-700 font-semibold mb-2">
                                                        <span className="w-5 h-5 rounded-full bg-brand-500 text-white flex items-center justify-center text-xs">✓</span>
                                                        You confirmed receipt · {new Date(order.buyer_received_confirmed_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}
                                                    </div>
                                                ) : (
                                                    <button onClick={() => confirmOrder('received')} disabled={!!confirmBusy}
                                                        className="w-full flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl transition disabled:opacity-50 mb-2">
                                                        {confirmBusy === 'received' ? 'Saving…' : '✓ Confirm I received my order'}
                                                    </button>
                                                )}
                                                {order.buyer_dispute_at ? (
                                                    <div className="mt-2 bg-amber-50 border border-amber-200 rounded-xl p-3">
                                                        <p className="text-xs font-bold text-amber-900">⚠ You reported a problem · {new Date(order.buyer_dispute_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</p>

                                                        <p className="text-xs text-amber-700 mt-1">The seller and YeboSell can see this. You can keep messaging the seller below.</p>
                                                    </div>
                                                ) : showDispute ? (
                                                    <div className="mt-2 border border-gray-200 rounded-xl p-3">
                                                        <label className="text-xs font-semibold text-gray-700">What went wrong?</label>
                                                        <textarea value={disputeNote} onChange={e => setDisputeNote(e.target.value)} rows="2" maxLength="500"
                                                            placeholder="e.g. I paid but haven't received my order"
                                                            className="w-full mt-1 text-sm border border-gray-200 rounded-lg p-2 focus:outline-none focus:border-brand-500" />
                                                        <div className="flex gap-2 mt-2">
                                                            <button onClick={() => confirmOrder('dispute', disputeNote)} disabled={!!confirmBusy}
                                                                className="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-lg text-sm transition disabled:opacity-50">
                                                                {confirmBusy === 'dispute' ? 'Sending…' : 'Submit report'}
                                                            </button>
                                                            <button onClick={() => { setShowDispute(false); setDisputeNote(''); }}
                                                                className="px-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2 rounded-lg text-sm transition">Cancel</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setShowDispute(true)} disabled={!!confirmBusy}
                                                        className="w-full text-center text-amber-700 hover:text-amber-800 font-semibold py-2 text-sm transition">
                                                        ⚠ Report a problem with this order
                                                    </button>
                                                )}

                                                {/* Buyer cancellation — the button stays visible; once the order is
                                                    out for delivery / delivered it explains why it can't be cancelled. */}
                                                {order.status !== 'cancelled' && (
                                                    <div className="mt-3 pt-3 border-t border-gray-100">
                                                        {!showCancel ? (
                                                            <button onClick={() => setShowCancel(true)} disabled={!!confirmBusy}
                                                                className="w-full text-center text-gray-400 hover:text-red-600 font-medium py-1.5 text-xs transition">
                                                                Cancel this order
                                                            </button>
                                                        ) : CANCELLABLE.includes(order.status) ? (
                                                            <div className="border border-red-200 rounded-xl p-3">
                                                                <label className="text-xs font-semibold text-gray-700">Cancel this order?</label>
                                                                <p className="text-[11px] text-gray-400 mt-0.5 mb-1.5">The seller will be notified and any reserved stock is released. Tell them why (optional).</p>
                                                                <textarea value={cancelNote} onChange={e => setCancelNote(e.target.value)} rows="2" maxLength="500"
                                                                    placeholder="e.g. Ordered by mistake / changed my mind"
                                                                    className="w-full text-sm border border-gray-200 rounded-lg p-2 focus:outline-none focus:border-red-400" />
                                                                <div className="flex gap-2 mt-2">
                                                                    <button onClick={cancelOrder} disabled={cancelBusy}
                                                                        className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg text-sm transition disabled:opacity-50">
                                                                        {cancelBusy ? 'Cancelling…' : 'Yes, cancel my order'}
                                                                    </button>
                                                                    <button onClick={() => { setShowCancel(false); setCancelNote(''); }} disabled={cancelBusy}
                                                                        className="px-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2 rounded-lg text-sm transition">Keep order</button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="border border-gray-200 bg-gray-50 rounded-xl p-3">
                                                                <p className="text-xs text-gray-600">
                                                                    {order.status === 'delivered'
                                                                        ? "This order has already been delivered, so it can't be cancelled here."
                                                                        : "This order is already on its way, so it can't be cancelled here."}
                                                                    {' '}Please message the seller below if you need help.
                                                                </p>
                                                                <button onClick={() => setShowCancel(false)}
                                                                    className="mt-2 text-xs font-semibold text-gray-500 hover:text-gray-700">Got it</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Shared order documents */}
                                        {activeToken && <div ref={orderDocsRef}><OrderDocuments token={activeToken} sellerName={seller && seller.business_name} reloadTrigger={docsReloadTrigger} /></div>}

                                        {/* Push opt-in */}
                                        {activeToken && <PushPrompt />}

                                        {/* In-app chat */}
                                        {activeToken && <div id="order-messages"><BuyerThread token={activeToken} sellerName={seller && seller.business_name} /></div>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Payment proof modal */}
                    {showPayModal && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.55)' }}
                            onClick={e => { if (e.target === e.currentTarget && !payProofBusy && !confirmBusy) { setShowPayModal(false); setPayProofFile(null); } }}>
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                                <div className="bg-brand-500 px-5 py-4">
                                    <h2 className="text-white font-bold text-base">Confirm Payment</h2>
                                    <p className="text-green-100 text-xs mt-0.5">Attach a photo or screenshot as proof (optional but recommended)</p>
                                </div>
                                <div className="p-5">
                                    <input ref={payProofInputRef} type="file" accept="image/jpeg,image/png,image/webp,application/pdf" capture="environment"
                                        onChange={e => setPayProofFile(e.target.files && e.target.files[0] || null)} className="hidden" />
                                    {payProofFile ? (
                                        <div className="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl p-3 mb-4">
                                            <span className="text-2xl">📎</span>
                                            <div className="min-w-0 flex-1">
                                                <p className="text-sm font-semibold text-green-900 truncate">{payProofFile.name}</p>
                                                <p className="text-xs text-green-700">{(payProofFile.size / 1024).toFixed(0)} KB · ready to upload</p>
                                            </div>
                                            <button onClick={() => { setPayProofFile(null); if (payProofInputRef.current) payProofInputRef.current.value = ''; }}
                                                className="text-green-700 hover:text-green-900 text-lg font-bold flex-shrink-0">✕</button>
                                        </div>
                                    ) : (
                                        <button onClick={() => payProofInputRef.current && payProofInputRef.current.click()}
                                            className="w-full flex flex-col items-center gap-2 border-2 border-dashed border-gray-300 hover:border-brand-400 rounded-xl py-5 mb-4 transition text-gray-500 hover:text-brand-600">
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                            <span className="text-sm font-semibold">Take photo or choose file</span>
                                            <span className="text-xs text-gray-400">JPG, PNG, WebP or PDF · max 5 MB</span>
                                        </button>
                                    )}
                                    <button onClick={confirmWithProof} disabled={payProofBusy || !!confirmBusy}
                                        className="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-60 text-white font-bold py-3 rounded-xl transition text-base mb-2">
                                        {(payProofBusy || confirmBusy === 'paid') ? (payProofFile ? 'Uploading & confirming…' : 'Confirming…') : (payProofFile ? 'Upload proof & confirm payment' : 'Confirm payment (no proof)')}
                                    </button>
                                    <button onClick={() => { if (!payProofBusy && !confirmBusy) { setShowPayModal(false); setPayProofFile(null); } }}
                                        disabled={payProofBusy || !!confirmBusy}
                                        className="w-full text-center text-gray-500 hover:text-gray-700 text-sm py-2 transition disabled:opacity-50">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="text-center py-8 text-xs text-gray-400 space-y-2">
                        <div>
                            <a href={window.whatsappLink(YEBOSELL_SUPPORT_WA, 'Hi YeboSell support, I need help with an order.')}
                               target="_blank" rel="noopener noreferrer"
                               className="inline-flex items-center gap-1.5 font-semibold text-brand-600 hover:underline">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                                Contact YeboSell support
                            </a>
                            <p className="text-[11px] text-gray-400 mt-1">For help the seller can’t resolve. For order questions, message the seller above.</p>
                        </div>
                        <p>Powered by <a href="https://yebosell.com" className="font-semibold hover:underline"><span className="text-brand-600">Yebo</span><span className="text-amber-500">Sell</span></a></p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TrackingPage />);
    </script>
</body>
</html>
